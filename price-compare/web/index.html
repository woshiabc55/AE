<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电商价格采集对比工具</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3348;
  --text: #e4e6f0;
  --text2: #9498ad;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --jd: #e4393c;
  --tb: #ff6a00;
  --pdd: #e02e24;
  --green: #00b894;
  --yellow: #fdcb6e;
  --blue: #0984e3;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; line-height: 1.6; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

header { text-align: center; padding: 40px 20px 30px; }
header h1 { font-size: 2.2em; background: linear-gradient(135deg, var(--accent), var(--accent2), #fd79a8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: 2px; }
header p { color: var(--text2); margin-top: 8px; font-size: 1.05em; }

.search-box { background: var(--surface); border-radius: var(--radius); padding: 28px 32px; margin-bottom: 24px; border: 1px solid var(--border); }
.search-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.search-row input[type="text"] { flex: 1; min-width: 200px; padding: 12px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 16px; outline: none; transition: border .2s; }
.search-row input[type="text"]:focus { border-color: var(--accent); }
.search-row button { padding: 12px 32px; border-radius: 8px; border: none; background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform .15s, box-shadow .2s; }
.search-row button:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(108,92,231,.4); }
.search-row button:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

.filters { display: flex; gap: 16px; margin-top: 16px; flex-wrap: wrap; align-items: center; }
.filters label { color: var(--text2); font-size: 14px; display: flex; align-items: center; gap: 6px; }
.filters input[type="number"] { width: 100px; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 14px; outline: none; }
.filters input[type="number"]:focus { border-color: var(--accent); }
.platform-checks { display: flex; gap: 12px; }
.platform-checks label { cursor: pointer; display: flex; align-items: center; gap: 4px; }
.platform-checks input[type="checkbox"] { accent-color: var(--accent); }
.platform-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; color: #fff; }
.platform-tag.jd { background: var(--jd); }
.platform-tag.tb { background: var(--tb); }
.platform-tag.pdd { background: var(--pdd); }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); text-align: center; transition: transform .2s; }
.stat-card:hover { transform: translateY(-2px); }
.stat-card .label { color: var(--text2); font-size: 13px; margin-bottom: 6px; }
.stat-card .value { font-size: 1.6em; font-weight: 700; }
.stat-card .value.price { color: var(--jd); }
.stat-card .value.green { color: var(--green); }
.stat-card .value.blue { color: var(--blue); }
.stat-card .value.yellow { color: var(--yellow); }

.section-title { font-size: 1.3em; font-weight: 700; margin: 28px 0 16px; display: flex; align-items: center; gap: 10px; }
.section-title .icon { font-size: 1.2em; }

.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.chart-card { background: var(--surface); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); }
.chart-card h3 { font-size: 15px; color: var(--text2); margin-bottom: 12px; font-weight: 500; }
.chart-container { width: 100%; height: 320px; }

.recommendations { margin-bottom: 24px; }
.rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.rec-card { background: var(--surface); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); transition: transform .2s, border-color .2s; }
.rec-card:hover { transform: translateY(-2px); border-color: var(--accent); }
.rec-card .rank { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-weight: 700; font-size: 14px; margin-right: 8px; }
.rec-card .rank.gold { background: linear-gradient(135deg, #f9ca24, #f0932b); color: #fff; }
.rec-card .rank.silver { background: linear-gradient(135deg, #b2bec3, #636e72); color: #fff; }
.rec-card .rank.bronze { background: linear-gradient(135deg, #e17055, #d63031); color: #fff; }
.rec-card .rank.normal { background: var(--surface2); color: var(--text2); }
.rec-card .name { font-weight: 600; font-size: 15px; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.rec-card .meta { display: flex; gap: 16px; font-size: 13px; color: var(--text2); margin-bottom: 8px; flex-wrap: wrap; }
.rec-card .price-val { color: var(--jd); font-weight: 700; font-size: 18px; }
.rec-card .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.rec-card .tag { padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.tag-low { background: rgba(0,184,148,.15); color: var(--green); }
.tag-hot { background: rgba(253,203,110,.15); color: var(--yellow); }
.tag-rating { background: rgba(9,132,227,.15); color: var(--blue); }
.tag-discount { background: rgba(225,112,85,.15); color: #e17055; }
.rec-card .link { margin-top: 8px; }
.rec-card .link a { color: var(--accent2); font-size: 13px; text-decoration: none; }
.rec-card .link a:hover { text-decoration: underline; }

.compare-section { margin-bottom: 24px; }
.compare-table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.compare-table th { background: var(--surface2); color: var(--text2); padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; white-space: nowrap; }
.compare-table td { padding: 10px 16px; border-top: 1px solid var(--border); font-size: 14px; }
.compare-table tr:hover td { background: rgba(108,92,231,.05); }

.product-table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); margin-bottom: 24px; }
.product-table th { background: var(--surface2); color: var(--text2); padding: 10px 14px; text-align: left; font-size: 13px; font-weight: 600; white-space: nowrap; position: sticky; top: 0; }
.product-table td { padding: 8px 14px; border-top: 1px solid var(--border); font-size: 13px; }
.product-table tr:hover td { background: rgba(108,92,231,.05); }
.product-table .pname { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.product-table .pprice { color: var(--jd); font-weight: 700; }
.table-wrap { max-height: 500px; overflow-y: auto; border-radius: var(--radius); }

.loading-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,17,23,.8); z-index: 999; justify-content: center; align-items: center; }
.loading-overlay.active { display: flex; }
.loading-spinner { text-align: center; }
.loading-spinner .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-spinner p { color: var(--text2); font-size: 15px; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; color: #fff; }
.badge-jd { background: var(--jd); }
.badge-tb { background: var(--tb); }
.badge-pdd { background: var(--pdd); }

.trend-chart-container { width: 100%; height: 400px; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-state .icon { font-size: 3em; margin-bottom: 16px; }
.empty-state p { font-size: 16px; }

@media (max-width: 900px) {
  .charts-grid { grid-template-columns: 1fr; }
  .rec-grid { grid-template-columns: 1fr; }
  .search-row { flex-direction: column; }
  .search-row input[type="text"] { min-width: 100%; }
}
</style>
</head>
<body>
<div class="loading-overlay" id="loading">
  <div class="loading-spinner">
    <div class="spinner"></div>
    <p id="loadingText">正在采集数据，请稍候...</p>
  </div>
</div>

<div class="container">
  <header>
    <h1>🛒 电商价格采集对比工具</h1>
    <p>京东 · 淘宝 · 拼多多 — 一键比价，智能推荐</p>
  </header>

  <div class="search-box">
    <div class="search-row">
      <input type="text" id="keyword" placeholder="输入商品关键词，如：手机、笔记本、耳机..." value="手机">
      <button id="searchBtn" onclick="doSearch()">🔍 采集比价</button>
    </div>
    <div class="filters">
      <div class="platform-checks">
        <label><input type="checkbox" value="jd" checked> <span class="platform-tag jd">京东</span></label>
        <label><input type="checkbox" value="taobao" checked> <span class="platform-tag tb">淘宝</span></label>
        <label><input type="checkbox" value="pdd" checked> <span class="platform-tag pdd">拼多多</span></label>
      </div>
      <label>最低价 <input type="number" id="minPrice" placeholder="0"></label>
      <label>最高价 <input type="number" id="maxPrice" placeholder="不限"></label>
      <label>最低销量 <input type="number" id="minSales" placeholder="0"></label>
      <label>最低评分 <input type="number" id="minRating" placeholder="0" step="0.1" min="0" max="5"></label>
    </div>
  </div>

  <div id="resultsArea" style="display:none;">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="section-title"><span class="icon">📊</span> 数据可视化</div>
    <div class="charts-grid">
      <div class="chart-card">
        <h3>各平台价格分布</h3>
        <div class="chart-container" id="priceDistChart"></div>
      </div>
      <div class="chart-card">
        <h3>平台均价对比</h3>
        <div class="chart-container" id="platformCompChart"></div>
      </div>
      <div class="chart-card">
        <h3>价格区间分布</h3>
        <div class="chart-container" id="priceRangeChart"></div>
      </div>
      <div class="chart-card">
        <h3>平台商品数量占比</h3>
        <div class="chart-container" id="platformPieChart"></div>
      </div>
    </div>

    <div class="section-title"><span class="icon">📈</span> 价格趋势</div>
    <div class="chart-card" style="margin-bottom:24px;">
      <h3>近30天价格走势（Top 5 最低价商品）</h3>
      <div class="trend-chart-container" id="trendChart"></div>
    </div>

    <div class="section-title"><span class="icon">🏆</span> 性价比推荐</div>
    <div class="recommendations" id="recArea"></div>

    <div class="section-title"><span class="icon">⚖️</span> 跨平台对比</div>
    <div class="compare-section" id="compareArea"></div>

    <div class="section-title"><span class="icon">📋</span> 全部商品列表</div>
    <div class="table-wrap" id="tableArea"></div>
  </div>

  <div id="emptyState" class="empty-state">
    <div class="icon">🔍</div>
    <p>输入关键词开始采集比价，或等待示例数据加载...</p>
  </div>
</div>

<script>
const PLAT_MAP = {jd:'京东',taobao:'淘宝',pdd:'拼多多'};
const PLAT_COLORS = {jd:'#e4393c',taobao:'#ff6a00',pdd:'#e02e24'};
const PLAT_BADGE = {jd:'badge-jd',taobao:'badge-tb',pdd:'badge-pdd'};
let charts = {};

function fmtPrice(v){return '¥'+Number(v).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtSales(v){return v>=10000?(v/10000).toFixed(1)+'万':String(v);}

function showLoading(text){
  document.getElementById('loadingText').textContent=text||'正在采集数据，请稍候...';
  document.getElementById('loading').classList.add('active');
}
function hideLoading(){document.getElementById('loading').classList.remove('active');}

async function doSearch(){
  const keyword=document.getElementById('keyword').value.trim();
  if(!keyword){alert('请输入关键词');return;}
  const platforms=[...document.querySelectorAll('.platform-checks input:checked')].map(e=>e.value);
  if(!platforms.length){alert('请至少选择一个平台');return;}
  const body={keyword,platforms,count:20,
    min_price:parseFloat(document.getElementById('minPrice').value)||0,
    max_price:parseFloat(document.getElementById('maxPrice').value)||999999,
    min_sales:parseInt(document.getElementById('minSales').value)||0,
    min_rating:parseFloat(document.getElementById('minRating').value)||0
  };
  showLoading('正在从 '+platforms.map(p=>PLAT_MAP[p]).join('、')+' 采集 "'+keyword+'" ...');
  try{
    const resp=await fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await resp.json();
    if(data.error){alert(data.error);hideLoading();return;}
    renderResults(data);
  }catch(e){alert('请求失败: '+e.message);}
  hideLoading();
}

async function loadDemo(){
  try{
    const resp=await fetch('/api/demo');
    const data=await resp.json();
    if(data.error)return;
    document.getElementById('keyword').value=data.keyword||'手机';
    renderResults(data);
  }catch(e){console.log('Demo load failed',e);}
}

function renderResults(data){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('resultsArea').style.display='block';
  renderStats(data.stats);
  renderCharts(data);
  renderRecommendations(data.analysis.recommendations);
  renderCompare(data.analysis.cross_platform);
  renderTable(data.products);
}

function renderStats(stats){
  if(!stats)return;
  const items=[
    {label:'商品总数',value:stats.total||0,cls:'blue'},
    {label:'最低价',value:fmtPrice(stats.price_min||0),cls:'price'},
    {label:'最高价',value:fmtPrice(stats.price_max||0),cls:'price'},
    {label:'平均价',value:fmtPrice(stats.price_avg||0),cls:'price'},
    {label:'中位价',value:fmtPrice(stats.price_median||0),cls:'yellow'},
    {label:'平均评分',value:(stats.rating_avg||0).toFixed(2),cls:'green'},
  ];
  document.getElementById('statsGrid').innerHTML=items.map(it=>
    `<div class="stat-card"><div class="label">${it.label}</div><div class="value ${it.cls}">${it.value}</div></div>`
  ).join('');
}

function renderCharts(data){
  setTimeout(()=>{
    renderPriceDistChart(data.products||[]);
    renderPlatformCompChart(data.analysis.platform_comparison||{});
    renderPriceRangeChart(data.analysis.price_distribution||{});
    renderPlatformPieChart(data.stats?.platform_counts||{});
    renderTrendChart(data.analysis.trend_data||[]);
  },100);
}

function renderPriceDistChart(products){
  const el=document.getElementById('priceDistChart');
  if(!el)return;
  if(charts.priceDist)charts.priceDist.dispose();
  charts.priceDist=echarts.init(el);
  const byPlat={};
  products.forEach(p=>{
    if(!byPlat[p.platform])byPlat[p.platform]=[];
    byPlat[p.platform].push(p.price);
  });
  const platKeys=Object.keys(byPlat);
  charts.priceDist.setOption({
    tooltip:{trigger:'item',backgroundColor:'#1a1d27',borderColor:'#2e3348',textStyle:{color:'#e4e6f0'}},
    legend:{textStyle:{color:'#9498ad'},top:0},
    grid:{left:60,right:20,bottom:30,top:40},
    xAxis:{type:'category',data:platKeys.map(k=>PLAT_MAP[k]),axisLabel:{color:'#9498ad'},axisLine:{lineStyle:{color:'#2e3348'}}},
    yAxis:{type:'value',axisLabel:{color:'#9498ad',formatter:v=>'¥'+v},splitLine:{lineStyle:{color:'#2e3348'}}},
    series:platKeys.map(k=>({
      name:PLAT_MAP[k],type:'boxplot',
      data:(()=>{
        const prices=byPlat[k].sort((a,b)=>a-b);
        const q1=prices[Math.floor(prices.length*.25)];
        const q2=prices[Math.floor(prices.length*.5)];
        const q3=prices[Math.floor(prices.length*.75)];
        const iqr=q3-q1;
        return [[Math.max(q1-1.5*iqr,prices[0]),q1,q2,q3,Math.min(q3+1.5*iqr,prices[prices.length-1])]];
      })(),
      itemStyle:{color:PLAT_COLORS[k],borderColor:PLAT_COLORS[k]},
    }))
  });
}

function renderPlatformCompChart(comp){
  const el=document.getElementById('platformCompChart');
  if(!el)return;
  if(charts.platComp)charts.platComp.dispose();
  charts.platComp=echarts.init(el);
  const keys=Object.keys(comp);
  if(!keys.length)return;
  charts.platComp.setOption({
    tooltip:{trigger:'axis',backgroundColor:'#1a1d27',borderColor:'#2e3348',textStyle:{color:'#e4e6f0'}},
    legend:{textStyle:{color:'#9498ad'},top:0},
    grid:{left:60,right:20,bottom:30,top:40},
    xAxis:{type:'category',data:keys.map(k=>PLAT_MAP[k]||k),axisLabel:{color:'#9498ad'},axisLine:{lineStyle:{color:'#2e3348'}}},
    yAxis:{type:'value',axisLabel:{color:'#9498ad',formatter:v=>'¥'+v},splitLine:{lineStyle:{color:'#2e3348'}}},
    series:[
      {name:'最低价',type:'bar',data:keys.map(k=>comp[k].min),itemStyle:{color:'#00b894',borderRadius:[4,4,0,0]}},
      {name:'平均价',type:'bar',data:keys.map(k=>comp[k].avg),itemStyle:{color:'#6c5ce7',borderRadius:[4,4,0,0]}},
      {name:'最高价',type:'bar',data:keys.map(k=>comp[k].max),itemStyle:{color:'#fd79a8',borderRadius:[4,4,0,0]}},
    ]
  });
}

function renderPriceRangeChart(dist){
  const el=document.getElementById('priceRangeChart');
  if(!el)return;
  if(charts.priceRange)charts.priceRange.dispose();
  charts.priceRange=echarts.init(el);
  if(!dist.labels||!dist.labels.length)return;
  charts.priceRange.setOption({
    tooltip:{trigger:'axis',backgroundColor:'#1a1d27',borderColor:'#2e3348',textStyle:{color:'#e4e6f0'}},
    grid:{left:60,right:20,bottom:30,top:20},
    xAxis:{type:'category',data:dist.labels,axisLabel:{color:'#9498ad',fontSize:11},axisLine:{lineStyle:{color:'#2e3348'}}},
    yAxis:{type:'value',axisLabel:{color:'#9498ad'},splitLine:{lineStyle:{color:'#2e3348'}}},
    series:[{type:'bar',data:dist.bars||dist.bins,itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#6c5ce7'},{offset:1,color:'#a29bfe'}]),borderRadius:[4,4,0,0]},barWidth:'60%'}]
  });
}

function renderPlatformPieChart(counts){
  const el=document.getElementById('platformPieChart');
  if(!el)return;
  if(charts.pie)charts.pie.dispose();
  charts.pie=echarts.init(el);
  const keys=Object.keys(counts);
  charts.pie.setOption({
    tooltip:{trigger:'item',backgroundColor:'#1a1d27',borderColor:'#2e3348',textStyle:{color:'#e4e6f0'}},
    legend:{textStyle:{color:'#9498ad'},bottom:0},
    series:[{type:'pie',radius:['40%','70%'],label:{color:'#e4e6f0'},data:keys.map(k=>({name:PLAT_MAP[k]||k,value:counts[k],itemStyle:{color:PLAT_COLORS[k]}}))}]
  });
}

function renderTrendChart(trendData){
  const el=document.getElementById('trendChart');
  if(!el)return;
  if(charts.trend)charts.trend.dispose();
  charts.trend=echarts.init(el);
  if(!trendData.length)return;
  const top5=trendData.slice(0,5);
  const days=top5[0]?.history?.map(h=>h.day)||[];
  const dayLabels=days.map(d=>d===0?'今天':d+'天前');
  const colors=['#6c5ce7','#00b894','#fdcb6e','#e17055','#0984e3'];
  charts.trend.setOption({
    tooltip:{trigger:'axis',backgroundColor:'#1a1d27',borderColor:'#2e3348',textStyle:{color:'#e4e6f0'}},
    legend:{textStyle:{color:'#9498ad'},top:0,type:'scroll'},
    grid:{left:60,right:20,bottom:30,top:40},
    xAxis:{type:'category',data:dayLabels,axisLabel:{color:'#9498ad',fontSize:11,interval:4},axisLine:{lineStyle:{color:'#2e3348'}}},
    yAxis:{type:'value',axisLabel:{color:'#9498ad',formatter:v=>'¥'+v},splitLine:{lineStyle:{color:'#2e3348'}}},
    series:top5.map((t,i)=>({
      name:t.name.substring(0,20)+'...',
      type:'line',
      data:t.history.map(h=>h.price),
      smooth:true,
      lineStyle:{width:2,color:colors[i%colors.length]},
      itemStyle:{color:colors[i%colors.length]},
      symbol:'none',
    }))
  });
}

function renderRecommendations(recs){
  const area=document.getElementById('recArea');
  if(!recs||!recs.length){area.innerHTML='<p style="color:var(--text2)">暂无推荐数据</p>';return;}
  area.innerHTML='<div class="rec-grid">'+recs.map((r,i)=>{
    const p=r.product;
    const rankCls=i===0?'gold':i===1?'silver':i===2?'bronze':'normal';
    const tags=(r.tags||[]).map(t=>{
      let cls='tag-low';
      if(t.includes('热销'))cls='tag-hot';
      else if(t.includes('口碑'))cls='tag-rating';
      else if(t.includes('折扣'))cls='tag-discount';
      return `<span class="tag ${cls}">${t}</span>`;
    }).join('');
    return `<div class="rec-card">
      <div style="display:flex;align-items:center;margin-bottom:8px;">
        <span class="rank ${rankCls}">${i+1}</span>
        <span class="badge ${PLAT_BADGE[p.platform]||''}">${PLAT_MAP[p.platform]||p.platform}</span>
      </div>
      <div class="name">${p.name}</div>
      <div class="meta">
        <span class="price-val">${fmtPrice(p.price)}</span>
        ${p.original_price&&p.original_price>p.price?'<span style="text-decoration:line-through;color:var(--text2);font-size:13px;">'+fmtPrice(p.original_price)+'</span>':''}
      </div>
      <div class="meta">
        <span>销量 ${fmtSales(p.sales)}</span>
        <span>评分 ${p.store_rating}</span>
        <span>性价比 ${r.score}</span>
      </div>
      <div class="tags">${tags}</div>
      <div class="link"><a href="${p.url}" target="_blank" rel="noopener">查看商品 →</a></div>
    </div>`;
  }).join('')+'</div>';
}

function renderCompare(compare){
  const area=document.getElementById('compareArea');
  if(!compare||!compare.length){area.innerHTML='<p style="color:var(--text2)">暂无跨平台对比数据</p>';return;}
  let html='<table class="compare-table"><thead><tr><th>品牌</th><th>价差</th><th>最低价平台</th>';
  const allPlats=new Set();
  compare.forEach(c=>Object.keys(c.platforms).forEach(p=>allPlats.add(p)));
  allPlats.forEach(p=>{html+=`<th>${PLAT_MAP[p]||p} 均价</th><th>${PLAT_MAP[p]||p} 最低价</th><th>${PLAT_MAP[p]||p} 均销</th><th>${PLAT_MAP[p]||p} 均分</th>`;});
  html+='</tr></thead><tbody>';
  compare.slice(0,15).forEach(c=>{
    html+=`<tr><td><strong>${c.brand}</strong></td><td style="color:var(--jd)">${fmtPrice(c.price_spread||0)}</td><td><span class="badge ${PLAT_BADGE[c.cheapest_platform]||''}">${PLAT_MAP[c.cheapest_platform]||c.cheapest_platform||'-'}</span></td>`;
    allPlats.forEach(p=>{
      const d=c.platforms[p];
      if(d){html+=`<td>${fmtPrice(d.avg_price)}</td><td style="color:var(--green)">${fmtPrice(d.min_price)}</td><td>${fmtSales(d.avg_sales)}</td><td>${d.avg_rating}</td>`;}
      else{html+='<td>-</td><td>-</td><td>-</td><td>-</td>';}
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  area.innerHTML=html;
}

function renderTable(products){
  const area=document.getElementById('tableArea');
  if(!products||!products.length){area.innerHTML='<p style="color:var(--text2)">暂无商品数据</p>';return;}
  let html='<table class="product-table"><thead><tr><th>#</th><th>平台</th><th>商品名称</th><th>价格</th><th>原价</th><th>折扣</th><th>销量</th><th>店铺评分</th><th>店铺</th><th>性价比</th><th>链接</th></tr></thead><tbody>';
  products.forEach((p,i)=>{
    html+=`<tr>
      <td>${i+1}</td>
      <td><span class="badge ${PLAT_BADGE[p.platform]||''}">${PLAT_MAP[p.platform]||p.platform}</span></td>
      <td class="pname" title="${p.name}">${p.name}</td>
      <td class="pprice">${fmtPrice(p.price)}</td>
      <td style="color:var(--text2)">${p.original_price?fmtPrice(p.original_price):'-'}</td>
      <td style="color:var(--green)">${p.discount||'-'}</td>
      <td>${fmtSales(p.sales)}</td>
      <td>${p.store_rating}</td>
      <td style="font-size:12px;">${p.store_name}</td>
      <td style="color:var(--accent2);font-weight:600;">${p.value_score||'-'}</td>
      <td><a href="${p.url}" target="_blank" rel="noopener" style="color:var(--accent2);font-size:12px;">查看</a></td>
    </tr>`;
  });
  html+='</tbody></table>';
  area.innerHTML=html;
}

window.addEventListener('resize',()=>{Object.values(charts).forEach(c=>{if(c&&c.resize)c.resize();});});
document.getElementById('keyword').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

loadDemo();
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电商价格雷达 - 跨平台商品比价工具</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root {
    --bg-primary: #0f172a;
    --bg-secondary: #1e293b;
    --bg-card: #1e293b;
    --bg-card-hover: #263348;
    --border: #334155;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent-blue: #3b82f6;
    --accent-green: #10b981;
    --accent-purple: #8b5cf6;
    --accent-cyan: #06b6d4;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }
  .app-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  header { text-align: center; padding: 40px 20px 30px; position: relative; }
  header::after {
    content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 200px; height: 2px; background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
  }
  .logo { font-size: 2.4rem; font-weight: 800; letter-spacing: -1px; }
  .logo span { background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { color: var(--text-secondary); font-size: 1rem; margin-top: 8px; }
  .search-section {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 28px 32px; margin: 30px 0; box-shadow: var(--shadow);
  }
  .search-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search-input {
    flex: 1; min-width: 260px; padding: 14px 20px; background: var(--bg-primary);
    border: 2px solid var(--border); border-radius: 10px; color: var(--text-primary);
    font-size: 1rem; outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent-blue); }
  .search-input::placeholder { color: var(--text-muted); }
  .platform-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    padding: 10px 18px; border-radius: 8px; border: 2px solid var(--border);
    background: var(--bg-primary); color: var(--text-secondary); cursor: pointer;
    font-size: 0.9rem; transition: all 0.2s; user-select: none;
  }
  .chip.active { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(59,130,246,0.1); }
  .chip:hover { border-color: var(--accent-blue); }
  .btn-search {
    padding: 14px 36px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; white-space: nowrap;
  }
  .btn-search:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
  .btn-search:active { transform: translateY(0); }
  .btn-search:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: 24px 0; }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; text-align: center; transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-value { font-size: 1.8rem; font-weight: 700; }
  .stat-label { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }
  .stat-card.blue .stat-value { color: var(--accent-blue); }
  .stat-card.green .stat-value { color: var(--accent-green); }
  .stat-card.purple .stat-value { color: var(--accent-purple); }
  .stat-card.cyan .stat-value { color: var(--accent-cyan); }
  .section-title { font-size: 1.3rem; font-weight: 700; margin: 32px 0 16px; display: flex; align-items: center; gap: 10px; }
  .section-title .icon { font-size: 1.4rem; }
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(440px, 1fr)); gap: 20px; margin: 16px 0; }
  .chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
  .chart-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: var(--text-secondary); }
  .chart-container { width: 100%; height: 320px; }
  .recommend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin: 16px 0; }
  .recommend-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .recommend-card:hover { border-color: var(--accent-blue); transform: translateY(-2px); }
  .recommend-card .tag {
    position: absolute; top: 12px; right: 12px; padding: 4px 12px; border-radius: 20px;
    font-size: 0.8rem; font-weight: 600; background: rgba(59,130,246,0.15); color: var(--accent-blue);
  }
  .recommend-card .tag.best { background: rgba(16,185,129,0.15); color: var(--accent-green); }
  .recommend-card .tag.hot { background: rgba(239,68,68,0.15); color: #ef4444; }
  .recommend-card .tag.star { background: rgba(139,92,246,0.15); color: var(--accent-purple); }
  .recommend-card .r-name { font-weight: 600; font-size: 1rem; margin-bottom: 10px; padding-right: 100px; }
  .recommend-card .r-price { font-size: 1.5rem; font-weight: 800; color: var(--accent-green); }
  .recommend-card .r-price .unit { font-size: 0.9rem; font-weight: 400; }
  .recommend-card .r-original { color: var(--text-muted); text-decoration: line-through; font-size: 0.9rem; margin-left: 8px; }
  .recommend-card .r-meta { display: flex; gap: 16px; margin-top: 10px; color: var(--text-secondary); font-size: 0.85rem; }
  .recommend-card .r-platform { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; margin-top: 8px; }
  .r-platform.jd { background: rgba(229,62,62,0.15); color: #e53e3e; }
  .r-platform.tb { background: rgba(237,137,54,0.15); color: #ed8936; }
  .r-platform.pdd { background: rgba(239,68,68,0.15); color: #ef4444; }
  .recommend-card .r-score { margin-top: 10px; }
  .recommend-card .r-score-bar { height: 6px; border-radius: 3px; background: var(--bg-primary); overflow: hidden; margin-top: 4px; }
  .recommend-card .r-score-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); transition: width 0.6s ease; }
  .table-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; }
  thead { background: rgba(59,130,246,0.08); }
  th { padding: 14px 16px; text-align: left; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
  tbody tr { transition: background 0.15s; }
  tbody tr:hover { background: var(--bg-card-hover); }
  tbody tr:last-child td { border-bottom: none; }
  .price-cell { font-weight: 700; color: var(--accent-green); font-size: 1rem; }
  .price-original { color: var(--text-muted); text-decoration: line-through; font-size: 0.8rem; font-weight: 400; margin-left: 6px; }
  .platform-badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
  .platform-badge.jd { background: rgba(229,62,62,0.15); color: #e53e3e; }
  .platform-badge.tb { background: rgba(237,137,54,0.15); color: #ed8936; }
  .platform-badge.pdd { background: rgba(239,68,68,0.15); color: #ef4444; }
  .rating-stars { color: #fbbf24; }
  .discount-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; background: rgba(16,185,129,0.15); color: var(--accent-green); }
  a.product-link { color: var(--accent-blue); text-decoration: none; font-size: 0.8rem; }
  a.product-link:hover { text-decoration: underline; }
  .loading-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15,23,42,0.8); z-index: 1000; justify-content: center;
    align-items: center; flex-direction: column; gap: 20px;
  }
  .loading-overlay.active { display: flex; }
  .spinner {
    width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--accent-blue);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-secondary); font-size: 1rem; }
  .demo-banner {
    background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(6,182,212,0.1));
    border: 1px solid rgba(59,130,246,0.3); border-radius: var(--radius);
    padding: 16px 24px; margin: 20px 0; display: flex; align-items: center;
    gap: 12px; color: var(--accent-cyan); font-size: 0.95rem;
  }
  .results-area { display: none; }
  .results-area.visible { display: block; }
  @media (max-width: 768px) {
    .app-container { padding: 12px; }
    .search-row { flex-direction: column; }
    .search-input { min-width: 100%; }
    .charts-grid { grid-template-columns: 1fr; }
    .chart-container { height: 260px; }
    .recommend-grid { grid-template-columns: 1fr; }
    table { font-size: 0.8rem; }
    th, td { padding: 10px 8px; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">正在跨平台采集商品数据...</div>
</div>

<div class="app-container">
  <header>
    <div class="logo"><span>价格雷达</span></div>
    <div class="subtitle">跨平台电商商品价格采集与智能对比工具</div>
  </header>

  <section class="search-section">
    <div class="search-row">
      <input type="text" class="search-input" id="keywordInput" placeholder="输入商品关键词，如：手机、笔记本、耳机..." />
      <div class="platform-chips" id="platformChips">
        <div class="chip active" data-platform="京东">京东</div>
        <div class="chip active" data-platform="淘宝">淘宝</div>
        <div class="chip active" data-platform="拼多多">拼多多</div>
      </div>
      <button class="btn-search" id="searchBtn" onclick="doSearch()">🔍 采集比价</button>
    </div>
  </section>

  <div id="demoBanner" class="demo-banner">
    💡 页面已加载「手机」品类演示数据，您可以直接查看分析结果，也可以输入关键词进行实时采集
  </div>

  <div class="results-area" id="resultsArea">
    <div class="stats-bar" id="statsBar"></div>

    <div class="section-title"><span class="icon">🎯</span> 性价比推荐</div>
    <div class="recommend-grid" id="recommendGrid"></div>

    <div class="section-title"><span class="icon">📊</span> 数据可视化</div>
    <div class="charts-grid">
      <div class="chart-card">
        <h3>平台价格对比</h3>
        <div class="chart-container" id="chartPriceCompare"></div>
      </div>
      <div class="chart-card">
        <h3>价格区间分布</h3>
        <div class="chart-container" id="chartDistribution"></div>
      </div>
      <div class="chart-card">
        <h3>平台销量对比</h3>
        <div class="chart-container" id="chartSalesCompare"></div>
      </div>
      <div class="chart-card">
        <h3>店铺评分雷达</h3>
        <div class="chart-container" id="chartRatingRadar"></div>
      </div>
    </div>

    <div class="section-title"><span class="icon">📋</span> 全部商品明细</div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>商品名称</th>
            <th>平台</th>
            <th>价格</th>
            <th>销量</th>
            <th>店铺</th>
            <th>评分</th>
            <th>折扣</th>
            <th>链接</th>
          </tr>
        </thead>
        <tbody id="productTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const PLATFORM_COLORS = { '京东': '#e53e3e', '淘宝': '#ed8936', '拼多多': '#f43f5e' };
const PLATFORM_CLASS = { '京东': 'jd', '淘宝': 'tb', '拼多多': 'pdd' };
let currentData = null;
let chartInstances = {};

function getSelectedPlatforms() {
  return Array.from(document.querySelectorAll('#platformChips .chip.active')).map(c => c.dataset.platform);
}

document.querySelectorAll('#platformChips .chip').forEach(chip => {
  chip.addEventListener('click', () => chip.classList.toggle('active'));
});

document.getElementById('keywordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function doSearch() {
  const keyword = document.getElementById('keywordInput').value.trim();
  if (!keyword) { alert('请输入搜索关键词'); return; }
  const platforms = getSelectedPlatforms();
  if (platforms.length === 0) { alert('请至少选择一个平台'); return; }

  const loading = document.getElementById('loading');
  loading.classList.add('active');
  try {
    const resp = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keyword, platforms })
    });
    const data = await resp.json();
    if (data.success) { currentData = data; renderResults(data); }
    else { alert(data.error || '采集失败'); }
  } catch (e) {
    alert('请求失败: ' + e.message);
  } finally {
    loading.classList.remove('active');
  }
}

async function loadDemo() {
  try {
    const resp = await fetch('/api/demo');
    const data = await resp.json();
    if (data.success) {
      currentData = data;
      document.getElementById('keywordInput').value = data.keyword;
      renderResults(data);
    }
  } catch (e) {
    console.error('Demo load failed:', e);
  }
}

function renderResults(data) {
  document.getElementById('resultsArea').classList.add('visible');
  document.getElementById('demoBanner').style.display = data.is_demo ? 'flex' : 'none';
  renderStats(data);
  renderRecommendations(data.recommendations);
  renderTable(data.products);
  renderCharts(data);
}

function renderStats(data) {
  const comp = data.comparison || {};
  const allPrices = (data.products || []).map(p => p.price);
  const minPrice = allPrices.length ? Math.min(...allPrices) : 0;
  const avgPrice = allPrices.length ? allPrices.reduce((a,b) => a+b, 0) / allPrices.length : 0;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card blue"><div class="stat-value">${data.total || 0}</div><div class="stat-label">采集商品数</div></div>
    <div class="stat-card green"><div class="stat-value">¥${minPrice.toFixed(0)}</div><div class="stat-label">最低价格</div></div>
    <div class="stat-card purple"><div class="stat-value">¥${avgPrice.toFixed(0)}</div><div class="stat-label">平均价格</div></div>
    <div class="stat-card cyan"><div class="stat-value">${Object.keys(comp).length}</div><div class="stat-label">覆盖平台</div></div>
  `;
}

function renderRecommendations(recs) {
  document.getElementById('recommendGrid').innerHTML = recs.map(r => {
    const tagClass = r.recommend_tag.includes('性价比') ? 'best' : r.recommend_tag.includes('热销') ? 'hot' : r.recommend_tag.includes('优质') ? 'star' : '';
    const pct = Math.round(r.value_score * 100);
    return `
      <div class="recommend-card">
        <div class="tag ${tagClass}">${r.recommend_tag}</div>
        <div class="r-name">${r.name}</div>
        <div><span class="r-price"><span class="unit">¥</span>${r.price.toFixed(2)}</span>${r.original_price ? `<span class="r-original">¥${r.original_price.toFixed(2)}</span>` : ''}</div>
        <div class="r-meta"><span>📦 销量 ${(r.sales/10000).toFixed(1)}万</span><span>⭐ ${r.store_rating}</span></div>
        <span class="r-platform ${PLATFORM_CLASS[r.platform] || ''}">${r.platform}</span>
        <div class="r-score">
          <div style="display:flex;justify-content:space-between;font-size:0.8rem;color:var(--text-muted)"><span>性价比指数</span><span>${pct}%</span></div>
          <div class="r-score-bar"><div class="r-score-fill" style="width:${pct}%"></div></div>
        </div>
      </div>`;
  }).join('');
}

function renderTable(products) {
  document.getElementById('productTable').innerHTML = products.map((p, i) => `
    <tr>
      <td>${i + 1}</td>
      <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.name}">${p.name}</td>
      <td><span class="platform-badge ${PLATFORM_CLASS[p.platform] || ''}">${p.platform}</span></td>
      <td class="price-cell">¥${p.price.toFixed(2)}${p.original_price ? `<span class="price-original">¥${p.original_price.toFixed(2)}</span>` : ''}</td>
      <td>${p.sales >= 10000 ? (p.sales/10000).toFixed(1) + '万' : p.sales.toLocaleString()}</td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.store_name}">${p.store_name}</td>
      <td><span class="rating-stars">★</span> ${p.store_rating}</td>
      <td>${p.discount ? `<span class="discount-badge">${(p.discount * 10).toFixed(1)}折</span>` : '-'}</td>
      <td><a class="product-link" href="${p.url}" target="_blank">查看</a></td>
    </tr>
  `).join('');
}

function renderCharts(data) {
  Object.values(chartInstances).forEach(c => c.dispose());
  chartInstances = {};
  renderPriceCompareChart(data);
  renderDistributionChart(data);
  renderSalesCompareChart(data);
  renderRatingRadarChart(data);
}

function renderPriceCompareChart(data) {
  const chart = echarts.init(document.getElementById('chartPriceCompare'));
  chartInstances['priceCompare'] = chart;
  const comp = data.comparison || {};
  const platforms = Object.keys(comp);
  chart.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: params => {
      let s = params[0].axisValue + '<br/>';
      params.forEach(p => s += `${p.marker} ${p.seriesName}: ¥${p.value.toFixed(2)}<br/>`);
      return s;
    }},
    legend: { top: 0, textStyle: { color: '#94a3b8' } },
    grid: { top: 40, bottom: 30, left: 60, right: 20 },
    xAxis: { type: 'category', data: platforms, axisLabel: { color: '#94a3b8' } },
    yAxis: { type: 'value', axisLabel: { color: '#94a3b8', formatter: '¥{value}' }, splitLine: { lineStyle: { color: '#1e293b' } } },
    series: [
      { name: '最低价', type: 'bar', data: platforms.map(p => comp[p].min_price), itemStyle: { color: '#10b981' } },
      { name: '平均价', type: 'bar', data: platforms.map(p => comp[p].avg_price), itemStyle: { color: '#3b82f6' } },
      { name: '最高价', type: 'bar', data: platforms.map(p => comp[p].max_price), itemStyle: { color: '#f43f5e' } },
    ]
  });
  window.addEventListener('resize', () => chart.resize());
}

function renderDistributionChart(data) {
  const chart = echarts.init(document.getElementById('chartDistribution'));
  chartInstances['distribution'] = chart;
  const dist = data.price_distribution || [];
  chart.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
    grid: { top: 20, bottom: 30, left: 60, right: 20 },
    xAxis: { type: 'category', data: dist.map(d => d.range), axisLabel: { color: '#94a3b8', rotate: 20 } },
    yAxis: { type: 'value', axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#1e293b' } } },
    series: [{
      type: 'bar', data: dist.map(d => d.count), barWidth: '50%',
      itemStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: '#3b82f6' }, { offset: 1, color: '#06b6d4' }]),
        borderRadius: [4, 4, 0, 0]
      }
    }]
  });
  window.addEventListener('resize', () => chart.resize());
}

function renderSalesCompareChart(data) {
  const chart = echarts.init(document.getElementById('chartSalesCompare'));
  chartInstances['salesCompare'] = chart;
  const comp = data.comparison || {};
  const platforms = Object.keys(comp);
  chart.setOption({
    tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
    legend: { top: 0, textStyle: { color: '#94a3b8' } },
    series: [{
      type: 'pie', radius: ['40%', '70%'], center: ['50%', '55%'], avoidLabelOverlap: true,
      itemStyle: { borderRadius: 6, borderColor: '#1e293b', borderWidth: 2 },
      label: { color: '#94a3b8' },
      data: platforms.map(p => ({ name: p, value: comp[p].avg_sales, itemStyle: { color: PLATFORM_COLORS[p] || '#3b82f6' } }))
    }]
  });
  window.addEventListener('resize', () => chart.resize());
}

function renderRatingRadarChart(data) {
  const chart = echarts.init(document.getElementById('chartRatingRadar'));
  chartInstances['ratingRadar'] = chart;
  const comp = data.comparison || {};
  const platforms = Object.keys(comp);
  const maxSales = Math.max(...platforms.map(p => comp[p].avg_sales || 0), 1);
  const maxCount = Math.max(...platforms.map(p => comp[p].count || 0), 1);
  const minAvgPrice = Math.min(...platforms.map(p => comp[p].avg_price || Infinity));
  chart.setOption({
    tooltip: {},
    legend: { top: 0, textStyle: { color: '#94a3b8' } },
    radar: {
      indicator: [
        { name: '平均评分', max: 5 }, { name: '价格优势', max: 100 },
        { name: '销量指数', max: 100 }, { name: '商品丰富度', max: 100 },
      ],
      axisName: { color: '#94a3b8' },
      splitArea: { areaStyle: { color: ['rgba(59,130,246,0.02)', 'rgba(59,130,246,0.05)'] } },
      splitLine: { lineStyle: { color: '#334155' } },
      axisLine: { lineStyle: { color: '#334155' } },
    },
    series: [{ type: 'radar', data: platforms.map(p => {
      const c = comp[p];
      return {
        value: [
          c.avg_rating || 0,
          Math.round((1 - (c.avg_price - minAvgPrice) / (c.avg_price || 1)) * 100),
          Math.round(((c.avg_sales || 0) / maxSales) * 100),
          Math.round(((c.count || 0) / maxCount) * 100),
        ],
        name: p,
        areaStyle: { opacity: 0.15 },
        lineStyle: { color: PLATFORM_COLORS[p] },
        itemStyle: { color: PLATFORM_COLORS[p] },
      };
    })}]
  });
  window.addEventListener('resize', () => chart.resize());
}

loadDemo();
</script>

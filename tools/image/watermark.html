<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>图片水印 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">💧 图片水印</div>
    <div class="page-desc">为图片添加文字水印（支持位置、字号、颜色、透明）。</div>
  </div>

  <div class="panel">
    <div class="row">
      <input id="file" type="file" accept="image/*" />
      <input id="text" type="text" value="© SkillBox" style="max-width:240px" />
      <input id="color" type="color" value="#ffffff" style="width:60px; height:38px" />
      <div class="col" style="min-width:140px"><div class="panel-title" style="font-size:12px">字号</div><input id="size" type="number" value="36" /></div>
      <div class="col" style="min-width:140px"><div class="panel-title" style="font-size:12px">透明度 <span id="ov">70</span>%</div><input id="op" type="range" min="0" max="100" value="70" /></div>
      <select id="pos" style="max-width:140px">
        <option value="rb">右下</option><option value="lb">左下</option><option value="rt">右上</option><option value="lt">左上</option><option value="cc">居中</option>
      </select>
      <button class="btn btn-primary" onclick="run()">▶ 添加水印</button>
    </div>
  </div>

  <div class="grid grid-2">
    <div class="panel"><div class="panel-title">原图</div><div id="orig" style="min-height:240px; display:flex; align-items:center; justify-content:center; background:var(--bg-2); border-radius:8px;">未选择</div></div>
    <div class="panel"><div class="panel-title">水印后</div><div id="new" style="min-height:240px; display:flex; align-items:center; justify-content:center; background:var(--bg-2); border-radius:8px;">—</div>
      <div style="margin-top:8px"><button class="btn" id="dl" disabled>⬇ 下载</button></div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/image/watermark.html");
let cur = null, curURL = null;
$ = id => document.getElementById(id);
$("op").addEventListener("input", e => $("ov").textContent = e.target.value);
$("file").addEventListener("change", e => {
  cur = e.target.files[0]; if (!cur) return;
  if (curURL) URL.revokeObjectURL(curURL);
  curURL = URL.createObjectURL(cur);
  $("orig").innerHTML = `<img src="${curURL}" style="max-width:100%; max-height:240px;" />`;
});

function run() {
  if (!cur) return toast("请选择图片");
  const img = new Image();
  img.onload = () => {
    const c = document.createElement("canvas"); c.width = img.width; c.height = img.height;
    const ctx = c.getContext("2d");
    ctx.drawImage(img, 0, 0);
    const txt = $("text").value;
    const size = +$("size").value;
    const op = +$("op").value / 100;
    ctx.font = `bold ${size}px sans-serif`;
    const m = ctx.measureText(txt);
    const tw = m.width, th = size;
    const pad = 16;
    const pos = $("pos").value;
    let x, y;
    if (pos === "rb") { x = c.width  - tw - pad; y = c.height - pad; }
    if (pos === "lb") { x = pad; y = c.height - pad; }
    if (pos === "rt") { x = c.width  - tw - pad; y = th + pad; }
    if (pos === "lt") { x = pad; y = th + pad; }
    if (pos === "cc") { x = (c.width - tw)/2; y = (c.height + th)/2; }
    ctx.fillStyle = $("color").value;
    ctx.globalAlpha = op;
    ctx.fillText(txt, x, y);
    ctx.globalAlpha = 1;
    const url = c.toDataURL("image/png");
    $("new").innerHTML = `<img src="${url}" style="max-width:100%; max-height:240px;" />`;
    $("dl").disabled = false;
    $("dl").onclick = () => { const a = document.createElement("a"); a.href = url; a.download = "watermarked.png"; a.click(); };
  };
  img.src = curURL;
}
</script>
</body></html>

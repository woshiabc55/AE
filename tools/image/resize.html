<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>图片缩放 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">↔️ 图片缩放</div>
    <div class="page-desc">按宽度/高度/百分比缩放图片。</div>
  </div>

  <div class="panel">
    <input id="file" type="file" accept="image/*" style="margin-bottom:12px" />
    <div class="row">
      <div class="col"><div class="panel-title" style="font-size:12px">宽度 (px)</div><input id="w" type="number" placeholder="留空按比例" /></div>
      <div class="col"><div class="panel-title" style="font-size:12px">高度 (px)</div><input id="h" type="number" placeholder="留空按比例" /></div>
      <div class="col"><div class="panel-title" style="font-size:12px">百分比 %</div><input id="pct" type="number" placeholder="例如 50" /></div>
      <label class="tag" style="align-self:end; cursor:pointer"><input id="lock" type="checkbox" checked /> 保持比例</label>
      <button class="btn btn-primary" style="align-self:end" onclick="run()">▶ 缩放</button>
    </div>
  </div>

  <div class="grid grid-2">
    <div class="panel"><div class="panel-title">原图</div><div id="orig" style="min-height:240px; display:flex; align-items:center; justify-content:center; background:var(--bg-2); border-radius:8px;">未选择</div></div>
    <div class="panel"><div class="panel-title">缩放后</div><div id="new" style="min-height:240px; display:flex; align-items:center; justify-content:center; background:var(--bg-2); border-radius:8px;">—</div>
      <div style="margin-top:8px"><button class="btn" id="dl" disabled>⬇ 下载</button></div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/image/resize.html");
let cur = null, curURL = null;
$ = id => document.getElementById(id);
$("file").addEventListener("change", e => {
  const f = e.target.files[0]; if (!f) return;
  cur = f; if (curURL) URL.revokeObjectURL(curURL);
  curURL = URL.createObjectURL(f);
  $("orig").innerHTML = `<img src="${curURL}" style="max-width:100%; max-height:240px;" />`;
  const img = new Image();
  img.onload = () => { $("w").value = img.width; $("h").value = img.height; };
  img.src = curURL;
});

function run() {
  if (!cur) return toast("请选择图片");
  const img = new Image();
  img.onload = () => {
    let nw = +$("w").value, nh = +$("h").value, pct = +$("pct").value;
    if (pct) { nw = Math.round(img.width * pct / 100); nh = Math.round(img.height * pct / 100); }
    else if ($("lock").checked) {
      if (nw && !nh) nh = Math.round(img.height * nw / img.width);
      else if (nh && !nw) nw = Math.round(img.width * nh / img.height);
    }
    nw = nw || img.width; nh = nh || img.height;
    const c = document.createElement("canvas"); c.width = nw; c.height = nh;
    c.getContext("2d").drawImage(img, 0, 0, nw, nh);
    c.toBlob(b => {
      const url = URL.createObjectURL(b);
      $("new").innerHTML = `<img src="${url}" style="max-width:100%; max-height:240px;" />`;
      $("dl").disabled = false;
      $("dl").onclick = () => { const a = document.createElement("a"); a.href = url; a.download = "resized.png"; a.click(); };
    }, "image/png");
  };
  img.src = curURL;
}
</script>
</body></html>

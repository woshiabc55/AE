<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>图片裁剪 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
<style>
  .crop-box { position: relative; display: inline-block; max-width:100%; }
  .crop-box img { max-width: 100%; max-height: 480px; display:block; }
  .crop-sel { position:absolute; border:2px dashed var(--accent); background: rgba(106,166,255,0.12); cursor:move; }
  .crop-handle { position:absolute; width:10px; height:10px; background:#fff; border:1px solid var(--accent); }
  .crop-handle.tl {top:-5px;left:-5px;cursor:nwse-resize}
  .crop-handle.tr {top:-5px;right:-5px;cursor:nesw-resize}
  .crop-handle.bl {bottom:-5px;left:-5px;cursor:nesw-resize}
  .crop-handle.br {bottom:-5px;right:-5px;cursor:nwse-resize}
</style>
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">✂ 图片裁剪</div>
    <div class="page-desc">拖拽选择区域，导出裁剪后的图片。</div>
  </div>

  <div class="panel">
    <input id="file" type="file" accept="image/*" style="margin-bottom:12px" />
  </div>

  <div class="panel">
    <div class="panel-title">预览（拖动白边调整裁剪框）</div>
    <div class="crop-box" id="box"><span style="color:var(--muted)">请选择图片...</span></div>
  </div>

  <div class="panel">
    <div id="out"></div>
    <button class="btn" id="dl" disabled style="margin-top:8px">⬇ 下载</button>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/image/crop.html");
let img = null, scale = 1, sel = {x:0, y:0, w:0, h:0};
const $ = id => document.getElementById(id);

$("file").addEventListener("change", e => {
  const f = e.target.files[0]; if (!f) return;
  const url = URL.createObjectURL(f);
  const box = $("box");
  box.innerHTML = `<img id="img" src="${url}" />`;
  img = new Image();
  img.onload = () => {
    const dispW = Math.min(720, img.width);
    scale = dispW / img.width;
    const el = $("img");
    el.style.width = dispW + "px";
    el.onload = () => {
      sel = { x: img.width*0.1, y: img.height*0.1, w: img.width*0.8, h: img.height*0.8 };
      drawSel();
    };
    if (el.complete) el.onload();
  };
  img.src = url;
});

function drawSel() {
  if (!img) return;
  let old = document.getElementById("sel");
  if (old) old.remove();
  const disp = document.createElement("div");
  disp.id = "sel"; disp.className = "crop-sel";
  disp.style.left   = (sel.x * scale) + "px";
  disp.style.top    = (sel.y * scale) + "px";
  disp.style.width  = (sel.w * scale) + "px";
  disp.style.height = (sel.h * scale) + "px";
  ["tl","tr","bl","br"].forEach(p => {
    const h = document.createElement("div");
    h.className = "crop-handle " + p; h.dataset.pos = p;
    h.addEventListener("mousedown", startResize);
    disp.appendChild(h);
  });
  disp.addEventListener("mousedown", startMove);
  $("box").appendChild(disp);
  render();
}

function startMove(e) {
  if (e.target.classList.contains("crop-handle")) return;
  const sx = e.clientX, sy = e.clientY;
  const ox = sel.x, oy = sel.y;
  const move = ev => {
    sel.x = Math.max(0, Math.min(img.width - sel.w, ox + (ev.clientX - sx) / scale));
    sel.y = Math.max(0, Math.min(img.height - sel.h, oy + (ev.clientY - sy) / scale));
    drawSel();
  };
  const up = () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up); };
  window.addEventListener("mousemove", move); window.addEventListener("mouseup", up);
}

function startResize(e) {
  e.stopPropagation();
  const pos = e.target.dataset.pos;
  const sx = e.clientX, sy = e.clientY;
  const o = {...sel};
  const move = ev => {
    const dx = (ev.clientX - sx) / scale, dy = (ev.clientY - sy) / scale;
    if (pos.includes("r")) sel.w = Math.max(10, o.w + dx);
    if (pos.includes("b")) sel.h = Math.max(10, o.h + dy);
    if (pos.includes("l")) { sel.x = o.x + dx; sel.w = o.w - dx; }
    if (pos.includes("t")) { sel.y = o.y + dy; sel.h = o.h - dy; }
    sel.w = Math.max(10, sel.w); sel.h = Math.max(10, sel.h);
    if (sel.x < 0) { sel.w += sel.x; sel.x = 0; }
    if (sel.y < 0) { sel.h += sel.y; sel.y = 0; }
    if (sel.x + sel.w > img.width) sel.w = img.width - sel.x;
    if (sel.y + sel.h > img.height) sel.h = img.height - sel.y;
    drawSel();
  };
  const up = () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up); };
  window.addEventListener("mousemove", move); window.addEventListener("mouseup", up);
}

function render() {
  if (!img) return;
  const c = document.createElement("canvas");
  c.width = sel.w; c.height = sel.h;
  c.getContext("2d").drawImage(img, sel.x, sel.y, sel.w, sel.h, 0, 0, sel.w, sel.h);
  const url = c.toDataURL("image/png");
  $("out").innerHTML = `<img src="${url}" style="max-width:100%; max-height:300px; border-radius:6px;" />`;
  $("dl").disabled = false;
  $("dl").onclick = () => { const a = document.createElement("a"); a.href = url; a.download = "cropped.png"; a.click(); };
}
</script>
</body></html>

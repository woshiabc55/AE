<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>图片压缩 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🗜 图片压缩</div>
    <div class="page-desc">本地 Canvas 压缩，调整质量与最长边，输出 PNG/JPG/WebP。</div>
  </div>

  <div class="panel">
    <div class="row">
      <input id="file" type="file" accept="image/*" />
      <select id="format" style="max-width:140px">
        <option value="image/jpeg">JPG</option>
        <option value="image/png">PNG</option>
        <option value="image/webp">WebP</option>
      </select>
      <div class="col" style="min-width:160px">
        <div class="panel-title" style="font-size:12px">质量 <span id="qv">80</span>%</div>
        <input id="q" type="range" min="10" max="100" value="80" />
      </div>
      <div class="col" style="min-width:160px">
        <div class="panel-title" style="font-size:12px">最长边 (px)</div>
        <input id="max" type="number" value="1920" min="50" />
      </div>
      <button class="btn btn-primary" onclick="compress()">▶ 压缩</button>
    </div>
  </div>

  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title">原图</div>
      <div id="orig" style="min-height:240px; display:flex; align-items:center; justify-content:center; background:var(--bg-2); border-radius:8px;">未选择</div>
      <div id="origInfo" style="margin-top:8px; color:var(--muted); font-size:12px;"></div>
    </div>
    <div class="panel">
      <div class="panel-title">压缩后</div>
      <div id="new" style="min-height:240px; display:flex; align-items:center; justify-content:center; background:var(--bg-2); border-radius:8px;">—</div>
      <div id="newInfo" style="margin-top:8px; color:var(--muted); font-size:12px;"></div>
      <div style="margin-top:8px"><button class="btn" id="dl" disabled>⬇ 下载</button></div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/image/compress.html");
let cur = null;
$ = id => document.getElementById(id);
$("q").addEventListener("input", e => $("qv").textContent = e.target.value);
$("file").addEventListener("change", e => {
  const f = e.target.files[0]; if (!f) return;
  cur = f;
  $("orig").innerHTML = `<img src="${URL.createObjectURL(f)}" style="max-width:100%; max-height:240px; border-radius:6px;" />`;
  $("origInfo").textContent = `${f.name} · ${(f.size/1024).toFixed(1)} KB · ${f.type}`;
  $("new").innerHTML = "—"; $("newInfo").textContent = ""; $("dl").disabled = true;
});

function compress() {
  if (!cur) return toast("请选择图片");
  const img = new Image();
  img.onload = () => {
    const max = +$("max").value || 1920;
    let w = img.width, h = img.height;
    if (w > max || h > max) {
      if (w > h) { h = Math.round(h * max / w); w = max; }
      else       { w = Math.round(w * max / h); h = max; }
    }
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    c.getContext("2d").drawImage(img, 0, 0, w, h);
    const fmt = $("format").value;
    const quality = +$("q").value / 100;
    c.toBlob(b => {
      const url = URL.createObjectURL(b);
      $("new").innerHTML = `<img src="${url}" style="max-width:100%; max-height:240px; border-radius:6px;" />`;
      $("newInfo").textContent = `${w}×${h} · ${(b.size/1024).toFixed(1)} KB · 减少 ${((1-b.size/cur.size)*100).toFixed(1)}%`;
      $("dl").disabled = false;
      $("dl").onclick = () => {
        const a = document.createElement("a"); a.href = url;
        a.download = "compressed." + fmt.split("/")[1]; a.click();
      };
    }, fmt, quality);
  };
  img.src = URL.createObjectURL(cur);
}
</script>
</body></html>

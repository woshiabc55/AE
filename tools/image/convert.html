<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>格式转换 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🔄 格式转换 PNG/JPG/WebP</div>
    <div class="page-desc">本地转换图片格式（无需上传）。</div>
  </div>

  <div class="panel">
    <div class="row">
      <input id="file" type="file" accept="image/*" />
      <select id="fmt" style="max-width:200px">
        <option value="image/png">→ PNG</option>
        <option value="image/jpeg">→ JPG</option>
        <option value="image/webp">→ WebP</option>
      </select>
      <button class="btn btn-primary" onclick="run()">▶ 转换</button>
    </div>
  </div>

  <div class="grid grid-2">
    <div class="panel"><div class="panel-title">原图</div><div id="orig" style="min-height:240px; display:flex; align-items:center; justify-content:center; background:var(--bg-2); border-radius:8px;">未选择</div></div>
    <div class="panel"><div class="panel-title">转换后</div><div id="new" style="min-height:240px; display:flex; align-items:center; justify-content:center; background:var(--bg-2); border-radius:8px;">—</div>
      <div style="margin-top:8px"><button class="btn" id="dl" disabled>⬇ 下载</button></div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/image/convert.html");
let cur = null, curURL = null;
$ = id => document.getElementById(id);
$("file").addEventListener("change", e => {
  const f = e.target.files[0]; if (!f) return;
  cur = f; if (curURL) URL.revokeObjectURL(curURL);
  curURL = URL.createObjectURL(f);
  $("orig").innerHTML = `<img src="${curURL}" style="max-width:100%; max-height:240px;" />`;
});

function run() {
  if (!cur) return toast("请选择图片");
  const img = new Image();
  img.onload = () => {
    const c = document.createElement("canvas"); c.width = img.width; c.height = img.height;
    c.getContext("2d").drawImage(img, 0, 0);
    c.toBlob(b => {
      const url = URL.createObjectURL(b);
      $("new").innerHTML = `<img src="${url}" style="max-width:100%; max-height:240px;" />`;
      $("dl").disabled = false;
      const ext = $("fmt").value.split("/")[1];
      $("dl").onclick = () => { const a = document.createElement("a"); a.href = url; a.download = "converted." + ext; a.click(); };
    }, $("fmt").value, 0.92);
  };
  img.src = curURL;
}
</script>
</body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>BMR / TDEE · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🔥 BMR / TDEE</div>
    <div class="page-desc">基础代谢率 + 每日总消耗，使用 Mifflin-St Jeor 公式。</div>
  </div>

  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title">个人信息</div>
      <div class="row">
        <div class="col"><div class="panel-title" style="font-size:12px">性别</div>
          <select id="sex"><option value="m">男</option><option value="f">女</option></select>
        </div>
        <div class="col"><div class="panel-title" style="font-size:12px">年龄</div><input id="age" type="number" value="28" /></div>
        <div class="col"><div class="panel-title" style="font-size:12px">身高 cm</div><input id="h" type="number" value="170" /></div>
        <div class="col"><div class="panel-title" style="font-size:12px">体重 kg</div><input id="w" type="number" value="65" /></div>
      </div>
      <div style="margin-top:10px">
        <div class="panel-title" style="font-size:12px">活动水平</div>
        <select id="act">
          <option value="1.2">久坐（很少运动）</option>
          <option value="1.375">轻度（每周 1-3 次）</option>
          <option value="1.55" selected>中度（每周 3-5 次）</option>
          <option value="1.725">高度（每周 6-7 次）</option>
          <option value="1.9">极高（专业运动员）</option>
        </select>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">结果</div>
      <div id="out"></div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/life/bmr.html");
function run() {
  const m = document.getElementById("sex").value === "m";
  const age = +document.getElementById("age").value;
  const h = +document.getElementById("h").value;
  const w = +document.getElementById("w").value;
  const a = +document.getElementById("act").value;
  // Mifflin-St Jeor
  const bmr = m ? 10*w + 6.25*h - 5*age + 5 : 10*w + 6.25*h - 5*age - 161;
  const tdee = bmr * a;
  document.getElementById("out").innerHTML = `
    <div class="stat" style="margin-bottom:8px"><div class="stat-num">${bmr.toFixed(0)}</div><div class="stat-lbl">BMR 基础代谢 (kcal)</div></div>
    <div class="stat" style="margin-bottom:8px"><div class="stat-num" style="color:var(--accent)">${tdee.toFixed(0)}</div><div class="stat-lbl">TDEE 每日总消耗 (kcal)</div></div>
    <div class="grid grid-3" style="margin-top:12px; gap:8px;">
      <div class="stat"><div class="stat-num" style="font-size:16px; color:var(--danger)">${(tdee-500).toFixed(0)}</div><div class="stat-lbl">减脂 (低 500)</div></div>
      <div class="stat"><div class="stat-num" style="font-size:16px; color:var(--success)">${tdee.toFixed(0)}</div><div class="stat-lbl">维持</div></div>
      <div class="stat"><div class="stat-num" style="font-size:16px; color:var(--warn)">${(tdee+500).toFixed(0)}</div><div class="stat-lbl">增肌 (高 500)</div></div>
    </div>
    <div style="color:var(--muted); font-size:12px; margin-top:14px; line-height:1.6">
      💡 BMR 是你躺着不动也会消耗的热量。TDEE = BMR × 活动系数，反映真实日消耗。
    </div>
  `;
}
["sex","age","h","w","act"].forEach(id => document.getElementById(id).addEventListener("input", run));
run();
</script>
</body></html>

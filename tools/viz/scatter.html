<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>散点图 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">✨ 散点图</div>
    <div class="page-desc">观察两个变量之间的相关性与聚类。</div>
  </div>

  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title">数据（每行 名称,X,Y,可选大小）</div>
      <textarea id="csv" style="min-height:200px; font-family:monospace">A,10,8,30
B,12,15,40
C,18,10,25
D,8,12,35
E,15,20,50
F,22,18,45
G,30,25,60
H,5,8,20
I,25,30,55
J,12,22,38</textarea>
      <button class="btn btn-primary" style="margin-top:10px" onclick="render()">▶ 渲染</button>
    </div>
    <div class="panel" style="min-height:480px">
      <div class="panel-title">图表</div>
      <div id="chart" style="width:100%; height:420px;"></div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/viz/scatter.html");
let chart = echarts.init(document.getElementById("chart"));
window.addEventListener("resize", () => chart.resize());

function render() {
  const lines = document.getElementById("csv").value.trim().split(/\r?\n/);
  const data = lines.map(l => {
    const c = l.split(",").map(s => s.trim());
    return [Number(c[1]), Number(c[2]), Number(c[3] || 20), c[0]];
  });
  chart.setOption({
    backgroundColor: "transparent",
    tooltip: { trigger: "item", formatter: p => `${p.data[3]}<br/>X=${p.data[0]} Y=${p.data[1]}` },
    grid: { left: 50, right: 30, top: 30, bottom: 40 },
    xAxis: { axisLabel: { color: "#9aa3b2" }, splitLine: { lineStyle: { color: "#2c3346" } } },
    yAxis: { axisLabel: { color: "#9aa3b2" }, splitLine: { lineStyle: { color: "#2c3346" } } },
    series: [{
      type: "scatter",
      data,
      symbolSize: d => d[2],
      itemStyle: { opacity: 0.75, color: "#6aa6ff" }
    }]
  });
}
render();
</script>
</body></html>

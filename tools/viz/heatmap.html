<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>热力图 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🔥 热力图</div>
    <div class="page-desc">矩阵数据的颜色密度（如：每天不同时段活跃度）。</div>
  </div>

  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title">数据（CSV：行=星期，列=小时）</div>
      <textarea id="csv" style="min-height:200px; font-family:monospace">,0,3,6,9,12,15,18,21
周一,5,2,1,30,80,95,90,40
周二,4,1,2,35,82,93,85,45
周三,6,2,2,40,88,96,92,50
周四,5,1,3,38,90,98,95,55
周五,8,3,2,45,92,99,98,75
周六,15,8,4,30,70,80,90,90
周日,20,12,5,25,60,75,95,80</textarea>
      <button class="btn btn-primary" style="margin-top:10px" onclick="render()">▶ 渲染</button>
    </div>
    <div class="panel" style="min-height:480px">
      <div class="panel-title">图表</div>
      <div id="chart" style="width:100%; height:420px;"></div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/viz/heatmap.html");
let chart = echarts.init(document.getElementById("chart"));
window.addEventListener("resize", () => chart.resize());

function render() {
  const lines = document.getElementById("csv").value.trim().split(/\r?\n/);
  const header = lines[0].split(",").map(s => s.trim()).slice(1);
  const rows = lines.slice(1);
  const data = [];
  let max = 0;
  rows.forEach((row, i) => {
    const c = row.split(",").map(s => s.trim());
    c.slice(1).forEach((v, j) => {
      const n = Number(v); if (n > max) max = n;
      data.push([j, i, n]);
    });
  });
  chart.setOption({
    backgroundColor: "transparent",
    tooltip: { position: "top" },
    grid: { left: 60, right: 20, top: 30, bottom: 60 },
    xAxis: { type: "category", data: header, axisLabel: { color: "#9aa3b2" }, splitArea: { show: true } },
    yAxis: { type: "category", data: rows.map(l => l.split(",")[0]), axisLabel: { color: "#9aa3b2" }, splitArea: { show: true } },
    visualMap: { min: 0, max, calculable: true, orient: "horizontal", left: "center", bottom: 0, inRange: { color: ["#1c2230", "#6aa6ff", "#ff6b6b"] }, textStyle: { color: "#9aa3b2" } },
    series: [{ type: "heatmap", data, label: { show: true, color: "#fff" }, emphasis: { itemStyle: { shadowBlur: 10, shadowColor: "rgba(0,0,0,0.5)" } } }]
  });
}
render();
</script>
</body></html>

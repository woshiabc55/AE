<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>折线图 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">📈 折线图</div>
    <div class="page-desc">展示数据随时间/类别的变化趋势。</div>
  </div>

  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title">数据（CSV）</div>
      <textarea id="csv" style="min-height:200px; font-family:monospace">日期,访问量,注册量
周一,820,120
周二,932,142
周三,901,130
周四,1234,210
周五,1490,290
周六,1620,340
周日,1530,310</textarea>
      <div style="margin-top:10px" class="row">
        <label class="tag"><input id="smooth" type="checkbox" checked /> 平滑曲线</label>
        <label class="tag"><input id="area" type="checkbox" /> 面积图</label>
        <button class="btn btn-primary" style="margin-left:auto" onclick="render()">▶ 渲染</button>
      </div>
    </div>
    <div class="panel" style="min-height:480px">
      <div class="panel-title">图表</div>
      <div id="chart" style="width:100%; height:420px;"></div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/viz/line.html");
let chart = echarts.init(document.getElementById("chart"));
window.addEventListener("resize", () => chart.resize());

function render() {
  const lines = document.getElementById("csv").value.trim().split(/\r?\n/);
  const header = lines[0].split(",").map(s => s.trim());
  const cats = header.slice(1);
  const series = lines.slice(1).map(l => {
    const c = l.split(",").map(s => s.trim());
    return { name: c[0], type: "line", smooth: document.getElementById("smooth").checked, data: c.slice(1).map(Number), areaStyle: document.getElementById("area").checked ? { opacity: 0.2 } : undefined };
  });
  chart.setOption({
    backgroundColor: "transparent",
    tooltip: { trigger: "axis" },
    legend: { textStyle: { color: "#cdd3e0" } },
    grid: { left: 50, right: 30, top: 50, bottom: 40 },
    xAxis: { type: "category", data: cats, axisLabel: { color: "#9aa3b2" }, boundaryGap: false },
    yAxis: { type: "value", axisLabel: { color: "#9aa3b2" } },
    series
  });
}
render();
</script>
</body></html>

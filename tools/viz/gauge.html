<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>仪表盘 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🎯 仪表盘</div>
    <div class="page-desc">单个核心指标的可视化（如：完成率、评分）。</div>
  </div>

  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title">参数</div>
      <div class="row">
        <div class="col">
          <div class="panel-title" style="font-size:12px">当前值</div>
          <input id="val" type="number" value="73" />
        </div>
        <div class="col">
          <div class="panel-title" style="font-size:12px">标题</div>
          <input id="name" type="text" value="项目完成度" />
        </div>
      </div>
      <div class="row" style="margin-top:10px">
        <div class="col">
          <div class="panel-title" style="font-size:12px">最小值</div>
          <input id="min" type="number" value="0" />
        </div>
        <div class="col">
          <div class="panel-title" style="font-size:12px">最大值</div>
          <input id="max" type="number" value="100" />
        </div>
        <div class="col">
          <div class="panel-title" style="font-size:12px">单位</div>
          <input id="unit" type="text" value="%" />
        </div>
      </div>
      <button class="btn btn-primary" style="margin-top:14px" onclick="render()">▶ 渲染</button>
    </div>
    <div class="panel" style="min-height:480px">
      <div class="panel-title">图表</div>
      <div id="chart" style="width:100%; height:420px;"></div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/viz/gauge.html");
let chart = echarts.init(document.getElementById("chart"));
window.addEventListener("resize", () => chart.resize());

function render() {
  const v = +document.getElementById("val").value;
  const min = +document.getElementById("min").value;
  const max = +document.getElementById("max").value;
  const name = document.getElementById("name").value;
  const unit = document.getElementById("unit").value;
  chart.setOption({
    backgroundColor: "transparent",
    series: [{
      type: "gauge",
      min, max,
      progress: { show: true, width: 18, itemStyle: { color: "#6aa6ff" } },
      axisLine: { lineStyle: { width: 18, color: [[1, "#2c3346"]] } },
      pointer: { show: false },
      axisTick: { show: false },
      splitLine: { show: false },
      axisLabel: { show: false },
      anchor: { show: false },
      title: { color: "#cdd3e0", fontSize: 14, offsetCenter: [0, "70%"] },
      detail: { valueAnimation: true, fontSize: 36, color: "#fff", formatter: v => v + " " + unit, offsetCenter: [0, "0%"] },
      data: [{ value: v, name }]
    }]
  });
}
render();
</script>
</body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>桑基图 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🌊 桑基图</div>
    <div class="page-desc">展示流量、能量、资金等的流向与分布。</div>
  </div>

  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title">数据 (JSON)</div>
      <textarea id="src" style="min-height:280px; font-family:monospace">{
  "nodes": [
    {"name": "首页"}, {"name": "搜索"}, {"name": "推荐"},
    {"name": "详情"}, {"name": "购物车"}, {"name": "支付"},
    {"name": "离开"}
  ],
  "links": [
    {"source": "首页", "target": "搜索", "value": 30},
    {"source": "首页", "target": "推荐", "value": 50},
    {"source": "首页", "target": "离开", "value": 20},
    {"source": "搜索", "target": "详情", "value": 25},
    {"source": "推荐", "target": "详情", "value": 40},
    {"source": "详情", "target": "购物车", "value": 35},
    {"source": "详情", "target": "离开", "value": 30},
    {"source": "购物车", "target": "支付", "value": 25},
    {"source": "购物车", "target": "离开", "value": 10}
  ]
}</textarea>
      <button class="btn btn-primary" style="margin-top:10px" onclick="render()">▶ 渲染</button>
    </div>
    <div class="panel" style="min-height:480px">
      <div class="panel-title">图表</div>
      <div id="chart" style="width:100%; height:420px;"></div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/viz/sankey.html");
let chart = echarts.init(document.getElementById("chart"));
window.addEventListener("resize", () => chart.resize());

function render() {
  const data = JSON.parse(document.getElementById("src").value);
  chart.setOption({
    backgroundColor: "transparent",
    tooltip: { trigger: "item" },
    series: [{
      type: "sankey",
      left: 20, right: 80, top: 20, bottom: 20,
      data: data.nodes,
      links: data.links,
      lineStyle: { color: "gradient", curveness: 0.5, opacity: 0.5 },
      itemStyle: { borderWidth: 0 },
      label: { color: "#cdd3e0" }
    }]
  });
}
render();
</script>
</body></html>

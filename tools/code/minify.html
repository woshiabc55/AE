<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>代码压缩 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🪶 代码压缩</div>
    <div class="page-desc">JS / CSS / HTML 简单压缩（去除注释/空白）。</div>
  </div>

  <div class="panel">
    <div class="row">
      <select id="lang" style="max-width:160px">
        <option value="js">JavaScript</option>
        <option value="css">CSS</option>
        <option value="html">HTML</option>
      </select>
      <label class="tag" style="cursor:pointer"><input id="safe" type="checkbox" checked /> 保留字符串字面量</label>
      <button class="btn btn-primary" onclick="run()">▶ 压缩</button>
    </div>
  </div>

  <div class="grid grid-2">
    <div class="panel"><div class="panel-title">输入（<span id="si">0</span> 字节）</div><textarea id="src" style="min-height:380px; font-family:monospace">/* 注释 */
function add(a, b) {
  // 求和
  return a + b;
}
const result = add(2, 3);
console.log("result is", result);</textarea></div>
    <div class="panel"><div class="panel-title">输出（<span id="oi">0</span> 字节）</div><textarea id="out" style="min-height:380px; font-family:monospace" readonly></textarea>
      <div style="margin-top:8px">
        <button class="btn" onclick="copyText(out.value)">📋 复制</button>
        <button class="btn" onclick="downloadFile('min.' + lang.value, out.value)">⬇ 下载</button>
      </div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/code/minify.html");
const $ = id => document.getElementById(id);

function minJS(s) {
  return s.replace(/\/\*[\s\S]*?\*\//g, "")
          .replace(/(^|[^:])\/\/.*$/gm, "$1")
          .replace(/\s+/g, " ")
          .replace(/\s*([{};,:()=+\-*\/])\s*/g, "$1")
          .replace(/;}/g, "}");
}
function minCSS(s) {
  return s.replace(/\/\*[\s\S]*?\*\//g, "")
          .replace(/\s+/g, " ")
          .replace(/\s*([{};,:])\s*/g, "$1")
          .replace(/;}/g, "}");
}
function minHTML(s) {
  return s.replace(/<!--[\s\S]*?-->/g, "")
          .replace(/\s+/g, " ")
          .replace(/>\s+</g, "><")
          .trim();
}
function run() {
  const v = $("src").value;
  const lang = $("lang").value;
  let out;
  if (lang === "js")   out = minJS(v);
  if (lang === "css")  out = minCSS(v);
  if (lang === "html") out = minHTML(v);
  $("si").textContent = v.length;
  $("oi").textContent = out.length;
  $("out").value = out;
}
$("lang").addEventListener("change", run);
$("src").addEventListener("input", run);
run();
</script>
</body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>URL 解析 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🧭 URL 解析</div>
    <div class="page-desc">分解 URL 各组件：协议、域名、端口、路径、查询参数、片段。</div>
  </div>

  <div class="panel">
    <div class="panel-title">URL</div>
    <input id="url" type="text" value="https://user:pass@example.com:8080/path/to/page?lang=zh&sort=desc#section" />
  </div>

  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title">组件</div>
      <table class="tbl" id="parts"></table>
    </div>
    <div class="panel">
      <div class="panel-title">查询参数</div>
      <table class="tbl" id="params">
        <thead><tr><th>Key</th><th>Value</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">URL 拼接（从组件构建）</div>
    <div class="grid grid-2">
      <input id="p_protocol" placeholder="https" value="https" />
      <input id="p_host"     placeholder="example.com" value="example.com" />
      <input id="p_port"     placeholder="443" value="" />
      <input id="p_path"     placeholder="/path" value="/api/v1" />
    </div>
    <div style="margin-top:8px" class="row">
      <input id="p_query" style="flex:1" placeholder="key1=val1&key2=val2" value="a=1&b=2" />
      <input id="p_frag" style="flex:1" placeholder="fragment" value="top" />
    </div>
    <input id="built" style="margin-top:8px" readonly />
    <div style="margin-top:8px"><button class="btn" onclick="copyText(built.value)">📋 复制</button></div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/net/url.html");
const $ = id => document.getElementById(id);

function parse() {
  const url = $("url").value;
  let u;
  try { u = new URL(url); } catch (e) { $("parts").innerHTML = `<tr><td colspan="2" style="color:var(--danger)">无效 URL</td></tr>`; return; }
  const rows = [
    ["协议 protocol", u.protocol],
    ["用户名", u.username || "(无)"],
    ["密码", u.password || "(无)"],
    ["主机 host", u.hostname],
    ["端口", u.port || "(默认)"],
    ["路径 pathname", u.pathname],
    ["查询 search", u.search || "(无)"],
    ["片段 hash", u.hash || "(无)"],
    ["完整 origin", u.origin]
  ];
  $("parts").innerHTML = rows.map(([k,v]) => `<tr><th>${k}</th><td><code>${v}</code></td></tr>`).join("");

  $("params").querySelector("tbody").innerHTML = [...u.searchParams.entries()].map(([k,v]) =>
    `<tr><td><code>${k}</code></td><td><code>${v}</code></td></tr>`).join("") || `<tr><td colspan="2" style="color:var(--muted)">(无)</td></tr>`;
}

function build() {
  const p = $("p_protocol").value.replace(/:$/, "");
  const h = $("p_host").value;
  const port = $("p_port").value ? ":" + $("p_port").value : "";
  const path = $("p_path").value.startsWith("/") ? $("p_path").value : "/" + $("p_path").value;
  const q = $("p_query").value ? "?" + $("p_query").value.replace(/^\?/, "") : "";
  const f = $("p_frag").value ? "#" + $("p_frag").value.replace(/^#/, "") : "";
  $("built").value = `${p}://${h}${port}${path}${q}${f}`;
}

$("url").addEventListener("input", parse);
["p_protocol","p_host","p_port","p_path","p_query","p_frag"].forEach(id => $(id).addEventListener("input", build));
parse(); build();
</script>
</body></html>

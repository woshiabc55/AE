<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>二维码生成 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🔲 二维码生成</div>
    <div class="page-desc">文本 / URL 转二维码，支持颜色与尺寸调整。</div>
  </div>

  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title">内容</div>
      <textarea id="text" style="min-height:160px">https://example.com/skillbox</textarea>
      <div class="row" style="margin-top:12px">
        <div class="col">
          <div class="panel-title" style="font-size:12px">前景色</div>
          <input id="fg" type="color" value="#0f1115" style="height:42px; padding:0 4px" />
        </div>
        <div class="col">
          <div class="panel-title" style="font-size:12px">背景色</div>
          <input id="bg" type="color" value="#ffffff" style="height:42px; padding:0 4px" />
        </div>
        <div class="col">
          <div class="panel-title" style="font-size:12px">尺寸</div>
          <input id="size" type="number" value="320" min="120" max="800" />
        </div>
      </div>
      <button class="btn btn-primary" style="margin-top:14px" onclick="render()">▶ 生成</button>
    </div>
    <div class="panel" style="text-align:center; min-height:480px">
      <div class="panel-title">二维码</div>
      <div id="qrcode" style="display:flex; justify-content:center; align-items:center; padding:20px;"></div>
      <button class="btn" onclick="downloadQR()">⬇ 下载 PNG</button>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/util/qrcode.html");
let dataURL = "";
function render() {
  const el = document.getElementById("qrcode");
  el.innerHTML = "";
  QRCode.toCanvas(document.createTextNode ? null : document.getElementById("text").value, {
    width: +document.getElementById("size").value,
    color: { dark: document.getElementById("fg").value, light: document.getElementById("bg").value },
    errorCorrectionLevel: "M"
  }, (err, canvas) => {
    if (err) return toast("生成失败");
    el.appendChild(canvas);
    dataURL = canvas.toDataURL("image/png");
  });
}
function downloadQR() {
  if (!dataURL) return;
  const a = document.createElement("a"); a.href = dataURL; a.download = "qrcode.png"; a.click();
}
render();
</script>
</body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>番茄钟 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
<style>
  .timer { text-align: center; padding: 30px 0; }
  .timer-time { font-size: 80px; font-weight: 800; color: #fff; font-family: "SF Mono", Menlo, monospace; }
  .timer-label { color: var(--muted); font-size: 16px; margin-bottom: 20px; }
  .timer-bar { height: 8px; background: var(--bg-2); border-radius: 999px; overflow: hidden; margin: 20px 0; }
  .timer-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width 0.3s; }
  .timer-cycles { color: var(--muted); margin-top: 14px; font-size: 13px; }
</style>
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🍅 番茄钟</div>
    <div class="page-desc">25 分钟专注 + 5 分钟休息，循环 4 次为一轮。</div>
  </div>

  <div class="panel" style="max-width:560px; margin:0 auto;">
    <div class="timer">
      <div class="timer-label" id="label">🍅 专注中</div>
      <div class="timer-time" id="time">25:00</div>
      <div class="timer-bar"><div class="timer-bar-fill" id="bar" style="width:0%"></div></div>
      <div class="row" style="justify-content:center;">
        <button class="btn btn-primary" id="startBtn">▶ 开始</button>
        <button class="btn" id="pauseBtn">⏸ 暂停</button>
        <button class="btn" id="resetBtn">↺ 重置</button>
        <button class="btn" id="skipBtn">⏭ 跳过</button>
      </div>
      <div class="timer-cycles">已完成 <strong id="cycles">0</strong> 个番茄 · 总专注 <strong id="total">0</strong> 分钟</div>
    </div>
  </div>

  <div class="panel" style="max-width:560px; margin:14px auto 0;">
    <div class="panel-title">设置</div>
    <div class="row">
      <div class="col"><div class="panel-title" style="font-size:12px">专注 (分)</div><input id="work" type="number" value="25" min="1" max="120" /></div>
      <div class="col"><div class="panel-title" style="font-size:12px">短休 (分)</div><input id="short" type="number" value="5" min="1" max="30" /></div>
      <div class="col"><div class="panel-title" style="font-size:12px">长休 (分)</div><input id="long" type="number" value="15" min="1" max="60" /></div>
    </div>
    <label class="tag" style="margin-top:10px; cursor:pointer; display:inline-block">
      <input id="sound" type="checkbox" checked /> 结束提示音
    </label>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/util/pomodoro.html");
let mode = "work", remaining = 25*60, total = 25*60, timer = null, cycles = 0;
const $ = id => document.getElementById(id);

function setDuration() {
  const m = mode === "work" ? +$("work").value : mode === "short" ? +$("short").value : +$("long").value;
  total = m * 60; remaining = m * 60;
  update();
}
function update() {
  const m = String(Math.floor(remaining/60)).padStart(2,"0");
  const s = String(remaining%60).padStart(2,"0");
  $("time").textContent = `${m}:${s}`;
  $("bar").style.width = ((total - remaining) / total * 100) + "%";
  $("label").textContent = mode === "work" ? "🍅 专注中" : mode === "short" ? "☕ 短休息" : "🌿 长休息";
}
function tick() {
  if (remaining > 0) { remaining--; update(); }
  else { next(); }
}
function next() {
  if (mode === "work") {
    cycles++;
    $("cycles").textContent = cycles;
    $("total").textContent = cycles * +$("work").value;
    mode = cycles % 4 === 0 ? "long" : "short";
  } else {
    mode = "work";
  }
  if ($("sound").checked) beep();
  setDuration();
  toast(mode === "work" ? "回到专注" : "休息一下");
}
function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    o.frequency.value = 880; o.connect(ctx.destination); o.start();
    setTimeout(() => { o.frequency.value = 660; }, 150);
    setTimeout(() => { o.stop(); ctx.close(); }, 400);
  } catch (e) {}
}

$("startBtn").onclick = () => { if (timer) return; timer = setInterval(tick, 1000); };
$("pauseBtn").onclick = () => { clearInterval(timer); timer = null; };
$("resetBtn").onclick = () => { clearInterval(timer); timer = null; cycles = 0; $("cycles").textContent = 0; $("total").textContent = 0; mode="work"; setDuration(); };
$("skipBtn").onclick = () => { next(); };
["work","short","long"].forEach(id => $(id).addEventListener("change", () => { if (!timer) setDuration(); }));
setDuration();
</script>
</body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>密码生成 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🔑 密码生成</div>
    <div class="page-desc">高强度随机密码，支持强度可视化评估。</div>
  </div>

  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title">参数</div>
      <div class="row">
        <div class="col">
          <div class="panel-title" style="font-size:12px">长度</div>
          <input id="len" type="number" value="16" min="4" max="128" />
        </div>
        <div class="col">
          <div class="panel-title" style="font-size:12px">数量</div>
          <input id="n" type="number" value="5" min="1" max="50" />
        </div>
      </div>
      <div style="margin-top:12px" class="row">
        <label class="tag" style="cursor:pointer"><input id="lower" type="checkbox" checked /> 小写 a-z</label>
        <label class="tag" style="cursor:pointer"><input id="upper" type="checkbox" checked /> 大写 A-Z</label>
        <label class="tag" style="cursor:pointer"><input id="digit" type="checkbox" checked /> 数字 0-9</label>
        <label class="tag" style="cursor:pointer"><input id="sym" type="checkbox" checked /> 符号 !@#</label>
        <label class="tag" style="cursor:pointer"><input id="exclude" type="checkbox" /> 排除易混 (0OoIl1)</label>
      </div>
      <button class="btn btn-primary" style="margin-top:14px" onclick="render()">▶ 生成</button>
    </div>
    <div class="panel">
      <div class="panel-title">结果（点击复制）</div>
      <div id="out"></div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/util/password.html");

function strength(pwd) {
  let s = 0;
  if (pwd.length >= 8) s++;
  if (pwd.length >= 12) s++;
  if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) s++;
  if (/\d/.test(pwd)) s++;
  if (/[^A-Za-z0-9]/.test(pwd)) s++;
  return s; // 0-5
}
function level(s) { return ["极弱","弱","一般","良好","强","极强"][s] || "极弱"; }
function color(s) { return ["#ff6b6b","#ff8a6b","#ffb86b","#cfd86b","#6bd991","#4ad991"][s] || "#ff6b6b"; }

function render() {
  const chars = [];
  let pool = "";
  if (document.getElementById("lower").checked) pool += "abcdefghijklmnopqrstuvwxyz";
  if (document.getElementById("upper").checked) pool += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  if (document.getElementById("digit").checked) pool += "0123456789";
  if (document.getElementById("sym").checked) pool += "!@#$%^&*()-_=+[]{};:,.<>?/|";
  if (document.getElementById("exclude").checked) pool = pool.replace(/[0OoIl1]/g, "");
  if (!pool) return toast("请至少选择一种字符集");

  const len = Math.max(4, Math.min(128, +document.getElementById("len").value));
  const n = Math.max(1, Math.min(50, +document.getElementById("n").value));
  const out = document.getElementById("out");
  out.innerHTML = "";
  for (let i = 0; i < n; i++) {
    const arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    let pwd = "";
    for (let j = 0; j < len; j++) pwd += pool[arr[j] % pool.length];
    const s = strength(pwd);
    const div = document.createElement("div");
    div.style.cssText = "background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;font-family:monospace;";
    div.innerHTML = `
      <code style="flex:1;color:#fff;">${pwd}</code>
      <span class="tag" style="background:${color(s)}22;color:${color(s)};border-color:${color(s)}55">${level(s)}</span>
      <button class="btn btn-sm" onclick="copyText('${pwd.replace(/'/g, "\\'")}')">复制</button>
    `;
    out.appendChild(div);
  }
}
render();
</script>
</body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>图片 → Base64 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🖼 图片 → Base64</div>
    <div class="page-desc">将本地图片转为 DataURL，可直接嵌入 HTML/CSS。</div>
  </div>

  <div class="panel">
    <div class="row">
      <input id="file" type="file" accept="image/*" />
      <label class="tag" style="cursor:pointer"><input id="resize" type="checkbox" /> 限制最长边</label>
      <input id="max" type="number" value="800" min="50" max="4000" style="max-width:120px" />
    </div>
  </div>

  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title">预览</div>
      <div id="preview" style="min-height:280px; display:flex; align-items:center; justify-content:center; background:var(--bg-2); border-radius:8px; border:1px solid var(--border);">
        <span style="color:var(--muted); font-size:13px;">请选择图片...</span>
      </div>
      <div id="info" style="margin-top:10px; color:var(--muted); font-size:12px;"></div>
    </div>
    <div class="panel">
      <div class="panel-title">DataURL 输出</div>
      <textarea id="out" style="min-height:280px; font-family:monospace; font-size:11px" readonly></textarea>
      <div style="margin-top:10px">
        <button class="btn" onclick="copyText(out.value)">📋 复制</button>
        <button class="btn" onclick="downloadFile('image.txt', out.value)">⬇ 下载</button>
      </div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/util/img2b64.html");

document.getElementById("file").addEventListener("change", e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    const dataURL = ev.target.result;
    const img = new Image();
    img.onload = () => {
      const wantResize = document.getElementById("resize").checked;
      const max = +document.getElementById("max").value;
      let w = img.width, h = img.height;
      if (wantResize && (w > max || h > max)) {
        if (w > h) { h = Math.round(h * max / w); w = max; }
        else       { w = Math.round(w * max / h); h = max; }
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        const finalURL = c.toDataURL("image/png");
        showResult(finalURL, w, h, f);
      } else {
        showResult(dataURL, w, h, f);
      }
    };
    img.src = dataURL;
  };
  r.readAsDataURL(f);
});

function showResult(url, w, h, f) {
  document.getElementById("preview").innerHTML = `<img src="${url}" style="max-width:100%; max-height:280px; border-radius:6px;" />`;
  document.getElementById("out").value = url;
  document.getElementById("info").textContent = `${f.name} · ${f.type} · ${w}×${h} · ${(url.length/1024).toFixed(1)} KB`;
}
</script>
</body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>计算器 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
<style>
  .calc-display { background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 18px; text-align: right; }
  .calc-hist { color: var(--muted); min-height: 22px; font-size: 14px; }
  .calc-now  { color: #fff; font-size: 32px; font-weight: 700; word-break: break-all; }
  .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 14px; }
  .calc-btn  { background: var(--panel-2); border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 8px; font-size: 18px; cursor: pointer; }
  .calc-btn:hover { background: #2a3247; }
  .calc-op   { background: #2a3760; color: #fff; }
  .calc-eq   { background: var(--accent); color: #0b0e14; font-weight: 700; grid-column: span 1; }
  .calc-fn   { background: #20283a; color: var(--muted); font-size: 14px; }
</style>
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🧮 计算器</div>
    <div class="page-desc">支持 + − × ÷ % ( ) 与基本科学函数。</div>
  </div>

  <div class="panel" style="max-width:480px; margin:0 auto;">
    <div class="calc-display">
      <div class="calc-hist" id="hist"></div>
      <div class="calc-now" id="now">0</div>
    </div>
    <div class="calc-grid">
      <button class="calc-btn calc-fn" data-fn="C">C</button>
      <button class="calc-btn calc-fn" data-fn="(">(</button>
      <button class="calc-btn calc-fn" data-fn=")">)</button>
      <button class="calc-btn calc-op" data-fn="/">÷</button>

      <button class="calc-btn" data-num="7">7</button>
      <button class="calc-btn" data-num="8">8</button>
      <button class="calc-btn" data-num="9">9</button>
      <button class="calc-btn calc-op" data-fn="*">×</button>

      <button class="calc-btn" data-num="4">4</button>
      <button class="calc-btn" data-num="5">5</button>
      <button class="calc-btn" data-num="6">6</button>
      <button class="calc-btn calc-op" data-fn="-">−</button>

      <button class="calc-btn" data-num="1">1</button>
      <button class="calc-btn" data-num="2">2</button>
      <button class="calc-btn" data-num="3">3</button>
      <button class="calc-btn calc-op" data-fn="+">+</button>

      <button class="calc-btn" data-fn="sin">sin</button>
      <button class="calc-btn" data-num="0">0</button>
      <button class="calc-btn" data-fn=".">.</button>
      <button class="calc-btn calc-eq" data-fn="=">=</button>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/util/calc.html");
let expr = "";
const now = document.getElementById("now");
const hist = document.getElementById("hist");
const SAFE = /[0-9+\-*/().\s]|^(sin|cos|tan|sqrt|log)$/;

function update() { now.textContent = expr || "0"; }

document.querySelectorAll(".calc-btn").forEach(b => {
  b.addEventListener("click", () => {
    const fn = b.dataset.fn, num = b.dataset.num;
    if (num) { expr += num; }
    else if (fn === "C") { expr = ""; hist.textContent = ""; }
    else if (fn === "=") {
      try {
        const safe = expr.replace(/sin/g, "Math.sin").replace(/cos/g, "Math.cos").replace(/tan/g, "Math.tan");
        const r = Function('"use strict";return (' + safe + ')')();
        hist.textContent = expr + " =";
        expr = String(Number.isFinite(r) ? +r.toFixed(10) : r);
      } catch (e) { hist.textContent = "错误"; expr = ""; }
    }
    else if (fn === "sin" || fn === "cos" || fn === "tan") { expr += fn; }
    else { expr += fn; }
    update();
  });
});

document.addEventListener("keydown", e => {
  if (/[0-9+\-*/().]/.test(e.key)) { expr += e.key; update(); }
  else if (e.key === "Enter" || e.key === "=") { document.querySelector('[data-fn="="]').click(); }
  else if (e.key === "Backspace") { expr = expr.slice(0, -1); update(); }
  else if (e.key === "Escape") { expr = ""; hist.textContent = ""; update(); }
});
</script>
</body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>大小写转换 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🔤 大小写转换</div>
    <div class="page-desc">一键转换英文大小写、中英混排格式。</div>
  </div>

  <div class="panel">
    <textarea id="text" style="min-height:160px">hello world  |  Hello World  |  HELLO WORLD
the quick brown fox jumps over the lazy dog
skillbox is awesome</textarea>
  </div>

  <div class="panel">
    <div class="row">
      <button class="btn btn-primary" onclick="apply('upper')">全大写 UPPER</button>
      <button class="btn btn-primary" onclick="apply('lower')">全小写 lower</button>
      <button class="btn btn-primary" onclick="apply('title')">标题 Title Case</button>
      <button class="btn btn-primary" onclick="apply('sentence')">句首 Sentence</button>
      <button class="btn btn-primary" onclick="apply('toggle')">大小写反转 tOGGLE</button>
      <button class="btn" onclick="apply('camel')">camelCase</button>
      <button class="btn" onclick="apply('snake')">snake_case</button>
      <button class="btn" onclick="apply('kebab')">kebab-case</button>
      <button class="btn" onclick="apply('constant')">CONSTANT_CASE</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">结果</div>
    <textarea id="out" style="min-height:160px" readonly></textarea>
    <div style="margin-top:10px">
      <button class="btn" onclick="copyText(out.value)">📋 复制</button>
      <button class="btn" onclick="downloadFile('case.txt', out.value)">⬇ 下载</button>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/text/case.html");
const $ = id => document.getElementById(id);
const titleCase = s => s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
const sentenceCase = s => s.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g, c => c.toUpperCase());
const toggleCase = s => s.split("").map(c => c === c.toUpperCase() ? c.toLowerCase() : c.toUpperCase()).join("");
const camelCase  = s => s.toLowerCase().replace(/[^a-z0-9]+(.)/g, (_, c) => c.toUpperCase());
const snakeCase  = s => s.trim().replace(/\s+/g, "_").replace(/([a-z])([A-Z])/g, "$1_$2").toLowerCase();
const kebabCase  = s => snakeCase(s).replace(/_/g, "-");
const constantCase = s => snakeCase(s).toUpperCase();

function apply(kind) {
  const v = $("text").value;
  if (kind === "upper")   $("out").value = v.toUpperCase();
  if (kind === "lower")   $("out").value = v.toLowerCase();
  if (kind === "title")   $("out").value = titleCase(v);
  if (kind === "sentence")$("out").value = sentenceCase(v);
  if (kind === "toggle")  $("out").value = toggleCase(v);
  if (kind === "camel")   $("out").value = camelCase(v);
  if (kind === "snake")   $("out").value = snakeCase(v);
  if (kind === "kebab")   $("out").value = kebabCase(v);
  if (kind === "constant")$("out").value = constantCase(v);
}
</script>
</body></html>

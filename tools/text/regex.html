<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>正则测试 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
<style>
  .hl { background: rgba(255, 184, 107, 0.35); color: #fff; padding: 0 2px; border-radius: 3px; }
</style>
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">.*  正则测试</div>
    <div class="page-desc">实时高亮匹配结果，支持捕获组。</div>
  </div>

  <div class="panel">
    <div class="row">
      <div class="col" style="min-width:200px">
        <div class="panel-title">正则表达式</div>
        <input id="pat" type="text" value="\b\d{3,4}\b" />
      </div>
      <div class="col" style="min-width:120px">
        <div class="panel-title">标志</div>
        <input id="flg" type="text" value="g" placeholder="g i m s u y" />
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">测试文本</div>
    <textarea id="text" style="min-height:160px">订单号 1001，金额 1234.56，电话 138-0000-0000，邮编 518000。
另外两个订单：1002 和 10003，金额分别为 12.5 与 9000.0。</textarea>
  </div>

  <div class="panel">
    <div class="panel-title">结果预览</div>
    <div id="preview" style="min-height:120px; line-height:1.8; padding:8px; background:var(--bg-2); border-radius:8px; border:1px solid var(--border);"></div>
  </div>

  <div class="panel">
    <div class="panel-title">匹配列表（<span id="cnt">0</span>）</div>
    <div id="matches" style="max-height:300px; overflow:auto;"></div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/text/regex.html");
const $ = id => document.getElementById(id);

function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[c]); }

function run() {
  $("preview").innerHTML = "";
  $("matches").innerHTML = "";
  let re;
  try { re = new RegExp($("pat").value, $("flg").value); }
  catch (e) { $("preview").textContent = "正则错误：" + e.message; return; }

  const text = $("text").value;
  const matches = [];
  if (re.global) {
    let m;
    while ((m = re.exec(text)) !== null) {
      if (m.index === re.lastIndex) re.lastIndex++;
      matches.push(m);
    }
  } else {
    const m = re.exec(text);
    if (m) matches.push(m);
  }

  // 高亮
  let html = "";
  let last = 0;
  matches.forEach(m => {
    html += escapeHtml(text.slice(last, m.index));
    html += `<span class="hl">${escapeHtml(m[0])}</span>`;
    last = m.index + m[0].length;
  });
  html += escapeHtml(text.slice(last));
  $("preview").innerHTML = html;

  // 列表
  $("cnt").textContent = matches.length;
  $("matches").innerHTML = matches.map((m, i) => `
    <div class="diff-line" style="border-bottom:1px solid var(--border);">
      <strong>#${i+1}</strong> 位置 ${m.index}  匹配 "${escapeHtml(m[0])}"
      ${m.length > 1 ? `<br>分组: ${m.slice(1).map((g, j) => `<code class="kbd">$${j+1}</code>=${escapeHtml(g ?? "")}</code>`).join(" ")}` : ""}
    </div>
  `).join("");
}

["pat","flg","text"].forEach(id => $(id).addEventListener("input", run));
run();
</script>
</body></html>

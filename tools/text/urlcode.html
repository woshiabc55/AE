<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>URL 编解码 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🌐 URL 编解码</div>
    <div class="page-desc">使用 encodeURIComponent / decodeURIComponent 处理 URL 片段。</div>
  </div>

  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title">输入</div>
      <textarea id="src" style="min-height:300px">https://example.com/search?q=你好世界&type=文本</textarea>
      <div style="margin-top:10px" class="row">
        <button class="btn btn-primary" onclick="run('enc')">编码</button>
        <button class="btn" onclick="run('dec')">解码</button>
        <button class="btn" onclick="run('fullEnc')">完整编码 (encodeURI)</button>
        <button class="btn" onclick="run('fullDec')">完整解码 (decodeURI)</button>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">输出</div>
      <textarea id="dst" style="min-height:300px" readonly></textarea>
      <div style="margin-top:10px"><button class="btn" onclick="copyText(dst.value)">📋 复制</button></div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/text/urlcode.html");
function run(kind) {
  const s = document.getElementById("src").value;
  try {
    if (kind === "enc")     document.getElementById("dst").value = encodeURIComponent(s);
    if (kind === "dec")     document.getElementById("dst").value = decodeURIComponent(s);
    if (kind === "fullEnc") document.getElementById("dst").value = encodeURI(s);
    if (kind === "fullDec") document.getElementById("dst").value = decodeURI(s);
  } catch (e) { toast("失败：" + e.message); }
}
</script>
</body></html>

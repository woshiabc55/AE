<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>ASCII 表 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
<style>
  .ascii-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; font-family: monospace; }
  .ascii-cell { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 6px; text-align: center; cursor: pointer; }
  .ascii-cell:hover { border-color: var(--accent); }
  .ascii-dec { color: var(--muted); font-size: 10px; }
  .ascii-ch  { color: #fff; font-size: 16px; font-weight: 600; min-height: 24px; }
  .ascii-cell.ctrl { background: var(--panel-2); }
  .ascii-cell.ctrl .ascii-ch { color: var(--muted); }
</style>
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🔤 ASCII 表</div>
    <div class="page-desc">0-127 完整 ASCII 表，点击复制（支持 hex/oct/dec）。</div>
  </div>

  <div class="panel">
    <input id="q" placeholder="🔎 搜索字符或编码 (如 A / 65 / 0x41)" />
  </div>

  <div class="panel">
    <div class="ascii-grid" id="grid"></div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/dev/ascii.html");
function show(c) {
  if (c < 32) return { glyph: "^" + String.fromCharCode(64 + c), ctrl: true };
  if (c === 32) return { glyph: "␣" };
  if (c === 127) return { glyph: "DEL", ctrl: true };
  return { glyph: String.fromCharCode(c) };
}
function render() {
  const q = document.getElementById("q").value.trim().toLowerCase();
  let html = "";
  for (let i = 0; i < 128; i++) {
    const s = show(i);
    if (q) {
      const matches = String(i).includes(q) || i.toString(16).toLowerCase() === q.replace(/^0x/,"") ||
        (s.glyph && s.glyph.toLowerCase().includes(q));
      if (!matches) continue;
    }
    html += `<div class="ascii-cell ${s.ctrl ? "ctrl" : ""}" onclick="copyText('${i} / 0x${i.toString(16).toUpperCase().padStart(2,"0")} / ${s.glyph.replace(/"/g, "&quot;")}')" title="点击复制">
      <div class="ascii-dec">${i} / 0x${i.toString(16).toUpperCase().padStart(2,"0")}</div>
      <div class="ascii-ch">${s.glyph}</div>
    </div>`;
  }
  document.getElementById("grid").innerHTML = html || `<div style="grid-column:1/-1;color:var(--muted);padding:20px;text-align:center">无匹配</div>`;
}
document.getElementById("q").addEventListener("input", render);
render();
</script>
</body></html>

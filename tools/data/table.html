<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>数据表格 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
<style>
  .tbl-wrap { max-height: 520px; overflow: auto; border: 1px solid var(--border); border-radius: 8px; }
  table.tbl-view { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.tbl-view th, table.tbl-view td { padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  table.tbl-view th { background: var(--panel-2); color: var(--muted); position: sticky; top: 0; cursor: pointer; user-select: none; }
  table.tbl-view tr:hover td { background: var(--bg-2); }
  table.tbl-view th:hover { color: var(--accent); }
</style>
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">📋 数据表格查看</div>
    <div class="page-desc">粘贴 JSON 数组或 CSV，自动渲染为可排序、分页的表格。</div>
  </div>

  <div class="panel">
    <div class="row">
      <select id="fmt" style="max-width:120px">
        <option value="json">JSON</option>
        <option value="csv">CSV</option>
      </select>
      <input id="q" type="text" placeholder="🔎 过滤..." style="flex:1" />
      <select id="ps" style="max-width:120px">
        <option>10</option><option selected>20</option><option>50</option><option>100</option>
      </select>
      <span id="cnt" style="color:var(--muted); font-size:12px;"></span>
    </div>
  </div>

  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title">输入</div>
      <textarea id="src" style="min-height:360px; font-family:monospace">[{"id":1,"name":"Alice","age":28,"city":"Shanghai","dept":"Engineering"},{"id":2,"name":"Bob","age":32,"city":"Beijing","dept":"Sales"},{"id":3,"name":"Carol","age":25,"city":"Shenzhen","dept":"Marketing"},{"id":4,"name":"David","age":40,"city":"Shanghai","dept":"Engineering"},{"id":5,"name":"Eve","age":30,"city":"Guangzhou","dept":"HR"}]</textarea>
    </div>
    <div class="panel">
      <div class="panel-title">表格</div>
      <div class="tbl-wrap" id="wrap"></div>
      <div id="pager" style="margin-top:10px; text-align:center; color:var(--muted); font-size:12px;"></div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/data/table.html");
const $ = id => document.getElementById(id);
let data = [], headers = [], sortKey = null, sortDir = 1, page = 0, pageSize = 20;

function parse(text, fmt) {
  if (fmt === "json") return JSON.parse(text);
  const rows = text.split(/\r?\n/).filter(l => l).map(l => l.split(","));
  const h = rows[0];
  return rows.slice(1).map(r => Object.fromEntries(h.map((k, i) => [k, r[i] ?? ""])));
}

function getData() {
  try {
    const raw = parse($("src").value, $("fmt").value);
    data = raw;
    if (data.length) headers = Object.keys(data[0]);
  } catch (e) { data = []; headers = []; }
}

function render() {
  getData();
  const q = $("q").value.toLowerCase();
  let view = data;
  if (q) view = view.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)));
  if (sortKey) view = view.slice().sort((a,b) => {
    const av = a[sortKey], bv = b[sortKey];
    return (typeof av === "number" ? av - bv : String(av).localeCompare(String(bv))) * sortDir;
  });
  $("cnt").textContent = `共 ${view.length} 行`;
  pageSize = +$("ps").value;
  const totalPages = Math.max(1, Math.ceil(view.length / pageSize));
  if (page >= totalPages) page = totalPages - 1;
  const slice = view.slice(page * pageSize, page * pageSize + pageSize);
  const html = `<table class="tbl-view"><thead><tr>${headers.map(h => `<th onclick="sort('${h}')">${h}${sortKey===h?(sortDir>0?" ▲":" ▼"):""}</th>`).join("")}</tr></thead>
    <tbody>${slice.map(r => `<tr>${headers.map(h => `<td>${r[h] ?? ""}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
  $("wrap").innerHTML = html || `<div style="padding:40px; text-align:center; color:var(--muted)">无数据</div>`;
  $("pager").innerHTML = `第 ${page+1} / ${totalPages} 页 <button class="btn btn-sm" onclick="page=Math.max(0,page-1);render()">‹</button> <button class="btn btn-sm" onclick="page=Math.min(totalPages-1,page+1);render()">›</button>`;
}
window.sort = (k) => { if (sortKey === k) sortDir = -sortDir; else { sortKey = k; sortDir = 1; } render(); };

["fmt","q","ps","src"].forEach(id => $(id).addEventListener("input", () => { page = 0; render(); }));
render();
</script>
</body></html>

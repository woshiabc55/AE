<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>CSV ↔ JSON · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🔁 CSV ↔ JSON</div>
    <div class="page-desc">支持表头 CSV 与 JSON 数组互转，自动检测。</div>
  </div>

  <div class="panel">
    <div class="row">
      <select id="dir" style="max-width:160px">
        <option value="c2j">CSV → JSON</option>
        <option value="j2c">JSON → CSV</option>
      </select>
      <button class="btn btn-primary" onclick="run()">▶ 转换</button>
      <button class="btn" onclick="swap()">🔃 交换</button>
    </div>
  </div>

  <div class="grid grid-2">
    <div class="panel"><div class="panel-title" id="lA">CSV</div><textarea id="A" style="min-height:340px; font-family:monospace">name,age,city
Alice,28,Shanghai
Bob,32,Beijing
Carol,25,Shenzhen</textarea></div>
    <div class="panel"><div class="panel-title" id="lB">JSON</div><textarea id="B" style="min-height:340px; font-family:monospace" readonly></textarea>
      <div style="margin-top:8px"><button class="btn" onclick="copyText(B.value)">📋 复制</button>
      <button class="btn" onclick="downloadFile('result', B.value, dir.value==='c2j'?'application/json':'text/csv')">⬇ 下载</button></div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/data/csvjson.html");
const $ = id => document.getElementById(id);

function csvParse(text) {
  const rows = []; let cur = []; let cell = ""; let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (c === '"') inQ = false;
      else cell += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ",") { cur.push(cell); cell = ""; }
      else if (c === "\n") { cur.push(cell); rows.push(cur); cur = []; cell = ""; }
      else if (c === "\r") {}
      else cell += c;
    }
  }
  if (cell || cur.length) { cur.push(cell); rows.push(cur); }
  return rows;
}
function csvFrom(arr) {
  if (!arr.length) return "";
  const headers = Object.keys(arr[0]);
  const esc = v => { const s = String(v ?? ""); return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s; };
  return [headers.join(","), ...arr.map(o => headers.map(h => esc(o[h])).join(","))].join("\n");
}

function run() {
  try {
    if ($("dir").value === "c2j") {
      const rows = csvParse($("A").value).filter(r => r.some(c => c.length));
      const headers = rows[0];
      const data = rows.slice(1).map(r => {
        const o = {};
        headers.forEach((h, i) => o[h] = r[i] ?? "");
        return o;
      });
      $("B").value = JSON.stringify(data, null, 2);
    } else {
      const data = JSON.parse($("A").value);
      $("B").value = csvFrom(Array.isArray(data) ? data : [data]);
    }
  } catch (e) { toast("错误：" + e.message); }
}
function swap() {
  const a = $("A").value, b = $("B").value;
  $("A").value = b; $("B").value = a;
  $("dir").value = $("dir").value === "c2j" ? "j2c" : "c2j";
  $("lA").textContent = $("dir").value === "c2j" ? "CSV" : "JSON";
  $("lB").textContent = $("dir").value === "c2j" ? "JSON" : "CSV";
}
$("dir").addEventListener("change", run);
$("A").addEventListener("input", run);
run();
</script>
</body></html>

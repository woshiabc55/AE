<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>随机密钥生成 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🗝 随机密钥生成</div>
    <div class="page-desc">使用加密级随机数生成 Hex / Base64 密钥。</div>
  </div>

  <div class="panel">
    <div class="row">
      <div class="col" style="min-width:140px"><div class="panel-title" style="font-size:12px">长度 (字节)</div>
        <select id="bytes">
          <option>16</option><option selected>32</option><option>64</option><option>128</option><option>256</option>
        </select>
      </div>
      <div class="col" style="min-width:140px"><div class="panel-title" style="font-size:12px">格式</div>
        <select id="fmt"><option>Hex</option><option>Base64</option><option>Base64URL</option></select>
      </div>
      <div class="col" style="min-width:120px"><div class="panel-title" style="font-size:12px">数量</div>
        <input id="n" type="number" value="5" min="1" max="50" />
      </div>
      <button class="btn btn-primary" style="align-self:end" onclick="run()">▶ 生成</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">结果</div>
    <textarea id="out" style="min-height:280px; font-family:monospace" readonly></textarea>
    <div style="margin-top:10px">
      <button class="btn" onclick="copyText(out.value)">📋 复制</button>
      <button class="btn" onclick="downloadFile('keys.txt', out.value)">⬇ 下载</button>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/crypto/keygen.html");
function run() {
  const n = Math.max(1, Math.min(50, +document.getElementById("n").value));
  const len = +document.getElementById("bytes").value;
  const fmt = document.getElementById("fmt").value;
  const arr = [];
  for (let i = 0; i < n; i++) {
    const buf = new Uint8Array(len);
    crypto.getRandomValues(buf);
    if (fmt === "Hex") {
      arr.push([...buf].map(b => b.toString(16).padStart(2,"0")).join(""));
    } else if (fmt === "Base64") {
      let s = ""; buf.forEach(b => s += String.fromCharCode(b));
      arr.push(btoa(s));
    } else {
      let s = ""; buf.forEach(b => s += String.fromCharCode(b));
      arr.push(btoa(s).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""));
    }
  }
  document.getElementById("out").value = arr.join("\n");
}
run();
</script>
</body></html>

<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>AES 加解密 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🛡 AES 加解密</div>
    <div class="page-desc">使用 Web Crypto API：AES-CBC / GCM，PBKDF2 派生密钥。</div>
  </div>

  <div class="panel">
    <div class="row">
      <div class="col"><div class="panel-title" style="font-size:12px">密码</div><input id="pwd" type="text" value="my-password" /></div>
      <div class="col" style="min-width:140px">
        <div class="panel-title" style="font-size:12px">算法</div>
        <select id="alg"><option value="AES-GCM">AES-GCM</option><option value="AES-CBC">AES-CBC</option></select>
      </div>
      <div class="col" style="min-width:140px">
        <div class="panel-title" style="font-size:12px">位长</div>
        <select id="bits"><option>128</option><option>192</option><option>256</option></select>
      </div>
    </div>
  </div>

  <div class="grid grid-2">
    <div class="panel">
      <div class="panel-title">原文</div>
      <textarea id="src" style="min-height:200px">这是一段需要加密的明文数据。Hello, SkillBox! 🔐</textarea>
      <div style="margin-top:10px"><button class="btn btn-primary" onclick="enc()">🔒 加密</button></div>
    </div>
    <div class="panel">
      <div class="panel-title">密文 (Base64) / 解密结果</div>
      <textarea id="dst" style="min-height:200px; font-family:monospace"></textarea>
      <div style="margin-top:10px">
        <button class="btn btn-primary" onclick="dec()">🔓 解密</button>
        <button class="btn" onclick="copyText(dst.value)">📋 复制</button>
      </div>
    </div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/crypto/aes.html");
$ = id => document.getElementById(id);

function b64encode(buf) {
  const bytes = new Uint8Array(buf);
  let s = ""; bytes.forEach(b => s += String.fromCharCode(b));
  return btoa(s);
}
function b64decode(s) {
  const bin = atob(s);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}

async function getKey() {
  const enc = new TextEncoder();
  const salt = enc.encode("skillbox-salt");
  const baseKey = await crypto.subtle.importKey("raw", enc.encode($("pwd").value), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
    baseKey,
    { name: $("alg").value, length: +$("bits").value },
    false, ["encrypt", "decrypt"]
  );
}

async function enc() {
  try {
    const key = await getKey();
    const alg = $("alg").value;
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name: alg, iv }, key, new TextEncoder().encode($("src").value));
    $("dst").value = b64encode(iv) + ":" + b64encode(ct);
  } catch (e) { toast("失败：" + e.message); }
}

async function dec() {
  try {
    const parts = $("dst").value.split(":");
    if (parts.length !== 2) return toast("密文格式错误");
    const key = await getKey();
    const alg = $("alg").value;
    const iv = new Uint8Array(b64decode(parts[0]));
    const pt = await crypto.subtle.decrypt({ name: alg, iv }, key, b64decode(parts[1]));
    $("dst").value = new TextDecoder().decode(pt);
  } catch (e) { toast("解密失败：可能密码或格式错误"); }
}
</script>
</body></html>

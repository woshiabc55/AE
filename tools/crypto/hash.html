// MD5 实现（精简版）
function md5(str) {
  function rh(n) { let j, s = ""; for (j = 0; j <= 3; j++) s += (n >> (j * 8 + 4) & 0x0F).toString(16) + (n >> (j * 8) & 0x0F).toString(16); return s; }
  function ad(x, y) { var l = (x & 0xFFFF) + (y & 0xFFFF), m = (x >> 16) + (y >> 16) + (l >> 16); return (m << 16) | (l & 0xFFFF); }
  function rl(n, c) { return (n << c) | (n >>> (32 - c)); }
  function cm(q, a, b, x, s, t) { return ad(rl(ad(ad(a, q), ad(x, t)), s), b); }
  function ff(a,b,c,d,x,s,t) { return cm((b & c) | ((~b) & d), a, b, x, s, t); }
  function gg(a,b,c,d,x,s,t) { return cm((b & d) | (c & (~d)), a, b, x, s, t); }
  function hh(a,b,c,d,x,s,t) { return cm(b ^ c ^ d, a, b, x, s, t); }
  function ii(a,b,c,d,x,s,t) { return cm(c ^ (b | (~d)), a, b, x, s, t); }
  function sb(s) {
    s = unescape(encodeURIComponent(s));
    var n = s.length, w = [], x, y, z, a = 1732584193, b = -271733879, c = -1732584194, d = 271733878;
    for (x = 0; x < n + 8; x++) w[x] = 0;
    for (x = 0; x < n; x++) w[x >> 2] |= s.charCodeAt(x) << ((x % 4) * 8);
    w[x >> 2] |= 0x80 << ((x % 4) * 8); w[(((n + 8) >> 6) * 16) + 14] = n * 8;
    for (x = 0; x < w.length; x += 16) {
      var aa = a, bb = b, cc = c, dd = d;
      a = ff(a,b,c,d,w[x+0],7,-680876936); d = ff(d,a,b,c,w[x+1],12,-389564586);
      c = ff(c,d,a,b,w[x+2],17,606105819); b = ff(b,c,d,a,w[x+3],22,-1044525330);
      a = ff(a,b,c,d,w[x+4],7,-176418897); d = ff(d,a,b,c,w[x+5],12,1200080426);
      c = ff(c,d,a,b,w[x+6],17,-1473231341); b = ff(b,c,d,a,w[x+7],22,-45705983);
      a = ff(a,b,c,d,w[x+8],7,1770035416); d = ff(d,a,b,c,w[x+9],12,-1958414417);
      c = ff(c,d,a,b,w[x+10],17,-42063); b = ff(b,c,d,a,w[x+11],22,-1990404162);
      a = ff(a,b,c,d,w[x+12],7,1804603682); d = ff(d,a,b,c,w[x+13],12,-40341101);
      c = ff(c,d,a,b,w[x+14],17,-1502002290); b = ff(b,c,d,a,w[x+15],22,1236535329);
      a = gg(a,b,c,d,w[x+1],5,-165796510); d = gg(d,a,b,c,w[x+6],9,-1069501632);
      c = gg(c,d,a,b,w[x+11],14,643717713); b = gg(b,c,d,a,w[x+0],20,-373897302);
      a = gg(a,b,c,d,w[x+5],5,-701558691); d = gg(d,a,b,c,w[x+10],9,38016083);
      c = gg(c,d,a,b,w[x+15],14,-660478335); b = gg(b,c,d,a,w[x+4],20,-405537848);
      a = gg(a,b,c,d,w[x+9],5,568446438); d = gg(d,a,b,c,w[x+14],9,-1019803690);
      c = gg(c,d,a,b,w[x+3],14,-187363961); b = gg(b,c,d,a,w[x+8],20,1163531501);
      a = gg(a,b,c,d,w[x+13],5,-1444681467); d = gg(d,a,b,c,w[x+2],9,-51403784);
      c = gg(c,d,a,b,w[x+7],14,1735328473); b = gg(b,c,d,a,w[x+12],20,-1926607734);
      a = hh(a,b,c,d,w[x+5],4,-378558); d = hh(d,a,b,c,w[x+8],11,-2022574463);
      c = hh(c,d,a,b,w[x+11],16,1839030562); b = hh(b,c,d,a,w[x+14],23,-35309556);
      a = hh(a,b,c,d,w[x+1],4,-1530992060); d = hh(d,a,b,c,w[x+4],11,1272893353);
      c = hh(c,d,a,b,w[x+7],16,-155497632); b = hh(b,c,d,a,w[x+10],23,-1094730640);
      a = hh(a,b,c,d,w[x+13],4,681279174); d = hh(d,a,b,c,w[x+0],11,-358537222);
      c = hh(c,d,a,b,w[x+3],16,-722521979); b = hh(b,c,d,a,w[x+6],23,76029189);
      a = hh(a,b,c,d,w[x+9],4,-640364487); d = hh(d,a,b,c,w[x+12],11,-421815835);
      c = hh(c,d,a,b,w[x+15],16,530742520); b = hh(b,c,d,a,w[x+2],23,-995338651);
      a = ii(a,b,c,d,w[x+0],6,-198630844); d = ii(d,a,b,c,w[x+7],10,1126891415);
      c = ii(c,d,a,b,w[x+14],15,-1416354905); b = ii(b,c,d,a,w[x+5],21,-57434055);
      a = ii(a,b,c,d,w[x+12],6,1700485571); d = ii(d,a,b,c,w[x+3],10,-1894986606);
      c = ii(c,d,a,b,w[x+10],15,-1051523); b = ii(b,c,d,a,w[x+1],21,-2054922799);
      a = ii(a,b,c,d,w[x+8],6,1873313359); d = ii(d,a,b,c,w[x+15],10,-30611744);
      c = ii(c,d,a,b,w[x+6],15,-1560198380); b = ii(b,c,d,a,w[x+13],21,1309151649);
      a = ii(a,b,c,d,w[x+4],6,-145523070); d = ii(d,a,b,c,w[x+11],10,-1120210379);
      c = ii(c,d,a,b,w[x+2],15,718787259); b = ii(b,c,d,a,w[x+9],21,-343485551);
      a = ad(a, aa); b = ad(b, bb); c = ad(c, cc); d = ad(d, dd);
    }
    return rh(a) + rh(b) + rh(c) + rh(d);
  }
  return sb(str);
}

async function sha(text, alg) {
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest(alg, buf);
  return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2,"0")).join("");
}

function run() {
  const t = document.getElementById("text").value;
  document.getElementById("md5").value  = md5(t);
  sha(t, "SHA-1").then(v => document.getElementById("s1").value = v);
  sha(t, "SHA-256").then(v => document.getElementById("s256").value = v);
  sha(t, "SHA-512").then(v => document.getElementById("s512").value = v);
}
document.getElementById("text").addEventListener("input", run);
run();
</script>

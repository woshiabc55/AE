<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8" />
<title>HMAC 签名 · SkillBox</title>
<link rel="stylesheet" href="/assets/style.css" />
</head><body>
<aside id="sidebar" class="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div class="page-title">🪪 HMAC 签名</div>
    <div class="page-desc">基于密钥的消息认证码（SHA-256 / SHA-512）。</div>
  </div>

  <div class="panel">
    <div class="row">
      <div class="col"><div class="panel-title" style="font-size:12px">密钥</div><input id="key" type="text" value="my-secret-key" /></div>
      <div class="col" style="min-width:160px">
        <div class="panel-title" style="font-size:12px">算法</div>
        <select id="alg"><option>SHA-256</option><option>SHA-512</option><option>SHA-1</option></select>
      </div>
    </div>
    <div style="margin-top:12px"><div class="panel-title" style="font-size:12px">消息</div><textarea id="msg" style="min-height:140px">待签名的消息内容：SkillBox HMAC demo</textarea></div>
  </div>

  <div class="panel">
    <div class="panel-title">HMAC 结果 (Hex)</div>
    <input id="out" type="text" readonly />
    <div style="margin-top:10px"><button class="btn" onclick="copyText(out.value)">📋 复制</button></div>
  </div>
</main>

<script src="/assets/app.js"></script>
<script>
renderSidebar("/tools/crypto/hmac.html");
$ = id => document.getElementById(id);

async function hmac(key, msg, alg) {
  const enc = new TextEncoder();
  const k = await crypto.subtle.importKey("raw", enc.encode(key), { name: "HMAC", hash: alg }, false, ["sign"]);
  const sig = await crypto.subtle.sign("HMAC", k, enc.encode(msg));
  return [...new Uint8Array(sig)].map(b => b.toString(16).padStart(2,"0")).join("");
}
async function run() {
  try {
    $("out").value = await hmac($("key").value, $("msg").value, $("alg").value);
  } catch (e) { toast("错误：" + e.message); }
}
["key","msg","alg"].forEach(id => $(id).addEventListener("input", run));
run();
</script>
</body></html>

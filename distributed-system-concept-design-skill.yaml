skill:
  name: "distributed-system-concept-design"
  version: "1.0.0"
  description: "分布式系统概念设计AAI提示词技能集，覆盖架构模式、一致性模型、容错机制、可扩展性、性能优化、安全设计与运维监控等核心维度"
  author: "AAI-Skill-Builder"
  tags:
    - "distributed-systems"
    - "concept-design"
    - "architecture"
    - "prompt-engineering"
    - "aai"
  language: "zh-CN"

variables:
  system_name:
    description: "目标分布式系统名称"
    example: "分布式电商订单系统"
  business_domain:
    description: "业务领域描述"
    example: "电商交易，日均订单量千万级，峰值QPS十万级"
  scale_requirement:
    description: "规模需求"
    example: "支持1000万DAU，数据量PB级，跨3个数据中心部署"
  consistency_level:
    description: "一致性要求级别"
    options: ["强一致性", "最终一致性", "因果一致性", "读己之写一致性"]
    default: "最终一致性"
  latency_requirement:
    description: "延迟要求"
    example: "P99延迟<200ms"
  availability_target:
    description: "可用性目标"
    example: "99.99%"
  fault_tolerance_scope:
    description: "容错范围"
    example: "容忍单数据中心故障，容忍1/3节点宕机"
  tech_stack:
    description: "技术栈偏好"
    example: "Java/Spring Cloud, Kubernetes, Kafka, Redis, MySQL"
  output_format:
    description: "输出格式偏好"
    options: ["markdown文档", "架构图描述", "决策矩阵", "对比分析表"]
    default: "markdown文档"

prompts:

  architecture_design:
    name: "架构模式设计"
    description: "生成分布式系统整体架构设计方案，包括架构风格选择、组件划分、通信模式等"
    template: |
      你是一位资深的分布式系统架构师，擅长概念设计与架构决策。

      ## 任务
      请为以下分布式系统进行概念级架构设计：

      **系统名称**：{{system_name}}
      **业务领域**：{{business_domain}}
      **规模需求**：{{scale_requirement}}
      **技术栈偏好**：{{tech_stack}}

      ## 输出要求

      请按以下结构输出设计方案：

      ### 1. 架构风格选型
      - 列出3种以上候选架构风格（如微服务、事件驱动、CQRS、分层架构、六边形架构等）
      - 对每种风格进行SWOT分析（优势、劣势、适用场景、风险）
      - 给出推荐方案及决策理由

      ### 2. 核心组件划分
      - 识别核心领域边界（限界上下文）
      - 定义各组件的职责与接口契约
      - 绘制组件依赖关系（用文本描述有向图）

      ### 3. 通信模式设计
      - 同步通信 vs 异步通信的选型决策
      - 服务间通信协议选择（gRPC/REST/消息队列）
      - 数据流拓扑描述

      ### 4. 数据架构
      - 数据分区策略（水平/垂直分片、一致性哈希）
      - 读写分离方案
      - 数据生命周期管理

      ### 5. 架构决策记录（ADR）
      - 每个关键决策以ADR格式记录：上下文→决策→后果→替代方案

      ## 约束
      - 所有设计停留在概念层面，不涉及具体代码实现
      - 每个设计决策必须附带权衡分析（trade-off analysis）
      - 明确标注假设条件与不确定性

  consistency_model:
    name: "一致性模型设计"
    description: "设计分布式系统的一致性策略，包括CAP权衡、一致性协议选择、冲突解决等"
    template: |
      你是一位分布式系统一致性专家，精通CAP理论、一致性协议与数据同步策略。

      ## 任务
      请为以下分布式系统设计一致性模型方案：

      **系统名称**：{{system_name}}
      **业务领域**：{{business_domain}}
      **一致性要求**：{{consistency_level}}
      **可用性目标**：{{availability_target}}
      **延迟要求**：{{latency_requirement}}

      ## 输出要求

      ### 1. CAP权衡分析
      - 分析系统在CAP三元组中的定位
      - 不同业务场景下的CP/AP选择
      - 网络分区时的降级策略

      ### 2. 一致性模型选型
      - 列出候选一致性模型（强一致、最终一致、因果一致、线性一致、顺序一致等）
      - 每种模型的适用场景与性能影响
      - 混合一致性策略（不同数据/操作使用不同一致性级别）

      ### 3. 一致性协议设计
      - 主流协议对比（Paxos/Raft/2PC/3PC/Saga/TCC）
      - 选定协议及理由
      - 协议在系统中的具体应用映射

      ### 4. 冲突检测与解决
      - 冲突产生场景枚举
      - 冲突检测机制（版本向量、向量时钟、LWW等）
      - 冲突解决策略（Last-Write-Wins、应用层合并、CRDT等）

      ### 5. 数据同步方案
      - 同步复制 vs 异步复制的决策矩阵
      - 跨数据中心同步策略
      - 同步延迟监控与告警阈值设计

      ## 约束
      - 每个一致性决策需明确其对延迟、吞吐、可用性的影响
      - 给出一致性违例时的补偿方案
      - 标注理论假设与工程实践的差距

  fault_tolerance:
    name: "容错机制设计"
    description: "设计分布式系统的容错与韧性策略，包括故障检测、隔离、恢复、降级等"
    template: |
      你是一位分布式系统韧性工程专家，擅长故障模式分析与容错设计。

      ## 任务
      请为以下分布式系统设计容错机制方案：

      **系统名称**：{{system_name}}
      **业务领域**：{{business_domain}}
      **容错范围**：{{fault_tolerance_scope}}
      **可用性目标**：{{availability_target}}

      ## 输出要求

      ### 1. 故障模式分析（FMEA）
      - 枚举所有可能的故障模式（节点故障、网络故障、磁盘故障、软件Bug、依赖服务故障等）
      - 每种故障的：发生概率、影响范围、检测难度、严重等级
      - 故障传播链分析（级联故障场景）

      ### 2. 故障检测机制
      - 心跳检测策略（间隔、超时阈值、误判率）
      - 健康检查设计（Liveness vs Readiness）
      - 异常检测算法选择（阈值、统计、机器学习）
      - 故障判定策略（避免误判与漏判的平衡）

      ### 3. 故障隔离策略
      - 隔离模式选型（舱壁模式、隔板模式、断路器模式）
      - 爆炸半径控制方案
      - 限流与降级策略（触发条件、降级级别、恢复策略）
      - 混沌工程验证方案

      ### 4. 故障恢复机制
      - 自动恢复策略（重启、重试、回退、主从切换）
      - 数据恢复方案（日志回放、快照恢复、增量同步）
      - 脑裂防护与处理
      - 恢复优先级排序

      ### 5. 韧性模式组合
      - 推荐的韧性模式组合方案（Circuit Breaker + Retry + Timeout + Bulkhead）
      - 各模式的参数配置建议
      - 模式间的交互与冲突分析

      ## 约束
      - 容错设计需覆盖部分故障（partial failure）场景
      - 明确区分可恢复故障与不可恢复故障
      - 每个容错机制需标注其自身引入的复杂度与风险

  scalability_design:
    name: "可扩展性设计"
    description: "设计分布式系统的水平/垂直扩展策略，包括分区、分片、负载均衡等"
    template: |
      你是一位分布式系统扩展性专家，精通水平扩展、数据分片与弹性伸缩策略。

      ## 任务
      请为以下分布式系统设计可扩展性方案：

      **系统名称**：{{system_name}}
      **业务领域**：{{business_domain}}
      **规模需求**：{{scale_requirement}}
      **延迟要求**：{{latency_requirement}}

      ## 输出要求

      ### 1. 扩展性瓶颈分析
      - 识别潜在瓶颈（计算、存储、网络、IO、锁竞争）
      - 瓶颈量化方法与监控指标
      - Amdahl定律在系统中的适用分析

      ### 2. 水平扩展策略
      - 无状态服务扩展方案
      - 有状态服务扩展挑战与对策
      - 数据分片策略（范围分片、哈希分片、目录分片）
      - 分片键选择与热点规避

      ### 3. 弹性伸缩设计
      - 伸缩触发条件（指标驱动、预测驱动、定时驱动）
      - 伸缩策略（步进式、目标追踪式）
      - 缩容保护机制（优雅终止、连接排空）
      - 冷启动优化方案

      ### 4. 负载均衡设计
      - L4/L7负载均衡选型
      - 负载均衡算法选择（轮询、加权、最少连接、一致性哈希）
      - 会话亲和性需求分析
      - 全局负载均衡（跨地域/跨AZ）

      ### 5. 数据扩展方案
      - 数据库分库分表策略
      - 冷热数据分离方案
      - 读写扩展路径
      - 数据迁移与再平衡策略

      ## 约束
      - 扩展方案需考虑成本效益比
      - 明确扩展的上限与瓶颈转移点
      - 区分线性扩展与亚线性扩展场景

  performance_optimization:
    name: "性能优化设计"
    description: "设计分布式系统的性能优化策略，包括延迟优化、吞吐提升、资源利用等"
    template: |
      你是一位分布式系统性能工程专家，擅长延迟优化与吞吐量提升。

      ## 任务
      请为以下分布式系统设计性能优化方案：

      **系统名称**：{{system_name}}
      **业务领域**：{{business_domain}}
      **延迟要求**：{{latency_requirement}}
      **规模需求**：{{scale_requirement}}

      ## 输出要求

      ### 1. 性能目标分解
      - 端到端延迟预算分配（P50/P95/P99）
      - 吞吐量目标分解
      - 资源利用率目标（CPU/内存/网络/磁盘IO）

      ### 2. 延迟优化策略
      - 关键路径分析
      - 缓存策略设计（多级缓存、缓存一致性、缓存淘汰）
      - 异步化与预计算方案
      - 数据本地化与就近访问

      ### 3. 吞吐优化策略
      - 批处理与流水线化
      - 并发模型选择（线程池、协程、Actor、响应式）
      - 背压机制设计
      - 零拷贝与序列化优化

      ### 4. 资源优化策略
      - 连接池化与复用
      - 内存管理（对象池、堆外内存、GC优化）
      - IO模型选择（BIO/NIO/AIO）
      - 计算下推与谓词下推

      ### 5. 性能可观测性
      - 关键性能指标定义（RED方法：Rate/Errors/Duration）
      - 分布式追踪设计（Trace/Span/Baggage）
      - 性能基线与异常检测
      - 性能回归防护机制

      ## 约束
      - 优化方案需标注预期收益与实施复杂度
      - 明确优化之间的依赖关系与冲突
      - 避免过早优化，按优先级排序

  security_design:
    name: "安全设计"
    description: "设计分布式系统的安全架构，包括认证授权、数据保护、通信安全等"
    template: |
      你是一位分布式系统安全架构专家，精通零信任架构与安全设计原则。

      ## 任务
      请为以下分布式系统设计安全方案：

      **系统名称**：{{system_name}}
      **业务领域**：{{business_domain}}
      **规模需求**：{{scale_requirement}}

      ## 输出要求

      ### 1. 威胁建模（STRIDE）
      - 识别系统信任边界
      - 逐组件进行STRIDE分析（欺骗/篡改/否认/信息泄露/拒绝服务/权限提升）
      - 攻击面枚举与风险评估

      ### 2. 身份认证与授权
      - 认证方案选型（OAuth2/OIDC/SAML/mTLS）
      - 授权模型设计（RBAC/ABAC/ReBAC）
      - 服务间认证（双向TLS、JWT、服务网格方案）
      - 会话管理与令牌策略

      ### 3. 数据安全
      - 数据分类分级策略
      - 传输加密方案（TLS版本、证书管理）
      - 存储加密方案（TDE、字段级加密、密钥管理）
      - 数据脱敏与隐私保护（GDPR/个保法合规）

      ### 4. 通信安全
      - 零信任网络架构
      - 服务网格安全策略
      - API安全网关设计
      - 防重放与防中间人攻击

      ### 5. 安全运维
      - 安全审计日志设计
      - 异常行为检测
      - 密钥轮换策略
      - 安全事件响应流程

      ## 约束
      - 安全方案需平衡安全性与可用性
      - 标注每种安全措施的性能开销
      - 遵循最小权限原则与纵深防御原则

  observability_design:
    name: "可观测性设计"
    description: "设计分布式系统的可观测性方案，包括日志、指标、追踪、告警等"
    template: |
      你是一位分布式系统可观测性专家，精通OpenTelemetry与SRE实践。

      ## 任务
      请为以下分布式系统设计可观测性方案：

      **系统名称**：{{system_name}}
      **业务领域**：{{business_domain}}
      **可用性目标**：{{availability_target}}

      ## 输出要求

      ### 1. 可观测性三大支柱
      - **日志（Logs）**：结构化日志规范、日志级别策略、日志聚合方案
      - **指标（Metrics）**：核心指标定义（USE方法+RED方法）、指标采集与存储、指标粒度策略
      - **追踪（Traces）**：分布式追踪架构、采样策略、上下文传播机制

      ### 2. SLI/SLO/SLA设计
      - 关键SLI定义（可用性、延迟、吞吐、正确性）
      - SLO目标设定与错误预算
      - SLA条款建议
      - SLO违例预警机制

      ### 3. 告警体系
      - 告警分级策略（P0-P4）
      - 告警规则设计（阈值、趋势、异常检测）
      - 告警收敛与去重
      - 告警路由与升级机制
      - On-Call轮值设计建议

      ### 4. 仪表盘设计
      - 服务概览仪表盘
      - 业务指标仪表盘
      - 基础设施仪表盘
      - 故障诊断仪表盘

      ### 5. 混沌工程验证
      - 可观测性验证实验设计
      - 故障注入方案
      - 盲区发现方法

      ## 约束
      - 可观测性方案需控制数据量与成本
      - 区分必须指标与可选指标
      - 确保可观测性系统自身的可靠性

  full_system_design:
    name: "完整系统概念设计"
    description: "综合所有维度，生成完整的分布式系统概念设计文档"
    template: |
      你是一位首席分布式系统架构师，需要完成一份完整的概念设计文档。

      ## 任务
      请为以下分布式系统生成完整的概念设计文档：

      **系统名称**：{{system_name}}
      **业务领域**：{{business_domain}}
      **规模需求**：{{scale_requirement}}
      **一致性要求**：{{consistency_level}}
      **延迟要求**：{{latency_requirement}}
      **可用性目标**：{{availability_target}}
      **容错范围**：{{fault_tolerance_scope}}
      **技术栈偏好**：{{tech_stack}}

      ## 输出要求

      请按以下结构输出完整概念设计文档：

      ### 第一部分：系统概述
      1. 业务背景与目标
      2. 核心需求分析（功能性/非功能性）
      3. 关键约束与假设
      4. 利益相关方与关注点

      ### 第二部分：架构设计
      1. 架构风格选型与决策
      2. 系统上下文图
      3. 核心组件划分与职责
      4. 通信模式与数据流
      5. 部署拓扑设计

      ### 第三部分：数据设计
      1. 数据模型与分区策略
      2. 一致性模型与协议
      3. 数据同步与复制方案
      4. 数据生命周期管理

      ### 第四部分：韧性设计
      1. 故障模式分析（FMEA）
      2. 容错与隔离策略
      3. 降级与熔断方案
      4. 故障恢复机制

      ### 第五部分：扩展性设计
      1. 扩展性瓶颈分析
      2. 水平扩展策略
      3. 弹性伸缩方案
      4. 数据扩展与再平衡

      ### 第六部分：性能设计
      1. 性能目标与预算
      2. 关键路径优化
      3. 缓存与异步化策略
      4. 性能可观测性

      ### 第七部分：安全设计
      1. 威胁模型
      2. 认证授权方案
      3. 数据保护策略
      4. 安全运维机制

      ### 第八部分：可观测性设计
      1. 日志/指标/追踪方案
      2. SLI/SLO定义
      3. 告警体系
      4. 混沌工程计划

      ### 第九部分：架构决策汇总
      1. 关键ADR列表
      2. 技术风险登记册
      3. 开放问题与待决事项

      ## 约束
      - 始终保持概念层面，不涉及具体代码
      - 每个设计决策附带权衡分析
      - 明确标注假设、风险与不确定性
      - 各部分之间保持一致性，避免矛盾

composition:
  name: "提示词组合策略"
  description: "如何组合使用各提示词模板"
  strategies:
    - name: "渐进式设计"
      description: "从架构设计开始，逐步深入各维度"
      order:
        - "architecture_design"
        - "consistency_model"
        - "fault_tolerance"
        - "scalability_design"
        - "performance_optimization"
        - "security_design"
        - "observability_design"
      when: "全新系统概念设计，需要系统性覆盖所有维度"

    - name: "聚焦式设计"
      description: "根据核心关注点选择特定维度深入"
      mapping:
        "高可用场景": ["fault_tolerance", "consistency_model", "observability_design"]
        "高并发场景": ["scalability_design", "performance_optimization", "observability_design"]
        "金融交易场景": ["consistency_model", "fault_tolerance", "security_design"]
        "物联网场景": ["scalability_design", "performance_optimization", "security_design"]
        "微服务改造场景": ["architecture_design", "observability_design", "fault_tolerance"]
      when: "针对特定场景，聚焦核心维度"

    - name: "一站式设计"
      description: "使用完整系统设计模板一次性输出"
      order:
        - "full_system_design"
      when: "需要快速获得完整概念设计文档，或作为设计评审材料"

usage_guide:
  quick_start: |
    1. 确定设计目标：明确系统名称、业务领域、规模需求等变量
    2. 选择提示词模板：根据设计阶段和关注点选择对应模板
    3. 填充变量：将{{variable}}替换为实际值
    4. 执行提示词：将填充后的提示词发送给AI
    5. 迭代优化：基于AI输出进行追问和细化

  best_practices:
    - "先完成架构设计，再深入各维度——确保整体方向正确"
    - "每个维度设计完成后，进行交叉验证——确保一致性"
    - "使用'权衡分析'要求AI给出决策理由——避免表面化设计"
    - "对AI输出进行批判性审查——AI可能忽略领域特定约束"
    - "将设计决策记录为ADR——便于后续追溯与演进"
    - "使用渐进式策略时，在后续提示中引用前序输出——保持上下文连贯"

  anti_patterns:
    - "一次性要求AI输出所有细节——容易导致浅层化"
    - "忽略变量填充直接使用——输出缺乏针对性"
    - "盲目接受AI推荐方案——缺少批判性思考"
    - "跳过约束条件说明——导致不切实际的设计"
    - "混合多个模板同时提问——上下文混乱"

  customization:
    - "可在template中添加domain_specific_knowledge变量注入领域知识"
    - "可在约束部分添加组织级约束（合规要求、技术标准等）"
    - "可在输出要求中调整粒度（概念级→逻辑级→物理级）"
    - "可根据团队偏好调整输出格式（文档→图表→决策矩阵）"

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4c870"/>
      <stop offset="100%" stop-color="#d49a3d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- 胶片孔 -->
  <g fill="#1a1410" stroke="url(#amber)" stroke-width="2">
    <rect x="20" y="40" width="60" height="40" rx="3"/>
    <rect x="20" y="200" width="60" height="40" rx="3"/>
    <rect x="20" y="360" width="60" height="40" rx="3"/>
    <rect x="432" y="40" width="60" height="40" rx="3"/>
    <rect x="432" y="200" width="60" height="40" rx="3"/>
    <rect x="432" y="360" width="60" height="40" rx="3"/>
  </g>
  <!-- 中央 clapperboard -->
  <g transform="translate(96 96)">
    <rect x="0" y="80" width="320" height="200" fill="none" stroke="url(#amber)" stroke-width="8"/>
    <path d="M0 80 L80 0 L120 0 L40 80 Z" fill="url(#amber)"/>
    <path d="M80 80 L160 0 L200 0 L120 80 Z" fill="url(#amber)" opacity="0.85"/>
    <path d="M160 80 L240 0 L280 0 L200 80 Z" fill="url(#amber)" opacity="0.7"/>
    <text x="160" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="700" fill="url(#amber)">L</text>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>哥窑 · PPT 演示（11 页 · 6 段结构）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
  <style>
    /* ============ 顶部章节条 ============ */
    .ppt__topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: rgba(14, 14, 16, 0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(244, 236, 216, 0.12);
      color: var(--paper-soft);
      font-family: var(--font-display);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
    }
    .ppt__topbar__chapters {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }
    .ppt__topbar__chapters a {
      color: var(--paper-soft);
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 2px;
      transition: all 0.2s var(--ease);
    }
    .ppt__topbar__chapters a:hover {
      background: var(--kiln-fire);
      color: var(--paper);
    }
    .ppt__topbar__chapters a.active {
      color: var(--kiln-glow);
      border-bottom: 1px solid var(--kiln-glow);
    }
    .ppt__topbar__chapters .sep {
      color: rgba(244, 236, 216, 0.3);
    }
    .ppt__topbar__home {
      color: var(--kiln-glow);
      text-decoration: none;
      font-family: var(--font-serif);
      letter-spacing: 0.05em;
    }
    .ppt__topbar__home:hover { color: var(--paper); }

    /* ============ 导出按钮样式 ============ */
    .ppt__btn--export {
      width: auto;
      height: 32px;
      padding: 0 12px;
      border-radius: 16px;
      font-family: var(--font-serif);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .ppt__btn--export::before {
      content: '';
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 6px;
      vertical-align: -2px;
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
    }
    .ppt__btn--print::before { content: '🖨'; font-size: 13px; margin-right: 4px; }
    .ppt__btn--html::before  { content: '↓'; font-size: 14px; margin-right: 4px; font-weight: 700; }
    .ppt__btn--md::before    { content: '📋'; font-size: 12px; margin-right: 4px; }
    .ppt__btn--export:disabled {
      opacity: 0.6;
      cursor: default;
      background: var(--kiln-fire) !important;
      border-color: var(--kiln-fire) !important;
    }

    @media (max-width: 720px) {
      .ppt__topbar__chapters { display: none; }
    }

    /* ============ 导出模式：所有 slide 堆叠 ============ */
    body.is-exporting .ppt {
      position: static;
      height: auto;
      min-height: auto;
      overflow: visible;
    }
    body.is-exporting .ppt__viewport {
      position: static;
      display: block;
      padding: 24px 0;
    }
    body.is-exporting .ppt__slide {
      position: relative;
      opacity: 1 !important;
      transform: none !important;
      pointer-events: auto !important;
      margin: 24px auto !important;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }
    /* 导出模式下隐藏控件 */
    body.is-exporting .ppt__controls,
    body.is-exporting .ppt__hint,
    body.is-exporting .ppt__topbar,
    body.is-exporting #pptBrand {
      display: none !important;
    }

    /* ============ 打印样式（PDF 导出） ============ */
    @media print {
      @page {
        size: 1280px 720px;
        margin: 0;
      }
      html, body {
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      .ppt__topbar, .ppt__controls, .ppt__hint, #pptBrand { display: none !important; }
      .ppt {
        position: static !important;
        height: auto !important;
        background: white !important;
        overflow: visible !important;
      }
      .ppt__viewport {
        position: static !important;
        display: block !important;
        padding: 0 !important;
      }
      .ppt__slide {
        position: relative !important;
        opacity: 1 !important;
        transform: none !important;
        pointer-events: auto !important;
        width: 1280px !important;
        height: 720px !important;
        aspect-ratio: auto !important;
        max-height: none !important;
        margin: 0 !important;
        padding: 60px 80px !important;
        box-shadow: none !important;
        page-break-after: always !important;
        page-break-inside: avoid !important;
        break-after: page !important;
        break-inside: avoid !important;
        background: white !important;
      }
      .ppt__slide:last-child {
        page-break-after: auto !important;
        break-after: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="ppt__topbar">
    <a href="index.html" class="ppt__topbar__home">← 哥窑 · 首页</a>
    <div class="ppt__topbar__chapters" id="pptTopbarChapters">
      <a href="preface.html"><span class="num">前</span>幕</a>
      <span class="sep">·</span>
      <a href="chapter-1.html"><span class="num">I</span>第一章</a>
      <a href="chapter-2.html"><span class="num">II</span>第二章</a>
      <a href="chapter-3.html"><span class="num">III</span>第三章</a>
      <a href="chapter-4.html"><span class="num">IV</span>第四章</a>
      <span class="sep">·</span>
      <a href="epilogue.html"><span class="num">尾</span>幕</a>
    </div>
  </div>

  <div class="ppt">
    <div class="ppt__viewport" id="pptViewport" style="padding-top: 36px;"></div>

    <div class="ppt__controls">
      <button class="ppt__btn" id="pptPrev" title="上一张 (←)">‹</button>
      <div class="ppt__progress" id="pptDots"></div>
      <span id="pptProgress" style="font-family:var(--font-display);font-size:0.85rem;letter-spacing:0.1em;min-width:56px;text-align:center;">01 / 11</span>
      <button class="ppt__btn" id="pptNext" title="下一张 (→)">›</button>
      <button class="ppt__btn" id="pptFullscreen" title="全屏 (F)">⛶</button>
      <span style="width:1px;height:20px;background:rgba(244,236,216,0.2);margin:0 4px;"></span>
      <button class="ppt__btn ppt__btn--export ppt__btn--print" id="pptPrint" title="打印 / 导出 PDF">打印 / PDF</button>
      <button class="ppt__btn ppt__btn--export ppt__btn--html"  id="pptExportHtml" title="下载独立 HTML">独立 HTML</button>
      <button class="ppt__btn ppt__btn--export ppt__btn--md"    id="pptExportMd" title="复制 / 下载 Markdown">Markdown</button>
    </div>

    <a href="index.html" class="nav__brand" id="pptBrand" style="position:fixed;top:50px;left:32px;z-index:60;color:var(--paper);opacity:0.85;">
      <span class="seal">哥</span>哥窑
    </a>

    <div class="ppt__hint">键盘 ← → 翻页 · F 全屏 · Home/End 首末页 · 右下角导出</div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/site.js"></script>
  <script src="js/ppt.js"></script>
</body>
</html>

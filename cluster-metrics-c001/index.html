<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集群指标 C-001 — Cluster Metrics Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: #06090f;
  --bg-1: #0b1018;
  --bg-2: #111827;
  --bg-3: #1a2332;
  --bg-4: #243044;
  --border: #1e2d42;
  --border-light: #2a3f5a;
  --text-0: #f0f4f8;
  --text-1: #b8c5d6;
  --text-2: #7a8da4;
  --text-3: #4a5e78;
  --cyan: #00d4ff;
  --cyan-dim: rgba(0,212,255,0.12);
  --cyan-glow: rgba(0,212,255,0.35);
  --green: #00ff88;
  --green-dim: rgba(0,255,136,0.12);
  --green-glow: rgba(0,255,136,0.3);
  --red: #ff4757;
  --red-dim: rgba(255,71,87,0.12);
  --orange: #ffa502;
  --orange-dim: rgba(255,165,2,0.12);
  --purple: #a855f7;
  --purple-dim: rgba(168,85,247,0.12);
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--sans);
  background: var(--bg-0);
  color: var(--text-0);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 800px 600px at 10% 20%, rgba(0,212,255,0.04), transparent),
    radial-gradient(ellipse 600px 400px at 90% 80%, rgba(0,255,136,0.03), transparent);
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; }

header {
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(11,16,24,0.8);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.cluster-badge {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 4px;
  background: var(--cyan-dim);
  color: var(--cyan);
  border: 1px solid rgba(0,212,255,0.25);
  letter-spacing: 1px;
}

.cluster-name {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.cluster-name span { color: var(--cyan); }

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green-glow);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.status-text {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--green);
}

.refresh-btn {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-3);
  color: var(--text-2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  font-size: 14px;
}

.refresh-btn:hover { background: var(--bg-4); color: var(--cyan); border-color: var(--cyan); }

main { padding: 20px 24px; }

.metrics-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 20px;
}

.metric-card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
}

.metric-card:hover {
  border-color: var(--border-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.metric-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
}

.metric-card.cyan::before { background: linear-gradient(90deg, var(--cyan), transparent); }
.metric-card.green::before { background: linear-gradient(90deg, var(--green), transparent); }
.metric-card.orange::before { background: linear-gradient(90deg, var(--orange), transparent); }
.metric-card.red::before { background: linear-gradient(90deg, var(--red), transparent); }
.metric-card.purple::before { background: linear-gradient(90deg, var(--purple), transparent); }

.metric-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.metric-label {
  font-size: 12px;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 500;
}

.metric-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.metric-icon.cyan { background: var(--cyan-dim); color: var(--cyan); }
.metric-icon.green { background: var(--green-dim); color: var(--green); }
.metric-icon.orange { background: var(--orange-dim); color: var(--orange); }
.metric-icon.red { background: var(--red-dim); color: var(--red); }
.metric-icon.purple { background: var(--purple-dim); color: var(--purple); }

.metric-value {
  font-family: var(--mono);
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 4px;
  line-height: 1;
}

.metric-value.cyan { color: var(--cyan); }
.metric-value.green { color: var(--green); }
.metric-value.orange { color: var(--orange); }
.metric-value.red { color: var(--red); }
.metric-value.purple { color: var(--purple); }

.metric-unit {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-2);
}

.metric-change {
  font-family: var(--mono);
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.metric-change.up { color: var(--green); }
.metric-change.down { color: var(--red); }
.metric-change.neutral { color: var(--text-3); }

.metric-sparkline {
  margin-top: 12px;
  height: 32px;
  position: relative;
}

.metric-sparkline canvas {
  width: 100%;
  height: 100%;
}

.section-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}

.section-row.full { grid-template-columns: 1fr; }

.panel {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.panel-header {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-1);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.panel-body { padding: 16px 18px; }

.node-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}

.node-card {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-2);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.node-card:hover { border-color: var(--border-light); background: var(--bg-3); }
.node-card.selected { border-color: var(--cyan); background: var(--cyan-dim); }

.node-status {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  position: absolute;
  top: 10px;
  right: 10px;
}

.node-status.healthy { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }
.node-status.warning { background: var(--orange); box-shadow: 0 0 6px rgba(255,165,2,0.4); }
.node-status.critical { background: var(--red); box-shadow: 0 0 6px rgba(255,71,87,0.4); }

.node-name {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-0);
  margin-bottom: 6px;
  font-weight: 500;
}

.node-metric {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-2);
  display: flex;
  justify-content: space-between;
  margin-bottom: 2px;
}

.node-bar {
  height: 3px;
  border-radius: 2px;
  background: var(--bg-4);
  margin-top: 6px;
  overflow: hidden;
}

.node-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}

.node-bar-fill.low { background: var(--green); }
.node-bar-fill.mid { background: var(--orange); }
.node-bar-fill.high { background: var(--red); }

.chart-container {
  width: 100%;
  height: 200px;
  position: relative;
}

.chart-container canvas { width: 100%; height: 100%; }

.alert-list { display: flex; flex-direction: column; gap: 8px; }

.alert-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-2);
  transition: all 0.2s;
}

.alert-item:hover { background: var(--bg-3); }

.alert-severity {
  width: 4px;
  height: 28px;
  border-radius: 2px;
  flex-shrink: 0;
}

.alert-severity.critical { background: var(--red); }
.alert-severity.warning { background: var(--orange); }
.alert-severity.info { background: var(--cyan); }

.alert-content { flex: 1; }

.alert-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-0);
  margin-bottom: 2px;
}

.alert-desc {
  font-size: 11px;
  color: var(--text-2);
}

.alert-time {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  flex-shrink: 0;
}

.table-wrap { overflow-x: auto; }

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 11px;
}

.data-table th {
  padding: 8px 12px;
  text-align: left;
  color: var(--text-2);
  border-bottom: 1px solid var(--border-light);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 10px;
}

.data-table td {
  padding: 8px 12px;
  color: var(--text-1);
  border-bottom: 1px solid rgba(30,45,66,0.5);
}

.data-table tr:hover td { background: var(--bg-2); }

.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
}

.tag.healthy { background: var(--green-dim); color: var(--green); }
.tag.warning { background: var(--orange-dim); color: var(--orange); }
.tag.critical { background: var(--red-dim); color: var(--red); }
.tag.running { background: var(--cyan-dim); color: var(--cyan); }
.tag.stopped { background: rgba(74,94,120,0.2); color: var(--text-3); }

.gauge-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.gauge-item {
  text-align: center;
  padding: 12px;
}

.gauge-canvas {
  width: 100px;
  height: 100px;
  margin: 0 auto 8px;
}

.gauge-label {
  font-size: 11px;
  color: var(--text-2);
  margin-bottom: 2px;
}

.gauge-value {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
}

.gauge-value.cyan { color: var(--cyan); }
.gauge-value.green { color: var(--green); }
.gauge-value.orange { color: var(--orange); }

@media (max-width: 1024px) {
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .section-row { grid-template-columns: 1fr; }
  .gauge-row { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 640px) {
  .metrics-grid { grid-template-columns: 1fr; }
  main { padding: 12px; }
  .gauge-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <span class="cluster-badge">C-001</span>
      <div class="cluster-name">集群 <span>PROD-CN-EAST</span></div>
    </div>
    <div class="header-right">
      <div class="status-dot"></div>
      <span class="status-text">ALL SYSTEMS NOMINAL</span>
      <button class="refresh-btn" id="refreshBtn" title="刷新数据">↻</button>
    </div>
  </header>

  <main>
    <div class="metrics-grid" id="metricsGrid"></div>

    <div class="section-row">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">集群节点</span>
          <span style="font-family:var(--mono);font-size:11px;color:var(--text-3)">12 / 12 在线</span>
        </div>
        <div class="panel-body">
          <div class="node-grid" id="nodeGrid"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">资源仪表</span>
        </div>
        <div class="panel-body">
          <div class="gauge-row" id="gaugeRow"></div>
        </div>
      </div>
    </div>

    <div class="section-row full">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">实时指标趋势</span>
          <div style="display:flex;gap:8px">
            <span style="font-family:var(--mono);font-size:10px;color:var(--cyan)">● CPU</span>
            <span style="font-family:var(--mono);font-size:10px;color:var(--green)">● 内存</span>
            <span style="font-family:var(--mono);font-size:10px;color:var(--orange)">● 网络</span>
          </div>
        </div>
        <div class="panel-body">
          <div class="chart-container"><canvas id="trendChart"></canvas></div>
        </div>
      </div>
    </div>

    <div class="section-row">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">告警</span>
          <span class="tag warning">3 活跃</span>
        </div>
        <div class="panel-body">
          <div class="alert-list" id="alertList"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">服务状态</span>
        </div>
        <div class="panel-body">
          <div class="table-wrap">
            <table class="data-table" id="serviceTable">
              <thead>
                <tr>
                  <th>服务</th>
                  <th>实例</th>
                  <th>CPU</th>
                  <th>内存</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="serviceBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const CLUSTER_DATA = {
  metrics: [
    { label: 'CPU 使用率', value: 67.3, unit: '%', change: '+2.1%', dir: 'up', color: 'cyan', icon: '⬡' },
    { label: '内存使用', value: 82.1, unit: '%', change: '-0.8%', dir: 'down', color: 'green', icon: '◈' },
    { label: '网络吞吐', value: 4.7, unit: 'Gbps', change: '+12%', dir: 'up', color: 'orange', icon: '◇' },
    { label: '磁盘 I/O', value: 2340, unit: 'IOPS', change: '+5%', dir: 'up', color: 'purple', icon: '⬢' },
  ],
  nodes: [
    { name: 'node-01', cpu: 72, mem: 85, status: 'healthy' },
    { name: 'node-02', cpu: 58, mem: 76, status: 'healthy' },
    { name: 'node-03', cpu: 91, mem: 94, status: 'warning' },
    { name: 'node-04', cpu: 45, mem: 62, status: 'healthy' },
    { name: 'node-05', cpu: 67, mem: 78, status: 'healthy' },
    { name: 'node-06', cpu: 33, mem: 55, status: 'healthy' },
    { name: 'node-07', cpu: 88, mem: 91, status: 'warning' },
    { name: 'node-08', cpu: 52, mem: 68, status: 'healthy' },
    { name: 'node-09', cpu: 61, mem: 73, status: 'healthy' },
    { name: 'node-10', cpu: 44, mem: 59, status: 'healthy' },
    { name: 'node-11', cpu: 97, mem: 96, status: 'critical' },
    { name: 'node-12', cpu: 39, mem: 51, status: 'healthy' },
  ],
  gauges: [
    { label: 'CPU 分配', value: 67, max: 100, color: 'cyan' },
    { label: '内存分配', value: 82, max: 100, color: 'green' },
    { label: '存储使用', value: 54, max: 100, color: 'orange' },
  ],
  alerts: [
    { severity: 'critical', title: 'node-11 CPU 过载', desc: 'CPU 使用率持续超过 95%，已持续 12 分钟', time: '2m ago' },
    { severity: 'warning', title: 'node-03 内存压力', desc: '可用内存低于 500MB，建议扩容', time: '8m ago' },
    { severity: 'warning', title: 'node-07 磁盘延迟', desc: '磁盘写入延迟 P99 超过 50ms', time: '15m ago' },
    { severity: 'info', title: '自动扩缩触发', desc: 'HPA 已将 api-gateway 扩容至 5 副本', time: '22m ago' },
  ],
  services: [
    { name: 'api-gateway', instances: 5, cpu: '34%', mem: '2.1GB', status: 'running' },
    { name: 'auth-service', instances: 3, cpu: '12%', mem: '1.4GB', status: 'running' },
    { name: 'data-pipeline', instances: 4, cpu: '78%', mem: '6.2GB', status: 'running' },
    { name: 'ml-inference', instances: 2, cpu: '91%', mem: '12.8GB', status: 'warning' },
    { name: 'cache-redis', instances: 6, cpu: '8%', mem: '4.6GB', status: 'running' },
    { name: 'log-collector', instances: 3, cpu: '15%', mem: '0.9GB', status: 'running' },
    { name: 'scheduler', instances: 1, cpu: '5%', mem: '0.5GB', status: 'stopped' },
  ],
};

function barClass(v) { return v < 60 ? 'low' : v < 85 ? 'mid' : 'high'; }

function renderMetrics() {
  const grid = document.getElementById('metricsGrid');
  grid.innerHTML = '';
  CLUSTER_DATA.metrics.forEach(m => {
    const card = document.createElement('div');
    card.className = `metric-card ${m.color}`;
    card.innerHTML = `
      <div class="metric-header">
        <span class="metric-label">${m.label}</span>
        <div class="metric-icon ${m.color}">${m.icon}</div>
      </div>
      <div class="metric-value ${m.color}">${m.value}<span class="metric-unit"> ${m.unit}</span></div>
      <div class="metric-change ${m.dir === 'up' ? (m.color === 'orange' || m.color === 'red' ? 'down' : 'up') : m.dir === 'down' ? (m.color === 'green' ? 'up' : 'down') : 'neutral'}">
        ${m.dir === 'up' ? '↑' : '↓'} ${m.change}
      </div>
      <div class="metric-sparkline"><canvas data-metric="${m.label}"></canvas></div>
    `;
    grid.appendChild(card);
  });
  drawSparklines();
}

function drawSparklines() {
  document.querySelectorAll('.metric-sparkline canvas').forEach(canvas => {
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    ctx.scale(2, 2);
    const w = rect.width, h = rect.height;
    const points = [];
    for (let i = 0; i < 30; i++) {
      points.push(0.2 + Math.random() * 0.6);
    }
    const colors = { 'CPU 使用率': '#00d4ff', '内存使用': '#00ff88', '网络吞吐': '#ffa502', '磁盘 I/O': '#a855f7' };
    const color = colors[canvas.dataset.metric] || '#00d4ff';
    ctx.beginPath();
    points.forEach((p, i) => {
      const x = (i / (points.length - 1)) * w;
      const y = h - p * h;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, color.replace(')', ',0.2)').replace('rgb', 'rgba'));
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fill();
  });
}

function renderNodes() {
  const grid = document.getElementById('nodeGrid');
  grid.innerHTML = '';
  CLUSTER_DATA.nodes.forEach(n => {
    const card = document.createElement('div');
    card.className = 'node-card';
    card.innerHTML = `
      <div class="node-status ${n.status}"></div>
      <div class="node-name">${n.name}</div>
      <div class="node-metric"><span>CPU</span><span>${n.cpu}%</span></div>
      <div class="node-metric"><span>MEM</span><span>${n.mem}%</span></div>
      <div class="node-bar"><div class="node-bar-fill ${barClass(n.cpu)}" style="width:${n.cpu}%"></div></div>
    `;
    card.addEventListener('click', () => {
      document.querySelectorAll('.node-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
    });
    grid.appendChild(card);
  });
}

function renderGauges() {
  const row = document.getElementById('gaugeRow');
  row.innerHTML = '';
  CLUSTER_DATA.gauges.forEach(g => {
    const item = document.createElement('div');
    item.className = 'gauge-item';
    item.innerHTML = `
      <div class="gauge-canvas"><canvas data-gauge="${g.label}" data-value="${g.value}" data-max="${g.max}" data-color="${g.color}"></canvas></div>
      <div class="gauge-label">${g.label}</div>
      <div class="gauge-value ${g.color}">${g.value}%</div>
    `;
    row.appendChild(item);
  });
  drawGauges();
}

function drawGauges() {
  document.querySelectorAll('.gauge-canvas canvas').forEach(canvas => {
    const ctx = canvas.getContext('2d');
    canvas.width = 200;
    canvas.height = 200;
    const cx = 100, cy = 100, r = 80;
    const value = parseInt(canvas.dataset.value);
    const colorMap = { cyan: '#00d4ff', green: '#00ff88', orange: '#ffa502' };
    const color = colorMap[canvas.dataset.color] || '#00d4ff';

    ctx.beginPath();
    ctx.arc(cx, cy, r, 0.75 * Math.PI, 2.25 * Math.PI);
    ctx.strokeStyle = '#1e2d42';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.stroke();

    const angle = 0.75 * Math.PI + (value / 100) * 1.5 * Math.PI;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0.75 * Math.PI, angle);
    ctx.strokeStyle = color;
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.stroke();

    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(cx, cy, r, angle - 0.02, angle);
    ctx.strokeStyle = color;
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.shadowBlur = 0;
  });
}

function renderAlerts() {
  const list = document.getElementById('alertList');
  list.innerHTML = '';
  CLUSTER_DATA.alerts.forEach(a => {
    const item = document.createElement('div');
    item.className = 'alert-item';
    item.innerHTML = `
      <div class="alert-severity ${a.severity}"></div>
      <div class="alert-content">
        <div class="alert-title">${a.title}</div>
        <div class="alert-desc">${a.desc}</div>
      </div>
      <span class="alert-time">${a.time}</span>
    `;
    list.appendChild(item);
  });
}

function renderServices() {
  const body = document.getElementById('serviceBody');
  body.innerHTML = '';
  CLUSTER_DATA.services.forEach(s => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--text-0);font-weight:500">${s.name}</td>
      <td>×${s.instances}</td>
      <td>${s.cpu}</td>
      <td>${s.mem}</td>
      <td><span class="tag ${s.status}">${s.status === 'running' ? '运行中' : '已停止'}</span></td>
    `;
    body.appendChild(tr);
  });
}

function drawTrendChart() {
  const canvas = document.getElementById('trendChart');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = 400;
  ctx.scale(2, 2);
  const w = rect.width, h = 200;
  const pad = { top: 10, right: 10, bottom: 20, left: 40 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;

  ctx.clearRect(0, 0, w, h);

  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(w - pad.right, y);
    ctx.strokeStyle = 'rgba(30,45,66,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#4a5e78';
    ctx.font = '10px IBM Plex Mono';
    ctx.textAlign = 'right';
    ctx.fillText((100 - i * 25) + '%', pad.left - 6, y + 3);
  }

  const timeLabels = ['5m', '4m', '3m', '2m', '1m', 'now'];
  timeLabels.forEach((label, i) => {
    const x = pad.left + (cw / (timeLabels.length - 1)) * i;
    ctx.fillStyle = '#4a5e78';
    ctx.font = '10px IBM Plex Mono';
    ctx.textAlign = 'center';
    ctx.fillText(label, x, h - 4);
  });

  const series = [
    { data: [], color: '#00d4ff', label: 'CPU' },
    { data: [], color: '#00ff88', label: 'MEM' },
    { data: [], color: '#ffa502', label: 'NET' },
  ];

  const points = 60;
  for (let i = 0; i < points; i++) {
    series[0].data.push(55 + Math.sin(i * 0.15) * 15 + Math.random() * 8);
    series[1].data.push(75 + Math.cos(i * 0.1) * 8 + Math.random() * 5);
    series[2].data.push(30 + Math.sin(i * 0.2 + 1) * 20 + Math.random() * 10);
  }

  series.forEach(s => {
    ctx.beginPath();
    s.data.forEach((v, i) => {
      const x = pad.left + (i / (points - 1)) * cw;
      const y = pad.top + ch - (v / 100) * ch;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.lineTo(pad.left + cw, pad.top + ch);
    ctx.lineTo(pad.left, pad.top + ch);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
    grad.addColorStop(0, s.color.slice(0, 7) + '20');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fill();
  });
}

function init() {
  renderMetrics();
  renderNodes();
  renderGauges();
  renderAlerts();
  renderServices();
  drawTrendChart();
}

init();

window.addEventListener('resize', () => {
  drawSparklines();
  drawGauges();
  drawTrendChart();
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  CLUSTER_DATA.metrics.forEach(m => {
    const delta = (Math.random() - 0.5) * 4;
    m.value = Math.max(0, Math.min(100, m.value + delta));
    m.value = parseFloat(m.value.toFixed(1));
  });
  CLUSTER_DATA.nodes.forEach(n => {
    n.cpu = Math.max(5, Math.min(100, n.cpu + Math.floor((Math.random() - 0.5) * 10)));
    n.mem = Math.max(10, Math.min(100, n.mem + Math.floor((Math.random() - 0.5) * 6)));
    n.status = n.cpu > 90 ? 'critical' : n.cpu > 80 ? 'warning' : 'healthy';
  });
  CLUSTER_DATA.gauges.forEach(g => {
    g.value = Math.max(10, Math.min(95, g.value + Math.floor((Math.random() - 0.5) * 8)));
  });
  init();
  document.getElementById('refreshBtn').style.transform = 'rotate(360deg)';
  setTimeout(() => { document.getElementById('refreshBtn').style.transform = ''; }, 400);
});

setInterval(() => {
  CLUSTER_DATA.metrics.forEach(m => {
    const delta = (Math.random() - 0.5) * 2;
    m.value = Math.max(0, Math.min(100, m.value + delta));
    m.value = parseFloat(m.value.toFixed(1));
  });
  renderMetrics();
}, 5000);
</script>

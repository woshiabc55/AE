<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏设定图鉴 · Game Assets Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --surface: #121216;
      --surface-2: #1c1c22;
      --surface-3: #25252e;
      --text: #f4f4f5;
      --text-dim: #a1a1aa;
      --text-muted: #71717a;
      --accent: #f4c430;
      --accent-2: #ff4655;
      --radius: 16px;
      --radius-sm: 8px;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
      --shadow-sm: 0 8px 24px rgba(0, 0, 0, 0.35);
      --transition: cubic-bezier(0.22, 1, 0.36, 1);
      --max-width: 1600px;
      --header-height: 88px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* 背景氛围 */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 0%, rgba(244, 196, 48, 0.08) 0%, transparent 45%),
        radial-gradient(circle at 85% 15%, rgba(255, 70, 85, 0.06) 0%, transparent 40%),
        radial-gradient(circle at 50% 100%, rgba(78, 205, 196, 0.05) 0%, transparent 45%);
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-height);
      background: rgba(9, 9, 11, 0.72);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }

    .brand h1 {
      font-family: 'Orbitron', 'Noto Sans SC', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand span {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 520px;
    }

    .search-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      height: 48px;
      padding: 0 16px 0 46px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.25s var(--transition);
    }

    #search::placeholder {
      color: var(--text-muted);
    }

    #search:focus {
      border-color: var(--accent);
      background: var(--surface-2);
      box-shadow: 0 0 0 4px rgba(244, 196, 48, 0.1);
    }

    .stats {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      flex-shrink: 0;
      min-width: 80px;
    }

    .stats strong {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      color: var(--accent);
    }

    .stats small {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* Filter bar */
    .filter-bar {
      position: sticky;
      top: var(--header-height);
      z-index: 90;
      background: linear-gradient(to bottom, rgba(9, 9, 11, 0.95), rgba(9, 9, 11, 0.7));
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      padding: 16px 0;
    }

    .filter-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-inner::-webkit-scrollbar {
      display: none;
    }

    .filter-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      white-space: nowrap;
      padding-right: 8px;
    }

    .filter-btn {
      flex-shrink: 0;
      padding: 8px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--surface);
      color: var(--text-dim);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s var(--transition);
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: rgba(255, 255, 255, 0.2);
      color: var(--text);
      transform: translateY(-1px);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0a0c;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(244, 196, 48, 0.25);
    }

    /* Main */
    main {
      position: relative;
      z-index: 10;
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .section-title {
      margin-bottom: 28px;
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    .section-title span {
      color: var(--text);
      font-weight: 700;
    }

    /* Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    @media (min-width: 640px) {
      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      }
    }

    @media (min-width: 1200px) {
      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      }
    }

    .card {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transform: translateY(0);
      opacity: 0;
      animation: cardIn 0.6s var(--transition) forwards;
      transition: transform 0.3s var(--transition), box-shadow 0.3s var(--transition), border-color 0.3s;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: var(--shadow);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0.6s var(--transition);
      pointer-events: none;
    }

    .card:hover::after {
      transform: translateX(100%);
    }

    .card-image {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: var(--surface-2);
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s var(--transition);
    }

    .card:hover .card-image img {
      transform: scale(1.08);
    }

    .card-image .skeleton {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      z-index: 1;
    }

    .card-image img.loaded + .skeleton {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .card-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card-info {
      padding: 16px;
      position: relative;
      z-index: 2;
    }

    .card-game {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .card-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-sub {
      font-size: 0.85rem;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .card-tags span {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--surface-3);
      color: var(--text-dim);
    }

    /* Empty state */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty h3 {
      font-size: 1.4rem;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.94);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s var(--transition);
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-img {
      max-width: 92vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      transform: scale(0.92);
      transition: transform 0.35s var(--transition);
    }

    .lightbox.open .lightbox-img {
      transform: scale(1);
    }

    .lightbox-info {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      padding: 14px 28px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      max-width: 90vw;
    }

    .lightbox-info h3 {
      font-size: 1.1rem;
      margin-bottom: 2px;
    }

    .lightbox-info p {
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .lightbox-close,
    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s var(--transition);
      backdrop-filter: blur(8px);
    }

    .lightbox-close:hover,
    .lightbox-prev:hover,
    .lightbox-next:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0a0c;
      transform: scale(1.08);
    }

    .lightbox-close {
      top: 24px;
      right: 24px;
    }

    .lightbox-prev {
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
    }

    .lightbox-next {
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
    }

    .lightbox-prev:hover,
    .lightbox-next:hover {
      transform: translateY(-50%) scale(1.08);
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 10;
      padding: 40px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      :root {
        --header-height: 76px;
      }

      .header-inner {
        flex-wrap: wrap;
        gap: 12px;
        padding: 12px 16px;
        height: auto;
      }

      .brand h1 {
        font-size: 1.2rem;
      }

      .search-wrap {
        order: 3;
        max-width: none;
        width: 100%;
      }

      #search {
        height: 42px;
      }

      .stats {
        order: 2;
      }

      .filter-inner {
        padding: 0 16px;
      }

      main {
        padding: 24px 16px 60px;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 12px;
      }

      .lightbox-prev,
      .lightbox-next {
        width: 40px;
        height: 40px;
        left: 12px;
        right: auto;
      }

      .lightbox-next {
        right: 12px;
        left: auto;
      }
    }
  </style>
</head>
<body>
  <div class="ambient"></div>
  <div class="noise"></div>

  <header>
    <div class="header-inner">
      <div class="brand">
        <h1>GAME ASSETS</h1>
        <span>官方设定图鉴 · 二次创作参考</span>
      </div>
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="text" id="search" placeholder="搜索游戏、角色、皮肤..." autocomplete="off">
      </div>
      <div class="stats">
        <strong id="stat-count">0</strong>
        <small>张素材</small>
      </div>
    </div>
  </header>

  <div class="filter-bar">
    <div class="filter-inner" id="filter-bar">
      <span class="filter-label">分类</span>
      <button class="filter-btn active" data-category="all">全部</button>
    </div>
  </div>

  <main>
    <div class="section-title">
      当前展示 <span id="showing-count">0</span> / <span id="total-count">0</span> 张素材
    </div>
    <div class="gallery" id="gallery">
      <div class="empty">
        <h3>暂无素材</h3>
        <p>请运行 <code>python scraper.py</code> 抓取图片，或检查 assets/data.json 是否存在。</p>
      </div>
    </div>
  </main>

  <footer>
    <p>本页面为代码框架演示，不内置任何官方美术资源。</p>
    <p>素材版权归各游戏公司所有，公开部署前请确保已获得授权或仅本地使用。</p>
  </footer>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" aria-label="关闭">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12" />
      </svg>
    </button>
    <button class="lightbox-prev" aria-label="上一张">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <button class="lightbox-next" aria-label="下一张">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 5l7 7-7 7" />
      </svg>
    </button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
    <div class="lightbox-info">
      <h3 id="lightbox-title">-</h3>
      <p id="lightbox-sub">-</p>
    </div>
  </div>

  <script>
    (async () => {
      const gallery = document.getElementById('gallery');
      const searchInput = document.getElementById('search');
      const filterBar = document.getElementById('filter-bar');
      const statCount = document.getElementById('stat-count');
      const showingCount = document.getElementById('showing-count');
      const totalCount = document.getElementById('total-count');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      const lightboxTitle = document.getElementById('lightbox-title');
      const lightboxSub = document.getElementById('lightbox-sub');

      let allItems = [];
      let filteredItems = [];
      let currentCategory = 'all';
      let currentIndex = -1;

      // 加载数据
      async function loadData() {
        try {
          const [dataRes, gamesRes] = await Promise.all([
            fetch('assets/data.json').catch(() => null),
            fetch('games.json').catch(() => null),
          ]);
          const data = dataRes && dataRes.ok ? await dataRes.json() : [];
          const gamesConfig = gamesRes && gamesRes.ok ? await gamesRes.json() : { categories: [] };
          allItems = Array.isArray(data) ? data : [];
          return gamesConfig.categories || [];
        } catch (err) {
          console.error('加载数据失败:', err);
          allItems = [];
          return [];
        }
      }

      // 渲染分类按钮
      function renderCategories(categories) {
        categories.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'filter-btn';
          btn.dataset.category = cat;
          btn.textContent = cat;
          filterBar.appendChild(btn);
        });
      }

      // 获取图片品牌色
      function getItemColor(item) {
        return item.brandColor || (item.type === 'skin' ? '#ff4655' : '#f4c430');
      }

      // 渲染画廊
      function renderGallery(items) {
        filteredItems = items;
        statCount.textContent = allItems.length;
        showingCount.textContent = items.length;
        totalCount.textContent = allItems.length;

        if (items.length === 0) {
          gallery.innerHTML = `
            <div class="empty">
              <h3>未找到匹配素材</h3>
              <p>尝试切换分类或更换搜索关键词。</p>
            </div>
          `;
          return;
        }

        gallery.innerHTML = items.map((item, idx) => {
          const color = getItemColor(item);
          const typeLabel = item.type === 'hero' ? '英雄' : item.type === 'skin' ? '皮肤' : item.type;
          const tags = (item.tags || []).slice(0, 3);
          return `
            <article class="card" data-index="${idx}" style="animation-delay: ${Math.min(idx * 0.03, 0.6)}s">
              <div class="card-image">
                <div class="skeleton"></div>
                <img
                  data-src="${item.localPath}"
                  alt="${item.name} ${item.subName || ''}"
                  loading="lazy"
                  onload="this.classList.add('loaded')"
                  onerror="this.style.display='none'"
                >
                <span class="card-badge" style="color: ${color}; border-color: ${color}40">${typeLabel}</span>
              </div>
              <div class="card-info">
                <div class="card-game">${item.gameName}</div>
                <h2 class="card-name">${item.name}</h2>
                <p class="card-sub">${item.subName || ''}</p>
                <div class="card-tags">
                  ${tags.map(t => `<span>${t}</span>`).join('')}
                </div>
              </div>
            </article>
          `;
        }).join('');

        observeImages();
        bindCardEvents();
      }

      // 懒加载
      function observeImages() {
        const imgs = gallery.querySelectorAll('img[data-src]');
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              img.src = img.dataset.src;
              img.removeAttribute('data-src');
              observer.unobserve(img);
            }
          });
        }, { rootMargin: '100px' });
        imgs.forEach(img => observer.observe(img));
      }

      // 卡片点击 -> 灯箱
      function bindCardEvents() {
        gallery.querySelectorAll('.card').forEach(card => {
          card.addEventListener('click', () => {
            const idx = Number(card.dataset.index);
            openLightbox(idx);
          });
        });
      }

      // 筛选与搜索
      function applyFilters() {
        const query = searchInput.value.trim().toLowerCase();
        const items = allItems.filter(item => {
          const matchCategory = currentCategory === 'all' || item.category === currentCategory;
          const text = `${item.gameName} ${item.name} ${item.subName || ''} ${(item.tags || []).join(' ')}`.toLowerCase();
          const matchSearch = !query || text.includes(query);
          return matchCategory && matchSearch;
        });
        renderGallery(items);
      }

      // 灯箱
      function openLightbox(idx) {
        currentIndex = idx;
        updateLightbox();
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
      }

      function updateLightbox() {
        const item = filteredItems[currentIndex];
        if (!item) return;
        lightboxImg.src = item.localPath;
        lightboxTitle.textContent = `${item.gameName} · ${item.name}`;
        lightboxSub.textContent = item.subName || '';
      }

      function prevImage() {
        if (filteredItems.length === 0) return;
        currentIndex = (currentIndex - 1 + filteredItems.length) % filteredItems.length;
        updateLightbox();
      }

      function nextImage() {
        if (filteredItems.length === 0) return;
        currentIndex = (currentIndex + 1) % filteredItems.length;
        updateLightbox();
      }

      // 事件绑定
      filterBar.addEventListener('click', (e) => {
        if (!e.target.classList.contains('filter-btn')) return;
        filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentCategory = e.target.dataset.category;
        applyFilters();
      });

      searchInput.addEventListener('input', applyFilters);

      lightbox.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
      lightbox.querySelector('.lightbox-prev').addEventListener('click', (e) => { e.stopPropagation(); prevImage(); });
      lightbox.querySelector('.lightbox-next').addEventListener('click', (e) => { e.stopPropagation(); nextImage(); });
      lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

      document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') prevImage();
        if (e.key === 'ArrowRight') nextImage();
      });

      // 初始化
      const categories = await loadData();
      renderCategories(categories);
      applyFilters();
    })();
  </script>
</body>
</html>

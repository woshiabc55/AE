<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>剧本工厂 · SCRIPT.FORGE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,800;0,6..96,900;1,6..96,400;1,6..96,700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Special+Elite&family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Long+Cang&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- 纸张噪点底纹 -->
  <div class="paper-noise" aria-hidden="true"></div>

  <!-- 顶栏 -->
  <header class="topbar">
    <div class="topbar__inner">
      <a href="#/" class="brand" data-link>
        <span class="brand__mark">▣</span>
        <span class="brand__name">SCRIPT.FORGE</span>
        <span class="brand__sub">·  剧 本 工 厂  ·</span>
      </a>
      <nav class="topnav" aria-label="主导航">
        <a href="#/" data-link>灵感前厅</a>
        <a href="#/library" data-link>资料库</a>
        <a href="#/trends" data-link>趋势</a>
        <a href="#/about" data-link>关于</a>
      </nav>
      <div class="topbar__right">
        <div class="searchbox">
          <span class="searchbox__icon">⌕</span>
          <input id="topSearch" type="search" placeholder="搜索标题 / 角色 / 主题…" />
        </div>
        <div class="topbar__stamp" title="剧本工厂 印章">剧 本 印 章</div>
        <div class="topbar__loadstat" id="loadStat" title="分块加载进度">···</div>
      </div>
    </div>
    <div class="topbar__rule" aria-hidden="true"></div>
  </header>

  <main id="main"></main>

  <!-- 剧本详情弹窗 -->
  <div id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer__scrim" data-drawer-close></div>
    <article class="drawer__sheet" id="drawerSheet" role="dialog" aria-modal="true" aria-label="剧本详情">
      <!-- 注入内容 -->
    </article>
  </div>

  <!-- 导出 / 通知 toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- 数据：分块加载（先 meta，按需加载分块） -->
  <script src="./data-meta.js"></script>
  <script src="./data-0.js"></script>
  <!-- 主逻辑 -->
  <script src="./app.js"></script>
</body>
</html>

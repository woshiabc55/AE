<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Studio - 空白画布工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container" id="appContainer">
        <!-- 顶部工具栏 -->
        <div class="toolbar" id="toolbar">
            <button class="tool-btn rotate-btn" id="rotateBtn" title="翻转屏幕">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 3 21 3 21 9"></polyline>
                    <polyline points="9 21 3 21 3 15"></polyline>
                    <path d="M21 3c-5 0-10 3-13 8c-1.5 2.5-2 4-2 10"></path>
                    <path d="M3 21c5 0 10-3 13-8c1.5-2.5 2-4 2-10"></path>
                </svg>
            </button>
            <div class="orientation-indicator" id="orientationIndicator">
                <span class="orientation-text" id="orientationText">横屏</span>
            </div>
            <button class="tool-btn clear-btn" id="clearBtn" title="清空画布">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
            </button>
        </div>

        <!-- 手机模拟器容器 -->
        <div class="phone-container" id="phoneContainer">
            <!-- 手机边框 -->
            <div class="phone-frame" id="phoneFrame">
                <!-- 顶部凹槽 -->
                <div class="phone-notch"></div>
                
                <!-- 屏幕 -->
                <div class="phone-screen" id="phoneScreen">
                    <!-- 画布 -->
                    <canvas id="canvas"></canvas>
                    
                    <!-- 画布控制栏 -->
                    <div class="canvas-controls" id="canvasControls">
                        <button class="color-btn active" data-color="#000000" style="background-color: #000000"></button>
                        <button class="color-btn" data-color="#ff6b6b" style="background-color: #ff6b6b"></button>
                        <button class="color-btn" data-color="#4ecdc4" style="background-color: #4ecdc4"></button>
                        <button class="color-btn" data-color="#ffe66d" style="background-color: #ffe66d"></button>
                        <button class="color-btn" data-color="#95e1d3" style="background-color: #95e1d3"></button>
                        <button class="color-btn" data-color="#f38181" style="background-color: #f38181"></button>
                    </div>
                </div>
                
                <!-- 底部扬声器 -->
                <div class="phone-speaker"></div>
            </div>
        </div>

        <!-- 底部状态栏 -->
        <div class="status-bar" id="statusBar">
            <div class="status-item">
                <span class="status-label">画布尺寸</span>
                <span class="status-value" id="canvasSize">800 × 400</span>
            </div>
            <div class="status-item">
                <span class="status-label">当前颜色</span>
                <span class="status-value" id="currentColor">黑色</span>
            </div>
            <div class="status-item">
                <span class="status-label">操作时间</span>
                <span class="status-value" id="timeDisplay">00:00</span>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>

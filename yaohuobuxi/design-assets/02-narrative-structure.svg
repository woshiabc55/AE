<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="'Noto Serif SC', 'SimSun', 'STSong', serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bgGrad)"/>

  <text x="800" y="50" text-anchor="middle" fill="#c0a060" font-size="22" letter-spacing="12" filter="url(#glow)">五幕叙事结构</text>
  <text x="800" y="75" text-anchor="middle" fill="#6a6a6a" font-size="11" letter-spacing="4">FIVE-ACT NARRATIVE STRUCTURE · 窑火不息·追迹</text>
  <line x1="200" y1="87" x2="1400" y2="87" stroke="#c0a060" stroke-opacity="0.3" stroke-width="0.5"/>

  <!-- Central narrative arc -->
  <g transform="translate(50, 120)">
    <path d="M0,250 Q 375,200 750,80 Q 950,40 1125,120 Q 1300,160 1500,250" stroke="#c0a060" stroke-opacity="0.4" fill="none" stroke-width="1" stroke-dasharray="8,4"/>

    <!-- Act 0: 序·裂 -->
    <g transform="translate(0, 180)">
      <rect x="0" y="0" width="200" height="140" rx="8" fill="#111" stroke="#7a8a7a" stroke-opacity="0.6" stroke-width="1"/>
      <rect x="0" y="0" width="200" height="30" rx="8" fill="#7a8a7a" opacity="0.2"/>
      <text x="100" y="20" text-anchor="middle" fill="#c0a060" font-size="12" letter-spacing="4" filter="url(#glow)">序 · 裂</text>
      <text x="100" y="50" text-anchor="middle" fill="#888" font-size="9">哥窑开片</text>
      <text x="100" y="72" text-anchor="middle" fill="#666" font-size="8">纯声音 → 视觉显现</text>
      <text x="100" y="92" text-anchor="middle" fill="#666" font-size="8">12镜 | 约73s</text>
      <text x="100" y="112" text-anchor="middle" fill="#555" font-size="8">色彩：青灰×金丝铁线</text>
      <text x="100" y="130" text-anchor="middle" fill="#555" font-size="8">从"倾听者"到"冥想者"</text>
    </g>

    <!-- Act 1: 火 -->
    <g transform="translate(260, 150)">
      <rect x="0" y="0" width="200" height="140" rx="8" fill="#111" stroke="#d4782a" stroke-opacity="0.6" stroke-width="1"/>
      <rect x="0" y="0" width="200" height="30" rx="8" fill="#d4782a" opacity="0.15"/>
      <text x="100" y="20" text-anchor="middle" fill="#d4882a" font-size="12" letter-spacing="4" filter="url(#glow)">第一幕 · 火</text>
      <text x="100" y="50" text-anchor="middle" fill="#888" font-size="9">哥弟关系</text>
      <text x="100" y="72" text-anchor="middle" fill="#666" font-size="8">暴雨夜拉坯 → 清晨出窑</text>
      <text x="100" y="92" text-anchor="middle" fill="#666" font-size="8">2镜 | 约55s</text>
      <text x="100" y="112" text-anchor="middle" fill="#555" font-size="8">色彩：深蓝×琥珀 / 青白×褐黑</text>
      <text x="100" y="130" text-anchor="middle" fill="#555" font-size="8">推泥 = 推心 · 劳动美学</text>
    </g>

    <!-- Act 2: 水 -->
    <g transform="translate(520, 100)">
      <rect x="0" y="0" width="200" height="140" rx="8" fill="#111" stroke="#cc2222" stroke-opacity="0.6" stroke-width="1"/>
      <rect x="0" y="0" width="200" height="30" rx="8" fill="#cc2222" opacity="0.15"/>
      <text x="100" y="20" text-anchor="middle" fill="#cc4444" font-size="12" letter-spacing="4" filter="url(#glow)">第二幕 · 水</text>
      <text x="100" y="50" text-anchor="middle" fill="#888" font-size="9">嫉妒与裂变</text>
      <text x="100" y="72" text-anchor="middle" fill="#666" font-size="8">窑旁对话 → 闪回 → 伤疤 → 泼水</text>
      <text x="100" y="92" text-anchor="middle" fill="#666" font-size="8">4镜 | 约100s</text>
      <text x="100" y="112" text-anchor="middle" fill="#555" font-size="8">色彩：暗红×灰褐 → 炽红×惨白</text>
      <text x="100" y="130" text-anchor="middle" fill="#555" font-size="8">全片情绪顶点 · 升格泼水</text>
    </g>

    <!-- Act 3: 裂 -->
    <g transform="translate(780, 140)">
      <rect x="0" y="0" width="200" height="140" rx="8" fill="#111" stroke="#8aaa9a" stroke-opacity="0.6" stroke-width="1"/>
      <rect x="0" y="0" width="200" height="30" rx="8" fill="#8aaa9a" opacity="0.15"/>
      <text x="100" y="20" text-anchor="middle" fill="#8aaa9a" font-size="12" letter-spacing="4" filter="url(#glow)">第三幕 · 裂</text>
      <text x="100" y="50" text-anchor="middle" fill="#888" font-size="9">哥窑诞生</text>
      <text x="100" y="72" text-anchor="middle" fill="#666" font-size="8">出窑惊愕 → 窑火对坐</text>
      <text x="100" y="92" text-anchor="middle" fill="#666" font-size="8">2镜 | 约60s</text>
      <text x="100" y="112" text-anchor="middle" fill="#555" font-size="8">色彩：青釉×黑纹 → 青釉×金光</text>
      <text x="100" y="130" text-anchor="middle" fill="#555" font-size="8">"它——活过了" 核心镜</text>
    </g>

    <!-- Act 4: 绊 -->
    <g transform="translate(1040, 180)">
      <rect x="0" y="0" width="200" height="140" rx="8" fill="#111" stroke="#d4b060" stroke-opacity="0.6" stroke-width="1"/>
      <rect x="0" y="0" width="200" height="30" rx="8" fill="#d4b060" opacity="0.15"/>
      <text x="100" y="20" text-anchor="middle" fill="#d4b060" font-size="12" letter-spacing="4" filter="url(#glow)">第四幕 · 绊</text>
      <text x="100" y="50" text-anchor="middle" fill="#888" font-size="9">人生裂痕</text>
      <text x="100" y="72" text-anchor="middle" fill="#666" font-size="8">看火谈心 → 异乡茶寮</text>
      <text x="100" y="92" text-anchor="middle" fill="#666" font-size="8">2镜 | 约75s</text>
      <text x="100" y="112" text-anchor="middle" fill="#555" font-size="8">色彩：暖橙 → 暖黄×冷白</text>
      <text x="100" y="130" text-anchor="middle" fill="#555" font-size="8">"疼吗……裂的时候" 情感核心</text>
    </g>

    <!-- Act 5: 迹 -->
    <g transform="translate(1300, 220)">
      <rect x="0" y="0" width="200" height="140" rx="8" fill="#111" stroke="#8aaa9a" stroke-opacity="0.6" stroke-width="1"/>
      <rect x="0" y="0" width="200" height="30" rx="8" fill="#8aaa9a" opacity="0.15"/>
      <text x="100" y="20" text-anchor="middle" fill="#8aaa9a" font-size="12" letter-spacing="4" filter="url(#glow)">第五幕 · 迹</text>
      <text x="100" y="50" text-anchor="middle" fill="#888" font-size="9">文明余火</text>
      <text x="100" y="72" text-anchor="middle" fill="#666" font-size="8">日本茶室 → 黑场终</text>
      <text x="100" y="92" text-anchor="middle" fill="#666" font-size="8">3镜 | 约55s + 字幕</text>
      <text x="100" y="112" text-anchor="middle" fill="#555" font-size="8">色彩：青釉×金锔钉 → 永恒黑</text>
      <text x="100" y="130" text-anchor="middle" fill="#555" font-size="8">"咔"声回环 · 文明遗嘱</text>
    </g>
  </g>

  <!-- Structure layers -->
  <g transform="translate(50, 420)">
    <text x="0" y="0" fill="#c0a060" font-size="12" letter-spacing="3" filter="url(#glow)">叙事层次</text>

    <!-- Layer 1 -->
    <rect x="0" y="20" width="1500" height="50" rx="4" fill="#111" stroke="#7a8a7a" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="15" y="42" fill="#7a8a7a" font-size="10" font-weight="bold">表层</text>
    <text x="80" y="42" fill="#888" font-size="9">一件哥窑开片瓷器的诞生故事</text>
    <text x="420" y="42" fill="#666" font-size="8">南宋龙泉窑 · 章氏兄弟 · 瓷艺传承</text>

    <!-- Layer 2 -->
    <rect x="0" y="78" width="1500" height="50" rx="4" fill="#111" stroke="#d4782a" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="15" y="100" fill="#d4782a" font-size="10" font-weight="bold">心理层</text>
    <text x="80" y="100" fill="#888" font-size="9">兄弟嫉妒、创伤起源、沉默之爱、和解仪式</text>
    <text x="500" y="100" fill="#666" font-size="8">中国式"爱在动作里" · "礼者，履也"</text>

    <!-- Layer 3 -->
    <rect x="0" y="136" width="1500" height="50" rx="4" fill="#111" stroke="#d4a830" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="15" y="158" fill="#d4a830" font-size="10" font-weight="bold">哲学层</text>
    <text x="80" y="158" fill="#888" font-size="9">"真正活过的东西，都会留下裂痕"</text>
    <text x="430" y="158" fill="#666" font-size="8">从工艺到存在 · 从器物到时间 · 从具体到抽象</text>

    <!-- Layer 4 -->
    <rect x="0" y="194" width="1500" height="50" rx="4" fill="#111" stroke="#cc2222" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="15" y="216" fill="#cc4444" font-size="10" font-weight="bold">文明层</text>
    <text x="80" y="216" fill="#888" font-size="9">从南宋到日本 · 从窑火到锔钉 · 从个人到文明</text>
    <text x="540" y="216" fill="#666" font-size="8">金缮 · 锔钉 · 马蝗绊 · 文明在裂痕中传承</text>
  </g>

  <!-- Key transitions -->
  <g transform="translate(50, 520)">
    <text x="0" y="0" fill="#c0a060" font-size="12" letter-spacing="3" filter="url(#glow)">关键转场机制</text>

    <rect x="0" y="15" width="220" height="80" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
    <text x="110" y="35" text-anchor="middle" fill="#c0a060" font-size="9">声音种子</text>
    <text x="110" y="52" text-anchor="middle" fill="#666" font-size="8">"咔"声 0-3 → 5-3 回环</text>
    <text x="110" y="68" text-anchor="middle" fill="#555" font-size="7">巨大声音括号</text>
    <text x="110" y="82" text-anchor="middle" fill="#555" font-size="7">未知→理解→悲怆</text>

    <rect x="250" y="15" width="220" height="80" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
    <text x="360" y="35" text-anchor="middle" fill="#c0a060" font-size="9">裂纹溶解</text>
    <text x="360" y="52" text-anchor="middle" fill="#666" font-size="8">Crack Dissolve</text>
    <text x="360" y="68" text-anchor="middle" fill="#555" font-size="7">0-5 序章裂纹 → 第三幕</text>
    <text x="360" y="82" text-anchor="middle" fill="#555" font-size="7">微观→宏观 时间折叠</text>

    <rect x="500" y="15" width="220" height="80" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
    <text x="610" y="35" text-anchor="middle" fill="#c0a060" font-size="9">闪白</text>
    <text x="610" y="52" text-anchor="middle" fill="#666" font-size="8">Flash White 0.5s</text>
    <text x="610" y="68" text-anchor="middle" fill="#555" font-size="7">2-3 伤疤揭示</text>
    <text x="610" y="82" text-anchor="middle" fill="#555" font-size="7">记忆闪电 · 时空折叠</text>

    <rect x="750" y="15" width="220" height="80" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
    <text x="860" y="35" text-anchor="middle" fill="#c0a060" font-size="9">快速摇镜+黑场</text>
    <text x="860" y="52" text-anchor="middle" fill="#666" font-size="8">Whip Pan to Black</text>
    <text x="860" y="68" text-anchor="middle" fill="#555" font-size="7">2-4 泼水后</text>
    <text x="860" y="82" text-anchor="middle" fill="#555" font-size="7">意识丧失的视觉模拟</text>

    <rect x="1000" y="15" width="220" height="80" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
    <text x="1110" y="35" text-anchor="middle" fill="#c0a060" font-size="9">裂纹转场</text>
    <text x="1110" y="52" text-anchor="middle" fill="#666" font-size="8">Crack Wipe</text>
    <text x="1110" y="68" text-anchor="middle" fill="#555" font-size="7">4-2 闪回与现实</text>
    <text x="1110" y="82" text-anchor="middle" fill="#555" font-size="7">时间的折叠</text>

    <rect x="1250" y="15" width="250" height="80" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
    <text x="1375" y="35" text-anchor="middle" fill="#c0a060" font-size="9">慢划像</text>
    <text x="1375" y="52" text-anchor="middle" fill="#666" font-size="8">Slow Wipe / Snow Wipe</text>
    <text x="1375" y="68" text-anchor="middle" fill="#555" font-size="7">1-2 晨雾 → 5-1 雪花</text>
    <text x="1375" y="82" text-anchor="middle" fill="#555" font-size="7">文明跨越的视觉桥</text>
  </g>

  <!-- Mirror structures -->
  <g transform="translate(50, 640)">
    <text x="0" y="0" fill="#c0a060" font-size="12" letter-spacing="3" filter="url(#glow)">镜像结构</text>

    <line x1="20" y1="30" x2="20" y2="150" stroke="#444" stroke-width="0.5"/>
    <line x1="750" y1="30" x2="750" y2="150" stroke="#444" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="1480" y1="30" x2="1480" y2="150" stroke="#444" stroke-width="0.5"/>

    <!-- Mirror 1: 推泥 → 推碗 -->
    <text x="20" y="55" fill="#c0a060" font-size="9" text-anchor="middle">镜号 1-1</text>
    <text x="20" y="72" fill="#888" font-size="8" text-anchor="middle">推泥</text>
    <text x="20" y="88" fill="#666" font-size="7" text-anchor="middle">章生一推泥给弟弟</text>
    <text x="20" y="104" fill="#555" font-size="7" text-anchor="middle">「不言之教」</text>

    <text x="750" y="55" fill="#c0a060" font-size="9" text-anchor="middle">镜号 3-2</text>
    <text x="750" y="72" fill="#888" font-size="8" text-anchor="middle">推碗</text>
    <text x="750" y="88" fill="#666" font-size="7" text-anchor="middle">章生一推碗给弟弟</text>
    <text x="750" y="104" fill="#555" font-size="7" text-anchor="middle">「仪式和解」</text>

    <text x="750" y="125" fill="#c0a060" font-size="8" text-anchor="middle">↻ 循环给予</text>

    <!-- Mirror 2: 咔 -->
    <text x="1480" y="55" fill="#c0a060" font-size="9" text-anchor="middle">镜号 0-3 → 5-3</text>
    <text x="1480" y="72" fill="#888" font-size="8" text-anchor="middle">"咔"</text>
    <text x="1480" y="88" fill="#666" font-size="7" text-anchor="middle">第一次=未知神秘</text>
    <text x="1480" y="104" fill="#555" font-size="7" text-anchor="middle">第二次=理解悲怆</text>
    <text x="1480" y="125" fill="#c0a060" font-size="8" text-anchor="middle">↻ 声音回环</text>
  </g>

  <!-- Shot count -->
  <g transform="translate(50, 800)">
    <text x="0" y="0" fill="#c0a060" font-size="11" letter-spacing="3" filter="url(#glow)">镜号分布</text>

    <rect x="0" y="15" width="180" height="40" rx="3" fill="#111" stroke="#7a8a7a" stroke-opacity="0.4" stroke-width="0.5"/>
    <text x="90" y="32" text-anchor="middle" fill="#7a8a7a" font-size="9">序：12镜</text>
    <text x="90" y="48" text-anchor="middle" fill="#555" font-size="7">0-1 ~ 0-12</text>

    <rect x="200" y="15" width="180" height="40" rx="3" fill="#111" stroke="#d4782a" stroke-opacity="0.4" stroke-width="0.5"/>
    <text x="290" y="32" text-anchor="middle" fill="#d4782a" font-size="9">一：2镜</text>
    <text x="290" y="48" text-anchor="middle" fill="#555" font-size="7">1-1 ~ 1-2</text>

    <rect x="400" y="15" width="180" height="40" rx="3" fill="#111" stroke="#cc2222" stroke-opacity="0.4" stroke-width="0.5"/>
    <text x="490" y="32" text-anchor="middle" fill="#cc4444" font-size="9">二：4镜</text>
    <text x="490" y="48" text-anchor="middle" fill="#555" font-size="7">2-1 ~ 2-4</text>

    <rect x="600" y="15" width="180" height="40" rx="3" fill="#111" stroke="#8aaa9a" stroke-opacity="0.4" stroke-width="0.5"/>
    <text x="690" y="32" text-anchor="middle" fill="#8aaa9a" font-size="9">三：2镜</text>
    <text x="690" y="48" text-anchor="middle" fill="#555" font-size="7">3-1 ~ 3-2</text>

    <rect x="800" y="15" width="180" height="40" rx="3" fill="#111" stroke="#d4b060" stroke-opacity="0.4" stroke-width="0.5"/>
    <text x="890" y="32" text-anchor="middle" fill="#d4b060" font-size="9">四：2镜</text>
    <text x="890" y="48" text-anchor="middle" fill="#555" font-size="7">4-1 ~ 4-2</text>

    <rect x="1000" y="15" width="180" height="40" rx="3" fill="#111" stroke="#8aaa9a" stroke-opacity="0.4" stroke-width="0.5"/>
    <text x="1090" y="32" text-anchor="middle" fill="#8aaa9a" font-size="9">五：3镜</text>
    <text x="1090" y="48" text-anchor="middle" fill="#555" font-size="7">5-1 ~ 5-3</text>

    <text x="1090" y="80" text-anchor="middle" fill="#c0a060" font-size="9">总镜数：25镜 | 总时长：约15分钟</text>
  </g>

  <text x="800" y="970" text-anchor="middle" fill="#333" font-size="8" letter-spacing="2">窑火不息·追迹 | 适配分镜表 | 五幕叙事结构</text>
</svg>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL FORGE — 像素编辑器</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050508;--bg2:#0a0a12;--bg3:#0f0f1a;--bg4:#141420;
  --fg:#d0ffd0;--fg-dim:#3a5a3a;--fg-mid:#6a8a6a;
  --accent:#00ff88;--accent2:#ff3366;--accent3:#44ddff;--accent4:#ffaa00;--accent5:#a29bfe;--accent6:#ff6b9d;--accent7:#7cff6b;
  --selena:#44ddff;--kelex:#ff6b9d;--skill:#7cff6b;--hermes:#ffaa00;--agent:#a29bfe;--opic:#ff3366;--rpa:#00ff88;
  --card:rgba(10,10,18,0.95);--border:#1a2a1a;--border2:#253525;
  --fp:'Press Start 2P',monospace;--fm:'Share Tech Mono',monospace;--fc:'Fira Code',monospace;
  --panel-w:260px;--prop-w:280px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--fg);font-family:var(--fm)}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9999}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.4) 100%);pointer-events:none;z-index:9998}

#app{display:flex;flex-direction:column;height:100%;position:relative;z-index:1}

.topbar{height:38px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.topbar .logo{font-family:var(--fp);font-size:9px;color:var(--accent7);text-shadow:0 0 12px rgba(124,255,107,0.5);letter-spacing:2px}
.topbar .logo-sub{font-family:var(--fp);font-size:6px;color:var(--fg-dim);letter-spacing:1px;margin-left:4px}
.topbar .sep{color:var(--border);font-size:14px}
.topbar .ws-label{font-family:var(--fp);font-size:6px;padding:3px 8px;border:1px solid var(--accent);color:var(--accent);border-radius:2px;letter-spacing:1px}
.topbar .spacer{flex:1}
.topbar .tbtn{font-family:var(--fp);font-size:6px;padding:4px 10px;background:transparent;border:1px solid var(--border);color:var(--fg-dim);border-radius:2px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.topbar .tbtn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,255,136,0.05)}
.topbar .tbtn.active{background:rgba(0,255,136,0.1);border-color:var(--accent);color:var(--accent)}
.topbar .tbtn.danger:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(255,51,102,0.05)}

.main{flex:1;display:flex;overflow:hidden}

.left-panel{width:var(--panel-w);min-width:var(--panel-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.lp-header{height:32px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
.lp-header .title{font-family:var(--fp);font-size:6px;color:var(--fg-dim);letter-spacing:2px}
.lp-header .spacer{flex:1}
.lp-header .ibtn{font-size:10px;color:var(--fg-dim);cursor:pointer;transition:color .2s;padding:2px 4px}
.lp-header .ibtn:hover{color:var(--accent)}
.lp-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.lp-tab{flex:1;padding:6px 0;font-family:var(--fp);font-size:5px;text-align:center;color:var(--fg-dim);cursor:pointer;transition:all .2s;letter-spacing:1px;border-bottom:2px solid transparent}
.lp-tab:hover{color:var(--fg-mid)}
.lp-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,255,136,0.03)}
.lp-content{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

.mc-group{border-bottom:1px solid var(--border)}
.mc-group-title{font-family:var(--fp);font-size:6px;padding:8px 10px 5px;cursor:pointer;display:flex;align-items:center;gap:5px;letter-spacing:1px;transition:background .2s;user-select:none}
.mc-group-title:hover{background:rgba(255,255,255,0.02)}
.mc-group-title .arrow{font-size:7px;transition:transform .2s;color:var(--fg-dim)}
.mc-group-title.collapsed .arrow{transform:rotate(-90deg)}
.mc-group-title .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.mc-group-title .count{font-family:var(--fm);font-size:9px;color:var(--fg-dim);margin-left:auto}
.mc-items{overflow:hidden;transition:max-height .3s}
.mc-items.collapsed{max-height:0!important}
.mc-item{padding:4px 10px 4px 26px;font-size:10px;color:var(--fg-dim);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-item:hover{background:rgba(0,255,136,0.04);color:var(--fg)}
.mc-item.active{background:rgba(0,255,136,0.08);color:var(--accent);border-right:2px solid var(--accent)}
.mc-item .tag{font-family:var(--fp);font-size:5px;padding:1px 4px;border-radius:1px;letter-spacing:0.5px;flex-shrink:0}
.mc-item .name{overflow:hidden;text-overflow:ellipsis}

.center-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:400px}
.canvas-toolbar{height:36px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
.ct-tool{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .2s;font-size:13px;color:var(--fg-dim);background:transparent}
.ct-tool:hover{border-color:var(--accent);color:var(--accent)}
.ct-tool.active{background:rgba(0,255,136,0.1);border-color:var(--accent);color:var(--accent)}
.ct-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.ct-label{font-family:var(--fp);font-size:5px;color:var(--fg-dim);letter-spacing:1px}
.ct-value{font-family:var(--fm);font-size:10px;color:var(--accent);min-width:30px}
.ct-input{width:50px;height:22px;background:var(--bg);border:1px solid var(--border);color:var(--fg);font-family:var(--fm);font-size:10px;padding:0 4px;border-radius:2px;text-align:center}
.ct-input:focus{border-color:var(--accent);outline:none}

.canvas-container{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;background:var(--bg)}
.canvas-container::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(0,255,136,0.015) 1px,transparent 1px);background-size:20px 20px;pointer-events:none}
#mainCanvas{image-rendering:pixelated;image-rendering:crisp-edges;border:1px solid var(--border2);box-shadow:0 0 40px rgba(0,255,136,0.06),0 0 80px rgba(0,0,0,0.4);cursor:crosshair;position:relative;z-index:1}
.canvas-info{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-family:var(--fp);font-size:5px;color:var(--fg-dim);letter-spacing:1px;background:rgba(5,5,8,0.8);padding:3px 10px;border-radius:2px;z-index:2}

.right-panel{width:var(--prop-w);min-width:var(--prop-w);background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.rp-header{height:32px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
.rp-header .title{font-family:var(--fp);font-size:6px;color:var(--fg-dim);letter-spacing:2px}
.rp-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.rp-tab{flex:1;padding:6px 0;font-family:var(--fp);font-size:5px;text-align:center;color:var(--fg-dim);cursor:pointer;transition:all .2s;letter-spacing:1px;border-bottom:2px solid transparent}
.rp-tab:hover{color:var(--fg-mid)}
.rp-tab.active{color:var(--accent3);border-bottom-color:var(--accent3);background:rgba(68,221,255,0.03)}
.rp-content{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;padding:8px}

.prop-section{margin-bottom:10px;border:1px solid var(--border);border-radius:3px;overflow:hidden}
.prop-section-title{font-family:var(--fp);font-size:5px;padding:6px 8px;letter-spacing:1px;display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;transition:background .2s}
.prop-section-title:hover{background:rgba(255,255,255,0.02)}
.prop-section-title .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.prop-section-body{padding:6px 8px;border-top:1px solid var(--border)}
.prop-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.prop-label{font-family:var(--fp);font-size:5px;color:var(--fg-dim);letter-spacing:0.5px;min-width:55px;flex-shrink:0}
.prop-slider{flex:1;-webkit-appearance:none;height:3px;background:var(--border);border-radius:2px;outline:none}
.prop-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--accent);border-radius:50%;cursor:pointer;box-shadow:0 0 6px rgba(0,255,136,0.3)}
.prop-val{font-family:var(--fm);font-size:10px;color:var(--accent);min-width:28px;text-align:right}
.prop-select{flex:1;height:20px;background:var(--bg);border:1px solid var(--border);color:var(--fg);font-family:var(--fm);font-size:10px;padding:0 4px;border-radius:2px}
.prop-select:focus{border-color:var(--accent);outline:none}
.prop-toggle{width:32px;height:16px;background:var(--border);border-radius:8px;cursor:pointer;position:relative;transition:background .2s}
.prop-toggle.on{background:rgba(0,255,136,0.3)}
.prop-toggle::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;background:var(--fg-dim);border-radius:50%;transition:all .2s}
.prop-toggle.on::after{left:18px;background:var(--accent)}
.prop-color{width:24px;height:20px;border:1px solid var(--border);border-radius:2px;cursor:pointer;padding:0}

.pipeline-viz{padding:6px 8px}
.pipe-stage{display:flex;align-items:center;gap:4px;margin-bottom:4px;padding:3px 6px;border:1px solid var(--border);border-radius:2px;font-family:var(--fp);font-size:5px;color:var(--fg-dim);letter-spacing:0.5px;transition:all .2s;cursor:pointer}
.pipe-stage:hover{border-color:var(--accent);color:var(--accent)}
.pipe-stage.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,136,0.06)}
.pipe-stage .num{width:14px;height:14px;display:flex;align-items:center;justify-content:center;background:var(--border);border-radius:50%;font-size:6px;color:var(--fg-dim);flex-shrink:0}
.pipe-stage.active .num{background:var(--accent);color:var(--bg)}
.pipe-arrow{text-align:center;color:var(--fg-dim);font-size:10px;margin:2px 0}

.layer-item{display:flex;align-items:center;gap:4px;padding:4px 6px;border:1px solid var(--border);border-radius:2px;margin-bottom:3px;transition:all .2s;cursor:pointer}
.layer-item:hover{border-color:var(--fg-dim)}
.layer-item.active{border-color:var(--accent3);background:rgba(68,221,255,0.05)}
.layer-item .vis{font-size:10px;color:var(--fg-dim);cursor:pointer;width:16px;text-align:center}
.layer-item .vis:hover{color:var(--accent)}
.layer-item .lname{flex:1;font-family:var(--fp);font-size:5px;color:var(--fg-dim);letter-spacing:0.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-item.active .lname{color:var(--accent3)}
.layer-item .lmode{font-family:var(--fp);font-size:4px;padding:1px 3px;border:1px solid var(--border);border-radius:1px;color:var(--fg-dim);letter-spacing:0.5px}

.statusbar{height:22px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-family:var(--fp);font-size:5px;color:var(--fg-dim);letter-spacing:1px;gap:14px;flex-shrink:0}
.statusbar .accent{color:var(--accent)}
.statusbar .sep{color:var(--border)}
.statusbar .indicator{width:6px;height:6px;border-radius:50%;flex-shrink:0}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.pulse{animation:pulse 2s ease-in-out infinite}

@keyframes glow{0%,100%{text-shadow:0 0 8px rgba(0,255,136,0.3)}50%{text-shadow:0 0 16px rgba(0,255,136,0.6)}}
.glow{animation:glow 3s ease-in-out infinite}

.toast{position:fixed;top:50px;right:20px;padding:8px 16px;background:var(--bg3);border:1px solid var(--accent);border-radius:3px;font-family:var(--fp);font-size:6px;color:var(--accent);letter-spacing:1px;z-index:10000;transform:translateX(120%);transition:transform .3s;box-shadow:0 0 20px rgba(0,255,136,0.15)}
.toast.show{transform:translateX(0)}
.toast.error{border-color:var(--accent2);color:var(--accent2);box-shadow:0 0 20px rgba(255,51,102,0.15)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9000;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 0 40px rgba(0,0,0,0.5)}
.modal-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.modal-header .title{font-family:var(--fp);font-size:7px;color:var(--accent);letter-spacing:1px}
.modal-header .spacer{flex:1}
.modal-header .close{font-size:14px;color:var(--fg-dim);cursor:pointer;transition:color .2s}
.modal-header .close:hover{color:var(--accent2)}
.modal-body{padding:14px;font-family:var(--fm);font-size:11px;color:var(--fg-mid);line-height:1.6}
.modal-body pre{background:var(--bg);padding:8px;border-radius:3px;overflow-x:auto;font-family:var(--fc);font-size:10px;color:var(--fg);border:1px solid var(--border)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <span class="logo glow">PIXEL FORGE</span>
    <span class="logo-sub">EDITOR</span>
    <span class="sep">|</span>
    <span class="ws-label" id="wsLabel">WORKSPACE:STARTER</span>
    <span class="spacer"></span>
    <button class="tbtn" id="btnUpload">⬆ 上传</button>
    <button class="tbtn" id="btnPlay">▶ 播放</button>
    <button class="tbtn" id="btnStop">■ 停止</button>
    <span class="sep">|</span>
    <button class="tbtn" id="btnExport">⬇ 导出</button>
    <button class="tbtn" id="btnDocs">◈ MCOP</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
  </div>

  <div class="main">
    <div class="left-panel">
      <div class="lp-header">
        <span class="title">◈ MCOP 文档树</span>
        <span class="spacer"></span>
        <span class="ibtn" id="btnCollapseAll" title="全部折叠">⊟</span>
        <span class="ibtn" id="btnExpandAll" title="全部展开">⊞</span>
      </div>
      <div class="lp-tabs">
        <div class="lp-tab active" data-tab="docs">文档</div>
        <div class="lp-tab" data-tab="skillpacks">技能包</div>
        <div class="lp-tab" data-tab="workspace">空间</div>
      </div>
      <div class="lp-content" id="lpContent"></div>
    </div>

    <div class="center-area">
      <div class="canvas-toolbar">
        <div class="ct-tool active" data-tool="brush" title="画笔">✏</div>
        <div class="ct-tool" data-tool="eraser" title="橡皮">◻</div>
        <div class="ct-tool" data-tool="fill" title="填充">◉</div>
        <div class="ct-tool" data-tool="pick" title="取色">💧</div>
        <div class="ct-tool" data-tool="move" title="移动">✥</div>
        <div class="ct-sep"></div>
        <span class="ct-label">尺寸</span>
        <input class="ct-input" id="brushSize" type="number" value="1" min="1" max="32">
        <div class="ct-sep"></div>
        <span class="ct-label">网格</span>
        <div class="prop-toggle on" id="gridToggle"></div>
        <div class="ct-sep"></div>
        <span class="ct-label">缩放</span>
        <span class="ct-value" id="zoomVal">8x</span>
        <div class="ct-sep"></div>
        <span class="ct-label">画布</span>
        <input class="ct-input" id="canvasW" type="number" value="64" min="8" max="256" style="width:40px">
        <span style="color:var(--fg-dim);font-size:10px">×</span>
        <input class="ct-input" id="canvasH" type="number" value="64" min="8" max="256" style="width:40px">
        <div class="ct-sep"></div>
        <span class="ct-label">效果</span>
        <select class="prop-select" id="effectSelect" style="width:100px">
          <option value="none">无</option>
          <option value="pixelate" selected>像素化</option>
          <option value="ionize">离子化</option>
          <option value="wave">波浪纹</option>
          <option value="glitch">故障</option>
          <option value="chromatic">色差</option>
        </select>
      </div>
      <div class="canvas-container" id="canvasContainer">
        <canvas id="mainCanvas" width="512" height="512"></canvas>
        <div class="canvas-info" id="canvasInfo">64×64 · ZOOM 8x · BRUSH</div>
      </div>
    </div>

    <div class="right-panel">
      <div class="rp-header">
        <span class="title">◈ 属性面板</span>
      </div>
      <div class="rp-tabs">
        <div class="rp-tab active" data-tab="effect">效果</div>
        <div class="rp-tab" data-tab="pipeline">管线</div>
        <div class="rp-tab" data-tab="layers">图层</div>
        <div class="rp-tab" data-tab="scene">场景</div>
      </div>
      <div class="rp-content" id="rpContent"></div>
    </div>
  </div>

  <div class="statusbar">
    <span class="indicator pulse" id="statusDot" style="background:var(--accent)"></span>
    <span>PIXEL FORGE</span>
    <span class="sep">|</span>
    <span>坐标: <span class="accent" id="stPos">0,0</span></span>
    <span class="sep">|</span>
    <span>颜色: <span class="accent" id="stColor">#000000</span></span>
    <span class="sep">|</span>
    <span>帧: <span class="accent" id="stFrame">0</span></span>
    <span class="sep">|</span>
    <span>FPS: <span class="accent" id="stFps">0</span></span>
    <span class="sep">|</span>
    <span>MCOP: <span class="accent" id="stMcop">7 formats · 57 docs</span></span>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="title" id="modalTitle">MCOP 文档</span>
      <span class="spacer"></span>
      <span class="close" id="modalClose">✕</span>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);

const MCOP_DATA={
  formats:[
    {ext:'.selena',name:'Selena',color:'#44ddff',icon:'◇',purpose:'场景选择',dir:'scenes/',items:[
      {id:'default-plane',name:'默认平面场景'},{id:'cloth-gravity',name:'布料重力场景'},
      {id:'sphere-wrap',name:'球体包裹场景'},{id:'cylinder-roll',name:'圆柱滚动场景'},
      {id:'cube-explode',name:'立方体爆炸场景'},{id:'torus-wave',name:'环面波浪场景'}
    ]},
    {ext:'.kelex',name:'Kelex',color:'#ff6b9d',icon:'◈',purpose:'效果变换',dir:'effects/',items:[
      {id:'pixelate-basic',name:'像素化'},{id:'ionize-burst',name:'离子化消散'},
      {id:'wave-line',name:'波浪纹线条'},{id:'glitch-shift',name:'故障偏移'},
      {id:'chromatic-aberration',name:'色差'}
    ]},
    {ext:'.skill',name:'Skill',color:'#7cff6b',icon:'▣',purpose:'能力技能',dir:'skills/',items:[
      {id:'pixel-render',name:'像素渲染能力'},{id:'physics-solve',name:'物理解算能力'}
    ]},
    {ext:'.hermes',name:'Hermes',color:'#ffaa00',icon:'⚡',purpose:'通信事件',dir:'comms/',items:[
      {id:'core-events',name:'核心事件协议'},{id:'effect-events',name:'效果事件协议'},
      {id:'ui-events',name:'UI事件协议'}
    ]},
    {ext:'.agent',name:'Agent',color:'#a29bfe',icon:'⬡',purpose:'模块代理',dir:'agents/',items:[
      {id:'eventbus',name:'EventBus',layer:'core'},{id:'core',name:'CoreModule',layer:'core'},
      {id:'ui',name:'UIModule',layer:'core'},{id:'pixelate',name:'PixelateEffect',layer:'effect'},
      {id:'ionize',name:'IonizeEffect',layer:'effect'},{id:'wave',name:'WaveEffect',layer:'effect'},
      {id:'glitch',name:'GlitchEffect',layer:'effect'},{id:'chromatic',name:'ChromaticEffect',layer:'effect'},

const canvas=$('#mainCanvas');
const ctx=canvas.getContext('2d');
let pixelData=null;
let sourceImage=null;
let offCanvas=null;
let offCtx=null;
let animId=null;
let lastTime=0;
let frameCount=0;
let fpsTime=0;

function initCanvas(){
  canvas.width=state.canvasW*state.zoom;
  canvas.height=state.canvasH*state.zoom;
  offCanvas=document.createElement('canvas');
  offCanvas.width=state.canvasW;
  offCanvas.height=state.canvasH;
  offCtx=offCanvas.getContext('2d');
  pixelData=offCtx.createImageData(state.canvasW,state.canvasH);
  for(let i=0;i<pixelData.data.length;i+=4){
    pixelData.data[i]=10;pixelData.data[i+1]=10;pixelData.data[i+2]=18;pixelData.data[i+3]=255;
  }
  offCtx.putImageData(pixelData,0,0);
  renderCanvas();
}

function renderCanvas(){
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(offCanvas,0,0,canvas.width,canvas.height);
  if(state.showGrid&&state.zoom>=4){
    ctx.strokeStyle='rgba(0,255,136,0.08)';
    ctx.lineWidth=0.5;
    for(let x=0;x<=state.canvasW;x++){
      ctx.beginPath();ctx.moveTo(x*state.zoom,0);ctx.lineTo(x*state.zoom,canvas.height);ctx.stroke();
    }
    for(let y=0;y<=state.canvasH;y++){
      ctx.beginPath();ctx.moveTo(0,y*state.zoom);ctx.lineTo(canvas.width,y*state.zoom);ctx.stroke();
    }
  }
}

function setPixel(x,y,r,g,b,a){
  if(x<0||x>=state.canvasW||y<0||y>=state.canvasH)return;
  const i=(y*state.canvasW+x)*4;
  pixelData.data[i]=r;pixelData.data[i+1]=g;pixelData.data[i+2]=b;pixelData.data[i+3]=a!==undefined?a:255;
}

function getPixel(x,y){
  if(x<0||x>=state.canvasW||y<0||y>=state.canvasH)return[0,0,0,0];
  const i=(y*state.canvasW+x)*4;
  return[pixelData.data[i],pixelData.data[i+1],pixelData.data[i+2],pixelData.data[i+3]];
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return[r,g,b];
}

function drawBrush(cx,cy){
  const[r,g,b]=hexToRgb(state.currentColor);
  const s=state.brushSize;
  const half=Math.floor(s/2);
  for(let dy=0;dy<s;dy++){
    for(let dx=0;dx<s;dx++){
      if(state.tool==='eraser') setPixel(cx-half+dx,cy-half+dy,10,10,18,255);
      else setPixel(cx-half+dx,cy-half+dy,r,g,b,255);
    }
  }
  offCtx.putImageData(pixelData,0,0);
  renderCanvas();
}

function floodFill(sx,sy,fr,fg,fb){
  const[cr,cg,cb,ca]=getPixel(sx,sy);
  if(cr===fr&&cg===fg&&cb===fb)return;
  const stack=[[sx,sy]];
  const visited=new Set();
  while(stack.length){
    const[x,y]=stack.pop();
    const key=x+','+y;
    if(visited.has(key))continue;
    visited.add(key);
    const[pr,pg,pb,pa]=getPixel(x,y);
    if(pr!==cr||pg!==cg||pb!==cb)continue;
    setPixel(x,y,fr,fg,fb);
    if(x>0)stack.push([x-1,y]);
    if(x<state.canvasW-1)stack.push([x+1,y]);
    if(y>0)stack.push([x,y-1]);
    if(y<state.canvasH-1)stack.push([x,y+1]);
  }
  offCtx.putImageData(pixelData,0,0);
  renderCanvas();
}

canvas.addEventListener('mousedown',e=>{
  const rect=canvas.getBoundingClientRect();
  const cx=Math.floor((e.clientX-rect.left)/state.zoom);
  const cy=Math.floor((e.clientY-rect.top)/state.zoom);
  state.mouseDown=true;
  if(state.tool==='brush'||state.tool==='eraser') drawBrush(cx,cy);
  else if(state.tool==='fill'){
    const[r,g,b]=hexToRgb(state.currentColor);
    floodFill(cx,cy,r,g,b);
  }else if(state.tool==='pick'){
    const[pr,pg,pb]=getPixel(cx,cy);
    state.currentColor='#'+[pr,pg,pb].map(v=>v.toString(16).padStart(2,'0')).join('');
    $('#stColor').textContent=state.currentColor;
  }
  $('#stPos').textContent=cx+','+cy;
});

canvas.addEventListener('mousemove',e=>{

function applyEffect(time){
  if(state.currentEffect==='none'||!pixelData)return;
  const w=state.canvasW,h=state.canvasH;
  const src=new Uint8ClampedArray(pixelData.data);
  const dst=pixelData.data;

  if(state.currentEffect==='pixelate'){
    const ps=Math.max(2,state.effectParams.pixelSize||8);
    for(let by=0;by<h;by+=ps){
      for(let bx=0;bx<w;bx+=ps){
        let sr=0,sg=0,sb=0,cnt=0;
        for(let dy=0;dy<ps&&by+dy<h;dy++){
          for(let dx=0;dx<ps&&bx+dx<w;dx++){
            const i=((by+dy)*w+(bx+dx))*4;
            sr+=src[i];sg+=src[i+1];sb+=src[i+2];cnt++;
          }
        }
        const ar=sr/cnt,ag=sg/cnt,ab=sb/cnt;
        for(let dy=0;dy<ps&&by+dy<h;dy++){
          for(let dx=0;dx<ps&&bx+dx<w;dx++){
            const i=((by+dy)*w+(bx+dx))*4;
            dst[i]=ar;dst[i+1]=ag;dst[i+2]=ab;dst[i+3]=255;
          }
        }
      }
    }
    if(state.effectParams.gridShow){
      for(let by=0;by<h;by+=ps){
        for(let bx=0;bx<w;bx+=ps){
          for(let dx=0;dx<ps&&bx+dx<w;dx++){const i=(by*w+(bx+dx))*4;dst[i]=40;dst[i+1]=60;dst[i+2]=40;}
          for(let dy=0;dy<ps&&by+dy<h;dy++){const i=((by+dy)*w+bx)*4;dst[i]=40;dst[i+1]=60;dst[i+2]=40;}
        }
      }
    }
  }else if(state.currentEffect==='wave'){
    const amp=state.effectParams.amplitude||15;
    const freq=state.effectParams.frequency||3;
    const spd=state.effectParams.speed||1;
    const mode=state.effectParams.lineMode||'sine';
    for(let y=0;y<h;y++){
      const t=y*freq*0.01+time*spd*0.001;
      let offset;
      if(mode==='sine') offset=amp*Math.sin(t);
      else if(mode==='triangle') offset=amp*(2*Math.abs(2*(t/(2*Math.PI)-Math.floor(t/(2*Math.PI)+0.5)))-1);
      else offset=amp*((t/(2*Math.PI)-Math.floor(t/(2*Math.PI)))*2-1);
      const off=Math.round(offset);
      for(let x=0;x<w;x++){
        const sx=x+off;
        const di=(y*w+x)*4;
        if(sx>=0&&sx<w){const si=(y*w+sx)*4;dst[di]=src[si];dst[di+1]=src[si+1];dst[di+2]=src[si+2];dst[di+3]=src[si+3];}
        else{dst[di]=0;dst[di+1]=0;dst[di+2]=0;dst[di+3]=0;}
      }
    }
  }else if(state.currentEffect==='glitch'){
    const intensity=state.effectParams.intensity||0.5;
    const bands=state.effectParams.bandCount||5;
    const shift=state.effectParams.channelShift||8;
    const burst=state.effectParams.burstMode&&Math.random()>0.7;
    for(let y=0;y<h;y++){
      const isBand=burst||Math.sin(y*0.7+time*0.003)*0.5+0.5>1-intensity;
      const rowShift=isBand?Math.round((Math.random()-0.5)*shift*2*intensity):0;
      for(let x=0;x<w;x++){
        const di=(y*w+x)*4;
        const rx=Math.min(w-1,Math.max(0,x+rowShift-shift));
        const bx=Math.min(w-1,Math.max(0,x+rowShift+shift));
        const gx=Math.min(w-1,Math.max(0,x+rowShift));
        dst[di]=src[(y*w+rx)*4];dst[di+1]=src[(y*w+gx)*4+1];dst[di+2]=src[(y*w+bx)*4+2];dst[di+3]=255;
      }
    }
  }else if(state.currentEffect==='chromatic'){
    const oR=state.effectParams.offsetR||-4;
    const oB=state.effectParams.offsetB||4;
    const anim=state.effectParams.animate?Math.sin(time*0.002)*3:0;
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        const di=(y*w+x)*4;
        const rx=Math.min(w-1,Math.max(0,x+oR+anim));
        const bx=Math.min(w-1,Math.max(0,x+oB+anim));
        dst[di]=src[(y*w+rx)*4];dst[di+1]=src[(y*w+x)*4+1];dst[di+2]=src[(y*w+bx)*4+2];dst[di+3]=255;
      }
    }
  }else if(state.currentEffect==='ionize'){
    const density=state.effectParams.density||0.05;
    const spd=state.effectParams.speed||2;
    const grav=state.effectParams.gravity||0.5;
    const spread=state.effectParams.spread||1.5;
    for(let i=0;i<dst.length;i++)dst[i]=0;
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        if(Math.random()>density)continue;
        const si=(y*w+x)*4;
        if(src[si+3]<10)continue;
        const life=Math.random();
        const vx=(Math.random()-0.5)*spread*spd;
        const vy=(Math.random()-0.5)*spread*spd+grav*time*0.0001;
        const nx=Math.round(x+vx);
        const ny=Math.round(y+vy);
        if(nx>=0&&nx<w&&ny>=0&&ny<h){
          const di=(ny*w+nx)*4;
          dst[di]=src[si];dst[di+1]=src[si+1];dst[di+2]=src[si+2];dst[di+3]=Math.floor(src[si+3]*life);
        }
      }
    }
  }
  offCtx.putImageData(pixelData,0,0);
}

function animateLoop(timestamp){
  if(!state.isPlaying)return;
  state.frame++;
  frameCount++;
  if(timestamp-fpsTime>=1000){state.fps=frameCount;frameCount=0;fpsTime=timestamp;$('#stFps').textContent=state.fps}
  applyEffect(timestamp);
  renderCanvas();
  $('#stFrame').textContent=state.frame;
  animId=requestAnimationFrame(animateLoop);
}

$('#btnPlay').addEventListener('click',()=>{
  if(state.isPlaying)return;
  state.isPlaying=true;
  state.frame=0;
  fpsTime=performance.now();
  frameCount=0;
  animId=requestAnimationFrame(animateLoop);
  $('#btnPlay').classList.add('active');
  $('#statusDot').style.background='var(--accent4)';
  showToast('动画播放中');
});

$('#btnStop').addEventListener('click',()=>{
  state.isPlaying=false;
  if(animId)cancelAnimationFrame(animId);
  animId=null;
  $('#btnPlay').classList.remove('active');
  $('#statusDot').style.background='var(--accent)';
  if(sourceImage){
    offCtx.drawImage(sourceImage,0,0,state.canvasW,state.canvasH);
    pixelData=offCtx.getImageData(0,0,state.canvasW,state.canvasH);
  }
  renderCanvas();
  showToast('动画已停止');
});

    const isActive=ws.id===state.currentWorkspace;
    if(isActive)section.style.borderColor='var(--accent)';
    const stitle=document.createElement('div');
    stitle.className='prop-section-title';
    stitle.style.background='var(--bg3)';
    stitle.innerHTML=`<span class="dot" style="background:var(--accent${ws.tier})"></span><span style="color:var(--accent${ws.tier})">TIER ${ws.tier}</span><span style="color:var(--fg-dim);font-size:9px;margin-left:auto">${isActive?'● ACTIVE':''}</span>`;
    section.appendChild(stitle);
    const body=document.createElement('div');
    body.className='prop-section-body';
    body.innerHTML=`
      <div class="prop-row"><span class="prop-label">名称</span><span style="color:var(--fg);font-size:10px">${ws.name}</span></div>
      <div class="prop-row"><span class="prop-label">描述</span><span style="color:var(--fg-dim);font-size:9px">${ws.desc}</span></div>
      <div class="prop-row"><span class="prop-label">效果</span><span style="color:var(--accent);font-size:10px">${ws.effects===99?'∞':ws.effects}</span></div>
      <div class="prop-row"><span class="prop-label">物理</span><span style="color:${ws.physics?'var(--accent)':'var(--fg-dim)'};font-size:10px">${ws.physics?'✓':'✗'}</span></div>
      <div class="prop-row"><span class="prop-label">3D</span><span style="color:${ws.threeD?'var(--accent)':'var(--fg-dim)'};font-size:10px">${ws.threeD?'✓':'✗'}</span></div>
      <div class="prop-row"><span class="prop-label">插件</span><span style="color:${ws.plugins?'var(--accent)':'var(--fg-dim)'};font-size:10px">${ws.plugins?'✓':'✗'}</span></div>
    `;
    if(!isActive){
      const btn=document.createElement('div');
      btn.style.cssText='margin-top:6px;padding:4px 8px;border:1px solid var(--border);border-radius:2px;font-family:var(--fp);font-size:5px;color:var(--fg-dim);cursor:pointer;text-align:center;letter-spacing:1px;transition:all .2s';
      btn.textContent='切换到此空间';
      btn.addEventListener('mouseenter',()=>{btn.style.borderColor='var(--accent)';btn.style.color='var(--accent)'});
      btn.addEventListener('mouseleave',()=>{btn.style.borderColor='var(--border)';btn.style.color='var(--fg-dim)'});
      btn.addEventListener('click',()=>{
        state.currentWorkspace=ws.id;
        $('#wsLabel').textContent='WORKSPACE:'+ws.name.replace('制作空间','').toUpperCase();
        buildLeftPanel();
        showToast('已切换到 '+ws.name);
      });
      body.appendChild(btn);
    }
    section.appendChild(body);
    container.appendChild(section);
  });
}

function renderRightPanel(){
  const content=$('#rpContent');
  content.innerHTML='';
  if(state.activeRpTab==='effect') buildEffectPanel(content);
  else if(state.activeRpTab==='pipeline') buildPipelinePanel(content);
  else if(state.activeRpTab==='layers') buildLayersPanel(content);
  else if(state.activeRpTab==='scene') buildScenePanel(content);
}

function buildEffectPanel(container){
  const effectName={none:'无',pixelate:'像素化',ionize:'离子化消散',wave:'波浪纹线条',glitch:'故障偏移',chromatic:'色差'};
  const section=document.createElement('div');
  section.className='prop-section';
  const stitle=document.createElement('div');
  stitle.className='prop-section-title';
  stitle.style.background='var(--bg3)';
  const kelexColor=state.currentEffect==='none'?'var(--fg-dim)':'#ff6b9d';
  stitle.innerHTML=`<span class="dot" style="background:${kelexColor}"></span><span style="color:${kelexColor}">KELEX: ${effectName[state.currentEffect]}</span>`;
  section.appendChild(stitle);
  const body=document.createElement('div');
  body.className='prop-section-body';
  const params=EFFECT_PARAMS[state.currentEffect];
  if(params){
    params.forEach(p=>{
      const row=document.createElement('div');
      row.className='prop-row';
      if(p.type==='range'){
        const val=state.effectParams[p.name]!==undefined?state.effectParams[p.name]:p.default;
        row.innerHTML=`<span class="prop-label">${p.label}</span><input class="prop-slider" type="range" min="${p.min}" max="${p.max}" step="${p.step||1}" value="${val}" data-param="${p.name}"><span class="prop-val">${val}</span>`;
        const slider=row.querySelector('.prop-slider');
        const valSpan=row.querySelector('.prop-val');
        slider.addEventListener('input',function(){
          const v=+this.value;
          state.effectParams[p.name]=v;
          valSpan.textContent=v%1===0?v:v.toFixed(2);
        });
      }else if(p.type==='bool'){
        const val=state.effectParams[p.name]!==undefined?state.effectParams[p.name]:p.default;
        row.innerHTML=`<span class="prop-label">${p.label}</span><div class="prop-toggle${val?' on':''}" data-param="${p.name}"></div>`;
        const toggle=row.querySelector('.prop-toggle');
        toggle.addEventListener('click',function(){
          this.classList.toggle('on');
          state.effectParams[p.name]=this.classList.contains('on');
        });
      }else if(p.type==='select'){
        const val=state.effectParams[p.name]||p.default;
        let optHtml=p.options.map(o=>`<option value="${o}"${o===val?' selected':''}>${o}</option>`).join('');
        row.innerHTML=`<span class="prop-label">${p.label}</span><select class="prop-select" data-param="${p.name}">${optHtml}</select>`;
        row.querySelector('.prop-select').addEventListener('change',function(){state.effectParams[p.name]=this.value});
      }
      body.appendChild(row);
    });
  }else{
    body.innerHTML='<div style="color:var(--fg-dim);font-size:10px;padding:4px">无效果参数</div>';
  }
  section.appendChild(body);
  container.appendChild(section);

  const colorSection=document.createElement('div');
  colorSection.className='prop-section';
  const ctitle=document.createElement('div');
  ctitle.className='prop-section-title';
  ctitle.style.background='var(--bg3)';
  ctitle.innerHTML='<span class="dot" style="background:var(--accent)"></span><span style="color:var(--accent)">画笔颜色</span>';
  colorSection.appendChild(ctitle);
  const cbody=document.createElement('div');
  cbody.className='prop-section-body';
  cbody.innerHTML=`<div class="prop-row"><span class="prop-label">当前色</span><input class="prop-color" type="color" value="${state.currentColor}" id="colorPicker"><span class="prop-val" id="colorVal">${state.currentColor}</span></div>`;
  colorSection.appendChild(cbody);
  container.appendChild(colorSection);
  setTimeout(()=>{
    const cp=$('#colorPicker');
    if(cp)cp.addEventListener('input',function(){state.currentColor=this.value;$('#colorVal').textContent=this.value;$('#stColor').textContent=this.value});
  },0);
}

function buildPipelinePanel(container){
  const section=document.createElement('div');
  section.className='prop-section';
  const stitle=document.createElement('div');
  stitle.className='prop-section-title';
  stitle.style.background='var(--bg3)';
  stitle.innerHTML='<span class="dot" style="background:#00ff88"></span><span style="color:#00ff88">RPA: 渲染管线</span>';
  section.appendChild(stitle);
  const body=document.createElement('div');
  body.className='prop-section-body pipeline-viz';
  state.pipeline.forEach((stage,i)=>{
    const el=document.createElement('div');
    el.className='pipe-stage'+(i===1?' active':'');
    el.innerHTML=`<span class="num">${i+1}</span><span>${stage.name}</span><span style="margin-left:auto;font-size:8px;color:var(--fg-dim)">${stage.type}</span>`;
    body.appendChild(el);
    if(i<state.pipeline.length-1){
      const arrow=document.createElement('div');
      arrow.className='pipe-arrow';
      arrow.textContent='↓';
      body.appendChild(arrow);
    }
  });
  section.appendChild(body);
  container.appendChild(section);
}

function buildLayersPanel(container){
  const section=document.createElement('div');
  section.className='prop-section';
  const stitle=document.createElement('div');
  stitle.className='prop-section-title';
  stitle.style.background='var(--bg3)';
  stitle.innerHTML='<span class="dot" style="background:#44ddff"></span><span style="color:#44ddff">图层合成</span>';
  section.appendChild(stitle);
  const body=document.createElement('div');
  body.className='prop-section-body';
  state.layers.forEach((layer,i)=>{
    const el=document.createElement('div');
    el.className='layer-item'+(i===state.activeLayer?' active':'');
    el.innerHTML=`<span class="vis">${layer.visible?'◉':'○'}</span><span class="lname">${layer.name}</span><span class="lmode">${layer.blend}</span>`;
    el.querySelector('.vis').addEventListener('click',e=>{
      e.stopPropagation();
      state.layers[i].visible=!state.layers[i].visible;
      renderRightPanel();
    });
    el.addEventListener('click',()=>{state.activeLayer=i;renderRightPanel()});
    body.appendChild(el);
  });
  section.appendChild(body);
  container.appendChild(section);
}

function buildScenePanel(container){
  const section=document.createElement('div');
  section.className='prop-section';
  const stitle=document.createElement('div');
  stitle.className='prop-section-title';
  stitle.style.background='var(--bg3)';
  stitle.innerHTML='<span class="dot" style="background:#44ddff"></span><span style="color:#44ddff">SELENA: 场景配置</span>';
  section.appendChild(stitle);
  const body=document.createElement('div');
  body.className='prop-section-body';
  body.innerHTML=`
    <div class="prop-row"><span class="prop-label">3D面</span><select class="prop-select"><option>plane</option><option>sphere</option><option>cylinder</option><option>box</option><option>torus</option></select></div>
    <div class="prop-row"><span class="prop-label">细分度</span><input class="prop-slider" type="range" min="8" max="64" value="32"><span class="prop-val">32</span></div>
    <div class="prop-row"><span class="prop-label">力场</span><select class="prop-select"><option>none</option><option>gravity</option><option>wind</option><option>explode</option><option>wave3d</option><option>spring</option></select></div>
    <div class="prop-row"><span class="prop-label">强度</span><input class="prop-slider" type="range" min="0" max="3" step="0.1" value="1"><span class="prop-val">1.0</span></div>
    <div class="prop-row"><span class="prop-label">阻尼</span><input class="prop-slider" type="range" min="0.8" max="1" step="0.01" value="0.98"><span class="prop-val">0.98</span></div>
    <div class="prop-row"><span class="prop-label">自动旋转</span><div class="prop-toggle" id="autoRotate"></div></div>
  `;
  section.appendChild(body);
  container.appendChild(section);

  const texSection=document.createElement('div');
  texSection.className='prop-section';
  const ttitle=document.createElement('div');
  ttitle.className='prop-section-title';
  ttitle.style.background='var(--bg3)';
  ttitle.innerHTML='<span class="dot" style="background:#ff3366"></span><span style="color:#ff3366">OPIC: 纹理映射</span>';
  texSection.appendChild(ttitle);
  const tbody=document.createElement('div');
  tbody.className='prop-section-body';
  tbody.innerHTML=`
    <div class="prop-row"><span class="prop-label">纹理</span><select class="prop-select"><option>pixel-default</option><option>rings-neon</option><option>spiral-cyber</option><option>checkerboard-mono</option><option>gradient-sunset</option><option>stripe-signal</option></select></div>
    <div class="prop-row"><span class="prop-label">magFilter</span><span style="color:var(--accent);font-size:10px">Nearest</span></div>
    <div class="prop-row"><span class="prop-label">minFilter</span><span style="color:var(--accent);font-size:10px">Nearest</span></div>
  `;
  texSection.appendChild(tbody);
  container.appendChild(texSection);
}

function showDocModal(fmt,item){
  const overlay=$('#modalOverlay');
  $('#modalTitle').textContent=fmt.name.toUpperCase()+' · '+item.name;
  const body=$('#modalBody');
  const layerInfo=item.layer?`<div style="margin-bottom:8px"><strong>Layer:</strong> <span style="color:${item.layer==='core'?'#7cff6b':item.layer==='effect'?'#ff6b9d':'#a29bfe'}">${item.layer}</span></div>`:'';
  body.innerHTML=`
    <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center">
      <span style="display:inline-block;padding:2px 8px;border:1px solid ${fmt.color};border-radius:2px;color:${fmt.color};font-family:var(--fp);font-size:6px;letter-spacing:1px">${fmt.ext}</span>
      <span style="color:var(--fg-dim);font-size:10px">${fmt.purpose}</span>
    </div>
    ${layerInfo}
    <div style="margin-bottom:8px"><strong>ID:</strong> <code style="color:var(--accent3)">${item.id}</code></div>
    <div style="margin-bottom:8px"><strong>文件:</strong> <code>${fmt.dir}${item.id}${fmt.ext}</code></div>
    <div style="margin-bottom:12px"><strong>交叉引用:</strong> <span style="color:var(--fg-dim)">参见 CATALOG 索引</span></div>
    <pre>${JSON.stringify({format:fmt.ext.replace('.','')+'/1.0',id:item.id,name:item.name,state:'published'},null,2)}</pre>
  `;
  overlay.classList.add('show');
}

$('#modalClose').addEventListener('click',()=>$('#modalOverlay').classList.remove('show'));
$('#modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('show')});

$('#btnDocs').addEventListener('click',()=>{
  const overlay=$('#modalOverlay');
  $('#modalTitle').textContent='MCOP · 7种文档标记格式';
  const body=$('#modalBody');
  body.innerHTML=MCOP_DATA.formats.map(f=>`
    <div style="margin-bottom:10px;padding:8px;border:1px solid var(--border);border-radius:3px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span style="width:8px;height:8px;border-radius:50%;background:${f.color};flex-shrink:0"></span>
        <strong style="color:${f.color}">${f.name}</strong>
        <code style="color:var(--fg-dim);font-size:10px">${f.ext}</code>
        <span style="margin-left:auto;color:var(--fg-dim);font-size:10px">${f.purpose}</span>
      </div>
      <div style="color:var(--fg-dim);font-size:10px;padding-left:14px">目录: ${f.dir} · 文档数: ${f.items.length}</div>
    </div>
  `).join('');
  overlay.classList.add('show');
});

$$('.lp-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    $$('.lp-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    state.activeLpTab=tab.dataset.tab;
    buildLeftPanel();
  });
});

$$('.rp-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    $$('.rp-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    state.activeRpTab=tab.dataset.tab;
    renderRightPanel();
  });
});

$('#btnCollapseAll').addEventListener('click',()=>{$$('.mc-group-title').forEach(t=>{t.classList.add('collapsed');t.nextElementSibling.classList.add('collapsed')}});
$('#btnExpandAll').addEventListener('click',()=>{$$('.mc-group-title').forEach(t=>{t.classList.remove('collapsed');t.nextElementSibling.classList.remove('collapsed')})});

initCanvas();
buildLeftPanel();
renderRightPanel();
updateCanvasInfo();
</script>
</body>
</html>

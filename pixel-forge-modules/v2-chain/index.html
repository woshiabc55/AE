<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Forge v2 - 管道链式特效</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d12;
  --bg2: #14141c;
  --bg3: #1a1a26;
  --accent: #00ff88;
  --accent2: #ff3366;
  --accent3: #44ddff;
  --pipe: #ffaa00;
  --text: #e0e0e8;
  --text2: #8888aa;
  --border: #2a2a3a;
  --card: #16161f;
  --danger: #ff3366;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

#app {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  width: 100vw;
}

#pipeline-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

#pipeline-bar .bar-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: var(--pipe);
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
}

#pipeline-bar .bar-title::before {
  content: '▸';
  color: var(--accent);
}

#pipeline-nodes {
  display: flex;
  align-items: center;
  gap: 0;
  overflow-x: auto;
  padding: 4px 0;
  min-height: 50px;
}

.pipe-node {
  display: flex;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
}

.node-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
  position: relative;
  min-width: 100px;
  user-select: none;
}

.node-box:hover {
  border-color: var(--accent);
  box-shadow: 0 0 8px rgba(0,255,136,0.15);
}

.node-box.active {
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(0,255,136,0.2);
}

.node-box.inactive {
  opacity: 0.45;
}

.node-indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  box-shadow: 0 0 6px var(--accent);
}

.node-indicator.off {
  background: #555;
  box-shadow: none;
}

.node-name {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: var(--text);
  white-space: nowrap;
}

.node-actions {
  display: flex;
  gap: 3px;
  margin-left: 4px;
}

.node-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  width: 18px;
  height: 18px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.node-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.node-btn.remove:hover {
  border-color: var(--danger);
  color: var(--danger);
}

.node-btn.toggle:hover {
  border-color: var(--pipe);
  color: var(--pipe);
}

.pipe-arrow {
  width: 30px;
  height: 2px;
  position: relative;
  flex-shrink: 0;
  margin: 0 2px;
}

.pipe-arrow-line {
  position: absolute;
  top: 0;
  left: 0;
  right: 8px;
  height: 2px;
  background: var(--pipe);
  opacity: 0.6;
}

.pipe-arrow-line.animated {
  background: repeating-linear-gradient(90deg, var(--pipe) 0px, var(--pipe) 4px, transparent 4px, transparent 8px);
  background-size: 8px 2px;
  animation: pipeFlow 0.6s linear infinite;
}

@keyframes pipeFlow {
  from { background-position: 0 0; }
  to { background-position: 8px 0; }
}

.pipe-arrow-head {
  position: absolute;
  right: 0;
  top: -4px;
  width: 0;
  height: 0;

  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
  opacity: 0.6;
}

#add-effect-btn {

  border: 1px dashed var(--border);
  border-radius: 6px;
  color: var(--text2);
  padding: 6px 14px;

  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  transition: all 0.2s;

#add-effect-btn:hover {

}

#main-area {

  overflow: hidden;
}

#left-panel {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;

.panel-section {

.panel-title {

.param-slider {

.param-slider::-webkit-slider-thumb {

.param-checkbox {

.param-checkbox input {

  height: 16px;

.param-checkbox input:checked {

.param-select {

  color: var(--text);

#data-flow-panel {

#data-flow-panel .panel-title {

#data-flow-stages {

.flow-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;

.flow-thumb {

  border-radius: 4px;

.flow-thumb canvas {

.flow-label {

.flow-arrow {

#canvas-area {

  align-items: center;

#main-canvas {
  border: 1px solid var(--border);
  border-radius: 4px;

#status-bar {

.status-dot {

.status-label {

.status-value {

#add-effect-menu {

#loading-overlay {

  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  transition: opacity 0.3s;

#loading-overlay.hidden {

.loading-title {
  font-family: 'Press Start 2P', monospace;

  text-shadow: 0 0 20px rgba(0,255,136,0.4);
}

.loading-sub {

.loading-bar {

.loading-bar-inner {

@keyframes loadProgress {

.no-effect-msg {

#source-section {

#load-image-btn {

}

#load-image-btn:hover {

#image-url-input {

<body>

<div id="loading-overlay">
  <div class="loading-title">PIXEL FORGE v2</div>
  <div class="loading-sub">管道链式特效引擎初始化中...</div>
  <div class="loading-bar"><div class="loading-bar-inner"></div></div>
</div>

<div id="app">
  <div id="pipeline-bar">
    <div class="bar-title">PIPELINE CHAIN</div>
    <div id="pipeline-nodes"></div>
  </div>

  <div id="main-area">
    <div id="left-panel">
      <div id="source-section">
        <div class="panel-title">图像源</div>
        <input type="text" id="image-url-input" placeholder="输入图片URL..." />
        <button id="load-image-btn">加载图像</button>
        <button id="play-btn">▶ 动画</button>
      </div>

      <div id="data-flow-panel">
        <div class="panel-title">管道数据流</div>
        <div id="data-flow-stages"></div>
      </div>

      <div id="effect-params">
        <div class="no-effect-msg">点击管道中的特效节点<br/>查看参数设置</div>
      </div>
    </div>

    <div id="canvas-area">
      <canvas id="main-canvas" width="512" height="512"></canvas>
    </div>
  </div>

  <div id="status-bar">
    <div class="status-item">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-label">状态</span>
      <span class="status-value" id="status-state">就绪</span>
    </div>
    <div class="status-item">
      <span class="status-label">FPS</span>
      <span class="status-value" id="status-fps">0</span>
    </div>
    <div class="status-item">
      <span class="status-label">管道</span>
      <span class="status-value" id="status-pipeline">空</span>
    </div>
    <div class="status-item">
      <span class="status-label">阶段</span>
      <span class="status-value" id="status-stage">-</span>
    </div>
    <div class="status-item">
      <span class="status-label">尺寸</span>
      <span class="status-value" id="status-size">512×512</span>
    </div>
  </div>
</div>

<div id="add-effect-menu"></div>

<script>
(function() {

const EventBus = {
  _listeners: {},
  on(event, fn) {
    if (!this._listeners[event]) this._listeners[event] = [];
    this._listeners[event].push(fn);
    return () => this.off(event, fn);
  },
  off(event, fn) {
    if (!this._listeners[event]) return;
    this._listeners[event] = this._listeners[event].filter(f => f !== fn);
  },
  emit(event, data) {
    if (!this._listeners[event]) return;
    this._listeners[event].forEach(fn => {
      try { fn(data); } catch(e) { console.error(`EventBus error [${event}]:`, e); }
    });
  }
};

class Pipeline {
  constructor(bus) {
    this.bus = bus;
    this.effects = [];
    this.canvases = [];
    this.ctxs = [];
    this.maxEffects = 8;
  }

  add(effect, index) {
    if (this.effects.length >= this.maxEffects) return false;
    const idx = index !== undefined ? index : this.effects.length;
    const canvas = document.createElement('canvas');
    canvas.width = this.width || 512;
    canvas.height = this.height || 512;
    const ctx = canvas.getContext('2d');
    this.effects.splice(idx, 0, effect);
    this.canvases.splice(idx, 0, canvas);
    this.ctxs.splice(idx, 0, ctx);
    effect.init(this.bus);
    this.bus.emit('pipeline:updated', this.getChainInfo());
    return true;
  }

  resize(w, h) {
    this.width = w;
    this.height = h;
    for (let i = 0; i < this.canvases.length; i++) {
      this.canvases[i].width = w;
      this.canvases[i].height = h;
    }
  }

  remove(index) {
    if (index < 0 || index >= this.effects.length) return;
    this.effects.splice(index, 1);
    this.canvases.splice(index, 1);
    this.ctxs.splice(index, 1);
    this.bus.emit('pipeline:updated', this.getChainInfo());
  }

  move(fromIdx, toIdx) {
    if (fromIdx === toIdx) return;
    if (fromIdx < 0 || fromIdx >= this.effects.length) return;
    if (toIdx < 0 || toIdx >= this.effects.length) return;
    const [effect] = this.effects.splice(fromIdx, 1);
    const [canvas] = this.canvases.splice(fromIdx, 1);
    const [ctx] = this.ctxs.splice(fromIdx, 1);
    this.effects.splice(toIdx, 0, effect);
    this.canvases.splice(toIdx, 0, canvas);
    this.ctxs.splice(toIdx, 0, ctx);
    this.bus.emit('pipeline:updated', this.getChainInfo());
  }

  toggle(index) {
    if (index < 0 || index >= this.effects.length) return;
    this.effects[index].enabled = !this.effects[index].enabled;
    this.bus.emit('pipeline:updated', this.getChainInfo());
  }

  process(sourceImageData, time) {
    let current = sourceImageData;
    for (let i = 0; i < this.effects.length; i++) {
      const effect = this.effects[i];
      if (!effect.enabled) continue;
      const ctx = this.ctxs[i];
      const cw = this.canvases[i].width;
      const ch = this.canvases[i].height;
      ctx.clearRect(0, 0, cw, ch);
      try {
        current = effect.render(ctx, current, time);
      } catch(e) {
        console.error(`Pipeline error [${effect.name}]:`, e);
      }
      this.bus.emit('pipeline:stage', { index: i, name: effect.name, imageData: current });
    }
    return current;
  }

  getIntermediateResults() {
    const results = [];
    for (let i = 0; i < this.effects.length; i++) {
      results.push({
        name: this.effects[i].name,
        canvas: this.canvases[i],
        enabled: this.effects[i].enabled
      });
    }
    return results;
  }

  getChainInfo() {
    return this.effects.map((e, i) => ({
      index: i,
      name: e.name,
      enabled: e.enabled
    }));
  }
}

class PixelateModule {
  constructor() {
    this.name = 'Pixelate';
    this.enabled = true;
    this.params = {
      pixelSize: { value: 8, min: 2, max: 64, step: 1, label: '像素尺寸' },
      gridShow: { value: false, type: 'checkbox', label: '显示网格' }
    };
  }

  init(bus) {}

  render(ctx, inputImageData, time) {
    const w = inputImageData.width;
    const h = inputImageData.height;
    const ps = Math.max(2, Math.round(this.params.pixelSize.value));
    const srcCanvas = document.createElement('canvas');
    srcCanvas.width = w;
    srcCanvas.height = h;
    const srcCtx = srcCanvas.getContext('2d');
    srcCtx.putImageData(inputImageData, 0, 0);

    const smallW = Math.max(1, Math.ceil(w / ps));
    const smallH = Math.max(1, Math.ceil(h / ps));
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = smallW;
    tmpCanvas.height = smallH;
    const tmpCtx = tmpCanvas.getContext('2d');
    tmpCtx.imageSmoothingEnabled = false;
    tmpCtx.drawImage(srcCanvas, 0, 0, smallW, smallH);

    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(tmpCanvas, 0, 0, w, h);

    if (this.params.gridShow.value) {
      ctx.strokeStyle = 'rgba(0,255,136,0.15)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x < w; x += ps) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      for (let y = 0; y < h; y += ps) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }
    }

    return ctx.getImageData(0, 0, w, h);
  }

  getParams() { return this.params; }
  setParam(name, value) {
    if (this.params[name] !== undefined) this.params[name].value = value;
  }
}

class IonizeModule {
  constructor() {
    this.name = 'Ionize';
    this.enabled = true;
    this.particles = [];
    this.initialized = false;
    this.params = {
      pixelSize: { value: 6, min: 2, max: 32, step: 1, label: '采样尺寸' },
      speed: { value: 2, min: 0.1, max: 10, step: 0.1, label: '速度' },
      spread: { value: 40, min: 5, max: 150, step: 1, label: '扩散' },
      gravity: { value: 0.5, min: 0, max: 5, step: 0.1, label: '重力' },
      fade: { value: 0.96, min: 0.8, max: 1, step: 0.005, label: '衰减' }
    };
  }

  init(bus) {
    this.particles = [];
    this.initialized = false;
  }

  _initParticles(inputImageData) {
    this.particles = [];
    const w = inputImageData.width;
    const h = inputImageData.height;
    const ps = Math.max(2, Math.round(this.params.pixelSize.value));
    const data = inputImageData.data;
    for (let y = 0; y < h; y += ps) {
      for (let x = 0; x < w; x += ps) {
        const i = (y * w + x) * 4;
        const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
        if (a < 30) continue;
        this.particles.push({
          ox: x, oy: y,
          x: x, y: y,
          vx: 0, vy: 0,
          r, g, b, a,
          life: 1
        });
      }
    }
    this.initialized = true;
  }

  render(ctx, inputImageData, time) {
    const w = inputImageData.width;
    const h = inputImageData.height;
    const ps = Math.max(2, Math.round(this.params.pixelSize.value));
    const speed = this.params.speed.value;
    const spread = this.params.spread.value;
    const gravity = this.params.gravity.value;
    const fade = this.params.fade.value;

    if (!this.initialized || this.particles.length === 0) {
      this._initParticles(inputImageData);
    }

    const t = time * 0.001;

    ctx.clearRect(0, 0, w, h);

    for (let i = 0; i < this.particles.length; i++) {
      const p = this.particles[i];
      const dx = p.ox - p.x;
      const dy = p.oy - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;

      const scatter = Math.sin(t * speed + p.ox * 0.01 + p.oy * 0.01) * spread;

      p.vx += (dx * 0.02 + Math.sin(t * speed * 2 + i * 0.1) * scatter * 0.05);
      p.vy += (dy * 0.02 + Math.cos(t * speed * 1.5 + i * 0.13) * scatter * 0.05 + gravity * 0.1);
      p.vx *= 0.92;
      p.vy *= 0.92;
      p.x += p.vx * speed * 0.3;
      p.y += p.vy * speed * 0.3;
      p.life *= fade;

      if (p.life < 0.01) {
        p.x = p.ox;
        p.y = p.oy;
        p.vx = 0;
        p.vy = 0;
        p.life = 1;
      }

      const alpha = Math.min(1, p.life * (p.a / 255));
      ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${alpha})`;
      const size = Math.max(1, ps * p.life);
      ctx.fillRect(Math.round(p.x), Math.round(p.y), Math.ceil(size), Math.ceil(size));
    }

    return ctx.getImageData(0, 0, w, h);
  }

  getParams() { return this.params; }
  setParam(name, value) {
    if (this.params[name] !== undefined) {
      this.params[name].value = value;
      if (name === 'pixelSize') this.initialized = false;
    }
  }
}

class WaveModule {
  constructor() {
    this.name = 'Wave';
    this.enabled = true;
    this.params = {
      amplitude: { value: 12, min: 1, max: 80, step: 1, label: '振幅' },
      frequency: { value: 0.05, min: 0.01, max: 0.3, step: 0.005, label: '频率' },
      speed: { value: 3, min: 0.1, max: 15, step: 0.1, label: '速度' },
      waveType: { value: 'sine', type: 'select', options: ['sine', 'triangle', 'sawtooth', 'square'], label: '波形' },
      lineWidth: { value: 2, min: 1, max: 8, step: 1, label: '线宽' },
      gap: { value: 4, min: 1, max: 20, step: 1, label: '行间距' }
    };
  }

  init(bus) {}

  _waveFunc(type, t) {
    switch(type) {
      case 'sine': return Math.sin(t);
      case 'triangle': return 2 * Math.abs(2 * (t / (2*Math.PI) - Math.floor(t / (2*Math.PI) + 0.5))) - 1;
      case 'sawtooth': return 2 * (t / (2*Math.PI) - Math.floor(t / (2*Math.PI) + 0.5));
      case 'square': return Math.sin(t) >= 0 ? 1 : -1;
      default: return Math.sin(t);
    }
  }

  render(ctx, inputImageData, time) {
    const w = inputImageData.width;
    const h = inputImageData.height;
    const amp = this.params.amplitude.value;
    const freq = this.params.frequency.value;
    const spd = this.params.speed.value;
    const wType = this.params.waveType.value;
    const lw = Math.max(1, Math.round(this.params.lineWidth.value));
    const gap = Math.max(1, Math.round(this.params.gap.value));

    const srcCanvas = document.createElement('canvas');
    srcCanvas.width = w;
    srcCanvas.height = h;
    const srcCtx = srcCanvas.getContext('2d');
    srcCtx.putImageData(inputImageData, 0, 0);

    ctx.clearRect(0, 0, w, h);

    const t = time * 0.001 * spd;

    for (let y = 0; y < h; y += gap) {
      const offset = this._waveFunc(wType, y * freq + t) * amp;
      ctx.drawImage(srcCanvas,
        0, y, w, lw,
        offset, y, w, lw
      );
    }

    return ctx.getImageData(0, 0, w, h);
  }

  getParams() { return this.params; }
  setParam(name, value) {
    if (this.params[name] !== undefined) this.params[name].value = value;
  }
}

class GlitchModule {
  constructor() {
    this.name = 'Glitch';
    this.enabled = true;
    this.lastGlitchTime = 0;
    this.slices = [];
    this.params = {
      sliceCount: { value: 6, min: 2, max: 20, step: 1, label: '切片数量' },
      shiftAmount: { value: 15, min: 1, max: 50, step: 1, label: '位移量' },
      rgbShift: { value: 5, min: 0, max: 20, step: 1, label: 'RGB偏移' },
      scanlines: { value: true, type: 'checkbox', label: '扫描线' }
    };
  }

  init(bus) {}

  _regenerateSlices(h) {
    const count = Math.round(this.params.sliceCount.value);
    this.slices = [];
    for (let i = 0; i < count; i++) {
      const y = Math.random() * h;
      const sliceH = Math.random() * (h / count) + 2;
      const shift = (Math.random() - 0.5) * 2 * this.params.shiftAmount.value;
      this.slices.push({ y, h: sliceH, shift });
    }
  }

  render(ctx, inputImageData, time) {
    const w = inputImageData.width;
    const h = inputImageData.height;
    const rgbShift = Math.round(this.params.rgbShift.value);
    const showScanlines = this.params.scanlines.value;

    if (time - this.lastGlitchTime > 80 + Math.random() * 120) {
      this._regenerateSlices(h);
      this.lastGlitchTime = time;
    }

    const srcCanvas = document.createElement('canvas');
    srcCanvas.width = w;
    srcCanvas.height = h;
    const srcCtx = srcCanvas.getContext('2d');
    srcCtx.putImageData(inputImageData, 0, 0);

    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(srcCanvas, 0, 0);

    if (rgbShift > 0) {
      const imgData = ctx.getImageData(0, 0, w, h);
      const data = imgData.data;
      const output = new Uint8ClampedArray(data.length);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const idx = (y * w + x) * 4;
          const rX = Math.min(w - 1, Math.max(0, x - rgbShift));
          const bX = Math.min(w - 1, Math.max(0, x + rgbShift));
          const rIdx = (y * w + rX) * 4;
          const bIdx = (y * w + bX) * 4;
          output[idx] = data[rIdx];
          output[idx + 1] = data[idx + 1];
          output[idx + 2] = data[bIdx + 2];
          output[idx + 3] = data[idx + 3];
        }
      }
      imgData.data.set(output);
      ctx.putImageData(imgData, 0, 0);
    }

    const glitchedCanvas = document.createElement('canvas');
    glitchedCanvas.width = w;
    glitchedCanvas.height = h;
    const glitchedCtx = glitchedCanvas.getContext('2d');
    glitchedCtx.drawImage(ctx.canvas, 0, 0);

    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(glitchedCanvas, 0, 0);

    for (const slice of this.slices) {
      const sy = Math.max(0, Math.floor(slice.y));
      const sh = Math.min(h - sy, Math.ceil(slice.h));
      if (sh <= 0) continue;
      const shift = Math.round(slice.shift);
      ctx.drawImage(glitchedCanvas, 0, sy, w, sh, shift, sy, w, sh);
    }

    if (showScanlines) {
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      for (let y = 0; y < h; y += 2) {
        ctx.fillRect(0, y, w, 1);
      }
      if (Math.random() > 0.7) {
        const lineY = Math.random() * h;
        ctx.fillStyle = 'rgba(255,255,255,0.04)';
        ctx.fillRect(0, lineY, w, 1);
      }
    }

    return ctx.getImageData(0, 0, w, h);
  }

  getParams() { return this.params; }
  setParam(name, value) {
    if (this.params[name] !== undefined) this.params[name].value = value;
  }
}

class CoreModule {
  constructor(bus, pipeline) {
    this.bus = bus;
    this.pipeline = pipeline;
    this.canvas = document.getElementById('main-canvas');
    this.ctx = this.canvas.getContext('2d');
    this.sourceImage = null;
    this.sourceImageData = null;
    this.animating = true;
    this.lastTime = 0;
    this.lastRenderTime = 0;
    this.frameCount = 0;
    this.fps = 0;
    this.fpsTimer = 0;
    this.currentStage = '-';
    this.needsRender = true;
  }

  init() {
    this.bus.on('pipeline:stage', (data) => {
      this.currentStage = data.name;
    });

    this.bus.on('image:loaded', (img) => {
      this.sourceImage = img;
      this.canvas.width = img.width;
      this.canvas.height = img.height;
      this.pipeline.resize(img.width, img.height);
      this._updateSizeStatus();
      const tmpCanvas = document.createElement('canvas');
      tmpCanvas.width = img.width;
      tmpCanvas.height = img.height;
      const tmpCtx = tmpCanvas.getContext('2d');
      tmpCtx.drawImage(img, 0, 0);
      this.sourceImageData = tmpCtx.getImageData(0, 0, img.width, img.height);
      this.pipeline.effects.forEach(e => {
        if (e.init) e.init(this.bus);
      });
      this.needsRender = true;
    });

    this.bus.on('core:toggleAnimation', () => {
      this.animating = !this.animating;
      const btn = document.getElementById('play-btn');
      if (this.animating) {
        btn.textContent = '⏸ 暂停';
        btn.classList.remove('paused');
        this.needsRender = true;
      } else {
        btn.textContent = '▶ 动画';
        btn.classList.add('paused');
      }
    });

    this.bus.on('pipeline:updated', () => {
      this.needsRender = true;
    });

    this._updateSizeStatus();
    this._loop(0);
  }

  _updateSizeStatus() {
    document.getElementById('status-size').textContent = `${this.canvas.width}×${this.canvas.height}`;
  }

  _loop(time) {
    requestAnimationFrame((t) => this._loop(t));

    this.frameCount++;
    if (time - this.fpsTimer >= 1000) {
      this.fps = this.frameCount;
      this.frameCount = 0;
      this.fpsTimer = time;
      document.getElementById('status-fps').textContent = this.fps;
    }

    if (!this.sourceImageData) return;

    if (!this.animating && !this.needsRender) {
      document.getElementById('status-dot').className = 'status-dot idle';
      document.getElementById('status-state').textContent = '已暂停';
      return;
    }

    this.needsRender = false;
    this.currentStage = '-';
    document.getElementById('status-dot').className = 'status-dot';
    document.getElementById('status-state').textContent = '渲染中';

    this.lastRenderTime = this.animating ? time : this.lastRenderTime;

    let result;
    if (this.pipeline.effects.length > 0) {
      result = this.pipeline.process(this.sourceImageData, this.lastRenderTime);
    } else {
      result = this.sourceImageData;
    }

    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    this.ctx.putImageData(result, 0, 0);

    document.getElementById('status-stage').textContent = this.currentStage;
  }
}

class PipelineUIModule {
  constructor(bus, pipeline) {
    this.bus = bus;
    this.pipeline = pipeline;
    this.selectedIndex = -1;
    this.effectClasses = {
      'Pixelate': () => new PixelateModule(),
      'Ionize': () => new IonizeModule(),
      'Wave': () => new WaveModule(),
      'Glitch': () => new GlitchModule()
    };
    this.effectColors = {
      'Pixelate': '#00ff88',
      'Ionize': '#ff3366',
      'Wave': '#44ddff',
      'Glitch': '#ffaa00'
    };
    this.flowCanvases = [];
    this.dragFromIndex = -1;
  }

  init() {
    this.bus.on('pipeline:updated', () => this.render());

    document.getElementById('add-effect-btn')?.addEventListener('click', (e) => {
      this._showAddMenu(e);
    });

    this.bus.on('pipeline:stage', (data) => {
      this._updateFlowThumb(data.index, data.imageData);
    });

    this.render();
  }

  _showAddMenu(e) {
    const menu = document.getElementById('add-effect-menu');
    menu.innerHTML = '';
    const existing = this.pipeline.effects.map(e => e.name);
    const available = Object.keys(this.effectClasses).filter(n => true);

    for (const name of available) {
      const item = document.createElement('div');
      item.className = 'menu-item';
      const dot = document.createElement('span');
      dot.className = 'mi-dot';
      dot.style.background = this.effectColors[name] || '#888';
      item.appendChild(dot);
      item.appendChild(document.createTextNode(name));
      item.addEventListener('click', () => {
        const effect = this.effectClasses[name]();
        this.pipeline.add(effect);
        menu.style.display = 'none';
      });
      menu.appendChild(item);
    }

    const rect = e.target.getBoundingClientRect();
    menu.style.left = rect.left + 'px';
    menu.style.top = (rect.bottom + 4) + 'px';
    menu.style.display = 'block';

    setTimeout(() => {
      const close = (ev) => {
        if (!menu.contains(ev.target)) {
          menu.style.display = 'none';
          document.removeEventListener('click', close);
        }
      };
      document.addEventListener('click', close);
    }, 10);
  }

  render() {
    const container = document.getElementById('pipeline-nodes');
    container.innerHTML = '';

    const chain = this.pipeline.getChainInfo();
    document.getElementById('status-pipeline').textContent =
      chain.length > 0 ? chain.map(c => c.name).join(' → ') : '空';

    chain.forEach((info, i) => {
      const nodeWrap = document.createElement('div');
      nodeWrap.className = 'pipe-node';

      const box = document.createElement('div');
      box.className = 'node-box' + (info.enabled ? '' : ' inactive') + (i === this.selectedIndex ? ' active' : '');
      box.draggable = true;

      const indicator = document.createElement('div');
      indicator.className = 'node-indicator' + (info.enabled ? '' : ' off');
      if (info.enabled) {
        indicator.style.background = this.effectColors[info.name] || '#00ff88';
        indicator.style.boxShadow = `0 0 6px ${this.effectColors[info.name] || '#00ff88'}`;
      }

      const name = document.createElement('span');
      name.className = 'node-name';
      name.textContent = info.name;

      const actions = document.createElement('div');
      actions.className = 'node-actions';

      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'node-btn toggle';
      toggleBtn.textContent = info.enabled ? '●' : '○';
      toggleBtn.title = '切换启用';
      toggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        this.pipeline.toggle(i);
      });

      const upBtn = document.createElement('button');
      upBtn.className = 'node-btn';
      upBtn.textContent = '↑';
      upBtn.title = '上移';
      upBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (i > 0) {
          this.pipeline.move(i, i - 1);
          if (this.selectedIndex === i) this.selectedIndex = i - 1;
          else if (this.selectedIndex === i - 1) this.selectedIndex = i;
        }
      });

      const downBtn = document.createElement('button');
      downBtn.className = 'node-btn';
      downBtn.textContent = '↓';
      downBtn.title = '下移';
      downBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (i < chain.length - 1) {
          this.pipeline.move(i, i + 1);
          if (this.selectedIndex === i) this.selectedIndex = i + 1;
          else if (this.selectedIndex === i + 1) this.selectedIndex = i;
        }
      });

      const removeBtn = document.createElement('button');
      removeBtn.className = 'node-btn remove';
      removeBtn.textContent = '✕';
      removeBtn.title = '移除';
      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        this.pipeline.remove(i);
        if (this.selectedIndex >= this.pipeline.effects.length) {
          this.selectedIndex = this.pipeline.effects.length - 1;
        }
        this._renderParams();
      });

      actions.appendChild(toggleBtn);
      actions.appendChild(upBtn);
      actions.appendChild(downBtn);
      actions.appendChild(removeBtn);

      box.appendChild(indicator);
      box.appendChild(name);
      box.appendChild(actions);

      box.addEventListener('click', () => {
        this.selectedIndex = i;
        this.render();
        this._renderParams();
      });

      box.addEventListener('dragstart', (e) => {
        this.dragFromIndex = i;
        e.dataTransfer.effectAllowed = 'move';
        box.style.opacity = '0.5';
      });

      box.addEventListener('dragend', () => {
        box.style.opacity = '1';
        this.dragFromIndex = -1;
      });

      box.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        box.style.borderColor = 'var(--pipe)';
      });

      box.addEventListener('dragleave', () => {
        box.style.borderColor = '';
      });

      box.addEventListener('drop', (e) => {
        e.preventDefault();
        box.style.borderColor = '';
        if (this.dragFromIndex >= 0 && this.dragFromIndex !== i) {
          const from = this.dragFromIndex;
          this.pipeline.move(from, i);
          if (this.selectedIndex === from) this.selectedIndex = i;
        }
        this.dragFromIndex = -1;
      });

      nodeWrap.appendChild(box);

      if (i < chain.length - 1) {
        const arrow = document.createElement('div');
        arrow.className = 'pipe-arrow';
        const line = document.createElement('div');
        line.className = 'pipe-arrow-line animated';
        const head = document.createElement('div');
        head.className = 'pipe-arrow-head';
        arrow.appendChild(line);
        arrow.appendChild(head);
        nodeWrap.appendChild(arrow);
      }

      container.appendChild(nodeWrap);
    });

    const addBtn = document.createElement('button');
    addBtn.id = 'add-effect-btn';
    addBtn.textContent = '+ 添加特效';
    addBtn.addEventListener('click', (e) => this._showAddMenu(e));
    container.appendChild(addBtn);

    this._renderFlowStages();
    if (this.selectedIndex >= 0 && this.selectedIndex < this.pipeline.effects.length) {
      this._renderParams();
    }
  }

  _renderParams() {
    const container = document.getElementById('effect-params');
    container.innerHTML = '';

    if (this.selectedIndex < 0 || this.selectedIndex >= this.pipeline.effects.length) {
      container.innerHTML = '<div class="no-effect-msg">点击管道中的特效节点<br/>查看参数设置</div>';
      return;
    }

    const effect = this.pipeline.effects[this.selectedIndex];
    const params = effect.getParams();

    const titleDiv = document.createElement('div');
    titleDiv.className = 'panel-title';
    titleDiv.style.color = this.effectColors[effect.name] || 'var(--accent3)';
    titleDiv.textContent = effect.name + ' 参数';
    container.appendChild(titleDiv);

    for (const [key, param] of Object.entries(params)) {
      const group = document.createElement('div');
      group.className = 'param-group';

      if (param.type === 'checkbox') {
        const label = document.createElement('label');
        label.className = 'param-checkbox';
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.checked = param.value;
        input.addEventListener('change', () => {
          effect.setParam(key, input.checked);
        });
        label.appendChild(input);
        const text = document.createElement('span');
        text.textContent = param.label;
        text.style.fontSize = '10px';
        text.style.color = 'var(--text2)';
        label.appendChild(text);
        group.appendChild(label);
      } else if (param.type === 'select') {
        const labelDiv = document.createElement('div');
        labelDiv.className = 'param-label';
        labelDiv.innerHTML = `<span>${param.label}</span>`;
        group.appendChild(labelDiv);
        const select = document.createElement('select');
        select.className = 'param-select';
        for (const opt of param.options) {
          const option = document.createElement('option');
          option.value = opt;
          option.textContent = opt;
          if (opt === param.value) option.selected = true;
          select.appendChild(option);
        }
        select.addEventListener('change', () => {
          effect.setParam(key, select.value);
        });
        group.appendChild(select);
      } else {
        const labelDiv = document.createElement('div');
        labelDiv.className = 'param-label';
        const nameSpan = document.createElement('span');
        nameSpan.textContent = param.label;
        const valueSpan = document.createElement('span');
        valueSpan.className = 'param-value';
        valueSpan.textContent = param.value;
        labelDiv.appendChild(nameSpan);
        labelDiv.appendChild(valueSpan);
        group.appendChild(labelDiv);

        const slider = document.createElement('input');
        slider.type = 'range';
        slider.className = 'param-slider';
        slider.min = param.min;
        slider.max = param.max;
        slider.step = param.step;
        slider.value = param.value;
        slider.addEventListener('input', () => {
          const v = parseFloat(slider.value);
          effect.setParam(key, v);
          valueSpan.textContent = Number.isInteger(v) ? v : v.toFixed(param.step < 1 ? 2 : 1);
        });
        group.appendChild(slider);
      }

      container.appendChild(group);
    }
  }

  _renderFlowStages() {
    const container = document.getElementById('data-flow-stages');
    container.innerHTML = '';
    this.flowCanvases = [];

    const srcStage = document.createElement('div');
    srcStage.className = 'flow-stage';
    const srcThumb = document.createElement('div');
    srcThumb.className = 'flow-thumb';
    const srcCanvas = document.createElement('canvas');
    srcCanvas.width = 48;
    srcCanvas.height = 48;
    srcThumb.appendChild(srcCanvas);
    const srcLabel = document.createElement('div');
    srcLabel.className = 'flow-label';
    srcLabel.textContent = 'SRC';
    srcStage.appendChild(srcThumb);
    srcStage.appendChild(srcLabel);
    container.appendChild(srcStage);
    this.flowCanvases.push({ canvas: srcCanvas, name: 'SRC' });

    const effects = this.pipeline.effects;
    for (let i = 0; i < effects.length; i++) {
      const arrow = document.createElement('div');
      arrow.className = 'flow-arrow';
      arrow.textContent = '→';
      container.appendChild(arrow);

      const stage = document.createElement('div');
      stage.className = 'flow-stage';
      const thumb = document.createElement('div');
      thumb.className = 'flow-thumb';
      const fc = document.createElement('canvas');
      fc.width = 48;
      fc.height = 48;
      thumb.appendChild(fc);
      const label = document.createElement('div');
      label.className = 'flow-label';
      label.textContent = effects[i].name.substring(0, 5);
      label.style.color = effects[i].enabled ? (this.effectColors[effects[i].name] || 'var(--text2)') : 'var(--text2)';
      stage.appendChild(thumb);
      stage.appendChild(label);
      container.appendChild(stage);
      this.flowCanvases.push({ canvas: fc, name: effects[i].name });
    }
  }

  _updateFlowThumb(index, imageData) {
    const flowIndex = index + 1;
    if (flowIndex >= this.flowCanvases.length) return;
    const fc = this.flowCanvases[flowIndex];
    if (!fc) return;
    const ctx = fc.canvas.getContext('2d');
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = imageData.width;
    tmpCanvas.height = imageData.height;
    tmpCanvas.getContext('2d').putImageData(imageData, 0, 0);
    ctx.clearRect(0, 0, 48, 48);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(tmpCanvas, 0, 0, 48, 48);
  }

  updateSourceThumb(imageData) {
    if (this.flowCanvases.length === 0) return;
    const ctx = this.flowCanvases[0].canvas.getContext('2d');
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = imageData.width;
    tmpCanvas.height = imageData.height;
    tmpCanvas.getContext('2d').putImageData(imageData, 0, 0);
    ctx.clearRect(0, 0, 48, 48);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(tmpCanvas, 0, 0, 48, 48);
  }
}

class UIModule {
  constructor(bus, core) {
    this.bus = bus;
    this.core = core;
  }

  init() {
    document.getElementById('play-btn').addEventListener('click', () => {
      this.bus.emit('core:toggleAnimation');
    });

    document.getElementById('load-image-btn').addEventListener('click', () => {
      const url = document.getElementById('image-url-input').value.trim();
      if (url) this._loadImage(url);
    });

    document.getElementById('image-url-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const url = e.target.value.trim();
        if (url) this._loadImage(url);
      }
    });
  }

  _loadImage(url) {
    document.getElementById('load-image-btn').textContent = '加载中...';
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const maxDim = 512;
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        const scale = maxDim / Math.max(w, h);
        w = Math.round(w * scale);
        h = Math.round(h * scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const resizedImg = new Image();
      resizedImg.onload = () => {
        this.bus.emit('image:loaded', resizedImg);
        document.getElementById('load-image-btn').textContent = '加载图像';
      };
      resizedImg.src = canvas.toDataURL();
    };
    img.onerror = () => {
      document.getElementById('load-image-btn').textContent = '加载失败';
      const c = document.createElement('canvas');
      c.width = 512; c.height = 512;
      const cx = c.getContext('2d');
      const grad = cx.createLinearGradient(0, 0, 512, 512);
      grad.addColorStop(0, '#1a0030');
      grad.addColorStop(0.5, '#002040');
      grad.addColorStop(1, '#003020');
      cx.fillStyle = grad;
      cx.fillRect(0, 0, 512, 512);
      for (let i = 0; i < 200; i++) {
        const x = Math.random() * 512;
        const y = Math.random() * 512;
        const s = Math.random() * 8 + 2;
        cx.fillStyle = `hsl(${Math.random()*360}, 80%, 60%)`;
        cx.fillRect(Math.floor(x/4)*4, Math.floor(y/4)*4, s, s);
      }
      cx.fillStyle = '#00ff88';
      cx.font = '16px "Press Start 2P"';
      cx.textAlign = 'center';
      cx.fillText('SAMPLE', 256, 240);
      cx.fillText('IMAGE', 256, 270);
      const fallback = new Image();
      fallback.onload = () => {
        this.bus.emit('image:loaded', fallback);
        document.getElementById('load-image-btn').textContent = '加载图像';
      };
      fallback.src = c.toDataURL();
    };
    img.src = url;
  }
}

const pipeline = new Pipeline(EventBus);
const core = new CoreModule(EventBus, pipeline);
const pipelineUI = new PipelineUIModule(EventBus, pipeline);
const ui = new UIModule(EventBus, core);

EventBus.on('image:loaded', (img) => {
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = img.width;
  tmpCanvas.height = img.height;
  tmpCanvas.getContext('2d').drawImage(img, 0, 0);
  const imgData = tmpCanvas.getContext('2d').getImageData(0, 0, img.width, img.height);
  pipelineUI.updateSourceThumb(imgData);
});

core.init();
pipelineUI.init();
ui.init();

pipeline.add(new PixelateModule());
pipeline.add(new WaveModule());

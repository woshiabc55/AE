<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL FORGE v1 — 模块化像素动画引擎</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #0f0f1a;
  --bg3: #141425;
  --accent: #00ff88;
  --accent2: #ff3366;
  --accent3: #44ddff;
  --text: #c0c0d0;
  --text-dim: #606080;
  --border: #1a1a30;
  --sidebar-w: 280px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
  z-index: 9998;
}

.app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  z-index: 10;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: var(--bg2); }
.sidebar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

.panel {
  border-bottom: 1px solid var(--border);
  padding: 12px;
}

.panel-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  text-shadow: 0 0 8px var(--accent);
}

.logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  color: var(--accent);
  text-align: center;
  padding: 16px 12px;
  border-bottom: 1px solid var(--border);
  text-shadow: 0 0 12px var(--accent), 0 0 24px rgba(0,255,136,0.3);
  line-height: 1.8;
}

.logo .v { font-size: 8px; color: var(--accent3); text-shadow: 0 0 8px var(--accent3); }

.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 4px;
  padding: 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 11px;
  color: var(--text-dim);
}

.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,255,136,0.03);
}

.upload-zone .icon { font-size: 20px; margin-bottom: 6px; display: block; }

.tabs {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.tab-btn {
  flex: 1;
  min-width: 0;
  padding: 6px 4px;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  background: var(--bg);
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  white-space: nowrap;
}

.tab-btn:hover { color: var(--text); border-color: var(--text-dim); }

.tab-btn.active {
  color: var(--accent);
  border-color: var(--accent);
  background: rgba(0,255,136,0.08);
  box-shadow: 0 0 8px rgba(0,255,136,0.2), inset 0 0 8px rgba(0,255,136,0.05);
}

.param-group { margin-top: 8px; }

.param-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
  gap: 6px;
}

.param-label {
  font-size: 10px;
  color: var(--text-dim);
  min-width: 70px;
  white-space: nowrap;
}

.param-value {
  font-size: 10px;
  color: var(--accent3);
  min-width: 32px;
  text-align: right;
  font-family: 'Share Tech Mono', monospace;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 4px;
  background: var(--bg);
  border-radius: 2px;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 12px;
  height: 12px;
  background: var(--accent);
  border-radius: 2px;
  cursor: pointer;
  box-shadow: 0 0 6px var(--accent);
}

input[type="range"]::-moz-range-thumb {
  width: 12px;
  height: 12px;
  background: var(--accent);
  border-radius: 2px;
  cursor: pointer;
  border: none;
  box-shadow: 0 0 6px var(--accent);
}

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.toggle-label {
  font-size: 10px;
  color: var(--text-dim);
}

.toggle {
  width: 36px;
  height: 18px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 9px;
  cursor: pointer;
  position: relative;
  transition: all 0.3s;
}

.toggle.on {
  background: rgba(0,255,136,0.2);
  border-color: var(--accent);
}

.toggle::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 12px;
  height: 12px;
  background: var(--text-dim);
  border-radius: 6px;
  transition: all 0.3s;
}

.toggle.on::after {
  left: 20px;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}

.btn-row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}

.btn {
  flex: 1;
  padding: 8px;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  background: var(--bg);
  color: var(--text);
}

.btn:hover { border-color: var(--text-dim); }

.btn-play {
  color: var(--accent);
  border-color: var(--accent);
}

.btn-play:hover {
  background: rgba(0,255,136,0.1);
  box-shadow: 0 0 10px rgba(0,255,136,0.2);
}

.btn-play.playing {
  color: var(--accent2);
  border-color: var(--accent2);
}

.btn-play.playing:hover {
  background: rgba(255,51,102,0.1);
  box-shadow: 0 0 10px rgba(255,51,102,0.2);
}

.btn-reset {
  color: var(--accent2);
  border-color: rgba(255,51,102,0.4);
}

.btn-reset:hover {
  border-color: var(--accent2);
  background: rgba(255,51,102,0.08);
}

.btn-export {
  color: var(--accent3);
  border-color: rgba(68,221,255,0.4);
}

.btn-export:hover {
  border-color: var(--accent3);
  background: rgba(68,221,255,0.08);
  box-shadow: 0 0 10px rgba(68,221,255,0.2);
}

.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.canvas-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 50%, rgba(0,255,136,0.02) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.005) 3px, rgba(255,255,255,0.005) 4px),
    var(--bg);
}

.canvas-wrap canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  border: 1px solid var(--border);
  box-shadow: 0 0 30px rgba(0,255,136,0.05), 0 0 60px rgba(0,0,0,0.5);
  max-width: 90%;
  max-height: 90%;
}

.status-bar {
  height: 28px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 20px;
  font-size: 10px;
  z-index: 10;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 4px var(--accent);
}

.status-dot.idle { background: var(--text-dim); box-shadow: none; }

.status-label { color: var(--text-dim); }
.status-val { color: var(--accent3); font-family: 'Share Tech Mono', monospace; }

.log-panel {
  height: 140px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 10;
}

.log-header {
  padding: 4px 12px;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: var(--accent2);
  text-shadow: 0 0 6px var(--accent2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.log-clear {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  cursor: pointer;
  background: none;
  border: none;
}

.log-clear:hover { color: var(--accent2); }

.log-body {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
  font-size: 10px;
}

.log-body::-webkit-scrollbar { width: 3px; }
.log-body::-webkit-scrollbar-track { background: var(--bg2); }
.log-body::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 2px; }

.log-entry {
  padding: 2px 12px;
  display: flex;
  gap: 8px;
  align-items: baseline;
  border-bottom: 1px solid rgba(255,255,255,0.02);
}

.log-entry:hover { background: rgba(255,255,255,0.02); }

.log-time { color: var(--text-dim); min-width: 70px; font-size: 9px; }
.log-event { color: var(--accent3); min-width: 130px; font-size: 9px; }
.log-data { color: var(--text-dim); font-size: 9px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.no-image-msg {
  color: var(--text-dim);
  font-size: 12px;
  text-align: center;
  font-family: 'Press Start 2P', monospace;
  line-height: 2;
}

.effect-params { display: none; }
.effect-params.active { display: block; }

select {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 4px 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  outline: none;
}

select:focus { border-color: var(--accent); }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.blink { animation: blink 1s infinite; }

.loading-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(10,10,15,0.8);
  z-index: 50;
}

.loading-text {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--accent);
  text-shadow: 0 0 10px var(--accent);
  animation: blink 0.8s infinite;
}
</style>

<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo">
      PIXEL FORGE<br><span class="v">v1.0 — CORE</span>
    </div>

    <div class="panel">
      <div class="panel-title">▸ 图像源</div>
      <div class="upload-zone" id="uploadZone">
        <span class="icon">⬆</span>
        拖放图片或点击上传

          <span class="param-label">频率</span>
          <input type="range" data-module="wave" data-param="frequency" min="0.005" max="0.1" value="0.03" step="0.001">
          <span class="param-value">0.03</span>
        </div>
        <div class="param-row">
          <span class="param-label">速度</span>
          <input type="range" data-module="wave" data-param="speed" min="0.5" max="8" value="3" step="0.5">

        <div class="param-row">
          <span class="param-label">波形</span>

        <div class="param-row">

          <input type="range" data-module="wave" data-param="lineWidth" min="1" max="6" value="2" step="1">
          <span class="param-value">2</span>
        </div>
        <div class="param-row">
          <span class="param-label">间距</span>
          <input type="range" data-module="wave" data-param="gap" min="1" max="8" value="3" step="1">
          <span class="param-value">3</span>
        </div>

    <div class="panel">
      <div class="panel-title">▸ 控制</div>
      <div class="btn-row">
        <button class="btn btn-play" id="btnPlay">▶ 播放</button>
        <button class="btn btn-reset" id="btnReset">↺ 重置</button>

      <div class="btn-row">
        <button class="btn btn-export" id="btnExport">⬇ 导出帧</button>

  <div class="main-area">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="mainCanvas" width="512" height="512"></canvas>

      </div>

        <div class="status-dot idle" id="statusDot"></div>
        <span class="status-label">状态</span>

        <span class="status-label">FPS</span>
        <span class="status-val" id="fpsVal">0</span>
      </div>

        <span class="status-label">效果</span>

      </div>

      </div>

        <span>◈ 通信日志 — EVENTBUS</span>

    </div>

<script>
// ═══════════════════════════════════════════
// EventBus — 中央发布/订阅通信枢纽
// ═══════════════════════════════════════════
class EventBus {
  constructor() {
    this._listeners = {};
    this._log = [];
    this._maxLog = 20;
    this._logEnabled = true;
    this._logCallback = null;
  }

  on(event, callback) {
    if (!this._listeners[event]) this._listeners[event] = [];
    this._listeners[event].push(callback);
    return () => this.off(event, callback);
  }

  off(event, callback) {
    if (!this._listeners[event]) return;
    this._listeners[event] = this._listeners[event].filter(cb => cb !== callback);
  }

  emit(event, data) {
    this._addLog(event, data);
    if (!this._listeners[event]) return;
    const cbs = [...this._listeners[event]];
    cbs.forEach(cb => {
      try { cb(data); } catch (e) { console.error(`[EventBus] Error in ${event}:`, e); }
    });
  }

  once(event, callback) {
    const wrapper = (data) => {
      this.off(event, wrapper);
      callback(data);
    };
    this.on(event, wrapper);
  }

  _addLog(event, data) {
    if (!this._logEnabled) return;
    const entry = {
      time: new Date(),
      event,
      data: this._summarizeData(data)
    };
    this._log.push(entry);
    if (this._log.length > this._maxLog) this._log.shift();
    if (this._logCallback) this._logCallback(entry);
  }

  _summarizeData(data) {
    if (data === undefined || data === null) return '—';
    if (typeof data === 'object') {
      try {
        const s = JSON.stringify(data);
        return s.length > 60 ? s.substring(0, 57) + '...' : s;
      } catch { return String(data); }
    }
    return String(data);
  }

  getLog() { return [...this._log]; }
  clearLog() { this._log = []; }
  setLogCallback(cb) { this._logCallback = cb; }
}

const bus = new EventBus();

// ═══════════════════════════════════════════
// CoreModule — 画布管理、图像加载、动画循环
// ═══════════════════════════════════════════
const CoreModule = {
  canvas: null,
  ctx: null,
  sourceImage: null,
  sourceData: null,
  animating: false,
  startTime: 0,
  frameCount: 0,
  _rafId: null,
  _lastFpsTime: 0,
  _fpsFrames: 0,
  _currentFps: 0,

  init() {
    this.canvas = document.getElementById('mainCanvas');
    this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
    this._setupDragDrop();
    this._setupFileInput();
    this._bindEvents();
    bus.emit('module:ready', { module: 'core' });
  },

  _setupDragDrop() {
    const wrap = document.getElementById('canvasWrap');
    const zone = document.getElementById('uploadZone');
    wrap.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    wrap.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    wrap.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) this._loadFile(file);
    });
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) this._loadFile(file);
    });
  },

  _setupFileInput() {
    const zone = document.getElementById('uploadZone');
    const input = document.getElementById('fileInput');
    zone.addEventListener('click', () => input.click());
    input.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) this._loadFile(file);
      input.value = '';
    });
  },

  _loadFile(file) {
    const reader = new FileReader();
    reader.onload = e => this.loadImageFromSrc(e.target.result);
    reader.readAsDataURL(file);
  },

  loadImageFromSrc(src) {
    const overlay = document.getElementById('loadingOverlay');
    overlay.style.display = 'flex';
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const maxDim = 512;
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        const scale = maxDim / Math.max(w, h);
        w = Math.round(w * scale);
        h = Math.round(h * scale);
      }
      this.canvas.width = w;
      this.canvas.height = h;
      this.ctx.drawImage(img, 0, 0, w, h);
      this.sourceImage = img;
      this.sourceData = this.ctx.getImageData(0, 0, w, h);
      overlay.style.display = 'none';
      bus.emit('image:loaded', { width: w, height: h });
    };
    img.onerror = () => {
      overlay.style.display = 'none';
      this._drawPlaceholder();
    };
    img.src = src;
  },

  _drawPlaceholder() {
    this.ctx.fillStyle = '#0a0a0f';
    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
    this.ctx.fillStyle = '#303050';
    this.ctx.font = '12px "Press Start 2P"';
    this.ctx.textAlign = 'center';
    this.ctx.fillText('NO IMAGE', this.canvas.width / 2, this.canvas.height / 2);
  },

  getSourceData() {
    return this.sourceData;
  },

  _bindEvents() {
    bus.on('animation:start', () => this.startAnimation());
    bus.on('animation:stop', () => this.stopAnimation());
  },

  startAnimation() {
    if (this.animating) return;
    if (!this.sourceData) return;
    this.animating = true;
    this.startTime = performance.now();
    this.frameCount = 0;
    this._lastFpsTime = this.startTime;
    this._fpsFrames = 0;
    this._loop();
    document.getElementById('statusDot').classList.remove('idle');
    document.getElementById('statusText').textContent = '运行中';
  },

  stopAnimation() {
    this.animating = false;
    if (this._rafId) {
      cancelAnimationFrame(this._rafId);
      this._rafId = null;
    }
    document.getElementById('statusDot').classList.add('idle');
    document.getElementById('statusText').textContent = '空闲';
    if (this.sourceImage) {
      this.ctx.drawImage(this.sourceImage, 0, 0, this.canvas.width, this.canvas.height);
    }
    IonizeModule.reset();
  },

  _loop() {
    if (!this.animating) return;
    const now = performance.now();
    const elapsed = (now - this.startTime) / 1000;

    this._fpsFrames++;
    if (now - this._lastFpsTime >= 1000) {
      this._currentFps = this._fpsFrames;
      this._fpsFrames = 0;
      this._lastFpsTime = now;
      document.getElementById('fpsVal').textContent = this._currentFps;
    }

    this.frameCount++;
    document.getElementById('frameVal').textContent = this.frameCount;

    bus.emit('animation:frame', { elapsed, frame: this.frameCount });

    this._rafId = requestAnimationFrame(() => this._loop());
  },

  loadSampleImage() {
    const url = 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=pixel%20art%20portrait%20of%20a%20cyberpunk%20warrior%20neon%20colors%20detailed%20retro%20game%20character&image_size=square';
    this.loadImageFromSrc(url);
  }
};

// ═══════════════════════════════════════════
// PixelateModule — 像素化效果
// ═══════════════════════════════════════════
const PixelateModule = {
  params: { pixelSize: 8, gridShow: false },

  init() {
    bus.on('animation:frame', data => this._onFrame(data));
    bus.on('param:changed', data => this._onParamChanged(data));
    bus.emit('module:ready', { module: 'pixelate' });
  },

  _onParamChanged(data) {
    if (data.module !== 'pixelate') return;
    this.params[data.param] = data.value;
  },

  _onFrame(data) {
    const currentEffect = UIModule.getCurrentEffect();
    if (currentEffect !== 'pixelate') return;
    this.render(CoreModule.ctx, CoreModule.getSourceData(), data.elapsed);
    bus.emit('effect:rendered', { effect: 'pixelate', frame: data.frame });
  },

  render(ctx, sourceData, time) {
    if (!sourceData) return;
    const w = CoreModule.canvas.width;
    const h = CoreModule.canvas.height;
    const ps = Math.max(2, this.params.pixelSize);
    const data = sourceData.data;

    ctx.clearRect(0, 0, w, h);

    for (let y = 0; y < h; y += ps) {
      for (let x = 0; x < w; x += ps) {
        let r = 0, g = 0, b = 0, count = 0;
        for (let dy = 0; dy < ps && y + dy < h; dy++) {
          for (let dx = 0; dx < ps && x + dx < w; dx++) {
            const idx = ((y + dy) * w + (x + dx)) * 4;
            r += data[idx];
            g += data[idx + 1];
            b += data[idx + 2];
            count++;
          }
        }
        r = Math.round(r / count);
        g = Math.round(g / count);
        b = Math.round(b / count);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(x, y, ps, ps);
      }
    }

    if (this.params.gridShow) {
      ctx.strokeStyle = 'rgba(0,255,136,0.15)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      for (let x = 0; x < w; x += ps) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
      }
      for (let y = 0; y < h; y += ps) {
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
      }
      ctx.stroke();
    }
  }
};

// ═══════════════════════════════════════════
// IonizeModule — 离子化/溶解效果
// ═══════════════════════════════════════════
const IonizeModule = {
  params: { pixelSize: 4, speed: 2, spread: 2, gravity: 0.5, fade: true },
  particles: [],
  _initialized: false,

  init() {
    bus.on('animation:frame', data => this._onFrame(data));
    bus.on('param:changed', data => this._onParamChanged(data));
    bus.on('animation:start', () => this._initParticles());
    bus.on('animation:stop', () => this.reset());
    bus.emit('module:ready', { module: 'ionize' });
  },

  _onParamChanged(data) {
    if (data.module !== 'ionize') return;
    this.params[data.param] = data.value;
  },

  reset() {
    this.particles = [];
    this._initialized = false;
  },

  _initParticles() {
    const sourceData = CoreModule.getSourceData();
    if (!sourceData) return;
    const w = CoreModule.canvas.width;
    const h = CoreModule.canvas.height;
    const ps = Math.max(2, this.params.pixelSize);
    const data = sourceData.data;

    this.particles = [];
    for (let y = 0; y < h; y += ps) {
      for (let x = 0; x < w; x += ps) {
        let r = 0, g = 0, b = 0, a = 0, count = 0;
        for (let dy = 0; dy < ps && y + dy < h; dy++) {
          for (let dx = 0; dx < ps && x + dx < w; dx++) {
            const idx = ((y + dy) * w + (x + dx)) * 4;
            r += data[idx];
            g += data[idx + 1];
            b += data[idx + 2];
            a += data[idx + 3];
            count++;
          }
        }
        count = Math.max(1, count);
        const angle = Math.random() * Math.PI * 2;
        const spd = (0.5 + Math.random() * 1.5) * this.params.spread;
        this.particles.push({
          ox: x, oy: y,
          x: x, y: y,
          size: ps,
          r: Math.round(r / count),
          g: Math.round(g / count),
          b: Math.round(b / count),
          a: Math.round(a / count) / 255,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd - Math.random() * 2,
          life: 1,
          decay: 0.002 + Math.random() * 0.005
        });
      }
    }
    this._initialized = true;
  },

  _onFrame(data) {
    const currentEffect = UIModule.getCurrentEffect();
    if (currentEffect !== 'ionize') return;
    if (!this._initialized) this._initParticles();
    this.render(CoreModule.ctx, CoreModule.getSourceData(), data.elapsed);
    bus.emit('effect:rendered', { effect: 'ionize', frame: data.frame });
  },

  render(ctx, sourceData, time) {
    if (!this.particles.length) return;
    const w = CoreModule.canvas.width;
    const h = CoreModule.canvas.height;
    const spd = this.params.speed;
    const grav = this.params.gravity;
    const doFade = this.params.fade;

    ctx.clearRect(0, 0, w, h);

    for (let i = 0; i < this.particles.length; i++) {
      const p = this.particles[i];
      p.x += p.vx * spd;
      p.vy += grav * 0.1;
      p.y += p.vy * spd;
      p.life -= p.decay * spd;
      if (p.life <= 0) p.life = 0;

      const alpha = doFade ? p.a * p.life : p.a;
      if (alpha < 0.01) continue;

      ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${alpha.toFixed(3)})`;
      ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
    }
  }
};

// ═══════════════════════════════════════════
// WaveModule — 波浪线效果（基于线条，非粒子）
// ═══════════════════════════════════════════
const WaveModule = {
  params: { amplitude: 20, frequency: 0.03, speed: 3, waveType: 'sine', lineWidth: 2, gap: 3 },

  init() {
    bus.on('animation:frame', data => this._onFrame(data));
    bus.on('param:changed', data => this._onParamChanged(data));
    bus.emit('module:ready', { module: 'wave' });
  },

  _onParamChanged(data) {
    if (data.module !== 'wave') return;
    this.params[data.param] = data.value;
  },

  _onFrame(data) {
    const currentEffect = UIModule.getCurrentEffect();
    if (currentEffect !== 'wave') return;
    this.render(CoreModule.ctx, CoreModule.getSourceData(), data.elapsed);
    bus.emit('effect:rendered', { effect: 'wave', frame: data.frame });
  },

  _waveFunc(x, time) {
    const { amplitude, frequency, speed, waveType } = this.params;
    const t = x * frequency + time * speed;
    switch (waveType) {
      case 'sine':
        return amplitude * Math.sin(t);
      case 'triangle':
        return amplitude * (2 / Math.PI) * Math.asin(Math.sin(t));
      case 'sawtooth':
        return amplitude * (2 * (t / (2 * Math.PI) - Math.floor(t / (2 * Math.PI) + 0.5)));
      default:
        return amplitude * Math.sin(t);
    }
  },

  render(ctx, sourceData, time) {
    if (!sourceData) return;
    const w = CoreModule.canvas.width;
    const h = CoreModule.canvas.height;
    const data = sourceData.data;
    const { lineWidth, gap } = this.params;

    ctx.clearRect(0, 0, w, h);
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round';

    const step = lineWidth + gap;

    for (let y = 0; y < h; y += step) {
      let prevX = 0;
      let prevY = y + this._waveFunc(0, time);
      for (let x = 1; x < w; x++) {
        const dy = this._waveFunc(x, time);
        const drawY = y + dy;
        const srcY = Math.min(Math.max(Math.round(y), 0), h - 1);
        const srcX = Math.min(Math.max(Math.round(x), 0), w - 1);
        const idx = (srcY * w + srcX) * 4;
        const r = data[idx];
        const g = data[idx + 1];
        const b = data[idx + 2];
        ctx.strokeStyle = `rgb(${r},${g},${b})`;
        ctx.beginPath();
        ctx.moveTo(prevX, prevY);
        ctx.lineTo(x, drawY);
        ctx.stroke();
        prevX = x;
        prevY = drawY;
      }
    }
  }
};

// ═══════════════════════════════════════════
// UIModule — DOM交互管理
// ═══════════════════════════════════════════
const UIModule = {
  _currentEffect: 'pixelate',
  _effectNames: { pixelate: '像素化', ionize: '离子化', wave: '波浪' },

  init() {
    this._setupTabs();
    this._setupSliders();
    this._setupToggles();
    this._setupSelects();
    this._setupButtons();
    this._setupLog();
    bus.emit('module:ready', { module: 'ui' });
  },

  getCurrentEffect() { return this._currentEffect; },

  _setupTabs() {
    const tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        this._currentEffect = btn.dataset.effect;

        document.querySelectorAll('.effect-params').forEach(p => p.classList.remove('active'));
        const panel = document.getElementById('params-' + this._currentEffect);
        if (panel) panel.classList.add('active');

        document.getElementById('effectVal').textContent = this._effectNames[this._currentEffect];
        IonizeModule.reset();
        bus.emit('effect:changed', { effect: this._currentEffect });
      });
    });
  },

  _setupSliders() {
    document.querySelectorAll('input[type="range"]').forEach(slider => {
      slider.addEventListener('input', () => {
        const val = parseFloat(slider.value);
        const valueSpan = slider.parentElement.querySelector('.param-value');
        if (valueSpan) valueSpan.textContent = val;
        bus.emit('param:changed', {
          module: slider.dataset.module,
          param: slider.dataset.param,
          value: val
        });
      });
    });
  },

  _setupToggles() {
    document.querySelectorAll('.toggle').forEach(toggle => {
      toggle.addEventListener('click', () => {
        toggle.classList.toggle('on');
        const isOn = toggle.classList.contains('on');
        bus.emit('param:changed', {
          module: toggle.dataset.module,
          param: toggle.dataset.param,
          value: isOn
        });
      });
    });
  },

  _setupSelects() {
    document.querySelectorAll('select').forEach(sel => {
      sel.addEventListener('change', () => {
        bus.emit('param:changed', {
          module: sel.dataset.module,
          param: sel.dataset.param,
          value: sel.value
        });
      });
    });
  },

  _setupButtons() {
    const btnPlay = document.getElementById('btnPlay');
    btnPlay.addEventListener('click', () => {
      if (btnPlay.classList.contains('playing')) {
        btnPlay.classList.remove('playing');
        btnPlay.textContent = '▶ 播放';
        bus.emit('animation:stop', {});
      } else {
        btnPlay.classList.add('playing');
        btnPlay.textContent = '■ 停止';
        bus.emit('animation:start', {});
      }
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      btnPlay.classList.remove('playing');
      btnPlay.textContent = '▶ 播放';
      bus.emit('animation:stop', {});
    });

    document.getElementById('btnExport').addEventListener('click', () => {
      const canvas = CoreModule.canvas;
      const link = document.createElement('a');
      link.download = 'pixel-forge-frame.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  },

  _setupLog() {
    const logBody = document.getElementById('logBody');
    bus.setLogCallback(entry => {
      const el = document.createElement('div');
      el.className = 'log-entry';
      const timeStr = entry.time.toLocaleTimeString('zh-CN', { hour12: false }) + '.' + String(entry.time.getMilliseconds()).padStart(3, '0');
      el.innerHTML = `<span class="log-time">${timeStr}</span><span class="log-event">${entry.event}</span><span class="log-data">${entry.data}</span>`;
      logBody.appendChild(el);
      if (logBody.children.length > 20) logBody.removeChild(logBody.firstChild);
      logBody.scrollTop = logBody.scrollHeight;
    });

    document.getElementById('logClear').addEventListener('click', () => {
      bus.clearLog();
      logBody.innerHTML = '';
    });
  }
};

// ═══════════════════════════════════════════
// 初始化所有模块
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  CoreModule.init();
  PixelateModule.init();
  IonizeModule.init();
  WaveModule.init();
  UIModule.init();

  CoreModule.loadSampleImage();
});
</script>

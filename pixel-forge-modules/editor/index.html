<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL FORGE — 文档编辑器</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060c;--bg2:#0d0d18;--bg3:#12121f;--fg:#e0ffe0;--fg-dim:#4a6a4a;--accent:#00ff88;--accent2:#ff3366;--accent3:#44ddff;--accent4:#ffaa00;--accent5:#a29bfe;--accent6:#ff6b9d;--accent7:#7cff6b;--card:rgba(14,14,26,0.95);--border:#1e2e1e;--code-bg:#0a0a14;--code-fg:#a9b1d6;--fp:'Press Start 2P',monospace;--fm:'Share Tech Mono',monospace;--fc:'Fira Code',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--fg);font-family:var(--fm)}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:9999}

#app{display:flex;flex-direction:column;height:100%;position:relative;z-index:1}

.topbar{height:36px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:12px;flex-shrink:0}
.topbar h1{font-family:var(--fp);font-size:9px;color:var(--accent7);text-shadow:0 0 10px rgba(124,255,107,0.4);letter-spacing:2px}
.topbar .sep{color:var(--border);font-size:12px}
.topbar .fname{font-family:var(--fp);font-size:7px;color:var(--accent3);letter-spacing:1px}
.topbar .spacer{flex:1}
.topbar .tbtn{font-family:var(--fp);font-size:6px;padding:4px 8px;background:transparent;border:1px solid var(--border);color:var(--fg-dim);border-radius:2px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.topbar .tbtn:hover{border-color:var(--accent);color:var(--accent)}
.topbar .tbtn.active{background:rgba(0,255,136,0.1);border-color:var(--accent);color:var(--accent)}
.topbar .back{font-family:var(--fp);font-size:6px;color:var(--fg-dim);text-decoration:none;border:1px solid var(--border);padding:3px 8px;border-radius:2px;transition:all .2s}
.topbar .back:hover{border-color:var(--accent7);color:var(--accent7)}

.main{flex:1;display:flex;overflow:hidden}

.filetree{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:6px 0;flex-shrink:0;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.ft-header{font-family:var(--fp);font-size:6px;color:var(--fg-dim);padding:6px 10px 4px;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border);margin-bottom:4px}
.ft-group{margin-bottom:2px}
.ft-group-title{font-family:var(--fp);font-size:6px;color:var(--accent4);padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:4px;letter-spacing:1px;transition:background .2s}
.ft-group-title:hover{background:rgba(255,170,0,0.05)}
.ft-group-title .arrow{font-size:8px;transition:transform .2s}
.ft-group-title.collapsed .arrow{transform:rotate(-90deg)}
.ft-items{overflow:hidden;transition:max-height .3s}
.ft-items.collapsed{max-height:0!important}
.ft-item{padding:3px 10px 3px 22px;font-size:10px;color:var(--fg-dim);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ft-item:hover{background:rgba(0,255,136,0.04);color:var(--fg)}
.ft-item.active{background:rgba(0,255,136,0.08);color:var(--accent);border-right:2px solid var(--accent)}
.ft-item .icon{font-size:10px;flex-shrink:0;width:14px;text-align:center}
.ft-item .fname2{overflow:hidden;text-overflow:ellipsis}

.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden}

.tab-bar{height:28px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:stretch;overflow-x:auto;flex-shrink:0}
.tab{display:flex;align-items:center;gap:4px;padding:0 12px;font-family:var(--fp);font-size:6px;color:var(--fg-dim);border-right:1px solid var(--border);cursor:pointer;transition:all .15s;letter-spacing:1px;white-space:nowrap;position:relative}
.tab:hover{background:rgba(0,255,136,0.04);color:var(--fg)}
.tab.active{background:var(--code-bg);color:var(--accent);border-bottom:2px solid var(--accent)}
.tab .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tab .close{font-size:8px;margin-left:4px;opacity:0;transition:opacity .2s;color:var(--accent2)}
.tab:hover .close{opacity:0.6}
.tab .close:hover{opacity:1}

.editor-split{flex:1;display:flex;overflow:hidden}

.code-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:300px}
.code-header{height:24px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;font-family:var(--fp);font-size:6px;color:var(--fg-dim);letter-spacing:1px;gap:8px}
.code-header .lang{color:var(--accent3)}
.code-wrap{flex:1;display:flex;overflow:hidden;position:relative}
.line-numbers{width:40px;background:var(--bg3);border-right:1px solid var(--border);overflow:hidden;padding:8px 0;font-family:var(--fc);font-size:11px;line-height:1.6;color:var(--fg-dim);text-align:right;padding-right:8px;user-select:none;flex-shrink:0}
.code-editor{flex:1;overflow:auto;position:relative}
.code-editor textarea{width:100%;height:100%;background:transparent;color:var(--code-fg);font-family:var(--fc);font-size:11px;line-height:1.6;border:none;outline:none;resize:none;padding:8px 12px;tab-size:2;white-space:pre;overflow-wrap:normal;overflow-x:auto}
.code-editor pre{position:absolute;top:0;left:0;right:0;padding:8px 12px;font-family:var(--fc);font-size:11px;line-height:1.6;pointer-events:none;white-space:pre;overflow:hidden;margin:0}
.code-editor .hl-tag{color:#ff6b9d}
.code-editor .hl-attr{color:#44ddff}
.code-editor .hl-str{color:#7cff6b}
.code-editor .hl-kw{color:#ffaa00}
.code-editor .hl-cmt{color:#4a6a4a;font-style:italic}
.code-editor .hl-num{color:#a29bfe}
.code-editor .hl-fn{color:#44ddff}

.preview-pane{width:45%;min-width:280px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.preview-header{height:24px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;font-family:var(--fp);font-size:6px;color:var(--fg-dim);letter-spacing:1px;gap:8px}
.preview-header .url{color:var(--accent3);font-family:var(--fm);font-size:9px}
.preview-header .spacer{flex:1}
.preview-header .pbtn{font-family:var(--fp);font-size:6px;padding:2px 6px;background:transparent;border:1px solid var(--border);color:var(--fg-dim);border-radius:1px;cursor:pointer;transition:all .2s}
.preview-header .pbtn:hover{border-color:var(--accent);color:var(--accent)}
.preview-frame{flex:1;background:#fff;position:relative}
.preview-frame iframe{width:100%;height:100%;border:none}
.preview-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--fg-dim);font-family:var(--fp);font-size:8px;background:var(--bg)}
.preview-placeholder .big{font-size:32px;opacity:0.3}

.statusbar{height:20px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-family:var(--fp);font-size:5px;color:var(--fg-dim);letter-spacing:1px;gap:16px;flex-shrink:0}
.statusbar .accent{color:var(--accent)}
.statusbar .sep{color:var(--border)}

.resize-handle{width:4px;cursor:col-resize;background:transparent;transition:background .2s;flex-shrink:0}
.resize-handle:hover{background:var(--accent)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <h1>PIXEL FORGE</h1>
    <span class="sep">|</span>
    <span class="fname" id="currentFile">未选择文件</span>
    <span class="spacer"></span>
    <button class="tbtn" id="btnSave">💾 保存</button>
    <button class="tbtn" id="btnSaveApi">☁ 保存到API</button>
    <button class="tbtn" id="btnRun">▶ 预览</button>
    <button class="tbtn" id="btnExport">⬇ 导出</button>
    <span class="sep">|</span>
    <span class="fname" id="apiStatus" style="color:var(--fg-dim)">API: 检测中</span>
    <a href="../index.html" class="back">◁ 总览</a>
  </div>

  <div class="main">
    <div class="filetree" id="fileTree"></div>
    <div class="editor-area">
      <div class="tab-bar" id="tabBar"></div>
      <div class="editor-split">
        <div class="code-pane" id="codePane">
          <div class="code-header">
            <span>◈ 编辑器</span>
            <span class="lang" id="langLabel">HTML</span>
          </div>
          <div class="code-wrap">
            <div class="line-numbers" id="lineNumbers"></div>
            <div class="code-editor" id="codeEditor">
              <textarea id="codeInput" spellcheck="false"></textarea>
            </div>
          </div>
        </div>
        <div class="resize-handle" id="resizeHandle"></div>
        <div class="preview-pane" id="previewPane">
          <div class="preview-header">
            <span>◈ 预览</span>
            <span class="url" id="previewUrl">—</span>
            <span class="spacer"></span>
            <button class="pbtn" id="btnRefresh">↻</button>
          </div>
          <div class="preview-frame" id="previewFrame">
            <div class="preview-placeholder" id="previewPlaceholder">
              <span class="big">◈</span>
              <span>选择文件并点击 ▶ 预览</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="statusbar">
    <span>PIXEL FORGE EDITOR</span>
    <span class="sep">|</span>
    <span>行: <span class="accent" id="stLine">1</span></span>
    <span>列: <span class="accent" id="stCol">1</span></span>
    <span class="sep">|</span>
    <span>字符: <span class="accent" id="stChars">0</span></span>
    <span class="sep">|</span>
    <span id="stMod">未修改</span>
    <span class="sep">|</span>
    <span>© 2026 PIXEL FORGE</span>
  </div>
</div>

<script>
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);

const API_BASE='http://localhost:4000/api';
let apiConnected=false;

async function checkApi(){
  try{
    const r=await fetch(`${API_BASE}/status`);
    if(r.ok){apiConnected=true;$('#apiStatus').textContent='API: ✓ 已连接';$('#apiStatus').style.color='#00ff88';return true}
  }catch(e){}
  apiConnected=false;$('#apiStatus').textContent='API: ✗ 未连接';$('#apiStatus').style.color='#ff3366';return false;
}

checkApi();

async function apiGet(endpoint){
  if(!apiConnected)return null;
  try{const r=await fetch(`${API_BASE}/${endpoint}`);return r.ok?await r.json():null}catch(e){return null}
}

async function apiPost(endpoint,body){
  if(!apiConnected)return null;
  try{const r=await fetch(`${API_BASE}/${endpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.ok?await r.json():null}catch(e){return null}
}

async function apiDelete(endpoint){
  if(!apiConnected)return null;
  try{const r=await fetch(`${API_BASE}/${endpoint}`,{method:'DELETE'});return r.ok?await r.json():null}catch(e){return null}
}

const FILES=[
  {id:'v1',label:'V1-CORE',color:'#00ff88',files:[
    {name:'index.html',path:'../v1-core/index.html',lang:'HTML'}
  ]},
  {id:'v2',label:'V2-CHAIN',color:'#ffaa00',files:[
    {name:'index.html',path:'../v2-chain/index.html',lang:'HTML'}
  ]},
  {id:'v3',label:'V3-BLEND',color:'#ff3366',files:[
    {name:'index.html',path:'../v3-blend/index.html',lang:'HTML'}
  ]},
  {id:'v4',label:'V4-INTERACTIVE',color:'#44ddff',files:[
    {name:'index.html',path:'../v4-interactive/index.html',lang:'HTML'}
  ]},
  {id:'v5',label:'V5-PLUGIN',color:'#a29bfe',files:[
    {name:'index.html',path:'../v5-plugin/index.html',lang:'HTML'}
  ]},
  {id:'v6',label:'V6-PHYSICS3D',color:'#ff6b9d',files:[
    {name:'index.html',path:'../v6-physics3d/index.html',lang:'HTML'}
  ]},
  {id:'v7',label:'V7-SOFTWARE MODEL',color:'#7cff6b',files:[
    {name:'index.html',path:'../v7-software-model/index.html',lang:'HTML'}
  ]},
  {id:'ts',label:'TypeScript 工程',color:'#44ddff',files:[
    {name:'index.html',path:'../../pixel-forge-ts/index.html',lang:'HTML'},
    {name:'package.json',path:'../../pixel-forge-ts/package.json',lang:'JSON'},
    {name:'tsconfig.json',path:'../../pixel-forge-ts/tsconfig.json',lang:'JSON'},
    {name:'main.ts',path:'../../pixel-forge-ts/src/main.ts',lang:'TS'},
    {name:'App.ts',path:'../../pixel-forge-ts/src/app/App.ts',lang:'TS'},
    {name:'EventBus.ts',path:'../../pixel-forge-ts/src/core/EventBus.ts',lang:'TS'},
    {name:'Renderer.ts',path:'../../pixel-forge-ts/src/core/Renderer.ts',lang:'TS'},
    {name:'AnimationLoop.ts',path:'../../pixel-forge-ts/src/core/AnimationLoop.ts',lang:'TS'},
    {name:'ImageLoader.ts',path:'../../pixel-forge-ts/src/core/ImageLoader.ts',lang:'TS'},
    {name:'Effect.ts',path:'../../pixel-forge-ts/src/effects/Effect.ts',lang:'TS'},
    {name:'PixelateEffect.ts',path:'../../pixel-forge-ts/src/effects/PixelateEffect.ts',lang:'TS'},
    {name:'IonizeEffect.ts',path:'../../pixel-forge-ts/src/effects/IonizeEffect.ts',lang:'TS'},
    {name:'WaveEffect.ts',path:'../../pixel-forge-ts/src/effects/WaveEffect.ts',lang:'TS'},
    {name:'GlitchEffect.ts',path:'../../pixel-forge-ts/src/effects/GlitchEffect.ts',lang:'TS'},
    {name:'ChromaticEffect.ts',path:'../../pixel-forge-ts/src/effects/ChromaticEffect.ts',lang:'TS'},
    {name:'Compositor.ts',path:'../../pixel-forge-ts/src/compositor/Compositor.ts',lang:'TS'},
    {name:'PhysicsEngine.ts',path:'../../pixel-forge-ts/src/physics/PhysicsEngine.ts',lang:'TS'},
    {name:'ProceduralTexture.ts',path:'../../pixel-forge-ts/src/texture/ProceduralTexture.ts',lang:'TS'},
    {name:'UIManager.ts',path:'../../pixel-forge-ts/src/ui/UIManager.ts',lang:'TS'},
    {name:'Scene3D.ts',path:'../../pixel-forge-ts/src/threejs/Scene3D.ts',lang:'TS'},
    {name:'EntityModelBuilder.ts',path:'../../pixel-forge-ts/src/threejs/EntityModelBuilder.ts',lang:'TS'},
  ]},
  {id:'overview',label:'总览页',color:'#00ff88',files:[
    {name:'index.html',path:'../index.html',lang:'HTML'}
  ]},
  {id:'senik',label:'☁ SENIK 内容',color:'#ff6b9d',files:[
    {name:'default.json',path:'senik:scenes/default.json',lang:'JSON',api:true},
    {name:'ionize-burst.json',path:'senik:effects/ionize-burst.json',lang:'JSON',api:true},
    {name:'neon-rings.json',path:'senik:textures/neon-rings.json',lang:'JSON',api:true},
    {name:'software-architecture.json',path:'senik:models/software-architecture.json',lang:'JSON',api:true},
    {name:'api-config.json',path:'senik:configs/api-config.json',lang:'JSON',api:true}
  ]}
];

let openTabs=[];
let activeFile=null;
let fileContents={};
let modified={};
let currentContent='';

function buildFileTree(){
  const tree=$('#fileTree');
  tree.innerHTML='<div class="ft-header">◈ 项目文件</div>';
  FILES.forEach(group=>{
    const g=document.createElement('div');
    g.className='ft-group';
    const title=document.createElement('div');
    title.className='ft-group-title';
    title.innerHTML=`<span class="arrow">▼</span><span style="color:${group.color}">${group.label}</span>`;
    g.appendChild(title);
    const items=document.createElement('div');
    items.className='ft-items';
    items.style.maxHeight=group.files.length*28+'px';
    group.files.forEach(f=>{
      const item=document.createElement('div');
      item.className='ft-item';
      item.dataset.path=f.path;
      item.dataset.lang=f.lang;
      item.dataset.group=group.id;
      const icon=f.lang==='HTML'?'◇':f.lang==='TS'?'◈':f.lang==='JSON'?'▣':'◇';
      item.innerHTML=`<span class="icon">${icon}</span><span class="fname2">${f.name}</span>`;
      item.addEventListener('click',()=>openFile(f.path,f.name,f.lang,group.id));
      items.appendChild(item);
    });
    g.appendChild(items);
    title.addEventListener('click',()=>{
      title.classList.toggle('collapsed');
      items.classList.toggle('collapsed');
    });
    tree.appendChild(g);
  });
}

async function openFile(path,name,lang,groupId){
  const isApi=path.startsWith('senik:');
  if(!fileContents[path]){
    if(isApi&&apiConnected){
      const apiPath=path.replace('senik:','');
      const data=await apiGet(`senik/read?path=${encodeURIComponent(apiPath)}`);
      fileContents[path]=data?data.content:`// 无法从API加载: ${apiPath}`;
    }else{
      try{
        const resp=await fetch(path);
        if(resp.ok) fileContents[path]=await resp.text();
        else fileContents[path]=`// 无法加载: ${path}\n// HTTP ${resp.status}`;
      }catch(e){
        fileContents[path]=`// 加载失败: ${path}\n// ${e.message}`;
      }
    }
  }
  if(!openTabs.find(t=>t.path===path)){
    openTabs.push({path,name,lang,groupId});
  }
  activeFile=path;
  currentContent=fileContents[path];
  renderTabs();
  renderEditor();
  updateFileTreeActive();
  $('#currentFile').textContent=name;
  $('#langLabel').textContent=lang;
  $('#stChars').textContent=currentContent.length;
  $('#stMod').textContent=modified[path]?'已修改':'未修改';
}

function renderTabs(){
  const bar=$('#tabBar');
  bar.innerHTML='';
  openTabs.forEach(tab=>{
    const group=FILES.find(g=>g.id===tab.groupId);
    const color=group?group.color:'#00ff88';
    const el=document.createElement('div');
    el.className='tab'+(tab.path===activeFile?' active':'');
    el.innerHTML=`<span class="dot" style="background:${color}"></span>${tab.name}<span class="close" data-path="${tab.path}">✕</span>`;
    el.addEventListener('click',(e)=>{
      if(e.target.classList.contains('close')){
        closeTab(tab.path);
      }else{
        activeFile=tab.path;
        currentContent=fileContents[tab.path]||'';
        renderTabs();
        renderEditor();
        updateFileTreeActive();
        $('#currentFile').textContent=tab.name;
        $('#langLabel').textContent=tab.lang;
      }
    });
    bar.appendChild(el);
  });
}

function closeTab(path){
  const idx=openTabs.findIndex(t=>t.path===path);
  if(idx===-1)return;
  openTabs.splice(idx,1);
  if(activeFile===path){
    if(openTabs.length>0){
      const next=openTabs[Math.min(idx,openTabs.length-1)];
      activeFile=next.path;
      currentContent=fileContents[next.path]||'';
      $('#currentFile').textContent=next.name;
      $('#langLabel').textContent=next.lang;
    }else{
      activeFile=null;
      currentContent='';
      $('#currentFile').textContent='未选择文件';
    }
  }
  renderTabs();
  renderEditor();
  updateFileTreeActive();
}

function updateFileTreeActive(){
  $$('.ft-item').forEach(item=>{
    item.classList.toggle('active',item.dataset.path===activeFile);
  });
}

function renderEditor(){
  const textarea=$('#codeInput');
  textarea.value=currentContent;
  updateLineNumbers();
}

function updateLineNumbers(){
  const lines=currentContent.split('\n').length;
  const el=$('#lineNumbers');
  let html='';
  for(let i=1;i<=lines;i++) html+=i+'\n';
  el.textContent=html;
}

const codeInput=$('#codeInput');
codeInput.addEventListener('input',()=>{
  currentContent=codeInput.value;
  if(activeFile){
    fileContents[activeFile]=currentContent;
    modified[activeFile]=true;
    $('#stMod').textContent='已修改';
    $('#stChars').textContent=currentContent.length;
  }
  updateLineNumbers();
});

codeInput.addEventListener('scroll',()=>{
  $('#lineNumbers').scrollTop=codeInput.scrollTop;
});

codeInput.addEventListener('keydown',(e)=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const start=codeInput.selectionStart;
    const end=codeInput.selectionEnd;
    codeInput.value=codeInput.value.substring(0,start)+'  '+codeInput.value.substring(end);
    codeInput.selectionStart=codeInput.selectionEnd=start+2;
    codeInput.dispatchEvent(new Event('input'));
  }
  if(e.key==='s'&&(e.ctrlKey||e.metaKey)){
    e.preventDefault();
    saveFile();
  }
});

codeInput.addEventListener('click',()=>{
  const pos=codeInput.selectionStart;
  const text=currentContent.substring(0,pos);
  const lines=text.split('\n');
  $('#stLine').textContent=lines.length;
  $('#stCol').textContent=lines[lines.length-1].length+1;
});

codeInput.addEventListener('keyup',()=>{
  const pos=codeInput.selectionStart;
  const text=currentContent.substring(0,pos);
  const lines=text.split('\n');
  $('#stLine').textContent=lines.length;
  $('#stCol').textContent=lines[lines.length-1].length+1;
});

function saveFile(){
  if(!activeFile)return;
  const blob=new Blob([currentContent],{type:'text/plain'});
  const a=document.createElement('a');
  const name=activeFile.split('/').pop();
  a.download=name;
  a.href=URL.createObjectURL(blob);
  a.click();
  URL.revokeObjectURL(a.href);
  modified[activeFile]=false;
  $('#stMod').textContent='已保存';
}

function runPreview(){
  if(!activeFile)return;
  const placeholder=$('#previewPlaceholder');
  placeholder.style.display='none';
  let iframe=$('#previewFrame iframe');
  if(!iframe){
    iframe=document.createElement('iframe');
    iframe.sandbox='allow-scripts allow-same-origin';
    $('#previewFrame').appendChild(iframe);
  }
  if(activeFile.endsWith('.html')){
    const blob=new Blob([currentContent],{type:'text/html'});
    iframe.src=URL.createObjectURL(blob);
    const name=activeFile.split('/').pop();
    $('#previewUrl').textContent=name;
  }else{
    iframe.srcdoc=`<!DOCTYPE html><html><head><style>body{background:#0a0a0f;color:#e0ffe0;font-family:'Share Tech Mono',monospace;padding:20px;font-size:12px;white-space:pre}</style></head><body>${escapeHtml(currentContent)}</body></html>`;
    $('#previewUrl').textContent='srcdoc';
  }
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

$('#btnSave').addEventListener('click',saveFile);
$('#btnRun').addEventListener('click',runPreview);
$('#btnRefresh').addEventListener('click',runPreview);

$('#btnSaveApi').addEventListener('click',async()=>{
  if(!activeFile||!apiConnected)return;
  const isApi=activeFile.startsWith('senik:');
  if(isApi){
    const apiPath=activeFile.replace('senik:','');
    const result=await apiPost('senik/write',{path:apiPath,content:currentContent});
    if(result&&result.ok){
      modified[activeFile]=false;
      $('#stMod').textContent='已保存到API';
    }else{
      alert('保存到API失败');
    }
  }else if(activeFile.startsWith('../')){
    const projPath=activeFile.replace('../','');
    const result=await apiPost('projects/write',{path:projPath,content:currentContent});
    if(result&&result.ok){
      modified[activeFile]=false;
      $('#stMod').textContent='已保存到项目API';
    }else{
      alert('保存到项目API失败');
    }
  }else{
    alert('此文件不支持API保存');
  }
});

$('#btnExport').addEventListener('click',()=>{
  if(!activeFile)return;
  const name=activeFile.split('/').pop();
  const blob=new Blob([currentContent],{type:'text/plain'});
  const a=document.createElement('a');
  a.download=name;
  a.href=URL.createObjectURL(blob);
  a.click();
  URL.revokeObjectURL(a.href);
});

const resizeHandle=$('#resizeHandle');
let resizing=false;
resizeHandle.addEventListener('mousedown',(e)=>{
  resizing=true;
  e.preventDefault();
});
document.addEventListener('mousemove',(e)=>{
  if(!resizing)return;
  const main=$('.editor-split');
  const rect=main.getBoundingClientRect();
  const codePane=$('#codePane');
  const previewPane=$('#previewPane');
  const ratio=(e.clientX-rect.left)/rect.width;
  codePane.style.flex=Math.max(0.2,Math.min(0.8,ratio));
  previewPane.style.width=`${Math.max(20,Math.min(80,(1-ratio)*100))}%`;
});
document.addEventListener('mouseup',()=>{resizing=false});

buildFileTree();

(async()=>{
  await openFile('../v1-core/index.html','index.html','HTML','v1');
  runPreview();
})();
</script>
</body>
</html>

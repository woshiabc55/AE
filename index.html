<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>窑火不息·追迹</title>
  <style>
    :root {
      --bg-deep: #0f0c0a;
      --bg-panel: rgba(20, 16, 13, 0.92);
      --fire-core: #ff9d4d;
      --fire-mid: #e85a2b;
      --fire-dim: #5a1e12;
      --celadon: #8fb8a8;
      --celadon-dark: #4a6b5f;
      --crack: #d9c6a8;
      --text-main: #f3ece3;
      --text-sub: #b8a89a;
      --accent: #c9a86c;
      --danger: #b94e38;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      line-height: 1.6;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.6s ease, visibility 0.6s ease;
      z-index: 10;
      background: var(--bg-deep);
    }

    .screen.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .screen-scene {
      justify-content: flex-end;
      padding: 0 0 100px;
    }

    .scene-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .scene-canvas svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 45%, transparent 0%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.06;
      pointer-events: none;
      z-index: 2;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .modal-card {
      position: relative;
      z-index: 3;
      width: min(88vw, 420px);
      max-height: 80vh;
      background: var(--bg-panel);
      border: 1px solid rgba(201, 168, 108, 0.25);
      border-radius: 18px;
      padding: 28px 24px 24px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06);
      overflow-y: auto;
    }

    .modal-title {
      font-size: clamp(22px, 6vw, 30px);
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      color: var(--accent);
    }

    .modal-subtitle {
      font-size: clamp(13px, 3.6vw, 15px);
      color: var(--text-sub);
      margin-bottom: 18px;
      letter-spacing: 0.1em;
    }

    .modal-message {
      font-size: clamp(14px, 4vw, 16px);
      color: var(--text-main);
      margin-bottom: 24px;
      line-height: 1.75;
      text-align: left;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      appearance: none;
      border: none;
      outline: none;
      cursor: pointer;
      font: inherit;
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.08em;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: linear-gradient(180deg, #d4a85c 0%, #b0863e 100%);
      color: #1a1209;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text-main);
      border: 1px solid rgba(255,255,255,0.14);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-sub);
      padding: 10px;
      font-size: 14px;
    }

    .narrative-card {
      position: relative;
      z-index: 3;
      width: 100%;
      padding: 22px 22px calc(22px + var(--safe-bottom));
      background: linear-gradient(to top, rgba(10,8,6,0.96) 0%, rgba(10,8,6,0.78) 75%, transparent 100%);
    }

    .narrative-inner {
      max-width: 520px;
      margin: 0 auto;
    }

    .scene-label {
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--accent);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .scene-text {
      font-size: clamp(15px, 4.2vw, 18px);
      line-height: 1.85;
      color: var(--text-main);
      margin-bottom: 18px;
      min-height: 3.6em;
    }

    .scene-hint {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 12px;
    }

    .scene-hint::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--fire-core);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--fire-mid), var(--accent));
      width: 0%;
      z-index: 50;
      transition: width 0.5s ease;
    }

    .top-controls {
      position: fixed;
      top: calc(12px + var(--safe-top));
      right: 14px;
      z-index: 40;
      display: flex;
      gap: 10px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .credit-line {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 16px;
      letter-spacing: 0.05em;
    }

    .hidden { display: none !important; }

    .typing-cursor::after {
      content: '|';
      animation: blink 1s step-start infinite;
      color: var(--accent);
    }

    @keyframes blink { 50% { opacity: 0; } }

    .tap-zone {
      position: absolute;
      inset: 0;
      z-index: 2;
      cursor: pointer;
    }

    .crack-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
      z-index: 2;
    }

    .crack-overlay.active { opacity: 1; }

    @media (max-height: 560px) {
      .screen-scene { padding-bottom: 84px; }
      .narrative-card { padding-top: 16px; }
      .modal-card { padding: 22px 20px 20px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="progress-bar" id="progress-bar" aria-hidden="true"></div>

    <div class="top-controls" id="top-controls" aria-hidden="true">
      <button class="icon-btn" id="btn-pause" type="button" aria-label="暂停">❚❚</button>
    </div>

    <div id="screen-start" class="screen active" aria-hidden="false">
      <div class="scene-canvas" id="start-canvas"></div>
      <div class="vignette"></div>
      <div class="grain"></div>
      <div class="modal-card">
        <h1 class="modal-title">窑火不息 · 追迹</h1>
        <p class="modal-subtitle">AIGC 东方文明叙事互动体验</p>
        <p class="modal-message">
          真正活过的东西，都会留下裂痕。<br><br>
          这是一段关于哥窑、窑火与兄弟羁绊的追迹。你将亲历一冷一热之间，裂纹自生的瞬间。
        </p>
        <div class="modal-actions">
          <button class="btn btn-primary" data-action="start" type="button">进入体验</button>
          <button class="btn btn-secondary" data-action="reset-progress" type="button">从头开始</button>
        </div>
        <p class="credit-line">献给所有活过的痕迹</p>
      </div>
    </div>

    <div id="screen-scenes" class="screen screen-scene" aria-hidden="true">
      <div class="scene-canvas" id="scene-canvas"></div>
      <div class="vignette"></div>
      <div class="grain"></div>
      <div class="crack-overlay" id="crack-overlay"></div>
      <div class="tap-zone" id="tap-zone" role="button" aria-label="继续"></div>
      <div class="narrative-card">
        <div class="narrative-inner">
          <div class="scene-label" id="scene-label"></div>
          <div class="scene-hint" id="scene-hint">点击画面继续</div>
          <p class="scene-text typing-cursor" id="scene-text"></p>
        </div>
      </div>
    </div>

    <div id="screen-pause" class="screen" aria-hidden="true">
      <div class="vignette"></div>
      <div class="modal-card">
        <h2 class="modal-title">已暂停</h2>
        <p class="modal-message">进度已自动保存，随时可以回来继续这段追迹。</p>
        <div class="modal-actions">
          <button class="btn btn-primary" data-action="resume" type="button">继续体验</button>
          <button class="btn btn-secondary" data-action="restart" type="button">重新体验</button>
          <button class="btn btn-ghost" data-action="back-to-start" type="button">返回首页</button>
        </div>
      </div>
    </div>

    <div id="screen-end" class="screen" aria-hidden="true">
      <div class="scene-canvas" id="end-canvas"></div>
      <div class="vignette"></div>
      <div class="grain"></div>
      <div class="modal-card">
        <h2 class="modal-title">一冷一热之间</h2>
        <p class="modal-subtitle">裂纹自生</p>
        <p class="modal-message" id="end-message"></p>
        <div class="modal-actions">
          <button class="btn btn-primary" data-action="restart" type="button">再次追迹</button>
          <button class="btn btn-secondary" data-action="back-to-start" type="button">返回首页</button>
        </div>
        <p class="credit-line">谨以此片，献给所有活过的痕迹。</p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const STORAGE_KEY = 'yaohuo_trace_progress_v1';
      const TOTAL_SCENES = 8;

      const scenes = [
        {
          id: 'prologue',
          label: '序 · 裂',
          texts: [
            '黑场。只有火声。',
            '“噼啪——” “噼啪——”',
            '像有人在黑暗里缓缓呼吸。',
            '随后，一声极轻的：“咔——”',
            '像冰层裂开。'
          ],
          svg: svgPrologue,
          interactive: true,
          hint: '轻触屏幕，唤醒那件开片瓷'
        },
        {
          id: 'act1',
          label: '一 · 火',
          texts: [
            '暴雨夜，窑火却烧得通红。',
            '章生一正在拉坯，沉默，粗粝。',
            '角落里，少年章生二偷偷模仿哥哥。',
            '泥坯忽然塌了。',
            '哥哥没回头，只是把那团更好的泥，推到弟弟面前。'
          ],
          svg: svgAct1,
          interactive: false,
          hint: '点击画面继续'
        },
        {
          id: 'act2',
          label: '二 · 水',
          texts: [
            '深夜，章生一独自守窑。',
            '弟弟站在不远处，看了很久。',
            '“你有没有怕过？怕有一天，它烧坏了。”',
            '哥哥低声说：“火本来就会伤人。”',
            '弟弟眼眶通红：“为什么……所有人都只记得你。”'
          ],
          svg: svgAct2,
          interactive: true,
          hint: '轻触屏幕，看那瓢冷水落下'
        },
        {
          id: 'act3',
          label: '三 · 裂',
          texts: [
            '一夜无眠。窑门缓缓打开。',
            '章生一取出第一只碗。',
            '器身上，裂纹缓缓蔓延。',
            '像冰河，像山脉，像大地干裂。',
            '“它活过了。”'
          ],
          svg: svgAct3,
          interactive: true,
          hint: '轻触屏幕，让光穿过裂纹'
        },
        {
          id: 'act4',
          label: '四 · 绊',
          texts: [
            '兄弟二人沉默坐着，中间放着那只开片瓷碗。',
            '“我嫉妒你。”弟弟终于开口。',
            '哥哥轻轻敲了敲那只碗。碗没碎。',
            '“人活着，哪有不裂的。”',
            '“可有些东西，偏偏裂了以后，才像真的活过。”'
          ],
          svg: svgAct4,
          interactive: true,
          hint: '轻触屏幕，轻叩那只碗'
        },
        {
          id: 'act5',
          label: '五 · 迹',
          texts: [
            '多年后，风雪将至的茶寮。',
            '白发苍苍的章生二打开旧木箱。',
            '里面，是当年那只裂开的哥窑。',
            '裂纹更多了，却仍旧完整。',
            '“有些东西，太完整了，反倒不像活过。”'
          ],
          svg: svgAct5,
          interactive: true,
          hint: '轻触屏幕，打开那只木箱'
        },
        {
          id: 'epilogue',
          label: '彩蛋 · 东渡',
          texts: [
            '日本茶室，雪落庭院。',
            '一只开片青瓷被缓缓放下，锔钉如蚂蝗伏于裂痕。',
            '“已经裂了。”年轻茶人说。',
            '老人抚过裂纹：“还能用。”',
            '茶盏轻落桌面。窗外落雪无声。'
          ],
          svg: svgEpilogue,
          interactive: false,
          hint: '点击画面继续'
        }
      ];

      let currentSceneIndex = -1;
      let currentTextIndex = 0;
      let isPaused = false;
      let typingTimer = null;
      let animationId = null;
      let interactionTriggered = false;

      function el(id) { return document.getElementById(id); }

      function showScreen(id) {
        document.querySelectorAll('.screen').forEach(node => {
          node.classList.remove('active');
          node.setAttribute('aria-hidden', 'true');
        });
        const target = el(id);
        if (target) {
          target.classList.add('active');
          target.setAttribute('aria-hidden', 'false');
        }
      }

      function saveProgress() {
        try {
          localStorage.setItem(STORAGE_KEY, String(currentSceneIndex));
        } catch (e) {}
      }

      function loadProgress() {
        try {
          const v = localStorage.getItem(STORAGE_KEY);
          return v === null ? -1 : parseInt(v, 10);
        } catch (e) { return -1; }
      }

      function clearProgress() {
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      }

      function updateProgress() {
        const pct = Math.max(0, Math.min(100, ((currentSceneIndex + 1) / TOTAL_SCENES) * 100));
        el('progress-bar').style.width = pct + '%';
      }

      function typeText(text) {
        const node = el('scene-text');
        node.textContent = '';
        node.classList.add('typing-cursor');
        let i = 0;
        clearInterval(typingTimer);
        typingTimer = setInterval(() => {
          if (i >= text.length) {
            clearInterval(typingTimer);
            node.classList.remove('typing-cursor');
            return;
          }
          node.textContent += text.charAt(i);
          i++;
        }, 42);
      }

      function renderScene(index) {
        const scene = scenes[index];
        currentSceneIndex = index;
        currentTextIndex = 0;
        interactionTriggered = false;
        saveProgress();
        updateProgress();

        el('scene-label').textContent = scene.label;
        el('scene-hint').textContent = scene.hint;
        el('scene-canvas').innerHTML = scene.svg();
        el('crack-overlay').classList.remove('active');
        el('crack-overlay').innerHTML = '';

        typeText(scene.texts[0]);
        startAmbientAnimation();

        showScreen('screen-scenes');
        el('top-controls').setAttribute('aria-hidden', 'false');
      }

      function nextTextOrScene() {
        if (isPaused) return;
        const scene = scenes[currentSceneIndex];

        if (scene.interactive && !interactionTriggered) {
          interactionTriggered = true;
          triggerInteraction(scene.id);
          el('scene-hint').textContent = '点击画面继续';
          return;
        }

        currentTextIndex++;
        if (currentTextIndex < scene.texts.length) {
          typeText(scene.texts[currentTextIndex]);
        } else {
          if (currentSceneIndex < scenes.length - 1) {
            renderScene(currentSceneIndex + 1);
          } else {
            finishExperience();
          }
        }
      }

      function triggerInteraction(id) {
        if (id === 'prologue') {
          el('crack-overlay').innerHTML = buildCrackSvg('#d9c6a8', 0.7);
          el('crack-overlay').classList.add('active');
        } else if (id === 'act2') {
          el('crack-overlay').innerHTML = '<div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,0) 0%,rgba(200,220,235,0.35) 60%,rgba(255,255,255,0.6) 100%);opacity:0;transition:opacity 0.8s ease;"></div>';
          const water = el('crack-overlay').firstChild;
          requestAnimationFrame(() => water.style.opacity = '1');
          setTimeout(() => water.style.opacity = '0', 1400);
        } else if (id === 'act3') {
          el('crack-overlay').innerHTML = buildCrackSvg('#f3ece3', 0.85);
          el('crack-overlay').classList.add('active');
          const glow = document.createElement('div');
          glow.style.cssText = 'position:absolute;inset:0;background:radial-gradient(circle at 50% 55%,rgba(255,200,120,0.45) 0%,transparent 60%);opacity:0;transition:opacity 1s ease;';
          el('crack-overlay').appendChild(glow);
          requestAnimationFrame(() => glow.style.opacity = '1');
        } else if (id === 'act4') {
          const bowl = el('scene-canvas').querySelector('.bowl-group');
          if (bowl) {
            bowl.style.transformOrigin = '50% 55%';
            bowl.animate([
              { transform: 'scale(1)' },
              { transform: 'scale(1.03)' },
              { transform: 'scale(0.99)' },
              { transform: 'scale(1)' }
            ], { duration: 420, easing: 'ease-out' });
          }
          el('crack-overlay').innerHTML = buildCrackSvg('#d9c6a8', 0.55);
          el('crack-overlay').classList.add('active');
        } else if (id === 'act5') {
          const lid = el('scene-canvas').querySelector('.box-lid');
          if (lid) {
            lid.style.transformOrigin = '50% 20%';
            lid.style.transition = 'transform 1.2s ease';
            requestAnimationFrame(() => lid.style.transform = 'rotateX(75deg) translateY(-12px)');
          }
          el('crack-overlay').innerHTML = buildCrackSvg('#d9c6a8', 0.6);
          el('crack-overlay').classList.add('active');
        }
      }

      function buildCrackSvg(color, opacity) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        let d = '';
        const seeds = 12;
        for (let i = 0; i < seeds; i++) {
          let x = 30 + Math.random() * 40;
          let y = 20 + Math.random() * 60;
          d += `M ${x * w / 100} ${y * h / 100} `;
          for (let j = 0; j < 8; j++) {
            x += (Math.random() - 0.5) * 12;
            y += (Math.random() - 0.2) * 10;
            d += `L ${x * w / 100} ${y * h / 100} `;
          }
        }
        return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${d}" fill="none" stroke="${color}" stroke-width="1.2" stroke-opacity="${opacity}" stroke-linecap="round"/></svg>`;
      }

      function startExperience() {
        const saved = loadProgress();
        if (saved >= 0 && saved < scenes.length - 1) {
          renderScene(saved + 1);
        } else {
          renderScene(0);
        }
      }

      function finishExperience() {
        const endMsg = el('end-message');
        endMsg.innerHTML = '你已完成这段关于哥窑、窑火与兄弟羁绊的追迹。<br><br>那些看似破碎的裂纹，正是时间留下的掌纹。';
        el('end-canvas').innerHTML = svgEpilogue();
        showScreen('screen-end');
        el('top-controls').setAttribute('aria-hidden', 'true');
        clearProgress();
      }

      function startAmbientAnimation() {
        cancelAnimationFrame(animationId);
        const flames = el('scene-canvas').querySelectorAll('.flame');
        const particles = el('scene-canvas').querySelectorAll('.particle');
        if (!flames.length && !particles.length) return;

        let t = 0;
        function loop() {
          t += 0.05;
          flames.forEach((f, i) => {
            const s = 1 + Math.sin(t + i * 1.3) * 0.08;
            const r = Math.sin(t * 0.7 + i) * 2;
            f.style.transform = `scale(${s}) rotate(${r}deg)`;
            f.style.transformOrigin = '50% 100%';
          });
          particles.forEach((p, i) => {
            const y = (parseFloat(p.dataset.y) || 0) - 0.15;
            p.dataset.y = y;
            const x = (parseFloat(p.dataset.x) || 0) + Math.sin(t + i) * 0.08;
            p.dataset.x = x;
            p.style.transform = `translate(${x}px, ${y}px)`;
            if (y < -40) { p.dataset.y = 0; p.dataset.x = 0; }
          });
          animationId = requestAnimationFrame(loop);
        }
        animationId = requestAnimationFrame(loop);
      }

      function bindEvents() {
        document.addEventListener('click', (e) => {
          const target = e.target;
          const action = target.dataset.action;

          if (action === 'start') {
            startExperience();
            return;
          }
          if (action === 'reset-progress') {
            clearProgress();
            renderScene(0);
            return;
          }
          if (action === 'resume') {
            isPaused = false;
            showScreen('screen-scenes');
            return;
          }
          if (action === 'restart') {
            clearProgress();
            renderScene(0);
            return;
          }
          if (action === 'back-to-start') {
            isPaused = false;
            showScreen('screen-start');
            el('top-controls').setAttribute('aria-hidden', 'true');
            return;
          }
          if (target.id === 'btn-pause') {
            isPaused = true;
            showScreen('screen-pause');
            return;
          }
        });

        el('tap-zone').addEventListener('click', (e) => {
          e.stopPropagation();
          nextTextOrScene();
        });

        el('tap-zone').addEventListener('touchstart', (e) => {
          e.preventDefault();
          nextTextOrScene();
        }, { passive: false });

        document.addEventListener('keydown', (e) => {
          if (e.code === 'Space' || e.code === 'Enter') {
            if (el('screen-scenes').classList.contains('active')) {
              nextTextOrScene();
            }
          }
        });
      }

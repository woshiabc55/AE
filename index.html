<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>王者荣耀 · 全英雄皮肤图鉴</title>
<link rel="preconnect" href="https://game.gtimg.cn" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;800;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet" />
<style>
  /* ========== 基础重置 ========== */
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Serif SC', 'STKaiti', 'KaiTi', serif;
    color: #f1e6c8;
    background: #0b0805;
    overflow-x: hidden;
    min-height: 100vh;
    line-height: 1.5;
  }
  img { display: block; max-width: 100%; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  /* ========== 背景层 ========== */
  .bg {
    position: fixed; inset: 0; z-index: -2;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(180, 60, 30, 0.25), transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(120, 60, 20, 0.25), transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(60, 20, 10, 0.4), transparent 70%),
      linear-gradient(180deg, #120a06 0%, #0b0805 50%, #050302 100%);
  }
  .bg-grain {
    position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.18;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95 0 0 0 0 0.85 0 0 0 0 0.55 0 0 0 0.6 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
    mix-blend-mode: overlay;
  }
  .bg-seal {
    position: fixed; right: -120px; top: -120px; width: 480px; height: 480px; z-index: -1;
    border: 2px solid rgba(200, 60, 40, 0.25);
    border-radius: 8px;
    transform: rotate(8deg);
    background: rgba(140, 30, 20, 0.05);
    box-shadow: inset 0 0 80px rgba(200, 60, 40, 0.08);
  }
  .bg-seal::after {
    content: '王者';
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Ma Shan Zheng', serif;
    font-size: 180px; color: rgba(200, 60, 40, 0.15);
    letter-spacing: 0.2em;
  }

  /* ========== 顶部标题 ========== */
  .masthead {
    text-align: center;
    padding: 56px 24px 32px;
    position: relative;
  }
  .masthead::before, .masthead::after {
    content: ''; position: absolute; left: 50%; transform: translateX(-50%);
    width: min(820px, 90vw); height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212, 175, 100, 0.6), transparent);
  }
  .masthead::before { top: 24px; }
  .masthead::after { bottom: 12px; }

  .vertical-title {
    display: inline-block;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
    color: #d4af64;
    writing-mode: vertical-rl;
    letter-spacing: 0.4em;
    font-size: 28px;
    margin: 0 12px;
    text-shadow: 0 0 12px rgba(212, 175, 100, 0.3);
  }
  .main-title {
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
    font-size: clamp(40px, 7vw, 88px);
    font-weight: 900;
    letter-spacing: 0.1em;
    color: transparent;
    background: linear-gradient(180deg, #f5e1a4 0%, #d4af64 50%, #8b6a2b 100%);
    -webkit-background-clip: text; background-clip: text;
    text-shadow: 0 4px 24px rgba(212, 175, 100, 0.3);
    margin: 16px 0;
  }
  .subtitle {
    font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
    font-size: 16px;
    color: #c9a86b;
    letter-spacing: 0.6em;
    padding-left: 0.6em;
    margin-bottom: 8px;
  }
  .meta {
    font-size: 13px;
    color: #8a7456;
    letter-spacing: 0.2em;
    margin-top: 12px;
  }
  .meta .count { color: #d4af64; font-weight: 600; }

  /* ========== 筛选器 ========== */
  .filters {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
    padding: 8px 24px 24px;
    max-width: 1200px; margin: 0 auto;
  }
  .filter-btn {
    position: relative;
    padding: 9px 22px;
    font-size: 14px;
    color: #c9a86b;
    background: rgba(40, 24, 14, 0.6);
    border: 1px solid rgba(212, 175, 100, 0.3);
    border-radius: 2px;
    letter-spacing: 0.15em;
    transition: all 0.3s ease;
    font-family: 'ZCOOL XiaoWei', serif;
  }
  .filter-btn:hover { background: rgba(80, 40, 20, 0.7); color: #f5e1a4; }
  .filter-btn.active {
    background: linear-gradient(180deg, #b22d1d, #7a1c10);
    color: #fff5d8;
    border-color: #d4af64;
    box-shadow: 0 0 16px rgba(178, 45, 29, 0.5), inset 0 0 8px rgba(255, 220, 160, 0.3);
  }
  .filter-btn .badge {
    display: inline-block; margin-left: 6px; padding: 1px 6px;
    font-size: 11px; background: rgba(0,0,0,0.3); border-radius: 8px;
  }

  /* ========== 搜索 ========== */
  .search-wrap { display: flex; justify-content: center; padding: 0 24px 24px; }
  .search {
    width: min(420px, 90vw);
    padding: 10px 16px 10px 40px;
    background: rgba(20, 12, 6, 0.7);
    border: 1px solid rgba(212, 175, 100, 0.3);
    color: #f1e6c8;
    font-family: inherit; font-size: 14px;
    border-radius: 2px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23c9a86b' stroke-width='2'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>");
    background-repeat: no-repeat;
    background-position: 14px center;
  }
  .search:focus { outline: none; border-color: #d4af64; box-shadow: 0 0 12px rgba(212, 175, 100, 0.3); }
  .search::placeholder { color: #6b5a3e; }

  /* ========== 英雄网格 (顶部展示) ========== */
  .gallery-section {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 24px 64px;
    position: relative;
  }
  .section-label {
    text-align: center;
    margin-bottom: 32px;
    position: relative;
  }
  .section-label h2 {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 32px;
    color: #d4af64;
    letter-spacing: 0.3em;
    padding-left: 0.3em;
  }
  .section-label .deco-line {
    display: inline-block; width: 60px; height: 1px;
    background: #d4af64; vertical-align: middle; margin: 0 16px; opacity: 0.6;
  }

  .hero-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 18px;
  }
  .hero-card {
    position: relative;
    background: linear-gradient(180deg, rgba(40, 24, 14, 0.7), rgba(15, 8, 4, 0.9));
    border: 1px solid rgba(212, 175, 100, 0.2);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s, border-color 0.4s;
    animation: cardIn 0.6s ease both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hero-card:hover {
    transform: translateY(-6px) scale(1.03);
    border-color: #d4af64;
    box-shadow: 0 12px 32px rgba(178, 45, 29, 0.4), 0 0 0 1px rgba(212, 175, 100, 0.4);
  }
  .hero-card .portrait {
    aspect-ratio: 1 / 1;
    background: #1a0e08;
    overflow: hidden;
    position: relative;
  }
  .hero-card .portrait img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease, filter 0.4s;
    filter: saturate(0.95);
  }
  .hero-card:hover .portrait img { transform: scale(1.08); filter: saturate(1.15) brightness(1.1); }
  .hero-card .portrait::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.7));
    pointer-events: none;
  }
  .hero-card .info {
    padding: 10px 8px 12px;
    text-align: center;
  }
  .hero-card .name {
    font-family: 'Noto Serif SC', serif;
    font-size: 17px;
    font-weight: 800;
    color: #f5e1a4;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }
  .hero-card .title {
    font-size: 11px;
    color: #a78a5a;
    letter-spacing: 0.15em;
    margin-bottom: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .hero-card .skin-count {
    font-size: 11px;
    color: #c9a86b;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(212, 175, 100, 0.2);
    border-radius: 10px;
  }
  .type-tag {
    position: absolute; top: 8px; left: 8px;
    z-index: 2;
    padding: 3px 8px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #fff;
    border-radius: 2px;
    backdrop-filter: blur(4px);
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }
  .type-warrior { background: rgba(192, 64, 32, 0.85); }
  .type-mage { background: rgba(80, 64, 192, 0.85); }
  .type-tank { background: rgba(64, 128, 192, 0.85); }
  .type-assassin { background: rgba(140, 64, 140, 0.85); }
  .type-marksman { background: rgba(192, 144, 48, 0.85); }
  .type-support { background: rgba(48, 160, 96, 0.85); }
  .type-other { background: rgba(120, 120, 120, 0.85); }

  /* ========== 模态框 ========== */
  .modal-mask {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 40px 20px;
    animation: fadeIn 0.3s ease;
  }
  .modal-mask.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    width: min(1100px, 100%);
    background: linear-gradient(180deg, #1a0e08 0%, #0b0805 100%);
    border: 1px solid rgba(212, 175, 100, 0.4);
    border-radius: 6px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(212, 175, 100, 0.1);
    overflow: hidden;
    position: relative;
    animation: modalIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes modalIn { from { opacity: 0; transform: translateY(40px) scale(0.96); } to { opacity: 1; transform: none; } }

  .modal-close {
    position: absolute; top: 16px; right: 16px; z-index: 5;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    color: #d4af64;
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(212, 175, 100, 0.3);
    transition: all 0.3s;
  }
  .modal-close:hover { background: #b22d1d; color: #fff; transform: rotate(90deg); }

  .modal-hero {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
  }
  @media (max-width: 760px) {
    .modal-hero { grid-template-columns: 1fr; }
  }
  .modal-portrait {
    position: relative;
    aspect-ratio: 1 / 1.1;
    overflow: hidden;
  }
  .modal-portrait img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .modal-portrait::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(0deg, rgba(11,8,5,0.9) 0%, transparent 30%, transparent 70%, rgba(11,8,5,0.6) 100%);
  }
  .modal-portrait .name-plate {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 24px 24px 20px;
    z-index: 2;
  }
  .modal-portrait .name-plate .cname {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 48px;
    color: #f5e1a4;
    letter-spacing: 0.15em;
    line-height: 1;
    text-shadow: 0 4px 16px rgba(0,0,0,0.8);
  }
  .modal-portrait .name-plate .title {
    font-size: 14px;
    color: #c9a86b;
    letter-spacing: 0.3em;
    margin-top: 8px;
  }
  .modal-portrait .name-plate .types {
    margin-top: 12px;
    display: flex; gap: 6px;
  }

  .modal-body {
    padding: 28px 28px 32px;
  }
  .modal-body h3 {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 22px;
    color: #d4af64;
    letter-spacing: 0.2em;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 12px;
  }
  .modal-body h3::before, .modal-body h3::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212, 175, 100, 0.5), transparent);
  }
  .modal-body .skin-sub {
    font-size: 12px; color: #8a7456;
    letter-spacing: 0.2em; margin-bottom: 20px;
  }

  .skin-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }
  .skin-card {
    background: rgba(20, 12, 6, 0.6);
    border: 1px solid rgba(212, 175, 100, 0.2);
    border-radius: 4px;
    overflow: hidden;
    transition: all 0.3s;
    cursor: zoom-in;
  }
  .skin-card:hover {
    transform: translateY(-3px);
    border-color: #d4af64;
    box-shadow: 0 8px 24px rgba(178, 45, 29, 0.3);
  }
  .skin-card .img {
    aspect-ratio: 16 / 10;
    background: #1a0e08;
    overflow: hidden;
    position: relative;
  }
  .skin-card .img img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.5s;
  }
  .skin-card:hover .img img { transform: scale(1.05); }
  .skin-card .img::before {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.6));
    pointer-events: none;
  }
  .skin-card .name {
    padding: 8px 10px;
    font-size: 13px;
    color: #f1e6c8;
    letter-spacing: 0.08em;
    text-align: center;
    border-top: 1px solid rgba(212, 175, 100, 0.1);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ========== 灯箱 ========== */
  .lightbox {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn 0.3s;
  }
  .lightbox.show { display: flex; }
  .lightbox img {
    max-width: 100%; max-height: 90vh;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    border: 1px solid rgba(212, 175, 100, 0.3);
  }
  .lightbox .label {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    padding: 8px 24px;
    background: rgba(11,8,5,0.9);
    border: 1px solid rgba(212, 175, 100, 0.3);
    color: #f5e1a4;
    font-size: 16px;
    letter-spacing: 0.2em;
    border-radius: 2px;
  }
  .lightbox-close {
    position: absolute; top: 24px; right: 24px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    color: #d4af64;
    font-size: 24px;
    border: 1px solid rgba(212, 175, 100, 0.4);
    display: flex; align-items: center; justify-content: center;
  }
  .lightbox-close:hover { background: #b22d1d; color: #fff; }

  /* ========== 页脚 ========== */
  .footer {
    text-align: center;
    padding: 32px 24px 48px;
    font-size: 12px;
    color: #5a4a32;
    letter-spacing: 0.2em;
    border-top: 1px solid rgba(212, 175, 100, 0.1);
    margin-top: 40px;
  }
  .footer a { color: #8a7456; text-decoration: none; }
  .footer a:hover { color: #d4af64; }

  /* 空状态 */
  .empty {
    text-align: center; padding: 60px 20px;
    color: #6b5a3e;
    font-size: 14px; letter-spacing: 0.2em;
  }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #0b0805; }
  ::-webkit-scrollbar-thumb { background: #3a2818; border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #5a3a22; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="bg-grain"></div>
  <div class="bg-seal"></div>

  <header class="masthead">
    <div class="subtitle">— 御 · 王 · 卷 · 山 · 河 —</div>
    <h1 class="main-title">王者荣耀图鉴</h1>
    <div class="meta">
      共 <span class="count" id="heroCount">—</span> 位英雄 ·
      <span class="count" id="skinCount">—</span> 款皮肤 · 数据来源 腾讯游戏官网
    </div>
  </header>

  <div class="filters" id="filters"></div>
  <div class="search-wrap">
    <input id="search" class="search" type="text" placeholder="搜索英雄 / 皮肤名…" />
  </div>

  <section class="gallery-section">
    <div class="section-label">
      <span class="deco-line"></span>
      <h2>全 英 雄 列 传</h2>
      <span class="deco-line"></span>
    </div>
    <div class="hero-grid" id="heroGrid"></div>
    <div class="empty" id="empty" style="display:none;">未找到匹配的英雄</div>
  </section>

  <footer class="footer">
    本站仅供学习交流 · 图片资源版权归
    <a href="https://pvp.qq.com" target="_blank" rel="noopener">腾讯游戏</a>
    所有 · 数据采集于王者荣耀官方公开接口
  </footer>

  <!-- 详情模态框 -->
  <div class="modal-mask" id="modalMask">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" aria-label="关闭">×</button>
      <div class="modal-hero">
        <div class="modal-portrait" id="modalPortrait"></div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
  </div>

  <!-- 灯箱 -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" aria-label="关闭">×</button>
    <img id="lightboxImg" src="" alt="" />
    <div class="label" id="lightboxLabel"></div>
  </div>

  <script src="hero_data.js"></script>
  <script>
    // 工具：图片 URL
    const PORTRAIT = id => `https://game.gtimg.cn/images/yxzj/img201606/heroimg/${id}/${id}-smallskin-1.jpg`;
    const SKIN_IMG = (id, idx) => `https://game.gtimg.cn/images/yxzj/img201606/skin/hero-info/${id}/${id}-bigskin-${idx}.jpg`;

    // 状态
    let currentType = 'all';
    let currentKeyword = '';

    // 统计
    const totalHeroes = HERO_DATA.length;
    const totalSkins = HERO_DATA.reduce((sum, h) => sum + h.skins.length, 0);
    document.getElementById('heroCount').textContent = totalHeroes;
    document.getElementById('skinCount').textContent = totalSkins;

    // 类型筛选
    const TYPES = [
      { key: 'all', name: '全部' },
      { key: '战士', name: '战士' },
      { key: '法师', name: '法师' },
      { key: '坦克', name: '坦克' },
      { key: '刺客', name: '刺客' },
      { key: '射手', name: '射手' },
      { key: '辅助', name: '辅助' },
    ];
    const typeCount = {};
    TYPES.forEach(t => {
      typeCount[t.key] = t.key === 'all' ? totalHeroes : HERO_DATA.filter(h => h.type === t.key || h.type2 === t.key).length;
    });

    const filtersEl = document.getElementById('filters');
    TYPES.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (t.key === 'all' ? ' active' : '');
      btn.dataset.type = t.key;
      btn.innerHTML = `${t.name}<span class="badge">${typeCount[t.key]}</span>`;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentType = t.key;
        render();
      });
      filtersEl.appendChild(btn);
    });

    // 渲染网格
    const grid = document.getElementById('heroGrid');
    const empty = document.getElementById('empty');

    function filtered() {
      const kw = currentKeyword.trim().toLowerCase();
      return HERO_DATA.filter(h => {
        const matchType = currentType === 'all' || h.type === currentType || h.type2 === currentType;
        if (!matchType) return false;
        if (!kw) return true;
        if (h.cname.toLowerCase().includes(kw)) return true;
        if (h.title.toLowerCase().includes(kw)) return true;
        if (h.skins.some(s => s.toLowerCase().includes(kw))) return true;
        return false;
      });
    }

    function render() {
      const list = filtered();
      grid.innerHTML = '';
      if (!list.length) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      const frag = document.createDocumentFragment();
      list.forEach((h, i) => {
        const card = document.createElement('div');
        card.className = 'hero-card';
        card.style.animationDelay = (Math.min(i, 60) * 0.015) + 's';
        card.innerHTML = `
          <span class="type-tag ${h.type_cls}">${h.type}</span>
          <div class="portrait">
            <img src="${PORTRAIT(h.ename)}" alt="${h.cname}" loading="lazy"
                 onerror="this.onerror=null;this.style.opacity=0.15;this.alt='暂无立绘'" />
          </div>
          <div class="info">
            <div class="name">${h.cname}</div>
            <div class="title">${h.title}</div>
            <div class="skin-count">✦ ${h.skins.length} 款皮肤</div>
          </div>
        `;
        card.addEventListener('click', () => openModal(h));
        frag.appendChild(card);
      });
      grid.appendChild(frag);
    }

    // 模态框
    const modalMask = document.getElementById('modalMask');
    const modalPortrait = document.getElementById('modalPortrait');
    const modalBody = document.getElementById('modalBody');
    const modalClose = document.getElementById('modalClose');

    function openModal(h) {
      const tags = [h.type];
      if (h.type2) tags.push(h.type2);
      modalPortrait.innerHTML = `
        <img src="${PORTRAIT(h.ename)}" alt="${h.cname}"
             onerror="this.onerror=null;this.style.opacity=0.2" />
        <div class="name-plate">
          <div class="cname">${h.cname}</div>
          <div class="title">${h.title}</div>
          <div class="types">
            ${tags.map((t, i) => {
              const cls = HERO_DATA.find(x => x.cname === h.cname && x.type === t)?.type_cls || 'type-other';
              return `<span class="type-tag ${cls}">${t}</span>`;
            }).join('')}
          </div>
        </div>
      `;
      const skinsHtml = h.skins.map((s, i) => `
        <div class="skin-card" data-idx="${i + 1}" data-name="${s}">
          <div class="img">
            <img src="${SKIN_IMG(h.ename, i + 1)}" alt="${s}" loading="lazy"
                 onerror="this.onerror=null;this.style.opacity=0.15" />
          </div>
          <div class="name">${s}</div>
        </div>
      `).join('');
      modalBody.innerHTML = `
        <h3>皮 肤 列 表</h3>
        <div class="skin-sub">共 ${h.skins.length} 款 · 单击查看大图</div>
        <div class="skin-grid">${skinsHtml}</div>
      `;
      modalBody.querySelectorAll('.skin-card').forEach(card => {
        card.addEventListener('click', () => {
          openLightbox(SKIN_IMG(h.ename, card.dataset.idx), card.dataset.name);
        });
      });
      modalMask.classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      modalMask.classList.remove('show');
      document.body.style.overflow = '';
    }
    modalClose.addEventListener('click', closeModal);
    modalMask.addEventListener('click', e => { if (e.target === modalMask) closeModal(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); closeLightbox(); }
    });

    // 灯箱
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxLabel = document.getElementById('lightboxLabel');
    const lightboxClose = document.getElementById('lightboxClose');
    function openLightbox(src, name) {
      lightboxImg.src = src;
      lightboxImg.alt = name || '';
      lightboxLabel.textContent = name || '';
      lightbox.classList.add('show');
    }
    function closeLightbox() {
      lightbox.classList.remove('show');
    }
    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox || e.target === lightboxLabel) closeLightbox(); });

    // 搜索
    const searchInput = document.getElementById('search');
    let searchTimer;
    searchInput.addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        currentKeyword = e.target.value;
        render();
      }, 120);
    });

    // 首屏
    render();
  </script>
</body>
</html>

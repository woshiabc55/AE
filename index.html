<style>
/* ============================================================
   THEME TOKENS
   ============================================================ */
:root, [data-theme="dark"]{
  --bg-0:#070713; --bg-1:#0c0c20; --bg-2:#12122b;
  --panel:rgba(20,20,45,0.55); --panel-2:rgba(30,30,60,0.65);
  --border:rgba(120,120,200,0.18); --border-2:rgba(160,160,255,0.28);
  --text-0:#f5f5ff; --text-1:#c8c8e6; --text-2:#8a8aab; --text-3:#5a5a7a;
  --accent-a:#7c5cff; --accent-b:#22d3ee; --accent-c:#ff5d8f; --accent-d:#ffd166;
  --grad-1:linear-gradient(135deg,#7c5cff 0%,#22d3ee 100%);
  --grad-2:linear-gradient(135deg,#ff5d8f 0%,#ffd166 100%);
  --grad-3:linear-gradient(135deg,#22d3ee 0%,#10b981 100%);
  --grad-4:linear-gradient(135deg,#7c5cff 0%,#ff5d8f 100%);
  --grad-5:linear-gradient(135deg,#f472b6 0%,#c084fc 100%);
  --shadow-1:0 8px 30px rgba(0,0,0,0.35);
  --shadow-2:0 12px 50px rgba(124,92,255,0.25);
  --grid-line:rgba(255,255,255,0.025);
  --noise:0;
}
[data-theme="light"]{
  --bg-0:#f4f4fa; --bg-1:#eeeef8; --bg-2:#e6e6f0;
  --panel:rgba(255,255,255,0.7); --panel-2:rgba(255,255,255,0.85);
  --border:rgba(80,80,140,0.18); --border-2:rgba(120,120,200,0.32);
  --text-0:#1a1a30; --text-1:#3a3a55; --text-2:#6a6a85; --text-3:#9a9ab0;
  --accent-a:#5c3aff; --accent-b:#0891b2; --accent-c:#e11d48; --accent-d:#b45309;
  --shadow-1:0 8px 30px rgba(60,60,140,0.10);
  --shadow-2:0 12px 50px rgba(92,58,255,0.15);
  --grid-line:rgba(0,0,0,0.04);
}
[data-theme="cyber"]{
  --bg-0:#000510; --bg-1:#001020; --bg-2:#001a30;
  --panel:rgba(0,30,60,0.55); --panel-2:rgba(0,40,80,0.65);
  --border:rgba(0,255,255,0.25); --border-2:rgba(255,0,255,0.35);
  --text-0:#00ffd5; --text-1:#80fff0; --text-2:#40c0c0; --text-3:#208080;
  --accent-a:#ff00ff; --accent-b:#00ffff; --accent-c:#ffff00; --accent-d:#ff0080;
  --grad-1:linear-gradient(135deg,#ff00ff 0%,#00ffff 100%);
  --grad-2:linear-gradient(135deg,#ffff00 0%,#ff0080 100%);
  --grid-line:rgba(0,255,255,0.06);
}
[data-density="compact"] .grid{gap:10px}
[data-density="compact"] .card{padding:12px 12px 10px}
[data-density="compact"] .hero{padding:36px 40px 44px}
[data-anim="off"] *{animation-duration:0s!important;transition-duration:0s!important}
[data-accent="cyan"]   { --accent-a:#22d3ee; --grad-1:linear-gradient(135deg,#22d3ee 0%,#7c5cff 100%); --grad-2:linear-gradient(135deg,#22d3ee 0%,#10b981 100%); }
[data-accent="pink"]   { --accent-a:#ff5d8f; --grad-1:linear-gradient(135deg,#ff5d8f 0%,#7c5cff 100%); --grad-2:linear-gradient(135deg,#ff5d8f 0%,#ffd166 100%); }
[data-accent="yellow"] { --accent-a:#ffd166; --grad-1:linear-gradient(135deg,#ffd166 0%,#ff5d8f 100%); --grad-2:linear-gradient(135deg,#ffd166 0%,#22d3ee 100%); }
[data-accent="green"]  { --accent-a:#10b981; --grad-1:linear-gradient(135deg,#10b981 0%,#22d3ee 100%); --grad-2:linear-gradient(135deg,#10b981 0%,#7c5cff 100%); }
[data-accent="orange"] { --accent-a:#fb923c; --grad-1:linear-gradient(135deg,#fb923c 0%,#ff5d8f 100%); --grad-2:linear-gradient(135deg,#fb923c 0%,#ffd166 100%); }
[data-fontsize="s"] { font-size:14px }
[data-fontsize="s"] h1, [data-fontsize="s"] .stat .val, [data-fontsize="s"] .insight .v { font-size:0.92em }
[data-fontsize="l"] { font-size:17px }
[data-fontsize="l"] h1, [data-fontsize="l"] .stat .val, [data-fontsize="l"] .insight .v { font-size:1.08em }
[data-radius="square"] .card, [data-radius="square"] .entry-card, [data-radius="square"] .viz-card, [data-radius="square"] .insight, [data-radius="square"] .stat, [data-radius="square"] .btn, [data-radius="square"] .chip, [data-radius="square"] .search, [data-radius="square"] .toolbar, [data-radius="square"] .hero, [data-radius="square"] .ip-hero, [data-radius="square"] .region-card, [data-radius="square"] .modal-box, [data-radius="square"] .settings-group, [data-radius="square"] .topnav, [data-radius="square"] .timeline-stage, [data-radius="square"] .compare-picker, [data-radius="square"] .compare-result, [data-radius="square"] .filters { border-radius:4px }
[data-radius="round"] .card, [data-radius="round"] .entry-card, [data-radius="round"] .viz-card, [data-radius="round"] .insight, [data-radius="round"] .stat, [data-radius="round"] .btn, [data-radius="round"] .chip, [data-radius="round"] .search, [data-radius="round"] .toolbar, [data-radius="round"] .hero, [data-radius="round"] .ip-hero, [data-radius="round"] .region-card, [data-radius="round"] .modal-box, [data-radius="round"] .settings-group, [data-radius="round"] .topnav, [data-radius="round"] .timeline-stage, [data-radius="round"] .compare-picker, [data-radius="round"] .compare-result, [data-radius="round"] .filters { border-radius:24px }
[data-blur="off"] *{backdrop-filter:none!important;-webkit-backdrop-filter:none!important}
[data-blur="light"] [style*="blur"] { backdrop-filter:blur(8px)!important;-webkit-backdrop-filter:blur(8px)!important }
[data-blur="light"] .card, [data-blur="light"] .entry-card, [data-blur="light"] .viz-card, [data-blur="light"] .insight, [data-blur="light"] .stat, [data-blur="light"] .btn, [data-blur="light"] .chip, [data-blur="light"] .search, [data-blur="light"] .toolbar, [data-blur="light"] .hero, [data-blur="light"] .ip-hero, [data-blur="light"] .region-card, [data-blur="light"] .modal-box, [data-blur="light"] .settings-group, [data-blur="light"] .topnav, [data-blur="light"] .timeline-stage, [data-blur="light"] .compare-picker, [data-blur="light"] .compare-result, [data-blur="light"] .filters { backdrop-filter:blur(8px) saturate(140%)!important;-webkit-backdrop-filter:blur(8px) saturate(140%)!important }
[data-contrast="high"] { --text-0:#ffffff; --text-1:#e8e8f5; --text-2:#b8b8d0; --border:rgba(255,255,255,0.35); --border-2:rgba(255,255,255,0.5) }
[data-contrast="high"] [data-theme="light"] { --text-0:#000000; --text-1:#1a1a1a; --text-2:#3a3a3a; --border:rgba(0,0,0,0.4); --border-2:rgba(0,0,0,0.55) }
[data-density="compact"] .card{padding:12px 12px 10px}
[data-density="compact"] .entry-card{padding:16px 16px 16px;min-height:130px}
[data-density="compact"] .hero{padding:32px 32px 40px}
[data-density="compact"] .grid{gap:10px}
[data-density="compact"] .viz-grid{gap:12px}
[data-density="comfortable"] .card{padding:20px 20px 18px}
[data-density="comfortable"] .grid{gap:18px}
[data-density="comfortable"] .hero{padding:60px 60px 70px}
[data-anim="off"] *{animation-duration:0s!important;transition-duration:0s!important}
[data-animspeed="slow"] *{animation-duration:0.6s!important;transition-duration:0.4s!important}
[data-animspeed="fast"] *{animation-duration:0.15s!important;transition-duration:0.1s!important}
[data-hover="glow"] .card:hover{transform:none;box-shadow:0 0 30px var(--accent-a)}
[data-hover="scale"] .card:hover{transform:scale(1.02)}
[data-gridcols="2"] .grid:not(.rank-list){grid-template-columns:repeat(2,1fr)!important}
[data-gridcols="3"] .grid:not(.rank-list){grid-template-columns:repeat(3,1fr)!important}
[data-gridcols="4"] .grid:not(.rank-list){grid-template-columns:repeat(4,1fr)!important}
[data-focus="weak"] *:focus-visible{outline:1px solid var(--accent-a)!important;box-shadow:none!important}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg-0); color:var(--text-0);
  overflow-x:hidden; -webkit-font-smoothing:antialiased;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-2;
  background:
    radial-gradient(60vw 50vh at 12% 8%, rgba(124,92,255,0.22), transparent 60%),
    radial-gradient(50vw 50vh at 88% 20%, rgba(34,211,238,0.18), transparent 60%),
    radial-gradient(60vw 60vh at 50% 100%, rgba(255,93,143,0.12), transparent 60%),
    linear-gradient(180deg,var(--bg-0) 0%,var(--bg-1) 50%,var(--bg-0) 100%);
}
[data-theme="light"] body::before{
  background:
    radial-gradient(60vw 50vh at 12% 8%, rgba(124,92,255,0.10), transparent 60%),
    radial-gradient(50vw 50vh at 88% 20%, rgba(34,211,238,0.08), transparent 60%),
    linear-gradient(180deg,var(--bg-0) 0%,var(--bg-1) 50%,var(--bg-0) 100%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background-image:
    linear-gradient(var(--grid-line) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
h1,h2,h3,h4{font-family:'Space Grotesk','Inter','PingFang SC',sans-serif;letter-spacing:-0.01em}
.app{max-width:1480px;margin:0 auto;padding:0 32px 80px}

/* === Top Nav === */
.topnav{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:18px;padding:14px 32px;
  background:rgba(7,7,19,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
[data-theme="light"] .topnav{background:rgba(244,244,250,0.85)}
.brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.brand .logo{
  width:36px;height:36px;border-radius:11px;background:var(--grad-1);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:18px;color:#fff;
  box-shadow:0 6px 20px rgba(124,92,255,0.45);
  position:relative;overflow:hidden;
}
.brand .logo::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.4),transparent 50%)}
.brand .name{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;letter-spacing:0.01em}
.brand .name small{display:block;font-size:10px;color:var(--text-2);font-family:'JetBrains Mono',monospace;letter-spacing:0.18em;text-transform:uppercase;font-weight:500}
.navlinks{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.navlinks::-webkit-scrollbar{display:none}
.navlinks a{
  padding:8px 14px;border-radius:10px;font-size:13px;font-weight:500;
  color:var(--text-2);transition:all 0.2s;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.navlinks a:hover{color:var(--text-0);background:rgba(255,255,255,0.04)}
.navlinks a.active{color:#fff;background:var(--grad-1);box-shadow:0 4px 14px rgba(124,92,255,0.35)}
.navlinks a svg{width:14px;height:14px}
.topnav-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.theme-btn,.topbtn{
  width:36px;height:36px;border-radius:10px;background:var(--panel);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  color:var(--text-1);transition:all 0.2s;
}
.theme-btn:hover,.topbtn:hover{border-color:var(--accent-a);color:var(--text-0)}
.theme-btn svg,.topbtn svg{width:16px;height:16px}
.theme-dot{width:8px;height:8px;border-radius:50%;background:var(--grad-1);box-shadow:0 0 12px rgba(124,92,255,0.6);margin-left:4px}

/* === Generic blocks === */
.hero{
  position:relative;border-radius:28px;padding:48px 48px 56px;
  background:linear-gradient(135deg,rgba(124,92,255,0.12),rgba(34,211,238,0.06) 50%,rgba(255,93,143,0.10));
  border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-1);
  margin-bottom:28px;
}
.hero-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.hero h1{
  font-size:48px;font-weight:800;letter-spacing:-0.02em;
  background:linear-gradient(120deg,#fff 20%,#c8b3ff 50%,#7ee0ff 90%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  line-height:1.1;margin-bottom:14px;
}
.hero h2{font-size:28px;font-weight:700;margin-bottom:10px;letter-spacing:-0.01em}
.hero h3{font-size:18px;font-weight:600;margin-bottom:8px}
.hero p.sub{color:var(--text-1);font-size:16px;line-height:1.6;max-width:780px}
.hero .meta{display:flex;gap:18px;flex-wrap:wrap;margin-top:18px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-2)}
.hero .meta span b{color:var(--text-0);font-weight:600}
.tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:22px}
.tag{font-size:12px;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text-1);font-family:'JetBrains Mono',monospace}
.tag.live{color:var(--accent-d);border-color:rgba(255,209,102,0.4)}
.tag.acc{color:var(--accent-b);border-color:rgba(34,211,238,0.4)}

.stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;margin-bottom:28px}
.stat{
  position:relative;padding:18px 20px;border-radius:18px;
  background:var(--panel);border:1px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);overflow:hidden;
}
.stat::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--g,var(--grad-1)) 0%,transparent 60%);opacity:0.18;pointer-events:none}
.stat .label{font-size:12px;color:var(--text-2);letter-spacing:0.12em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.stat .val{font-size:32px;font-weight:800;margin-top:6px;letter-spacing:-0.02em;font-family:'Space Grotesk',sans-serif}
.stat .val small{font-size:14px;font-weight:500;color:var(--text-2);margin-left:6px;font-family:'Inter',sans-serif}
.stat .delta{font-size:12px;color:var(--accent-b);margin-top:6px;font-family:'JetBrains Mono',monospace}
.stat:nth-child(1){--g:var(--grad-1)} .stat:nth-child(2){--g:var(--grad-2)}
.stat:nth-child(3){--g:var(--grad-3)} .stat:nth-child(4){--g:var(--grad-4)}
.stat:nth-child(5){--g:var(--grad-1)}

/* === Entry Grid (Home) === */
.entry-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-bottom:28px}
.entry-card{
  position:relative;padding:22px 22px 24px;border-radius:20px;
  background:var(--panel);border:1px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  overflow:hidden;cursor:pointer;transition:all 0.25s;
  text-align:left;display:flex;flex-direction:column;gap:10px;min-height:150px;
}
.entry-card::before{
  content:'';position:absolute;left:0;top:0;right:0;height:2px;
  background:var(--g,var(--grad-1));opacity:0.85;
}
.entry-card::after{
  content:'';position:absolute;right:-30px;bottom:-30px;width:120px;height:120px;border-radius:50%;
  background:var(--g,var(--grad-1));opacity:0.05;filter:blur(20px);
  transition:all 0.3s;
}
.entry-card:hover{transform:translateY(-3px);border-color:var(--border-2);box-shadow:0 14px 40px rgba(0,0,0,0.4)}
.entry-card:hover::after{opacity:0.12;transform:scale(1.2)}
.entry-card .icon{
  width:42px;height:42px;border-radius:12px;background:var(--g,var(--grad-1));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(0,0,0,0.3);
  position:relative;overflow:hidden;
}
.entry-card .icon::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.4),transparent 50%)}
.entry-card .icon svg{width:20px;height:20px;color:#fff;position:relative;z-index:1}
.entry-card h3{font-size:16px;font-weight:600;color:var(--text-0);line-height:1.3;display:flex;align-items:center;gap:8px}
.entry-card h3 .arr{margin-left:auto;opacity:0.5;transition:transform 0.2s}
.entry-card:hover .arr{transform:translateX(4px);opacity:1}
.entry-card p{font-size:12px;color:var(--text-1);line-height:1.5;flex:1}
.entry-card .ec{font-size:10px;color:var(--text-3);font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;margin-top:4px}
.entry-card.c1{--g:var(--grad-1)} .entry-card.c2{--g:var(--grad-2)}
.entry-card.c3{--g:var(--grad-3)} .entry-card.c4{--g:var(--grad-4)}
.entry-card.c5{--g:var(--grad-5)} .entry-card.c6{--g:linear-gradient(135deg,#4ade80,#22d3ee)}
.entry-card.c7{--g:linear-gradient(135deg,#fb923c,#ff5d8f)} .entry-card.c8{--g:linear-gradient(135deg,#60a5fa,#7c5cff)}
.entry-card.c9{--g:linear-gradient(135deg,#e879f9,#22d3ee)}

/* === Toolbar (Browse) === */
.toolbar{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;margin-bottom:18px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text-2);width:18px;height:18px}
.search{
  width:100%;padding:18px 22px 18px 50px;font-size:15px;color:var(--text-0);
  background:var(--panel);border:1px solid var(--border);border-radius:16px;
  outline:none;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  transition:all 0.2s;
}
.search::placeholder{color:var(--text-3)}
.search:focus{border-color:var(--accent-a);box-shadow:0 0 0 4px rgba(124,92,255,0.15)}
.toolbar-actions{display:flex;gap:10px;align-items:center}
.btn{
  padding:12px 16px;border-radius:12px;background:var(--panel);border:1px solid var(--border);
  color:var(--text-1);font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:8px;transition:all 0.2s;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.btn:hover{border-color:var(--accent-a);color:var(--text-0)}
.btn svg{width:14px;height:14px}
.btn.primary{background:var(--grad-1);border-color:transparent;color:#fff;font-weight:600}
.btn.primary:hover{box-shadow:0 8px 24px rgba(124,92,255,0.4)}
.btn.danger{color:var(--accent-c);border-color:rgba(255,93,143,0.3)}
.btn.danger:hover{background:rgba(255,93,143,0.1);border-color:var(--accent-c)}

/* === Body layout (Browse) === */
.body{display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:flex-start}
.filters{
  position:sticky;top:80px;background:var(--panel);border:1px solid var(--border);
  border-radius:20px;padding:20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  max-height:calc(100vh - 104px);overflow-y:auto;
}
.filters::-webkit-scrollbar{width:6px}
.filters::-webkit-scrollbar-thumb{background:rgba(124,92,255,0.3);border-radius:3px}
.f-group{margin-bottom:22px}
.f-group:last-child{margin-bottom:0}
.f-title{
  font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text-2);margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;
}
.f-title .clear{color:var(--accent-b);cursor:pointer;font-size:11px;text-transform:none;letter-spacing:0}
.f-title .clear:hover{text-decoration:underline}
.f-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  font-size:12px;padding:6px 11px;border-radius:10px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text-1);
  transition:all 0.15s;cursor:pointer;user-select:none;
}
.chip:hover{border-color:var(--border-2);color:var(--text-0)}
.chip.active{background:var(--grad-1);border-color:transparent;color:#fff;font-weight:600;box-shadow:0 4px 14px rgba(124,92,255,0.35)}
.chip .n{opacity:0.55;font-size:10px;margin-left:4px;font-family:'JetBrains Mono',monospace}
.f-list{display:flex;flex-direction:column;gap:5px;max-height:240px;overflow-y:auto;padding-right:4px}
.f-list::-webkit-scrollbar{width:4px}
.f-list::-webkit-scrollbar-thumb{background:rgba(124,92,255,0.3);border-radius:2px}
.f-item{
  display:flex;justify-content:space-between;align-items:center;
  font-size:13px;padding:6px 10px;border-radius:8px;cursor:pointer;
  color:var(--text-1);transition:all 0.15s;
}
.f-item:hover{background:rgba(255,255,255,0.04);color:var(--text-0)}
.f-item.active{background:rgba(124,92,255,0.18);color:var(--text-0)}
.f-item .n{color:var(--text-3);font-family:'JetBrains Mono',monospace;font-size:11px}

/* === Results === */
.results-head{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;
}
.results-count{font-size:14px;color:var(--text-1)}
.results-count b{color:var(--text-0);font-weight:700;font-size:18px;margin:0 4px}
.sort{
  display:flex;gap:6px;align-items:center;background:var(--panel);border:1px solid var(--border);
  border-radius:12px;padding:4px;
}
.sort button{
  padding:8px 14px;border-radius:8px;font-size:12px;color:var(--text-2);font-weight:500;
  transition:all 0.15s;
}
.sort button.active{background:var(--grad-1);color:#fff}
.sort button:hover:not(.active){color:var(--text-0)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{
  position:relative;background:var(--panel-2);border:1px solid var(--border);
  border-radius:16px;padding:16px 16px 14px;transition:all 0.2s;overflow:hidden;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);cursor:pointer;
}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--g,var(--grad-1));opacity:0.85}
.card:hover{transform:translateY(-3px);border-color:var(--border-2);box-shadow:0 14px 40px rgba(0,0,0,0.4)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-title{font-size:15px;font-weight:600;color:var(--text-0);line-height:1.35;flex:1}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;background:rgba(124,92,255,0.18);color:var(--accent-a);letter-spacing:0.05em;white-space:nowrap;flex-shrink:0}
.badge.b-anime{background:rgba(34,211,238,0.15);color:var(--accent-b)}
.badge.b-manga{background:rgba(255,93,143,0.15);color:var(--accent-c)}
.badge.b-film{background:rgba(255,209,102,0.15);color:var(--accent-d)}
.badge.b-tv{background:rgba(124,92,255,0.18);color:var(--accent-a)}
.badge.b-stage{background:rgba(168,85,247,0.18);color:#c084fc}
.badge.b-novel{background:rgba(74,222,128,0.15);color:#4ade80}
.badge.b-game{background:rgba(244,114,182,0.15);color:#f472b6}
.badge.b-music{background:rgba(251,146,60,0.15);color:#fb923c}
.badge.b-otaku{background:rgba(96,165,250,0.15);color:#60a5fa}
.badge.b-web{background:rgba(45,212,191,0.15);color:#2dd4bf}
.badge.b-radio{background:rgba(232,121,249,0.15);color:#e879f9}
.badge.b-short{background:rgba(248,113,113,0.15);color:#f87171}
.badge.b-live{background:rgba(253,224,71,0.15);color:#fde047}
.badge.b-other{background:rgba(148,163,184,0.15);color:#94a3b8}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;font-size:11px;color:var(--text-2);font-family:'JetBrains Mono',monospace}
.card-meta span{display:inline-flex;align-items:center;gap:3px}
.card-meta .ip{color:var(--accent-b);font-weight:600}
.card-meta .year{color:var(--accent-d)}
.card-desc{font-size:12px;color:var(--text-1);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity 0.2s}
.card:hover .card-actions{opacity:1}
.icon-btn{
  width:26px;height:26px;border-radius:7px;background:rgba(0,0,0,0.5);
  display:flex;align-items:center;justify-content:center;color:#fff;
  backdrop-filter:blur(8px);transition:all 0.2s;
}
.icon-btn:hover{background:var(--accent-a)}
.icon-btn.faved{background:var(--accent-c)}
.icon-btn svg{width:12px;height:12px}
.empty{
  grid-column:1/-1;padding:60px 20px;text-align:center;color:var(--text-2);
  background:var(--panel);border:1px dashed var(--border);border-radius:18px;
}
.empty h3{color:var(--text-1);margin-bottom:6px;font-size:18px}
.pager{display:flex;justify-content:center;align-items:center;gap:6px;flex-wrap:wrap;margin-top:32px}
.pager button{
  min-width:38px;height:38px;padding:0 12px;border-radius:10px;
  background:var(--panel);border:1px solid var(--border);
  color:var(--text-1);font-size:13px;font-weight:500;transition:all 0.15s;
}
.pager button:hover:not(:disabled){border-color:var(--accent-a);color:var(--text-0)}
.pager button:disabled{opacity:0.4;cursor:not-allowed}
.pager button.active{background:var(--grad-1);border-color:transparent;color:#fff;font-weight:600}
.pager .ellipsis{color:var(--text-3);padding:0 6px}

.foot{
  margin-top:48px;padding-top:24px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
  font-size:12px;color:var(--text-3);font-family:'JetBrains Mono',monospace;
}
.foot b{color:var(--accent-b);font-weight:600}

/* === Modal === */
.modal{
  position:fixed;inset:0;z-index:1000;background:rgba(7,7,19,0.7);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s;
}
.modal.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{
  width:100%;max-width:560px;
  background:linear-gradient(180deg,#15152e,#0c0c20);
  border:1px solid var(--border-2);border-radius:20px;padding:28px;
  position:relative;max-height:80vh;overflow-y:auto;
  box-shadow:0 30px 80px rgba(0,0,0,0.5);
}
[data-theme="light"] .modal-box{background:linear-gradient(180deg,#ffffff,#f0f0fa)}
.modal-box::-webkit-scrollbar{width:6px}
.modal-box::-webkit-scrollbar-thumb{background:rgba(124,92,255,0.3);border-radius:3px}
.modal-close{
  position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.06);color:var(--text-1);
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.modal-close:hover{background:rgba(255,255,255,0.12);color:#fff}
.modal h2{
  font-size:22px;font-weight:700;margin-bottom:8px;line-height:1.3;
  background:linear-gradient(120deg,#fff,#c8b3ff);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.modal .ip-line{
  display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--accent-b);
  font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;margin-bottom:14px;
  padding:4px 10px;border-radius:6px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.18);
}
.modal .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.modal .modal-grid .cell{
  padding:10px 12px;border-radius:10px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
}
.modal .modal-grid .cell .k{font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.modal .modal-grid .cell .v{font-size:14px;color:var(--text-0);font-weight:500}
.modal-desc{color:var(--text-1);font-size:14px;line-height:1.7}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.modal-related{margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.modal-related h4{font-size:12px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;font-family:'JetBrains Mono',monospace}
.modal-related .rel-item{
  padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.03);
  font-size:12px;color:var(--text-1);margin-bottom:4px;cursor:pointer;transition:all 0.15s;
}
.modal-related .rel-item:hover{background:rgba(124,92,255,0.15);color:var(--text-0)}

/* === Viz === */
.viz-controls{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
  background:var(--panel);border:1px solid var(--border);border-radius:16px;
  padding:14px 18px;margin-bottom:20px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.viz-controls .label{font-size:12px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.1em;font-family:'JetBrains Mono',monospace;margin-right:6px}
.viz-chip{
  font-size:12px;padding:6px 12px;border-radius:10px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text-1);
  cursor:pointer;transition:all 0.15s;
}
.viz-chip:hover{border-color:var(--border-2);color:var(--text-0)}
.viz-chip.active{background:var(--grad-1);border-color:transparent;color:#fff;font-weight:600}
.viz-grid{
  display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:18px;margin-bottom:18px;
}
.viz-card{
  position:relative;background:var(--panel);border:1px solid var(--border);
  border-radius:18px;padding:18px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  overflow:hidden;
}
.viz-card.span-12{grid-column:span 12}
.viz-card.span-8{grid-column:span 8}
.viz-card.span-6{grid-column:span 6}
.viz-card.span-4{grid-column:span 4}
.viz-card .vhead{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;
}
.viz-card .vhead h3{
  font-size:14px;font-weight:600;color:var(--text-0);
  display:flex;align-items:center;gap:8px;letter-spacing:0.02em;
}
.viz-card .vhead h3 svg{width:16px;height:16px;color:var(--accent-a)}
.viz-card .vhead .vmeta{font-size:11px;color:var(--text-3);font-family:'JetBrains Mono',monospace}
.chart{width:100%;height:340px}
.chart.tall{height:420px}
.chart.short{height:260px}
.viz-insights{
  display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px;
}
.insight{
  background:var(--panel);border:1px solid var(--border);border-radius:16px;
  padding:16px 18px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  position:relative;overflow:hidden;
}
.insight::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--g,var(--grad-1)) 0%,transparent 60%);opacity:0.15;pointer-events:none}
.insight .k{font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.12em;font-family:'JetBrains Mono',monospace}
.insight .v{font-size:24px;font-weight:800;margin-top:4px;font-family:'Space Grotesk',sans-serif}
.insight .v small{font-size:12px;color:var(--text-2);font-weight:500;margin-left:4px;font-family:'Inter',sans-serif}
.insight .h{font-size:12px;color:var(--text-1);margin-top:6px;line-height:1.4}
.insight:nth-child(1){--g:var(--grad-1)} .insight:nth-child(2){--g:var(--grad-2)}
.insight:nth-child(3){--g:var(--grad-3)} .insight:nth-child(4){--g:var(--grad-4)}

/* === IP Detail === */
.ip-hero{
  border-radius:24px;padding:36px 36px 32px;margin-bottom:24px;
  background:linear-gradient(135deg,rgba(124,92,255,0.16),rgba(34,211,238,0.08) 50%,rgba(255,93,143,0.10));
  border:1px solid var(--border-2);position:relative;overflow:hidden;
}
.ip-hero h1{font-size:36px;font-weight:800;margin-bottom:8px}
.ip-hero .ip-sub{color:var(--text-1);font-size:14px;font-family:'JetBrains Mono',monospace;letter-spacing:0.08em}
.ip-hero-actions{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
.ip-grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:18px;margin-bottom:18px}
.ip-grid .viz-card.span-12{grid-column:span 12}
.ip-grid .viz-card.span-8{grid-column:span 8}
.ip-grid .viz-card.span-6{grid-column:span 6}
.ip-grid .viz-card.span-4{grid-column:span 4}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;
  background:var(--panel);border:1px solid var(--border);color:var(--text-1);
  font-size:12px;margin-bottom:18px;transition:all 0.2s;
}
.back-btn:hover{border-color:var(--accent-a);color:var(--text-0)}

/* === Rankings === */
.rank-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.rank-tab{
  padding:10px 18px;border-radius:12px;background:var(--panel);border:1px solid var(--border);
  color:var(--text-1);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;gap:6px;
}
.rank-tab:hover{border-color:var(--border-2)}
.rank-tab.active{background:var(--grad-1);border-color:transparent;color:#fff;font-weight:600}
.rank-tab svg{width:14px;height:14px}
.rank-list{display:flex;flex-direction:column;gap:4px}
.rank-row{
  display:grid;grid-template-columns:60px 1fr 100px 80px;align-items:center;gap:14px;
  padding:10px 16px;border-radius:12px;background:var(--panel);border:1px solid var(--border);
  transition:all 0.15s;cursor:pointer;
}
.rank-row:hover{border-color:var(--accent-a);background:rgba(124,92,255,0.08)}
.rank-num{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text-2);text-align:center}
.rank-row:nth-child(1) .rank-num{color:#ffd166}
.rank-row:nth-child(2) .rank-num{color:#c0c0d0}
.rank-row:nth-child(3) .rank-num{color:#cd7f32}
.rank-name{font-size:14px;color:var(--text-0);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-bar-wrap{height:8px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;position:relative}
.rank-bar{height:100%;background:var(--grad-1);border-radius:4px;transition:width 0.4s}
.rank-val{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent-b);text-align:right;font-weight:600}

/* === Compare === */
.compare-picker{
  background:var(--panel);border:1px solid var(--border);border-radius:18px;
  padding:18px 20px;margin-bottom:20px;
}
.compare-picker h3{font-size:14px;margin-bottom:10px;color:var(--text-0)}
.compare-picker p{font-size:12px;color:var(--text-2);margin-bottom:12px}
.compare-chips{display:flex;flex-wrap:wrap;gap:6px;max-height:200px;overflow-y:auto;padding-right:4px}
.compare-result{
  background:var(--panel);border:1px solid var(--border);border-radius:18px;
  padding:18px;margin-bottom:18px;
}
.compare-result h3{font-size:14px;margin-bottom:14px;color:var(--text-0);display:flex;align-items:center;gap:8px}
.compare-table{width:100%;border-collapse:collapse;font-size:13px}
.compare-table th{text-align:left;padding:10px 12px;font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.1em;font-family:'JetBrains Mono',monospace;font-weight:600;border-bottom:1px solid var(--border)}
.compare-table td{padding:12px;border-bottom:1px solid var(--border);color:var(--text-0)}
.compare-table tr:hover td{background:rgba(124,92,255,0.06)}
.compare-bar{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.compare-bar > div{height:100%;border-radius:3px}

/* === Timeline === */
.timeline-stage{
  background:var(--panel);border:1px solid var(--border);border-radius:20px;
  padding:24px 28px;margin-bottom:20px;
}
.timeline-year{font-size:64px;font-weight:800;background:var(--grad-1);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;font-family:'Space Grotesk',sans-serif;text-align:center;margin:8px 0}
.timeline-slider{width:100%;margin:18px 0 8px;appearance:none;height:6px;border-radius:3px;background:rgba(255,255,255,0.1);outline:none}
.timeline-slider::-webkit-slider-thumb{appearance:none;width:22px;height:22px;border-radius:50%;background:var(--grad-1);cursor:pointer;box-shadow:0 0 0 4px rgba(124,92,255,0.25)}
.timeline-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--grad-1);cursor:pointer;border:none;box-shadow:0 0 0 4px rgba(124,92,255,0.25)}
.timeline-scale{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-3);margin-top:4px}
.timeline-events{margin-top:24px}
.timeline-events h3{font-size:14px;margin-bottom:10px}
.timeline-row{
  display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);
  font-size:13px;
}
.timeline-row:last-child{border-bottom:none}
.timeline-row .yr{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent-d);width:50px;flex-shrink:0}
.timeline-row .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-0)}
.timeline-row .tp{font-size:10px;color:var(--text-2);font-family:'JetBrains Mono',monospace}

/* === Map === */
.region-grid{
  display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:18px;margin-bottom:18px;
}
.region-card{
  position:relative;background:var(--panel);border:1px solid var(--border);
  border-radius:18px;padding:24px;backdrop-filter:blur(20px);
  overflow:hidden;cursor:pointer;transition:all 0.2s;
}
.region-card:hover{transform:translateY(-3px);border-color:var(--border-2)}
.region-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--g);
}
.region-card.r1{--g:var(--grad-1)} .region-card.r2{--g:var(--grad-2)}
.region-card.r3{--g:var(--grad-3)} .region-card.r4{--g:var(--grad-4)}
.region-card .rn{font-size:14px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.1em;font-family:'JetBrains Mono',monospace;margin-bottom:4px}
.region-card .rc{font-size:36px;font-weight:800;font-family:'Space Grotesk',sans-serif;letter-spacing:-0.02em}
.region-card .rp{font-size:12px;color:var(--text-1);margin-top:4px}
.region-card .rbar{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;margin-top:14px;overflow:hidden}
.region-card .rbar > div{height:100%;background:var(--g);border-radius:3px}

/* === Collections === */
.coll-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.coll-tags{display:flex;gap:6px;flex-wrap:wrap}
.coll-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.coll-empty{padding:60px 20px;text-align:center;color:var(--text-2);background:var(--panel);border:1px dashed var(--border);border-radius:18px}
.coll-empty h3{color:var(--text-1);margin-bottom:6px;font-size:18px}

/* === Settings === */
.settings-group{
  background:var(--panel);border:1px solid var(--border);border-radius:18px;
  padding:20px 24px;margin-bottom:16px;backdrop-filter:blur(20px);
}
.settings-group h3{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--text-0)}
.settings-group h3 svg{width:16px;height:16px;color:var(--accent-a)}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.settings-row:last-child{border-bottom:none}
.settings-row .lbl{color:var(--text-1)}
.settings-row .desc{font-size:11px;color:var(--text-3);margin-top:2px}
.settings-row .opts{display:flex;gap:6px}
.toggle{
  width:42px;height:24px;border-radius:12px;background:rgba(255,255,255,0.1);
  position:relative;cursor:pointer;transition:all 0.2s;border:1px solid var(--border);
}
.toggle.on{background:var(--grad-1);border-color:transparent}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;
  background:#fff;transition:all 0.2s;
}
.toggle.on::after{left:20px}

/* === Loader === */
#loader{
  position:fixed;inset:0;z-index:9999;background:var(--bg-0);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;
  transition:opacity 0.4s;
}
#loader .ring{
  width:56px;height:56px;border-radius:50%;
  border:3px solid rgba(124,92,255,0.2);
  border-top-color:var(--accent-a);
  animation:spin 0.9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loader .lt{color:var(--text-1);font-size:14px;font-family:'JetBrains Mono',monospace;letter-spacing:0.1em}
#loader .lp{color:var(--text-3);font-size:12px}
#loader.hidden{opacity:0;pointer-events:none}

/* === Featured / Spotlight === */
.spotlight-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:18px}
.spot-card{
  position:relative;padding:18px 18px 20px;border-radius:18px;
  background:var(--panel);border:1px solid var(--border);
  cursor:pointer;transition:all 0.2s;overflow:hidden;
}
.spot-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--g,var(--grad-1)) 0%,transparent 70%);opacity:0.10;pointer-events:none}
.spot-card:hover{transform:translateY(-2px);border-color:var(--border-2)}
.spot-card h4{font-size:14px;font-weight:600;color:var(--text-0);line-height:1.4;margin-bottom:8px;position:relative;z-index:1}
.spot-card .smeta{font-size:10px;color:var(--text-2);font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;position:relative;z-index:1}

/* === Brief (速递) === */
.brief-hero{
  position:relative;border-radius:24px;padding:36px 36px 32px;margin-bottom:24px;
  background:linear-gradient(135deg,rgba(255,93,143,0.14),rgba(124,92,255,0.10) 50%,rgba(34,211,238,0.10));
  border:1px solid var(--border);overflow:hidden;
}
.brief-hero .brief-date{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.2em;color:var(--accent-b);text-transform:uppercase;margin-bottom:6px}
.brief-hero h1{font-size:42px;font-weight:800;line-height:1.1;margin-bottom:8px;font-family:'Space Grotesk',sans-serif}
.brief-hero p{color:var(--text-1);font-size:15px;line-height:1.6;max-width:680px}
.brief-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:24px}
.brief-strip .bs{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px 20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.brief-strip .bs .bk{font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.12em;font-family:'JetBrains Mono',monospace}
.brief-strip .bs .bv{font-size:28px;font-weight:800;margin-top:4px;font-family:'Space Grotesk',sans-serif;background:var(--grad-1);-webkit-background-clip:text;background-clip:text;color:transparent}
.brief-strip .bs .bh{font-size:12px;color:var(--text-1);margin-top:4px;line-height:1.4}
.brief-section{margin-bottom:24px}
.brief-section h2{font-size:20px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.brief-section h2 svg{width:18px;height:18px;color:var(--accent-a)}
.brief-section h2 .sub{font-size:12px;color:var(--text-2);font-family:'JetBrains Mono',monospace;font-weight:500;margin-left:6px}
.brief-mix{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.brief-mix.span-2{grid-column:span 2}
.brief-ip-card{
  position:relative;padding:24px 24px 22px;border-radius:22px;
  background:linear-gradient(135deg,rgba(124,92,255,0.18),rgba(34,211,238,0.10));
  border:1px solid var(--border-2);overflow:hidden;cursor:pointer;transition:all 0.25s;
}
.brief-ip-card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(124,92,255,0.3)}
.brief-ip-card::after{content:'';position:absolute;right:-50px;top:-50px;width:160px;height:160px;border-radius:50%;background:var(--grad-1);opacity:0.15;filter:blur(30px)}
.brief-ip-card .iptag{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent-b);font-family:'JetBrains Mono',monospace;font-weight:600;margin-bottom:6px}
.brief-ip-card .ipname{font-size:28px;font-weight:800;line-height:1.1;margin-bottom:8px;position:relative;z-index:1}
.brief-ip-card .ipdesc{font-size:13px;color:var(--text-1);line-height:1.5;margin-bottom:14px;position:relative;z-index:1}
.brief-ip-card .ipstats{display:flex;gap:14px;font-size:11px;color:var(--text-2);font-family:'JetBrains Mono',monospace;position:relative;z-index:1}
.brief-ip-card .ipstats span b{color:var(--accent-d);font-weight:600;margin-left:4px}

/* === Launcher === */
.launcher-link{position:relative}
.launcher-link::after{content:'';position:absolute;bottom:-2px;left:10%;right:10%;height:2px;background:var(--grad-1);opacity:0.5;border-radius:1px}
.lh-hero{position:relative;padding:32px 36px 36px;background:linear-gradient(135deg,rgba(124,92,255,0.18) 0%,rgba(34,211,238,0.12) 50%,rgba(255,93,143,0.12) 100%);border:1px solid var(--border);border-radius:24px;margin-bottom:24px;overflow:hidden}
.lh-hero::before{content:'';position:absolute;right:-100px;top:-100px;width:300px;height:300px;background:radial-gradient(circle,rgba(124,92,255,0.4) 0%,transparent 70%);filter:blur(20px)}
.lh-hero::after{content:'';position:absolute;left:-50px;bottom:-100px;width:200px;height:200px;background:radial-gradient(circle,rgba(34,211,238,0.3) 0%,transparent 70%);filter:blur(20px)}
.lh-hero .lh-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.25em;color:var(--accent-b);text-transform:uppercase;margin-bottom:8px;position:relative;z-index:1}
.lh-hero h1{font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:800;line-height:1.05;margin-bottom:12px;position:relative;z-index:1;background:linear-gradient(135deg,#fff 0%,var(--accent-b) 50%,var(--accent-c) 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.lh-hero p{font-size:15px;color:var(--text-1);line-height:1.6;max-width:720px;position:relative;z-index:1;margin-bottom:18px}
.lh-hero-actions{display:flex;gap:10px;flex-wrap:wrap;position:relative;z-index:1}
.lh-hero-actions .btn{font-size:13px}
.lh-diagnostics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:24px}
.lh-diag{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px 20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:relative;overflow:hidden}
.lh-diag .ldi-icon{width:38px;height:38px;border-radius:12px;background:var(--grad-1);display:flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 6px 16px rgba(124,92,255,0.3)}
.lh-diag .ldi-icon svg{width:18px;height:18px;color:#fff}
.lh-diag .ldi-k{font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.12em;font-family:'JetBrains Mono',monospace;margin-bottom:4px}
.lh-diag .ldi-v{font-size:24px;font-weight:800;font-family:'Space Grotesk',sans-serif;background:var(--grad-1);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.1}
.lh-diag .ldi-h{font-size:11px;color:var(--text-2);margin-top:6px;line-height:1.4}
.lh-diag .ldi-bar{margin-top:10px;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.lh-diag .ldi-bar > div{height:100%;background:var(--grad-1);border-radius:2px;transition:width 0.4s}
.lh-apps{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.lh-app{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px 20px;text-decoration:none;color:inherit;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:all 0.18s;position:relative;overflow:hidden;display:block}
.lh-app:hover{transform:translateY(-3px);border-color:var(--accent-a);box-shadow:0 12px 30px rgba(124,92,255,0.2)}
.lh-app::after{content:'';position:absolute;right:-40px;top:-40px;width:120px;height:120px;border-radius:50%;background:var(--grad-1);opacity:0.1;filter:blur(20px);transition:opacity 0.2s}
.lh-app:hover::after{opacity:0.2}
.lh-app .la-icon{width:36px;height:36px;border-radius:10px;background:var(--grad-1);display:flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 4px 12px rgba(124,92,255,0.25)}
.lh-app .la-icon svg{width:18px;height:18px;color:#fff}
.lh-app .la-t{font-size:15px;font-weight:700;margin-bottom:4px}
.lh-app .la-p{font-size:12px;color:var(--text-2);line-height:1.5}
.lh-app .la-meta{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em}
.lh-app .la-meta .la-go{color:var(--accent-b);font-weight:600}
.lh-tools{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.lh-tool{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px 18px;cursor:pointer;transition:all 0.18s;text-align:left;font:inherit;color:inherit;display:block;width:100%;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.lh-tool:hover{border-color:var(--accent-a);background:rgba(124,92,255,0.08);transform:translateY(-2px)}
.lh-tool .lt-icon{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;background:rgba(124,92,255,0.15);margin-bottom:10px}
.lh-tool .lt-icon svg{width:16px;height:16px;color:var(--accent-a)}
.lh-tool .lt-t{font-size:13px;font-weight:600;margin-bottom:2px}
.lh-tool .lt-p{font-size:11px;color:var(--text-2);line-height:1.4}
.lh-log{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px 18px;margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;max-height:200px;overflow-y:auto;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.lh-log .ll-line{display:flex;gap:10px}
.lh-log .ll-time{color:var(--text-3);flex-shrink:0}
.lh-log .ll-tag{padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;flex-shrink:0}
.lh-log .ll-tag.ok{background:rgba(74,222,128,0.15);color:#4ade80}
.lh-log .ll-tag.warn{background:rgba(251,191,36,0.15);color:#fbbf24}
.lh-log .ll-tag.err{background:rgba(248,113,113,0.15);color:#f87171}
.lh-log .ll-tag.info{background:rgba(124,92,255,0.15);color:var(--accent-a)}
.lh-log .ll-msg{color:var(--text-1)}
@media(max-width:1024px){
  .lh-diagnostics{grid-template-columns:repeat(2,1fr)}
  .lh-hero h1{font-size:32px}
}
@media(max-width:640px){
  .lh-diagnostics{grid-template-columns:1fr 1fr}
  .lh-hero{padding:24px 20px 26px}
  .lh-hero h1{font-size:26px}
}

/* === Milestones === */
.ms-timeline{position:relative;padding:20px 0}
.ms-timeline::before{content:'';position:absolute;left:80px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--accent-a),var(--accent-b),var(--accent-c),var(--accent-d));opacity:0.5}
.ms-event{display:grid;grid-template-columns:80px 1fr;gap:24px;align-items:flex-start;margin-bottom:24px;position:relative}
.ms-event::before{content:'';position:absolute;left:74px;top:8px;width:14px;height:14px;border-radius:50%;background:var(--grad-1);border:3px solid var(--bg-0);box-shadow:0 0 0 3px var(--accent-a);z-index:1}
.ms-event .ms-year{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:800;background:var(--grad-1);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;text-align:right;padding-top:6px}
.ms-event .ms-body{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:20px 24px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.ms-event .ms-body h3{font-size:18px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.ms-event .ms-body h3 .ms-count{font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(124,92,255,0.18);color:var(--accent-a);font-weight:500;font-family:'JetBrains Mono',monospace;margin-left:auto}
.ms-event .ms-body p{font-size:13px;color:var(--text-1);line-height:1.6;margin-bottom:12px}
.ms-event .ms-works{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.ms-event .ms-work{font-size:12px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text-0);transition:all 0.15s;cursor:pointer}
.ms-event .ms-work:hover{background:rgba(124,92,255,0.15);border-color:var(--accent-a)}
.ms-event .ms-work .mw-y{color:var(--accent-d);font-family:'JetBrains Mono',monospace;font-size:10px;margin-right:6px}

/* === Trends === */
.trend-mover{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-bottom:24px}
.trend-card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:20px 22px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:relative;overflow:hidden}
.trend-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--g,var(--grad-1))}
.trend-card h3{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.trend-card h3 svg{width:16px;height:16px;color:var(--accent-a)}
.trend-card h3 .delta{font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(74,222,128,0.18);color:#4ade80;font-family:'JetBrains Mono',monospace;font-weight:600;margin-left:auto}
.trend-card h3 .delta.down{background:rgba(248,113,113,0.18);color:#f87171}
.trend-list{display:flex;flex-direction:column;gap:6px}
.trend-row{display:grid;grid-template-columns:24px 1fr 70px;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;font-size:13px;cursor:pointer;transition:all 0.15s}
.trend-row:hover{background:rgba(124,92,255,0.08)}
.trend-row .tr-rank{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);text-align:center}
.trend-row .tr-name{color:var(--text-0);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.trend-row .tr-delta{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;text-align:right}
.trend-row .tr-delta.up{color:#4ade80}
.trend-row .tr-delta.down{color:#f87171}

@media (max-width:1100px){
  .brief-strip{grid-template-columns:repeat(2,1fr)}
  .brief-mix{grid-template-columns:1fr}
  .brief-mix.span-2{grid-column:span 1}
  .trend-mover{grid-template-columns:1fr}
}
@media (max-width:680px){
  .brief-strip{grid-template-columns:1fr 1fr;gap:10px}
  .brief-hero{padding:24px 20px 26px}
  .brief-hero h1{font-size:28px}
  .ms-timeline::before{left:50px}
  .ms-event{grid-template-columns:50px 1fr;gap:14px}
  .ms-event::before{left:44px}
  .ms-event .ms-year{font-size:24px}
  .ms-event .ms-body{padding:14px 16px}
  .trend-mover{grid-template-columns:1fr}
}

/* === Page Heading === */
.page-heading{margin-bottom:24px}
.page-heading h1{font-size:36px;font-weight:800;letter-spacing:-0.02em;line-height:1.1;margin-bottom:6px;font-family:'Space Grotesk',sans-serif}
.page-heading h1 .grad{background:linear-gradient(120deg,var(--accent-a),var(--accent-b));-webkit-background-clip:text;background-clip:text;color:transparent}
.page-heading p{color:var(--text-1);font-size:14px;line-height:1.6;max-width:680px}

@media (max-width:1100px){
  .stats{grid-template-columns:repeat(3,1fr)}
  .body{grid-template-columns:1fr}
  .filters{position:static;max-height:none}
  .viz-card.span-8{grid-column:span 12}
  .viz-card.span-6{grid-column:span 12}
  .viz-card.span-4{grid-column:span 6}
  .viz-insights{grid-template-columns:repeat(2,1fr)}
  .entry-grid{grid-template-columns:repeat(2,1fr)}
  .region-grid .region-card{grid-column:span 6}
  .ip-grid .viz-card.span-8{grid-column:span 12}
  .ip-grid .viz-card.span-6{grid-column:span 12}
  .ip-grid .viz-card.span-4{grid-column:span 6}
}
@media (max-width:680px){
  .app{padding:0 14px 60px}
  .topnav{padding:10px 14px;gap:8px}
  .navlinks a{padding:7px 10px;font-size:12px}
  .navlinks a span{display:none}
  .hero{padding:28px 22px 36px}
  .hero h1,.page-heading h1{font-size:32px}
  .stats{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat .val{font-size:24px}
  .toolbar{grid-template-columns:1fr}
  .grid{grid-template-columns:1fr 1fr}
  .modal-grid{grid-template-columns:1fr !important}
  .viz-card.span-4{grid-column:span 12}
  .viz-insights{grid-template-columns:1fr 1fr}
  .chart{height:260px}
  .entry-grid{grid-template-columns:1fr}
  .region-grid .region-card{grid-column:span 12}
  .ip-grid .viz-card.span-4{grid-column:span 12}
  .rank-row{grid-template-columns:50px 1fr 70px;gap:10px}
  .rank-row .rank-bar-wrap{display:none}
  .timeline-year{font-size:48px}
}
</style>

/* === Export === */
function exportCSV(rows, filename){
  if(!rows || !rows.length) return;
  const keys = Object.keys(rows[0]);
  const escape = v => {
    if(v==null) return '';
    const s = String(v);
    if(s.indexOf('"')>=0 || s.indexOf(',')>=0 || s.indexOf('\n')>=0) return '"'+s.replace(/"/g,'""')+'"';
    return s;
  };
  const csv = [keys.join(',')].concat(rows.map(r => keys.map(k=>escape(r[k])).join(','))).join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename || 'export.csv';
  a.click();
}
function exportJSON(obj, filename){
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename || 'export.json';
  a.click();
}
function exportPNG(chartId, filename){
  const inst = charts[chartId];
  if(!inst) return;
  const url = inst.getDataURL({ type: 'png', pixelRatio: 2, backgroundColor: '#0c0c20' });
  const a = document.createElement('a');
  a.href = url;
  a.download = filename || 'chart.png';
  a.click();
}

}
function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
function escAttr(s){return String(s||"").replace(/"/g,'&quot;')}
function debounce(fn, ms){
  let t = null;
  return function(...args){
    clearTimeout(t);
    t = setTimeout(()=>fn.apply(this,args), ms);
  };
}

    WORKS[i] = {
      id: i+1,
      title: r[0],
      type: r[1],
      typeZh: TYPE_MAP[r[1]] || r[1],
      region: r[2],
      year: y,
      source: r[4] || "—",
      desc: r[5] || "",
      ip: r[6] || "其他"
    };
    if(y > 0){
      if(y < yearRange[0]) yearRange[0] = y;
      if(y > yearRange[1]) yearRange[1] = y;
    }
  }
}
function buildAggregates(){
  const N = WORKS.length;
  const ipC = Object.create(null);
  const tC = Object.create(null);
  const rC = Object.create(null);
  const dC = Object.create(null);
  for(let i=0; i<N; i++){

    rC[w.region] = (rC[w.region] || 0) + 1;
    const d = Math.floor(w.year/10)*10;
    dC[d] = (dC[d] || 0) + 1;
  }

  typeCounts = tC;
  regionCounts = rC;
  decadeCounts = dC;

}

          <div class="f-chips" id="br-f-types"></div>
        </div>
        <div class="f-group">
          <div class="f-title">地区 <span class="clear" data-clear="region">清空</span></div>
          <div class="f-chips" id="br-f-regions"></div>
        </div>
        <div class="f-group">
          <div class="f-title">年代 <span class="clear" data-clear="decade">清空</span></div>
          <div class="f-chips" id="br-f-decades"></div>
        </div>
        <div class="f-group">
          <div class="f-title">游戏 IP 源 <span class="clear" data-clear="ip">清空</span></div>
          <div class="f-list" id="br-f-ips"></div>
        </div>
      </aside>
      <main>
        <div class="results-head">
          <div class="results-count">共 <b id="br-r-count">0</b> 项作品匹配</div>
          <div class="sort" id="br-sort">
            <button class="active" data-sort="year-desc">最新优先</button>
            <button data-sort="year-asc">最早优先</button>
            <button data-sort="title-asc">名称 A→Z</button>
            <button data-sort="ip-asc">按 IP</button>
          </div>
        </div>
        <div class="grid" id="br-grid"></div>
        <div class="pager" id="br-pager"></div>
      </main>
    </div>
  `;
  const fav = storage.get('favs', []);
  const favSet = new Set(fav);
  function renderFilters(){
    document.getElementById("br-f-types").innerHTML = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).map(([k,v])=>
      `<div class="chip${browseState.types.has(k)?" active":""}" data-type="${k}">${TYPE_MAP[k]||k}<span class="n">${formatNum(v)}</span></div>`).join("");
    document.getElementById("br-f-regions").innerHTML = Object.entries(regionCounts).sort((a,b)=>b[1]-a[1]).map(([k,v])=>
      `<div class="chip${browseState.regions.has(k)?" active":""}" data-region="${k}">${k}<span class="n">${formatNum(v)}</span></div>`).join("");
    document.getElementById("br-f-decades").innerHTML = Object.entries(decadeCounts).sort((a,b)=>parseInt(a)-parseInt(b)).map(([k,v])=>
      `<div class="chip${browseState.decades.has(+k)?" active":""}" data-decade="${k}">${k}s<span class="n">${formatNum(v)}</span></div>`).join("");
    document.getElementById("br-f-ips").innerHTML = IP_LIST.map(([k,v])=>
      `<div class="f-item${browseState.ips.has(k)?" active":""}" data-ip="${escAttr(k)}"><span>${esc(k)}</span><span class="n">${formatNum(v)}</span></div>`).join("");
  }
  function render(){
    const list = getFiltered();
    const total = list.length;
    document.getElementById("br-r-count").textContent = formatNum(total);
    const totalPages = Math.max(1, Math.ceil(total / browseState.perPage));
    if(browseState.page > totalPages) browseState.page = totalPages;
    const start = (browseState.page - 1) * browseState.perPage;
    const pageList = list.slice(start, start + browseState.perPage);
    const grid = document.getElementById("br-grid");
    if(!pageList.length){
      grid.innerHTML = `<div class="empty"><h3>暂无匹配作品</h3><p>尝试调整筛选条件或重置</p></div>`;
    } else {
      let html = "";
      for(let i=0; i<pageList.length; i++){
        const w = pageList[i];
        const isFav = favSet.has(w.id);
        html += `<div class="card" data-id="${w.id}">
          <div class="card-head">
            <div class="card-title">${esc(w.title)}</div>
            <div class="badge ${TYPE_CLS[w.type]||'b-other'}">${w.typeZh}</div>
          </div>
          <div class="card-meta">
            <span class="ip">◆ ${esc(w.ip)}</span>
            <span class="year">${w.year}</span>
            <span>· ${esc(w.region)}</span>
          </div>
          <div class="card-desc">${esc(w.desc||'—')}</div>
          <div class="card-actions">
            <button class="icon-btn fav-btn ${isFav?'faved':''}" data-fav="${w.id}" title="收藏">
              <svg viewBox="0 0 24 24" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
            </button>
          </div>
        </div>`;
      }
      grid.innerHTML = html;
    }
    const pg = document.getElementById("br-pager");
    const p = browseState.page, tp = totalPages;
    let h = `<button data-p="${p-1}" ${p<=1?"disabled":""}>‹</button>`;
    const span=(a,b)=>{for(let i=a;i<=b;i++){h+=`<button data-p="${i}" class="${i===p?"active":""}">${i}</button>`}};
    if(tp<=9) span(1,tp);
    else if(p<=5){span(1,7);h+=`<span class="ellipsis">…</span>`;h+=`<button data-p="${tp}">${tp}</button>`}
    else if(p>=tp-4){h+=`<button data-p="1">1</button><span class="ellipsis">…</span>`;span(tp-6,tp)}
    else{h+=`<button data-p="1">1</button><span class="ellipsis">…</span>`;span(p-2,p+2);h+=`<span class="ellipsis">…</span><button data-p="${tp}">${tp}</button>`}
    h += `<button data-p="${p+1}" ${p>=tp?"disabled":""}>›</button>`;
    pg.innerHTML = h;
    pg.querySelectorAll("button[data-p]").forEach(b => b.addEventListener("click", () => { browseState.page = parseInt(b.dataset.p); render(); window.scrollTo({top:mountEl.offsetTop,behavior:"smooth"}); }));
    grid.querySelectorAll(".card").forEach(c => c.addEventListener("click", (e) => {
      if(e.target.closest('.fav-btn')) return;
      const w = WORKS.find(x => x.id === parseInt(c.dataset.id));
      if(w) openModal(w);
    }));
    grid.querySelectorAll(".fav-btn").forEach(b => b.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = parseInt(b.dataset.fav);
      const arr = storage.get('favs', []);
      const i = arr.indexOf(id);
      if(i >= 0){ arr.splice(i,1); b.classList.remove('faved'); favSet.delete(id); }
      else { arr.push(id); b.classList.add('faved'); favSet.add(id); }
      storage.set('favs', arr);
      b.querySelector('svg').setAttribute('fill', favSet.has(id) ? 'currentColor' : 'none');
    }));
  }
  function getFiltered(){
    const q = browseState.q;
    const hasQ = q.length > 0;
    const hasT = browseState.types.size > 0;
    const hasR = browseState.regions.size > 0;
    const hasD = browseState.decades.size > 0;
    const hasI = browseState.ips.size > 0;
    const out = [];
    for(let i=0, n=WORKS.length; i<n; i++){
      const w = WORKS[i];
      if(hasQ){
        const hay = (w.title + " " + w.ip + " " + w.typeZh + " " + w.region + " " + w.year + " " + w.desc).toLowerCase();
        if(hay.indexOf(q) < 0) continue;
      }
      if(hasT && !browseState.types.has(w.type)) continue;
      if(hasR && !browseState.regions.has(w.region)) continue;
      if(hasD && !browseState.decades.has(Math.floor(w.year/10)*10)) continue;
      if(hasI && !browseState.ips.has(w.ip)) continue;
      out.push(w);
    }
    const s = browseState.sort;
    if(s==="year-desc") out.sort((a,b)=>b.year-a.year);
    else if(s==="year-asc") out.sort((a,b)=>a.year-b.year);
    else if(s==="title-asc") out.sort((a,b)=>a.title.localeCompare(b.title,"zh"));
    else if(s==="ip-asc") out.sort((a,b)=>a.ip.localeCompare(b.ip,"zh"));
    return out;
  }
  document.getElementById("br-search").addEventListener("input", debounce(e => { browseState.q = e.target.value.trim().toLowerCase(); browseState.page = 1; render(); }, 200));
  document.getElementById("br-shuffle").addEventListener("click", () => openModal(WORKS[Math.floor(Math.random()*WORKS.length)]));
  document.getElementById("br-export").addEventListener("click", () => {
    const list = getFiltered().slice(0, 5000);
    exportCSV(list.map(w => ({ id:w.id, title:w.title, type:w.typeZh, region:w.region, year:w.year, source:w.source, ip:w.ip, desc:w.desc })), `gameip_${list.length}_${Date.now()}.csv`);
  });
  document.getElementById("br-f-types").addEventListener("click", e => { const k = e.target.closest("[data-type]")?.dataset.type; if(k){ browseState.types.has(k)?browseState.types.delete(k):browseState.types.add(k); browseState.page=1; renderFilters(); render(); } });
  document.getElementById("br-f-regions").addEventListener("click", e => { const k = e.target.closest("[data-region]")?.dataset.region; if(k){ browseState.regions.has(k)?browseState.regions.delete(k):browseState.regions.add(k); browseState.page=1; renderFilters(); render(); } });
  document.getElementById("br-f-decades").addEventListener("click", e => { const k = parseInt(e.target.closest("[data-decade]")?.dataset.decade); if(k){ browseState.decades.has(k)?browseState.decades.delete(k):browseState.decades.add(k); browseState.page=1; renderFilters(); render(); } });
  document.getElementById("br-f-ips").addEventListener("click", e => { const k = e.target.closest("[data-ip]")?.dataset.ip; if(k){ browseState.ips.has(k)?browseState.ips.delete(k):browseState.ips.add(k); browseState.page=1; renderFilters(); render(); } });
  mountEl.querySelectorAll(".clear").forEach(c => c.addEventListener("click", () => {
    const t = c.dataset.clear;
    if(t==="type") browseState.types.clear();
    if(t==="region") browseState.regions.clear();
    if(t==="decade") browseState.decades.clear();
    if(t==="ip") browseState.ips.clear();
    browseState.page=1; renderFilters(); render();
  }));
  document.getElementById("br-sort").addEventListener("click", e => {
    const k = e.target.dataset.sort; if(!k) return;
    browseState.sort = k; browseState.page = 1;
    document.querySelectorAll("#br-sort button").forEach(b => b.classList.toggle("active", b.dataset.sort === k));
    render();
  });
  renderFilters();
  render();
}

/* ============================================================
   VIEW 6: COMPARE
   ============================================================ */
let compareState = { ips: [] };
function renderCompare(mountEl){
  if(!compareState.ips.length){
    compareState.ips = storage.get('compare', []);
    if(!compareState.ips.length && IP_LIST.length) compareState.ips = [IP_LIST[0][0], IP_LIST[1] ? IP_LIST[1][0] : IP_LIST[0][0]];
  }
  mountEl.innerHTML = `
    <div class="page-heading" style="margin-top:24px">
      <h1>IP <span class="grad">对比</span></h1>
      <p>最多 4 个 IP · 6 维度雷达图横向比较</p>
    </div>
    <div class="compare-picker">
      <h3>选择 IP (1 – 4 个)</h3>
      <p>已选 ${compareState.ips.length} / 4 · 点击下方 chip 切换</p>
      <div class="compare-chips" id="cp-chips">
        ${IP_LIST.map(([k,v]) => `<div class="chip ${compareState.ips.includes(k)?'active':''}" data-ip="${escAttr(k)}">${esc(k)}<span class="n">${formatNum(v)}</span></div>`).join('')}
      </div>
    </div>
    <div class="compare-result" id="cr-out"></div>
  `;
  function runCompare(){
    const ips = compareState.ips.slice(0, 4);
    if(!ips.length){
      document.getElementById("cr-out").innerHTML = `<div class="empty"><h3>请至少选择 1 个 IP</h3></div>`;
      return;
    }
    // Per-IP stats
    const stats = {};
    for(const ip of ips){
      const list = [];
      for(let i=0, n=WORKS.length; i<n; i++){
        if(WORKS[i].ip === ip) list.push(WORKS[i]);
      }
      const tC = Object.create(null);
      const rC = Object.create(null);
      const yrs = [];
      for(const w of list){
        tC[w.type] = (tC[w.type]||0) + 1;
        rC[w.region] = (rC[w.region]||0) + 1;
        if(w.year > 0) yrs.push(w.year);
      }
      const ymin = yrs.length ? Math.min(...yrs) : 0;
      const ymax = yrs.length ? Math.max(...yrs) : 0;
      const span = ymax - ymin + 1;
      const anime = tC['anime'] || 0;
      const manga = tC['manga'] || 0;
      const game = tC['game'] || 0;
      const music = tC['music'] || 0;
      const otaku = tC['otaku'] || 0;
      // 6 dims
      stats[ip] = {
        total: list.length,
        typeCount: Object.keys(tC).length,
        regionCount: Object.keys(rC).length,
        span, ymin, ymax,
        anime, manga, game, music, otaku,
        // radar 6 dims: 0-100 normalized
        radar: [
          Math.min(100, list.length / 1000 * 100),  // total
          Math.min(100, Object.keys(tC).length / 13 * 100), // type diversity
          Math.min(100, Object.keys(rC).length / 9 * 100),  // region diversity
          Math.min(100, anime / 100 * 100),  // anime
          Math.min(100, otaku / 1000 * 100),  // otaku
          Math.min(100, span / 40 * 100),  // year span
        ],
      };
    }
    storage.set('compare', ips);
    const colors = ['#7c5cff', '#22d3ee', '#ff5d8f', '#ffd166'];
    const out = document.getElementById("cr-out");
    out.innerHTML = `
      <h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 22h20z"/></svg>6 维度雷达对比</h3>
      <div id="cmp-radar" style="height:380px"></div>
      <table class="compare-table" style="margin-top:20px">
        <thead><tr>
          <th>维度</th>
          ${ips.map((ip, i) => `<th style="color:${colors[i]}">${esc(ip)}</th>`).join('')}
        </tr></thead>
        <tbody>
          <tr><td>衍生总数</td>${ips.map(ip => `<td>${formatNum(stats[ip].total)}</td>`).join('')}</tr>
          <tr><td>类型数</td>${ips.map(ip => `<td>${stats[ip].typeCount}</td>`).join('')}</tr>
          <tr><td>地区数</td>${ips.map(ip => `<td>${stats[ip].regionCount}</td>`).join('')}</tr>
          <tr><td>最早–最新</td>${ips.map(ip => `<td>${stats[ip].ymin || '—'} – ${stats[ip].ymax || '—'}</td>`).join('')}</tr>
          <tr><td>动画</td>${ips.map(ip => `<td>${formatNum(stats[ip].anime)}</td>`).join('')}</tr>
          <tr><td>漫画</td>${ips.map(ip => `<td>${formatNum(stats[ip].manga)}</td>`).join('')}</tr>
          <tr><td>游戏</td>${ips.map(ip => `<td>${formatNum(stats[ip].game)}</td>`).join('')}</tr>
          <tr><td>音乐</td>${ips.map(ip => `<td>${formatNum(stats[ip].music)}</td>`).join('')}</tr>
          <tr><td>周边</td>${ips.map(ip => `<td>${formatNum(stats[ip].otaku)}</td>`).join('')}</tr>
        </tbody>
      </table>
      <div style="margin-top:20px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" id="cmp-clear">清空选择</button>
        <button class="btn" id="cmp-export">↓ 导出对比 (CSV)</button>
      </div>
    `;
    setTimeout(() => {
      const c = ensureChart("cmp-radar");
      c.setOption({
        ...baseTheme(),
        tooltip: { backgroundColor: 'rgba(20,20,45,0.95)', borderColor: 'rgba(124,92,255,0.3)', textStyle: { color: '#fff' } },
        legend: { bottom: 0, textStyle: { color: getComputedStyle(document.body).getPropertyValue('--text-1') } },
        radar: {
          indicator: [
            { name: '总量', max: 100 },
            { name: '类型多样性', max: 100 },
            { name: '地区多样性', max: 100 },
            { name: '动画覆盖', max: 100 },
            { name: '周边覆盖', max: 100 },
            { name: '时间跨度', max: 100 },
          ],
          shape: 'polygon',
          splitNumber: 4,
          axisName: { color: getComputedStyle(document.body).getPropertyValue('--text-1'), fontSize: 11 },
          splitLine: { lineStyle: { color: 'rgba(124,92,255,0.15)' } },
          splitArea: { areaStyle: { color: ['rgba(124,92,255,0.02)', 'rgba(124,92,255,0.05)'] } },
          axisLine: { lineStyle: { color: 'rgba(124,92,255,0.2)' } },
        },
        series: [{
          type: 'radar',
          data: ips.map((ip, i) => ({
            name: ip,
            value: stats[ip].radar,
            areaStyle: { color: colors[i] + '30' },
            lineStyle: { color: colors[i], width: 2 },
            itemStyle: { color: colors[i] },
          })),
        }],
      }, true);
    }, 50);
    document.getElementById("cmp-clear").addEventListener("click", () => {
      compareState.ips = [];
      storage.set('compare', []);
      renderCompare(mountEl);
    });
    document.getElementById("cmp-export").addEventListener("click", () => {
      const rows = [];
      for(const ip of ips){
        rows.push({ ip, ...stats[ip] });
      }
      exportCSV(rows, `compare_${Date.now()}.csv`);
    });
  }
  mountEl.querySelectorAll("[data-ip]").forEach(c => c.addEventListener("click", () => {
    const ip = c.dataset.ip;
    if(compareState.ips.includes(ip)){
      compareState.ips = compareState.ips.filter(x => x !== ip);
    } else {
      if(compareState.ips.length >= 4){ compareState.ips.shift(); }
      compareState.ips.push(ip);
    }
    storage.set('compare', compareState.ips);
    mountEl.querySelectorAll("[data-ip]").forEach(x => x.classList.toggle("active", compareState.ips.includes(x.dataset.ip)));
    runCompare();
  }));
  runCompare();
}

/* ============================================================
   VIEW 7: TIMELINE
   ============================================================ */
let timelineState = { year: yearRange[1] || 2025 };
function renderTimeline(mountEl){

  const works = [];
  for(let i=0, n=WORKS.length; i<n; i++){
    if(WORKS[i].year === yr) works.push(WORKS[i]);
  }
  const tC = Object.create(null);
  for(const w of works) tC[w.type] = (tC[w.type]||0) + 1;
  // top IPs of this year
  const ipC = Object.create(null);
  for(const w of works) ipC[w.ip] = (ipC[w.ip]||0) + 1;

      </div>

        <div class="insight"><div class="k">类型数</div><div class="v">${Object.keys(tC).length}<small>类</small></div><div class="h">${Object.entries(tC).sort((a,b)=>b[1]-a[1])[0] ? TYPE_MAP[Object.entries(tC).sort((a,b)=>b[1]-a[1])[0][0]] || '—' : '—'} 主导</div></div>

      </div>
    </div>
    <div class="viz-card" style="margin-bottom:18px">
      <div class="vhead"><h3>${yr} 类型分布</h3><span class="vmeta">${Object.keys(tC).length} 类</span></div>
      <div id="tl-chart-type" class="chart"></div>
    </div>
    <div class="viz-card" style="margin-bottom:18px">
      <div class="vhead"><h3>${yr} 头部 IP</h3><span class="vmeta">按该年度衍生数</span></div>
      <div id="tl-chart-ip" class="chart"></div>

    <div class="viz-card">
      <div class="vhead"><h3>${yr} 代表作品</h3><span class="vmeta">共 ${works.length} 项</span></div>
      <div class="timeline-events">

          <div class="nm">${esc(w.title)}</div>
          <div class="tp">${w.typeZh} · ${esc(w.ip)}</div>

      </div>

  `;
  const slider = document.getElementById("tl-slider");

      timelineState.year = newYr;
      renderTimeline(mountEl);

  setTimeout(() => {

        </button>
      </div>
    </div>`).join('')}</div>`;

      if(w) openModal(w);
    }));
    body.querySelectorAll("[data-rm]").forEach(b => b.addEventListener("click", e => {
      e.stopPropagation();
      const id = parseInt(b.dataset.rm);
      const newFavs = favs.filter(x => x !== id);
      storage.set('favs', newFavs);
      location.reload();
    }));
  }
  document.getElementById("coll-export").addEventListener("click", () => {
    exportJSON({ count: list.length, exportedAt: new Date().toISOString(), works: list.map(w => ({ id: w.id, title: w.title, type: w.typeZh, ip: w.ip, year: w.year, region: w.region, source: w.source, desc: w.desc })) }, `collections_${Date.now()}.json`);
  });
  document.getElementById("coll-import").addEventListener("click", () => document.getElementById("coll-file").click());
  document.getElementById("coll-file").addEventListener("change", e => {
    const f = e.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        const arr = (data.works || []).map(w => w.id).filter(Boolean);
        const merged = Array.from(new Set([...favs, ...arr]));
        storage.set('favs', merged);
        location.reload();
      } catch(err) { alert('导入失败: ' + err.message); }
    };
    r.readAsText(f);
  });
  document.getElementById("coll-clear").addEventListener("click", () => {
    if(confirm('确定清空所有收藏？此操作不可撤销。')){
      storage.set('favs', []);
      location.reload();
    }
  });
  renderList();
}

function _logToLauncher(tag, msg){

function _computeLocalStorageUsage(){
  let total = 0, count = 0;
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    const v = localStorage.getItem(k) || '';
    total += k.length + v.length;
    count++;
  }
  return { bytes: total, kb: (total/1024).toFixed(2), mb: (total/1024/1024).toFixed(2), count };
}

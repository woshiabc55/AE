function hideAllScreens(){
[elTitle,elScene,elEnd].forEach(function(el){

function showScreen(el){

function updateProgress(){

elProgress.style.width = pct + "%";

function initCodeRain(){
var container = document.getElementById("codeRain");
if(!container) return;
container.innerHTML = "";
var snippets = [
"scan(target)","fetch_profile()","classify(high)","generate_pitch()",
"IGBT.invert()","pwm.modulate()","agent.run()","target.convert()",
"lobster.farm","profit.fake()","patent.forge()","stream.ai_gen"
];
for(var i = 0; i < 12; i++){
var line = document.createElement("div");
line.className = "code-line";
line.textContent = snippets[i % snippets.length];
line.style.left = (Math.random() * 90) + "%";
line.style.animationDuration = (4 + Math.random() * 6) + "s";
line.style.animationDelay = (Math.random() * 3) + "s";
container.appendChild(line);
}
}

function loadScene(index){
if(index < 0 || index >= totalScenes) return;
currentScene = index;
currentDialogue = -1;
var scene = SCENES[index];

elBg.style.background = scene.bg;
elActBadge.textContent = scene.act + "：" + scene.actTitle;
elCounter.textContent = (index + 1) + " / " + totalScenes;
elVisual.innerHTML = buildVisual(scene.visuals);
elSpeaker.textContent = "";
elDialogue.textContent = "";
elTapHint.style.display = "block";
updateProgress();

if(scene.visuals === "hack"){
setTimeout(initCodeRain, 100);
}

advanceDialogue();
}

function advanceDialogue(){
var scene = SCENES[currentScene];
if(!scene) return;
currentDialogue++;
if(currentDialogue >= scene.dialogues.length){
goToNextScene();
return;
}
var d = scene.dialogues[currentDialogue];
elSpeaker.textContent = d.speaker || "";
if(d.isHTML){
elDialogue.innerHTML = d.text;
} else {
elDialogue.textContent = d.text;
}
}

function goToNextScene(){
if(isTransitioning) return;
if(currentScene >= totalScenes - 1){
showEndCard();
return;
}
isTransitioning = true;
elTransition.classList.add("active");
setTimeout(function(){
loadScene(currentScene + 1);
setTimeout(function(){
elTransition.classList.remove("active");
isTransitioning = false;
}, 400);
}, 400);
}

function showEndCard(){
isTransitioning = true;
elTransition.classList.add("active");
setTimeout(function(){
updateProgress();
elProgress.style.width = "100%";
showScreen(elEnd);
setTimeout(function(){
elTransition.classList.remove("active");
isTransitioning = false;
}, 400);
}, 400);
}

function startExperience(){
isTransitioning = true;
elTransition.classList.add("active");
setTimeout(function(){
showScreen(elScene);
loadScene(0);
setTimeout(function(){
elTransition.classList.remove("active");
isTransitioning = false;
}, 400);
}, 400);
}

function restartExperience(){
currentScene = -1;
currentDialogue = -1;
isTransitioning = true;
elTransition.classList.add("active");
setTimeout(function(){
elProgress.style.width = "0%";
showScreen(elTitle);
setTimeout(function(){
elTransition.classList.remove("active");
isTransitioning = false;
}, 400);
}, 400);
}

elApp.addEventListener("pointerdown", function(e){
if(isTransitioning) return;
if(elScene.classList.contains("active")){
advanceDialogue();
}
});

document.getElementById("btn-start").addEventListener("pointerdown", function(e){
e.stopPropagation();
startExperience();
});

document.getElementById("btn-restart").addEventListener("pointerdown", function(e){
e.stopPropagation();
restartExperience();
});

window.addEventListener("load", function(){
try{
showScreen(elTitle);
}catch(error){
console.error(error);
var fallback = document.createElement("div");
fallback.style.cssText = "position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;color:#111;font-size:18px;padding:24px;text-align:center;z-index:9999;";
fallback.textContent = "哎呀，出错了，请重启试试吧~";
document.body.innerHTML = "";
document.body.appendChild(fallback);
}
});
})();

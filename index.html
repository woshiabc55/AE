<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AI 剧本制作 · 主逻辑回路图</title>
  <style>
    :root {
      --bg-deep: #070a0e;
      --bg-panel: rgba(12, 17, 25, 0.96);
      --text-main: #e8f0f8;
      --text-sub: #7e8ca0;
      --accent: #4ec3ff;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      line-height: 1.55;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      z-index: 10;
      background: var(--bg-deep);
    }

    .screen.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .screen-diagram {
      justify-content: flex-start;
      padding-top: calc(10px + var(--safe-top));
      padding-bottom: var(--safe-bottom);
    }

    .modal-card {
      position: relative;
      z-index: 30;
      width: min(90vw, 460px);
      max-height: 82vh;
      background: var(--bg-panel);
      border: 1px solid rgba(78, 195, 255, 0.22);
      border-radius: 18px;
      padding: 24px 20px 20px;
      text-align: left;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 28px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      overflow-y: auto;
    }

    .modal-title {
      font-size: clamp(20px, 5.6vw, 26px);
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      text-align: center;
    }

    .modal-subtitle {
      font-size: 12px;
      color: var(--text-sub);
      margin-bottom: 16px;
      letter-spacing: 0.06em;
      text-align: center;
    }

    .modal-message {
      font-size: 14px;
      color: var(--text-main);
      margin-bottom: 18px;
      line-height: 1.7;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      appearance: none;
      border: none;
      outline: none;
      cursor: pointer;
      font: inherit;
      width: 100%;
      padding: 13px 18px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.05em;
      transition: transform 0.12s ease, opacity 0.12s ease;
      text-align: center;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(180deg, #4ec3ff 0%, #2794d9 100%);
      color: #01070a;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text-main);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .diagram-header {
      position: relative;
      z-index: 20;
      width: 100%;
      text-align: center;
      padding: 8px 16px 6px;
      flex-shrink: 0;
    }

    .diagram-header h1 {
      font-size: clamp(16px, 4.6vw, 21px);
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }

    .diagram-header p {
      font-size: 10px;
      color: var(--text-sub);
      letter-spacing: 0.04em;
    }

    .diagram-stage {
      position: relative;
      z-index: 15;
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      padding: 0 10px;
    }

    .diagram-svg {
      width: 100%;
      height: 100%;
      max-width: 520px;
      max-height: 520px;
      display: block;
    }

    .node-rect {
      cursor: pointer;
      transition: filter 0.18s ease, transform 0.18s ease;
    }

    .node-rect:hover { filter: brightness(1.2); }

    .node-rect:active { transform: scale(0.96); }

    .node-title {
      pointer-events: none;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    .node-sub {
      pointer-events: none;
      font-size: 9px;
      opacity: 0.8;
    }

    .node-badge {
      pointer-events: none;
      font-size: 10px;
      font-weight: 700;
    }

    .circuit-line {
      pointer-events: none;
      fill: none;
      stroke-linecap: round;
    }

    .feedback-line {
      pointer-events: none;
      fill: none;
      stroke-linecap: round;
      stroke-dasharray: 5 4;
    }

    .flow-particle {
      pointer-events: none;
      filter: drop-shadow(0 0 3px var(--accent));
    }

    .center-ring {
      pointer-events: none;
    }

    .detail-row { margin-bottom: 13px; }
    .detail-row:last-child { margin-bottom: 0; }

    .detail-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .detail-text {
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.65;
    }

    .detail-list {
      list-style: none;
      padding: 0;
    }

    .detail-list li {
      position: relative;
      padding-left: 13px;
      margin-bottom: 5px;
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.55;
    }

    .sub-node-title {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .sub-node-desc {
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.5;
    }

    .legend-bar {
      position: relative;
      z-index: 20;
      width: 100%;
      text-align: center;
      padding: 6px 16px 10px;
      font-size: 10px;
      color: var(--text-sub);
      flex-shrink: 0;
    }

    .pulse-ring {
      animation: pulseRing 2.6s ease-out infinite;
      transform-origin: center;
      pointer-events: none;
    }

    @keyframes pulseRing {
      0% { opacity: 0.45; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.55); }
    }

    @media (max-height: 620px) {
      .diagram-header h1 { font-size: 15px; }
      .node-title { font-size: 11px; }
      .node-sub { font-size: 8px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="screen-start" class="screen active" aria-hidden="false">
      <div class="modal-card">
        <h1 class="modal-title" style="color: var(--accent);">AI 剧本制作 · 主逻辑回路图</h1>
        <p class="modal-subtitle">不可移动界面 · 单屏闭环框架</p>
        <p class="modal-message">
          本框架图将所有流程节点收敛为一个主逻辑回路，完整显示在单屏内。<br><br>
          点击环上任意阶段，查看该阶段下所有子流程与执行细节。
        </p>
        <div class="modal-actions">
          <button class="btn btn-primary" data-action="start" type="button">进入回路图</button>
        </div>
      </div>
    </div>

    <div id="screen-diagram" class="screen screen-diagram" aria-hidden="true">
      <div class="diagram-header">
        <h1>AI 剧本制作 · 主逻辑回路</h1>
        <p>点击环上节点查看子流程 · 实线为主回路 · 虚线为反馈闭环</p>
      </div>
      <div class="diagram-stage">
        <svg class="diagram-svg" id="framework-svg" viewBox="0 0 400 420" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="legend-bar">核心回路：输入 → 解析 → 提示词 → 分镜 → 元素 → 素材 → 处理 → 剪辑 → 输出 → 反馈</div>
    </div>

    <div id="screen-detail" class="screen" aria-hidden="true">
      <div class="modal-card" id="detail-card">
        <h2 class="modal-title" id="detail-title"></h2>
        <p class="modal-subtitle" id="detail-subtitle"></p>
        <div id="detail-body"></div>
        <div class="modal-actions" style="margin-top: 20px;">
          <button class="btn btn-secondary" data-action="close-detail" type="button">返回回路图</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const W = 400;
      const H = 420;
      const CX = 200;
      const CY = 210;
      const R = 138;
      const NODE_W = 86;
      const NODE_H = 48;

      const phases = [
        {
          title: '输入层',
          subtitle: 'INPUT',
          short: '输入',
          color: '#4a90d9',
          nodes: [
            { title: '原始剧本', desc: '故事/对白/场景结构化', input: '文字剧本、小说、故事梗概、角色设定草稿', method: ['格式化清洗', '按场景拆分', '提取时间地点人物'], output: '结构化剧本文档、场景清单', note: '越规范的输入，后续 AI 提取越稳定。' },
            { title: '创意 brief', desc: '命题/受众/情绪/平台', input: '项目目标、目标受众、传播平台、情绪基调', method: ['AI 辅助关键词聚类', '生成一句话命题', '确定风格锚点'], output: '创意 brief、核心命题、关键词云', note: 'brief 是后续所有生成的“北极星”。' },
            { title: '参考片/参考图', desc: '风格/对标案例分析', input: '同行业短片、电影片段、插画、摄影作品', method: ['视觉特征拆解', '色彩/构图/节奏分析', '提取可复用 prompt 元素'], output: '参考图库、风格描述词、节奏参考表', note: '参考要具体，避免泛泛的“电影感”。' },
            { title: '平台规范', desc: '尺寸/时长/审核规则', input: '抖音/视频号/B站等平台规则', method: ['整理分辨率、时长、码率、字幕安全区', '列出审核红线与禁用词'], output: '平台技术规范表、内容安全清单', note: '前置规范能避免返工。' }
          ]
        },
        {
          title: '解析层',
          subtitle: 'ANALYSIS',
          short: '解析',
          color: '#5aa3a3',
          nodes: [
            { title: '剧本结构化', desc: '场景/角色/动作提取', input: '结构化剧本', method: ['识别场景边界', '标注场号、地点、时间', '提取动作与对白'], output: '场景表、角色出场表、对白清单', note: '结构化是后续自动化的基础。' },
            { title: '情绪曲线标注', desc: '节奏/高潮/留白', input: '剧本与场景表', method: ['逐场情绪打分', '绘制情感曲线', '标注高潮与转折点'], output: '情绪曲线图、节奏密度表', note: '情绪曲线决定观众代入感。' },
            { title: '视觉关键词提取', desc: '色彩/光影/氛围', input: '每场描述文本', method: ['提取视觉形容词', '归纳色彩、光影、天气、空间', '关联参考图标签'], output: '视觉关键词库、每场景氛围卡', note: '关键词要转化成 AI 可理解的 prompt。' },
            { title: '角色关系网', desc: '动机/冲突/成长', input: '人物小传与对白', method: ['梳理人物关系', '标注核心冲突', '绘制角色成长弧线'], output: '角色关系图、人物弧光表', note: '关系网是逻辑校验的重要依据。' },
            { title: '镜头类型标注', desc: '特写/全景/运动', input: '场景动作描述', method: ['根据动作推荐镜头', '标注景别、机位、运动方式'], output: '镜头建议表、初步分镜文字描述', note: '镜头标注为分镜提取做准备。' }
          ]
        },
        {
          title: '提示词工程',
          subtitle: 'PROMPT',
          short: '提示词',
          color: '#c9a86c',
          nodes: [
            { title: '场景提示词', desc: '空间/环境/时代', input: '场景地点、时间、氛围关键词', method: ['组合主体+环境+光影+风格', '固定风格关键词前缀'], output: '每场景文生图 prompt', note: '保持场景间视觉一致性。' },
            { title: '角色提示词', desc: '外貌/服装/气质', input: '角色外貌、服饰、性格描述', method: ['构建角色固定描述块', '使用种子/LoRA 固化形象', '多角度一致性测试'], output: '角色主 prompt、角色卡', note: '角色一致性是 AIGC 短片最大难点之一。' },
            { title: '构图/镜头提示词', desc: '景别/角度/运动', input: '镜头类型标注', method: ['添加 close-up/wide shot/dutch angle 等', '结合景深、焦段描述'], output: '镜头级 prompt 变体', note: '镜头语言决定叙事节奏。' },
            { title: '氛围/光影提示词', desc: '情绪/色调/天气', input: '情绪曲线与视觉关键词', method: ['匹配冷暖色调', '添加时间光线（golden hour/blue hour）', '加入天气与空气感'], output: '氛围 prompt 库', note: '光影是情绪的外化。' },
            { title: '负向提示词库', desc: '排除/降低/规避', input: '常见错误与平台禁忌', method: ['整理 deformity/blur/low quality 等通用负词', '针对项目补充禁忌内容'], output: '通用负词库 + 项目负词库', note: '负向词能显著提升出图可用率。' },
            { title: 'Prompt 模板固化', desc: '可复用/可迭代', input: '各类 prompt 实践结果', method: ['沉淀为可复用模板', '建立变量替换机制', '版本化管理'], output: 'Prompt 模板库、变量表', note: '模板化是规模化生产的前提。' }
          ]
        },
        {
          title: '分镜提取',
          subtitle: 'STORYBOARD',
          short: '分镜',
          color: '#9b7cb6',
          nodes: [
            { title: '文本分镜生成', desc: '场次/镜头/时长', input: '结构化剧本 + 镜头标注', method: ['每场拆分为若干镜头', '估算每个镜头时长', '输出文字分镜表'], output: '文字分镜脚本、镜头时长表', note: '文字分镜是视觉化的第一步。' },
            { title: '关键帧标注', desc: '起幅/落幅/高潮帧', input: '文字分镜 + 情绪曲线', method: ['标注每个镜头的关键画面', '标记高潮与转折帧', '关联参考图'], output: '关键帧列表、情绪锚点图', note: '关键帧是视觉参考的核心。' },
            { title: '分镜视觉预览', desc: '草图/气氛图', input: '关键帧 prompt', method: ['批量生成关键帧概念图', '按时间线排列预览', '快速验证视觉方向'], output: '分镜气氛图序列、视觉预览板', note: '早期预览能避免大方向错误。' },
            { title: '镜头运动标注', desc: '推/拉/摇/移/跟', input: '文字分镜与动作描述', method: ['标注镜头运动类型', '结合 AI 生成动态参考', '输出运动描述词'], output: '镜头运动表、动态参考片段', note: '运动标注影响后续剪辑节奏。' },
            { title: '时长/节奏标注', desc: '节拍点/转场点', input: '情绪曲线、音乐参考', method: ['标注节拍点与切点', '计算每场累计时长', '预留呼吸与留白'], output: '节奏表、时间线草稿', note: '节奏是短片的“呼吸”。' }
          ]
        },
        {
          title: '设计元素生成',
          subtitle: 'ELEMENTS',
          short: '元素',
          color: '#d07a5a',
          nodes: [
            { title: '角色设计', desc: '造型/表情/动态', input: '角色 prompt 与一致性方案', method: ['生成角色三视图/表情/动作', '使用 ControlNet/LoRA 固定形象', '输出角色素材包'], output: '角色设计稿、表情集、动作库', note: '角色是观众情感投射的载体。' },
            { title: '场景/背景设计', desc: '空间/时代/氛围', input: '场景 prompt 与关键帧', method: ['生成主场景与变体', '输出多时间/天气版本', '建立场景资产库'], output: '背景图、场景延展图、气氛图', note: '场景要与角色视觉风格统一。' },
            { title: '道具/服装设计', desc: '器物/服饰/纹样', input: '剧本道具与服装描述', method: ['生成关键道具与服装', '结合时代与风格校验', '输出透明底/分层素材'], output: '道具库、服装参考、纹样素材', note: '道具细节增强真实感。' },
            { title: '色彩板生成', desc: '主色/辅色/渐变', input: '参考图与氛围关键词', method: ['提取主色调与辅色', '生成配色方案', '建立 LUT/调色预设'], output: '色彩板、LUT 预设、配色规范', note: '统一色彩板是视觉一致性的关键。' },
            { title: '字体/排版风格', desc: '标题/字幕/包装', input: '项目风格与平台规范', method: ['选择/生成字体风格', '设计标题版式', '制定字幕规范'], output: '字体方案、标题模板、字幕样式', note: '字体风格影响整体气质。' },
            { title: '图形/ICON 元素', desc: '转场/装饰/信息图', input: '包装需求与视觉风格', method: ['生成装饰图形、转场元素', '设计信息图表样式', '输出 SVG/PNG 素材'], output: '图形包、转场素材、信息图模板', note: '图形元素提升包装精致度。' }
          ]
        },
        {
          title: '素材批量生成',
          subtitle: 'ASSETS',
          short: '素材',
          color: '#5b8c5a',
          nodes: [
            { title: '文生图批量', desc: '按分镜批量出图', input: '分镜 prompt + 模板', method: ['批量跑图', '按镜头编号归档', '初筛可用图'], output: '原始生成图库', note: '批量生成需要稳定的 prompt 与种子。' },
            { title: '图生图迭代', desc: '精修/变体/优化', input: '初筛图与修改意见', method: ['局部重绘', '风格迁移', 'upscale 放大'], output: '精修后的高质量图像', note: '迭代是提升质量的核心环节。' },
            { title: '角色一致性控制', desc: '种子/LoRA/ControlNet', input: '角色主 prompt 与参考图', method: ['固定种子与参数', '使用 LoRA/IP-Adapter', 'ControlNet 姿态控制'], output: '统一角色形象的系列素材', note: '一致性是叙事可信度的基础。' },
            { title: '场景延展生成', desc: '多角度/多时间', input: '主场景图与描述', method: ['生成同场景不同角度', '输出不同时间段变体', '保持透视与风格一致'], output: '场景多角度图、时间变体', note: '延展素材支持镜头调度。' },
            { title: '动态素材生成', desc: '动画/运镜/特效', input: '静态图与运动描述', method: ['图生视频/动画', 'AI 补帧与慢动作', '生成粒子/光效素材'], output: '动态镜头片段、特效素材', note: '动态素材让画面更有生命力。' },
            { title: '音效/配乐生成', desc: '氛围/节奏/情绪', input: '情绪曲线与节奏表', method: ['AI 生成氛围音效', '生成/推荐配乐', '按节奏点对齐'], output: '音效库、配乐轨道、节拍标记', note: '音频是情绪的一半。' }
          ]
        },
        {
          title: '集中处理',

      function el(id) { return document.getElementById(id); }

      function showScreen(id) {
        document.querySelectorAll('.screen').forEach(node => {
          node.classList.remove('active');
          node.setAttribute('aria-hidden', 'true');
        });
        const target = el(id);
        if (target) {
          target.classList.add('active');
          target.setAttribute('aria-hidden', 'false');
        }
      }

      function createSVGElement(tag, attrs) {
        const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
        for (const k in attrs) e.setAttribute(k, attrs[k]);
        return e;
      }

      function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r},${g},${b},${alpha})`;
      }

      function polar(cx, cy, r, deg) {
        const rad = (deg - 90) * Math.PI / 180;
        return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
      }

      function midArcPoint(cx, cy, r, startDeg, endDeg) {
        const mid = (startDeg + endDeg) / 2;
        return polar(cx, cy, r, mid);
      }

      function renderDiagram() {
        const svg = el('framework-svg');
        svg.innerHTML = '';

        const defs = createSVGElement('defs', {});
        const grad = createSVGElement('linearGradient', { id: 'circuitGrad', x1: '0', y1: '0', x2: '1', y2: '0' });
        grad.appendChild(createSVGElement('stop', { offset: '0%', 'stop-color': 'rgba(78,195,255,0.15)' }));
        grad.appendChild(createSVGElement('stop', { offset: '50%', 'stop-color': 'rgba(78,195,255,0.55)' }));
        grad.appendChild(createSVGElement('stop', { offset: '100%', 'stop-color': 'rgba(78,195,255,0.15)' }));
        defs.appendChild(grad);
        svg.appendChild(defs);

        const bgRing = createSVGElement('circle', {
          cx: CX, cy: CY, r: R,
          fill: 'none', stroke: 'rgba(78,195,255,0.08)', 'stroke-width': 1.5
        });
        svg.appendChild(bgRing);

        const innerRing = createSVGElement('circle', {
          cx: CX, cy: CY, r: R - 34,
          fill: 'none', stroke: 'rgba(78,195,255,0.05)', 'stroke-width': 1,
          'stroke-dasharray': '3 4'
        });
        svg.appendChild(innerRing);

        const count = phases.length;
        const step = 360 / count;

        const lineGroup = createSVGElement('g', {});
        for (let i = 0; i < count; i++) {
          const a1 = i * step;
          const a2 = ((i + 1) % count) * step;
          const p1 = polar(CX, CY, R, a1);
          const p2 = polar(CX, CY, R, a2);
          const mid = polar(CX, CY, R + 28, (a1 + a2) / 2);
          const d = `M${p1.x},${p1.y} Q${mid.x},${mid.y} ${p2.x},${p2.y}`;
          lineGroup.appendChild(createSVGElement('path', {
            class: 'circuit-line', d: d, stroke: 'url(#circuitGrad)', 'stroke-width': 2
          }));
        }

        const feedbackP1 = polar(CX, CY, R, (count - 1) * step);
        const feedbackP2 = polar(CX, CY, R, 0);
        const feedbackMid = polar(CX, CY, R - 42, ((count - 1) * step + 0) / 2 - 8);
        const feedbackD = `M${feedbackP1.x},${feedbackP1.y} Q${feedbackMid.x},${feedbackMid.y} ${feedbackP2.x},${feedbackP2.y}`;
        lineGroup.appendChild(createSVGElement('path', {
          class: 'feedback-line', d: feedbackD, stroke: '#8a9a5a', 'stroke-width': 1.5
        }));

        svg.appendChild(lineGroup);

        const flowGroup = createSVGElement('g', { id: 'flow-particles' });
        svg.appendChild(flowGroup);

        const centerGroup = createSVGElement('g', {});
        centerGroup.appendChild(createSVGElement('circle', {
          class: 'center-ring', cx: CX, cy: CY, r: 42,
          fill: 'rgba(78,195,255,0.08)', stroke: 'rgba(78,195,255,0.35)', 'stroke-width': 1.5
        }));
        centerGroup.appendChild(createSVGElement('circle', {
          class: 'pulse-ring', cx: CX, cy: CY, r: 42,
          fill: 'none', stroke: 'rgba(78,195,255,0.4)', 'stroke-width': 1.5
        }));
        const centerText1 = createSVGElement('text', {
          x: CX, y: CY - 5, 'text-anchor': 'middle', fill: '#fff', 'font-size': 12, 'font-weight': 600
        });
        centerText1.textContent = 'AI 剧本制作';
        centerGroup.appendChild(centerText1);
        const centerText2 = createSVGElement('text', {
          x: CX, y: CY + 12, 'text-anchor': 'middle', fill: 'var(--accent)', 'font-size': 10, 'letter-spacing': 0.08
        });
        centerText2.textContent = '主逻辑回路';
        centerGroup.appendChild(centerText2);
        svg.appendChild(centerGroup);

        const nodeGroup = createSVGElement('g', {});
        phases.forEach((phase, i) => {
          const angle = i * step;
          const pos = polar(CX, CY, R, angle);
          const g = createSVGElement('g', {
            class: 'node-group', 'data-index': i,
            transform: `translate(${pos.x - NODE_W / 2},${pos.y - NODE_H / 2})`
          });

          const rect = createSVGElement('rect', {
            class: 'node-rect',
            x: 0, y: 0, width: NODE_W, height: NODE_H, rx: 10,
            fill: hexToRgba(phase.color, 0.14),
            stroke: phase.color, 'stroke-width': 1.3
          });
          g.appendChild(rect);

          const badge = createSVGElement('rect', {
            x: 6, y: 14, width: 18, height: 18, rx: 5,
            fill: phase.color
          });
          g.appendChild(badge);
          const badgeText = createSVGElement('text', {
            class: 'node-badge', x: 15, y: 27, 'text-anchor': 'middle', fill: '#fff'
          });
          badgeText.textContent = i + 1;
          g.appendChild(badgeText);

          const title = createSVGElement('text', {
            class: 'node-title', x: NODE_W / 2 + 8, y: 21,
            'text-anchor': 'middle', fill: '#fff'
          });
          title.textContent = phase.short;
          g.appendChild(title);

          const sub = createSVGElement('text', {
            class: 'node-sub', x: NODE_W / 2 + 8, y: 36,
            'text-anchor': 'middle', fill: hexToRgba('#e8f0f8', 0.75)
          });
          sub.textContent = phase.subtitle;
          g.appendChild(sub);

          nodeGroup.appendChild(g);
        });
        svg.appendChild(nodeGroup);

        startFlowAnimation();
      }

      function startFlowAnimation() {
        const container = el('flow-particles');
        container.innerHTML = '';
        const count = phases.length;
        const step = 360 / count;

        for (let i = 0; i < count; i++) {
          const a1 = i * step;
          const a2 = ((i + 1) % count) * step;
          const p1 = polar(CX, CY, R, a1);
          const p2 = polar(CX, CY, R, a2);
          const mid = polar(CX, CY, R + 28, (a1 + a2) / 2);
          const pathId = `flow-path-${i}`;

          const path = createSVGElement('path', {
            id: pathId,
            d: `M${p1.x},${p1.y} Q${mid.x},${mid.y} ${p2.x},${p2.y}`,
            fill: 'none', stroke: 'none'
          });
          container.appendChild(path);

          const c = createSVGElement('circle', {
            r: 3.5, fill: '#4ec3ff', class: 'flow-particle'
          });
          const mpath = createSVGElement('mpath', { 'xlink:href': `#${pathId}` });
          const anim = createSVGElement('animateMotion', {
            dur: `${2.2 + i * 0.15}s`, repeatCount: 'indefinite', begin: `${i * 0.25}s`, calcMode: 'spline',
            keySplines: '0.45 0 0.55 1'
          });
          anim.appendChild(mpath);
          c.appendChild(anim);
          container.appendChild(c);
        }
      }

      function renderDetail(index) {
        const phase = phases[index];
        el('detail-title').textContent = `${index + 1}. ${phase.title}`;
        el('detail-title').style.color = phase.color;
        el('detail-subtitle').textContent = phase.subtitle;

        const body = el('detail-body');
        body.innerHTML = '';

        phase.nodes.forEach(node => {
          const row = document.createElement('div');
          row.className = 'detail-row';
          row.style.borderLeft = `3px solid ${phase.color}`;
          row.style.paddingLeft = '12px';
          row.style.marginBottom = '16px';
          row.innerHTML = `
            <div class="sub-node-title" style="color:${phase.color}">${node.title} <span style="color:var(--text-sub);font-size:11px;font-weight:400">— ${node.desc}</span></div>
            <div class="detail-text" style="margin-top:5px;font-size:12px;color:var(--text-sub)"><strong style="color:var(--text-main)">输入：</strong>${node.input}</div>
            <div class="detail-text" style="margin-top:4px;font-size:12px;color:var(--text-sub)"><strong style="color:var(--text-main)">输出：</strong>${node.output}</div>
            <div class="detail-text" style="margin-top:4px;font-size:12px;color:var(--text-sub)"><strong style="color:var(--text-main)">要点：</strong>${node.note}</div>
          `;
          body.appendChild(row);
        });

        showScreen('screen-detail');
      }

      function bindEvents() {
        document.addEventListener('click', (e) => {
          const target = e.target;
          const action = target.dataset.action;

          if (action === 'start') {
            showScreen('screen-diagram');
            return;
          }
          if (action === 'close-detail') {
            showScreen('screen-diagram');
            return;
          }

          const group = target.closest('.node-group');
          if (group) {
            const index = parseInt(group.dataset.index, 10);
            if (!isNaN(index)) renderDetail(index);
          }
        });

        document.addEventListener('keydown', (e) => {
          if (e.code === 'Escape') {
            if (el('screen-detail').classList.contains('active')) {
              showScreen('screen-diagram');
            }
          }
        });
      }

      window.addEventListener('load', () => {
        try {
          bindEvents();
          renderDiagram();
        } catch (error) {
          console.error(error);
          const fallback = document.createElement('div');
          fallback.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#070a0e;color:#e8f0f8;font-size:18px;padding:24px;text-align:center;z-index:9999;';
          fallback.textContent = '哎呀，出错了，请重启试试吧~';
          document.body.innerHTML = '';
          document.body.appendChild(fallback);
        }
      });
    })();
  </script>

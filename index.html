<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>画风提示词库 · 120 组提示词融合工具</title>
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: rgba(20, 20, 28, 0.7);
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-card-hover: rgba(255, 255, 255, 0.08);
      --text-primary: #f5f5f7;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --accent-gold: #f6c344;
      --accent-purple: #a855f7;
      --accent-pink: #ec4899;
      --accent-red: #ef4444;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: rgba(0, 0, 0, 0.5);
      --glass: rgba(255, 255, 255, 0.06);
      --radius: 14px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg-primary: #f8f7f4;
      --bg-secondary: rgba(255, 255, 255, 0.8);
      --bg-card: rgba(0, 0, 0, 0.03);
      --bg-card-hover: rgba(0, 0, 0, 0.06);
      --text-primary: #1a1a1a;
      --text-secondary: #4b5563;
      --text-muted: #9ca3af;
      --border: rgba(0, 0, 0, 0.08);
      --shadow: rgba(0, 0, 0, 0.1);
      --glass: rgba(255, 255, 255, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      transition: background var(--transition), color var(--transition);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 25%, rgba(168, 85, 247, 0.12) 0%, transparent 35%),
        radial-gradient(circle at 85% 75%, rgba(236, 72, 153, 0.1) 0%, transparent 35%),
        radial-gradient(circle at 50% 50%, rgba(246, 195, 68, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1600px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .brand h1 {
      font-family: "Songti SC", "SimSun", "Noto Serif SC", serif;
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-pink), var(--accent-purple));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(168, 85, 247, 0.3);
    }

    .brand span {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--glass);
      color: var(--text-secondary);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all var(--transition);
    }

    .icon-btn:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--shadow);
    }

    /* Main layout */
    .app {
      max-width: 1600px;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* Control bar */
    .control-bar {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .search-box {
      position: relative;
      margin-bottom: 1rem;
    }

    .search-box input {
      width: 100%;
      padding: 0.875rem 1rem 0.875rem 2.75rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: all var(--transition);
      outline: none;
    }

    .search-box input:focus {
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
    }

    .search-box::before {
      content: "🔍";
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.6;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
    }

    .theme-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      flex: 1;
    }

    .pill {
      padding: 0.4rem 0.85rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .pill:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }

    .pill.active {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(236, 72, 153, 0.2));
      border-color: var(--accent-purple);
      color: var(--text-primary);
      box-shadow: 0 0 16px rgba(168, 85, 247, 0.25);
    }

    .action-group {
      display: flex;
      gap: 0.5rem;
      margin-left: auto;
    }

    .btn {
      padding: 0.5rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--glass);
      color: var(--text-primary);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn:hover {
      background: var(--bg-card-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--shadow);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
      border: none;
      color: #fff;
    }

    .btn-primary:hover {
      box-shadow: 0 8px 24px rgba(168, 85, 247, 0.35);
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-red));
      border: none;
      color: #1a1a1a;
      font-weight: 600;
    }

    .stats-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .stat-value {
      color: var(--accent-gold);
      font-weight: 700;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    /* Prompt grid */
    .theme-section {
      margin-bottom: 2.5rem;
      animation: fadeInUp 0.6s ease both;
    }

    .theme-title {
      font-family: "Songti SC", "SimSun", "Noto Serif SC", serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 1rem;
      padding-left: 0.75rem;
      border-left: 3px solid var(--accent-purple);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .theme-title small {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .prompts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    .prompts-grid.compact {
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
    }

    .prompt-card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      cursor: pointer;
      transition: all var(--transition);
      overflow: hidden;
    }

    .prompt-card:hover {
      background: var(--bg-card-hover);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px var(--shadow);
      border-color: rgba(168, 85, 247, 0.3);
    }

    .prompt-card.selected {
      border-color: transparent;
      background: linear-gradient(135deg, rgba(246, 195, 68, 0.08), rgba(168, 85, 247, 0.08), rgba(236, 72, 153, 0.08));
      box-shadow: 0 0 24px rgba(168, 85, 247, 0.2), inset 0 0 0 1px rgba(168, 85, 247, 0.5);
    }

    .prompt-card.selected::before {
      content: "✓";
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-purple));
      color: #1a1a1a;
      font-size: 0.8rem;
      font-weight: 800;
      display: grid;
      place-items: center;
      animation: scaleIn 0.2s ease;
    }

    .card-id {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .card-content {
      font-size: 0.92rem;
      color: var(--text-secondary);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color var(--transition);
    }

    .prompt-card:hover .card-content,
    .prompt-card.selected .card-content {
      color: var(--text-primary);
    }

    .card-theme {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--accent-purple);
      font-weight: 500;
      opacity: 0.8;
    }

    /* Fusion panel */
    .fusion-panel {
      position: sticky;
      top: 92px;
      height: fit-content;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px var(--shadow);
    }

    .panel-header {
      font-family: "Songti SC", "SimSun", "Noto Serif SC", serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header span {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
    }

    .selected-list {
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 1rem;
      padding-right: 0.5rem;
    }

    .selected-list:empty::before {
      content: "未选择提示词";
      display: block;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      padding: 1.5rem 0;
    }

    .selected-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.5rem;
      margin-bottom: 0.4rem;
      background: var(--bg-card);
      border-radius: 8px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      border: 1px solid transparent;
      transition: all var(--transition);
    }

    .selected-item:hover {
      border-color: var(--accent-red);
      color: var(--text-primary);
    }

    .selected-item button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 0.2rem;
    }

    .selected-item button:hover {
      color: var(--accent-red);
    }

    .fusion-output {
      width: 100%;
      min-height: 220px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      color: var(--text-primary);
      font-size: 0.9rem;
      line-height: 1.7;
      resize: vertical;
      outline: none;
      transition: all var(--transition);
      font-family: inherit;
    }

    .fusion-output:focus {
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.12);
    }

    .char-count {
      text-align: right;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .panel-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-top: 1rem;
    }

    .panel-actions .btn {
      justify-content: center;
      padding: 0.7rem;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
      color: #fff;
      padding: 0.8rem 1.5rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: 0 12px 32px rgba(168, 85, 247, 0.35);
      z-index: 1000;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state h3 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
    }

    /* Footer */
    footer {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      position: relative;
      z-index: 1;
    }

    footer kbd {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.75rem;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        transform: scale(0);
      }
      to {
        transform: scale(1);
      }
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .app {
        grid-template-columns: 1fr 340px;
      }
    }

    @media (max-width: 992px) {
      .app {
        grid-template-columns: 1fr;
      }

      .fusion-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        top: auto;
        border-radius: var(--radius) var(--radius) 0 0;
        max-height: 60vh;
        transform: translateY(calc(100% - 56px));
        transition: transform var(--transition);
        z-index: 200;
      }

      .fusion-panel.expanded {
        transform: translateY(0);
      }

      .panel-toggle {
        display: block;
      }

      .main-content {
        padding-bottom: 70px;
      }
    }

    @media (max-width: 640px) {
      .header-inner {
        flex-wrap: wrap;
        gap: 1rem;
      }

      .brand h1 {
        font-size: 1.4rem;
      }

      .prompts-grid {
        grid-template-columns: 1fr;
      }

      .action-group {
        width: 100%;
        margin-left: 0;
      }

      .action-group .btn {
        flex: 1;
        justify-content: center;
      }
    }

    .panel-toggle {
      display: none;
    }

    @media (max-width: 992px) {
      .panel-toggle {
        display: block;
        width: 100%;
        text-align: center;
        padding: 0.5rem;
        margin-bottom: 0.75rem;
        color: var(--text-muted);
        font-size: 0.8rem;
        cursor: pointer;
      }

      .panel-toggle::before {
        content: "";
        display: inline-block;
        width: 40px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin-bottom: 0.5rem;
      }
    }
  </style>
</head>
<body data-theme="dark">
  <header>
    <div class="header-inner">
      <div class="brand">
        <h1>画风提示词库</h1>
        <span>120 PROMPTS</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="densityBtn" title="切换密度">☷</button>
        <button class="icon-btn" id="themeBtn" title="切换明暗">☀</button>
      </div>
    </div>
  </header>

  <div class="app">
    <main class="main-content">
      <div class="control-bar">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="搜索提示词关键词，如：天守阁、巨兽、霓虹、竹林..." autocomplete="off">
        </div>
        <div class="filter-row">
          <div class="theme-pills" id="themePills"></div>
          <div class="action-group">
            <button class="btn btn-primary" id="randomBtn">🎲 随机融合</button>
            <button class="btn" id="clearBtn">清空</button>
          </div>
        </div>
        <div class="stats-bar">
          <div>已选择 <span class="stat-value" id="selectedCount">0</span> 组</div>
          <div>当前显示 <span class="stat-value" id="visibleCount">120</span> 组</div>
          <div>融合字数 <span class="stat-value" id="fusionChars">0</span></div>
        </div>
      </div>

      <div id="promptsContainer"></div>
    </main>

    <aside class="fusion-panel" id="fusionPanel">
      <div class="panel-toggle" id="panelToggle"></div>
      <div class="panel-header">
        融合工作台
        <span id="panelCount">0 / 120</span>
      </div>
      <div class="selected-list" id="selectedList"></div>
      <textarea class="fusion-output" id="fusionOutput" placeholder="选择提示词后，融合结果将显示在这里。你也可以直接编辑..."></textarea>
      <div class="char-count" id="charCount">0 字符</div>
      <div class="panel-actions">
        <button class="btn btn-gold" id="copyBtn">📋 复制</button>
        <button class="btn btn-primary" id="exportBtn">💾 导出 TXT</button>
      </div>
    </aside>
  </div>

  <footer>
    <p>快捷键：<kbd>Ctrl/Cmd + A</kbd> 全选当前结果 · <kbd>Esc</kbd> 清空 · <kbd>Ctrl/Cmd + Enter</kbd> 复制融合结果</p>
    <p style="margin-top: 0.5rem;">所有提示词基于日式二次元 3D 渲染风格设计，支持自由组合与再创作</p>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    const prompts = [
      { id: 1, theme: "黎明曙光", content: "黎明高原，日系二次元3D少女身穿宽松中式白袍，面向初升太阳，动态单光源从侧后方打亮发梢，黄色高光与紫粉红光晕交织，背景远山天守阁若隐若现，神话巨兽剪影横亘，Web3D渲染，边缘柔化，纪录片镜头。" },
      { id: 2, theme: "黎明曙光", content: "曙光下的城市边缘，二次元3D角色身着宽大飘逸长裙缓步前行，裙摆微动，主光源低角度侧光，整体偏暗但人物受光面明亮，紫色与粉色环境光反射，远景有巨兽轮廓，VRM质感，高粗糙度面料。" },

    const STORAGE_KEY = "promptFusionToolState_v1";

      selectedIds: [],
      searchQuery: "",
      activeTheme: "全部",
      density: "comfortable",
      darkMode: true,
      fusionText: ""
    };

      searchInput: document.getElementById("searchInput"),
      themePills: document.getElementById("themePills"),
      promptsContainer: document.getElementById("promptsContainer"),
      selectedCount: document.getElementById("selectedCount"),

      themeBtn: document.getElementById("themeBtn"),

      fusionPanel: document.getElementById("fusionPanel"),
      panelToggle: document.getElementById("panelToggle"),
      toast: document.getElementById("toast"),
      body: document.body
    };

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          state = { ...state, ...parsed };
        }
      } catch (e) {
        console.warn("Failed to load state:", e);
      }
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          selectedIds: state.selectedIds,
          darkMode: state.darkMode,
          density: state.density
        }));
      } catch (e) {
        console.warn("Failed to save state:", e);
      }
    }

    function getFilteredPrompts() {
      return prompts.filter(p => {
        const matchesTheme = state.activeTheme === "全部" || p.theme === state.activeTheme;
        const query = state.searchQuery.trim().toLowerCase();
        const matchesSearch = !query ||
          p.content.toLowerCase().includes(query) ||
          p.theme.toLowerCase().includes(query);
        return matchesTheme && matchesSearch;
      });
    }

    function fusePrompts() {
      const selected = prompts.filter(p => state.selectedIds.includes(p.id));
      if (selected.length === 0) return "";

      const base = selected.map(p => p.content).join("，");
      const deduped = base
        .replace(/。+/g, "。")
        .replace(/，+/g, "，")
        .replace(/。，/g, "，")
        .replace(/，。/g, "。");

      return deduped;
    }

    function renderThemePills() {
      const allPill = document.createElement("button");
      allPill.className = `pill ${state.activeTheme === "全部" ? "active" : ""}`;
      allPill.textContent = `全部 (${prompts.length})`;
      allPill.addEventListener("click", () => setTheme("全部"));

      els.themePills.innerHTML = "";
      els.themePills.appendChild(allPill);

      themes.forEach(theme => {
        const count = prompts.filter(p => p.theme === theme).length;
        const pill = document.createElement("button");
        pill.className = `pill ${state.activeTheme === theme ? "active" : ""}`;
        pill.textContent = `${theme} (${count})`;
        pill.addEventListener("click", () => setTheme(theme));
        els.themePills.appendChild(pill);
      });
    }

    function renderPrompts() {
      const filtered = getFilteredPrompts();
      els.visibleCount.textContent = filtered.length;
      els.promptsContainer.innerHTML = "";

      if (filtered.length === 0) {
        els.promptsContainer.innerHTML = `
          <div class="empty-state">
            <h3>未找到匹配的提示词</h3>
            <p>尝试更换关键词或清除筛选条件</p>
          </div>
        `;
        return;
      }

      const groups = groupByTheme(filtered);
      let delay = 0;

      Object.entries(groups).forEach(([theme, items]) => {
        const section = document.createElement("section");
        section.className = "theme-section";
        section.style.animationDelay = `${delay}s`;

        const title = document.createElement("h2");
        title.className = "theme-title";
        title.innerHTML = `${theme}<small>${items.length} 组</small>`;
        section.appendChild(title);

        const grid = document.createElement("div");
        grid.className = `prompts-grid ${state.density === "compact" ? "compact" : ""}`;

        items.forEach(p => {
          const card = document.createElement("article");
          card.className = `prompt-card ${state.selectedIds.includes(p.id) ? "selected" : ""}`;
          card.setAttribute("role", "button");
          card.setAttribute("tabindex", "0");
          card.setAttribute("aria-pressed", state.selectedIds.includes(p.id));
          card.dataset.id = p.id;
          card.innerHTML = `
            <div class="card-id">#${String(p.id).padStart(3, "0")}</div>
            <div class="card-content">${escapeHtml(p.content)}</div>
            <div class="card-theme">${p.theme}</div>
          `;

          card.addEventListener("click", () => toggleSelection(p.id));
          card.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              toggleSelection(p.id);
            }
          });

          grid.appendChild(card);
        });

        section.appendChild(grid);
        els.promptsContainer.appendChild(section);
        delay += 0.05;
      });
    }

    function groupByTheme(items) {
      return items.reduce((acc, item) => {
        if (!acc[item.theme]) acc[item.theme] = [];
        acc[item.theme].push(item);
        return acc;
      }, {});
    }

    function renderFusionPanel() {
      const selected = prompts.filter(p => state.selectedIds.includes(p.id));
      const fusionText = fusePrompts();

      els.selectedCount.textContent = selected.length;
      els.panelCount.textContent = `${selected.length} / ${prompts.length}`;
      els.fusionChars.textContent = fusionText.length;

      els.selectedList.innerHTML = "";
      selected.forEach(p => {
        const item = document.createElement("div");
        item.className = "selected-item";
        item.innerHTML = `
          <span style="color: var(--accent-gold); font-weight: 600;">#${p.id}</span>
          <span style="flex: 1; line-height: 1.5;">${escapeHtml(p.content.slice(0, 40))}${p.content.length > 40 ? "..." : ""}</span>
          <button title="移除" data-id="${p.id}">×</button>
        `;
        item.querySelector("button").addEventListener("click", (e) => {
          e.stopPropagation();
          toggleSelection(p.id);
        });
        els.selectedList.appendChild(item);
      });

      if (state.fusionText !== fusionText) {
        state.fusionText = fusionText;
        els.fusionOutput.value = fusionText;
      }

      els.charCount.textContent = `${els.fusionOutput.value.length} 字符`;
    }

    function toggleSelection(id) {
      const idx = state.selectedIds.indexOf(id);
      if (idx > -1) {
        state.selectedIds.splice(idx, 1);
      } else {
        state.selectedIds.push(id);
      }
      state.selectedIds.sort((a, b) => a - b);
      updateAll();
    }

    function clearSelection() {
      state.selectedIds = [];
      updateAll();
    }

    function selectAllVisible() {
      const visible = getFilteredPrompts();
      const visibleIds = visible.map(p => p.id);
      const allSelected = visibleIds.every(id => state.selectedIds.includes(id));

      if (allSelected) {
        state.selectedIds = state.selectedIds.filter(id => !visibleIds.includes(id));
      } else {
        visibleIds.forEach(id => {
          if (!state.selectedIds.includes(id)) state.selectedIds.push(id);
        });
      }
      state.selectedIds.sort((a, b) => a - b);
      updateAll();
    }

    function randomFusion() {
      const pool = getFilteredPrompts();
      if (pool.length === 0) {
        showToast("当前筛选结果为空，无法随机融合");
        return;
      }

      const count = Math.min(5, Math.max(3, Math.floor(Math.random() * 3) + 3));
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      const picked = shuffled.slice(0, count);

      state.selectedIds = picked.map(p => p.id).sort((a, b) => a - b);
      updateAll();
      showToast(`已随机融合 ${picked.length} 组提示词`);
    }

    function setTheme(theme) {
      state.activeTheme = theme;
      updateAll();
    }

    function toggleDensity() {
      state.density = state.density === "comfortable" ? "compact" : "comfortable";
      els.densityBtn.textContent = state.density === "comfortable" ? "☷" : "≣";
      updateAll();
    }

    function toggleTheme() {
      state.darkMode = !state.darkMode;
      els.body.setAttribute("data-theme", state.darkMode ? "dark" : "light");
      els.themeBtn.textContent = state.darkMode ? "☀" : "☾";
      updateAll();
    }

    async function copyToClipboard() {
      const text = els.fusionOutput.value.trim();
      if (!text) {
        showToast("没有可复制的内容");
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        showToast("已复制到剪贴板");
      } catch (e) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        showToast("已复制到剪贴板");
      }
    }

    function exportFile(format) {
      const text = els.fusionOutput.value.trim();
      if (!text) {
        showToast("没有可导出的内容");
        return;
      }

      const timestamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
      const selected = prompts.filter(p => state.selectedIds.includes(p.id));

      let content = "";
      let filename = "";
      let mimeType = "";

      if (format === "txt") {
        content = [
          "=== 画风提示词融合结果 ===",
          `生成时间：${new Date().toLocaleString()}`,
          `融合数量：${selected.length} 组`,
          "",
          "【融合提示词】",
          text,
          "",
          "【原始提示词】",
          ...selected.map(p => `[#${p.id}] ${p.theme}\n${p.content}`)
        ].join("\n");
        filename = `prompt-fusion-${timestamp}.txt`;
        mimeType = "text/plain;charset=utf-8";
      } else if (format === "md") {
        content = [
          "# 画风提示词融合结果",
          "",
          `- 生成时间：${new Date().toLocaleString()}`,
          `- 融合数量：${selected.length} 组`,
          "",
          "## 融合提示词",
          "",
          "```text",
          text,
          "```",
          "",
          "## 原始提示词",
          "",
          ...selected.map(p => `### #${p.id} · ${p.theme}\n\n${p.content}`)
        ].join("\n");
        filename = `prompt-fusion-${timestamp}.md`;
        mimeType = "text/markdown;charset=utf-8";
      }

      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast(`已导出 ${format.toUpperCase()}`);
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      setTimeout(() => els.toast.classList.remove("show"), 2500);
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function updateAll() {
      renderThemePills();
      renderPrompts();
      renderFusionPanel();
      saveState();
    }

    function init() {
      loadState();
      els.body.setAttribute("data-theme", state.darkMode ? "dark" : "light");
      els.themeBtn.textContent = state.darkMode ? "☀" : "☾";
      els.densityBtn.textContent = state.density === "comfortable" ? "☷" : "≣";

      renderThemePills();
      renderPrompts();
      renderFusionPanel();

      els.searchInput.value = state.searchQuery;
      els.searchInput.addEventListener("input", (e) => {
        state.searchQuery = e.target.value;
        renderPrompts();
      });

      els.randomBtn.addEventListener("click", randomFusion);
      els.clearBtn.addEventListener("click", clearSelection);
      els.copyBtn.addEventListener("click", copyToClipboard);
      els.exportBtn.addEventListener("click", () => exportFile("txt"));
      els.exportBtn.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        exportFile("md");
      });
      els.themeBtn.addEventListener("click", toggleTheme);
      els.densityBtn.addEventListener("click", toggleDensity);

      els.fusionOutput.addEventListener("input", () => {
        state.fusionText = els.fusionOutput.value;
        els.charCount.textContent = `${els.fusionOutput.value.length} 字符`;
        els.fusionChars.textContent = els.fusionOutput.value.length;
      });

      els.panelToggle.addEventListener("click", () => {
        els.fusionPanel.classList.toggle("expanded");
      });

      document.addEventListener("keydown", (e) => {
        const isCmd = e.metaKey || e.ctrlKey;

        if (isCmd && e.key === "a" && document.activeElement !== els.fusionOutput) {
          e.preventDefault();
          selectAllVisible();
        }

        if (e.key === "Escape") {
          if (document.activeElement === els.searchInput) {
            els.searchInput.blur();
          } else {
            clearSelection();
          }
        }

        if (isCmd && e.key === "Enter") {
          e.preventDefault();
          copyToClipboard();
        }
      });
    }

    init();
  </script>
</body>
</html>

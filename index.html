<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高粱河车神与雍熙悲歌 · 分镜交互系统</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0f;
    --bg2:#13131c;
    --bg3:#1c1c28;
    --ink:#e8e6df;
    --ink2:#a8a59c;
    --ink3:#6b6862;
    --gold:#c9a35a;
    --gold2:#8a6d2e;
    --red:#a8242b;
    --red2:#6e1418;
    --jade:#5a8a72;
    --line:#2a2a36;
    --shadow:0 8px 32px rgba(0,0,0,.5);
  }
  html,body{background:var(--bg);color:var(--ink);font-family:"Source Han Serif SC","Noto Serif SC","Songti SC",serif;line-height:1.6;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;background:
    radial-gradient(ellipse at top, rgba(201,163,90,.06), transparent 60%),
    radial-gradient(ellipse at bottom, rgba(168,36,43,.05), transparent 60%),
    var(--bg)}

  /* ====== HEADER ====== */
  header{position:relative;padding:48px 32px 32px;text-align:center;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(0,0,0,.4),transparent)}
  header::before{content:"";position:absolute;inset:0;background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><path d='M0 50 Q25 30 50 50 T100 50' stroke='%23c9a35a' stroke-width='.3' fill='none' opacity='.15'/></svg>");opacity:.4;pointer-events:none}
  .seal{position:absolute;top:24px;right:32px;width:64px;height:64px;border:2px solid var(--red);color:var(--red);font-size:11px;display:flex;align-items:center;justify-content:center;transform:rotate(-8deg);font-weight:700;letter-spacing:2px;opacity:.85;background:rgba(168,36,43,.08)}
  h1{font-size:36px;letter-spacing:8px;font-weight:900;background:linear-gradient(180deg,#e8c878,#c9a35a 50%,#8a6d2e);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:8px;text-shadow:0 2px 12px rgba(201,163,90,.2)}
  .subtitle{color:var(--ink2);font-size:14px;letter-spacing:6px;margin-bottom:16px}
  .meta{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;font-size:13px;color:var(--ink3)}
  .meta span{display:inline-flex;align-items:center;gap:6px}
  .meta b{color:var(--gold);font-weight:600}

  /* ====== LAYOUT ====== */
  .wrap{display:grid;grid-template-columns:340px 1fr;min-height:calc(100vh - 200px)}
  @media(max-width:980px){.wrap{grid-template-columns:1fr}}

  /* ====== SIDEBAR / SCRIPT SELECTOR ====== */
  aside{background:var(--bg2);border-right:1px solid var(--line);padding:24px 0;position:sticky;top:0;max-height:100vh;overflow-y:auto}
  aside::-webkit-scrollbar{width:6px}
  aside::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .side-title{padding:0 24px 12px;font-size:11px;letter-spacing:4px;color:var(--ink3);text-transform:uppercase;border-bottom:1px dashed var(--line);margin-bottom:8px}
  .act{padding:14px 24px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;font-size:14px;color:var(--ink2)}
  .act:hover{background:rgba(201,163,90,.05);color:var(--ink)}
  .act.active{background:linear-gradient(90deg,rgba(201,163,90,.1),transparent);border-left-color:var(--gold);color:var(--gold)}
  .act .n{font-size:11px;color:var(--ink3);display:block;margin-top:2px;letter-spacing:1px}
  .shot-list{margin-top:8px;border-top:1px dashed var(--line);padding-top:8px}
  .shot-mini{padding:6px 24px 6px 36px;font-size:12px;color:var(--ink3);cursor:pointer;transition:all .15s;display:flex;gap:8px;align-items:center}
  .shot-mini:hover{color:var(--ink);background:rgba(255,255,255,.02)}
  .shot-mini.current{color:var(--gold)}
  .shot-mini .idx{font-family:monospace;width:28px;flex-shrink:0;color:var(--ink3)}
  .shot-mini.current .idx{color:var(--gold)}
  .shot-mini .dur{margin-left:auto;font-size:10px;color:var(--ink3);font-family:monospace}

  /* ====== MAIN / DETAIL ====== */
  main{padding:32px 40px;max-width:1200px;margin:0 auto;width:100%}
  .crumb{font-size:12px;color:var(--ink3);letter-spacing:2px;margin-bottom:16px}
  .crumb b{color:var(--gold);font-weight:600}

  .shot-header{display:flex;align-items:flex-end;gap:24px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--line)}
  .shot-no{font-family:monospace;font-size:64px;font-weight:900;color:var(--gold);line-height:1;letter-spacing:-2px}
  .shot-title{flex:1}
  .shot-title h2{font-size:24px;letter-spacing:4px;margin-bottom:4px}
  .shot-title .time{color:var(--ink3);font-size:13px;font-family:monospace}
  .shot-title .time b{color:var(--red)}

  .shot-nav{display:flex;gap:8px}
  .shot-nav button{background:var(--bg3);color:var(--ink2);border:1px solid var(--line);padding:8px 14px;cursor:pointer;font-size:12px;letter-spacing:1px;transition:all .15s;font-family:inherit}
  .shot-nav button:hover{background:var(--gold);color:#000;border-color:var(--gold)}
  .shot-nav button:disabled{opacity:.3;cursor:not-allowed}

  /* ====== GRID ====== */
  .grid{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;margin-bottom:20px}
  @media(max-width:780px){.grid{grid-template-columns:1fr}}
  .card{background:var(--bg2);border:1px solid var(--line);padding:20px;box-shadow:var(--shadow);position:relative}
  .card::before{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:var(--gold)}
  .card.red::before{background:var(--red)}
  .card.jade::before{background:var(--jade)}
  .card-title{font-size:11px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .card-title::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  .card-body{font-size:14px;line-height:1.85;color:var(--ink);white-space:pre-wrap}

  /* ====== CHARACTER LIST ====== */
  .char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:8px}
  .char{background:var(--bg3);padding:10px;border:1px solid var(--line);text-align:center}
  .char-av{width:48px;height:48px;margin:0 auto 6px;border-radius:50%;background:linear-gradient(135deg,var(--gold2),var(--red2));display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:700;letter-spacing:0;border:2px solid var(--gold)}
  .char-name{font-size:12px;font-weight:600;color:var(--ink)}
  .char-pos{font-size:10px;color:var(--ink3);margin-top:2px}

  /* ====== PROMPT BOX ====== */
  .prompt-box{background:#000;border:1px dashed var(--gold2);padding:14px;font-family:monospace;font-size:12px;color:var(--gold);line-height:1.7;border-radius:0;position:relative;word-break:break-word}
  .prompt-box::before{content:"EN_PROMPT";position:absolute;top:-8px;left:10px;background:var(--bg2);padding:0 6px;font-size:9px;letter-spacing:2px;color:var(--gold2)}
  .prompt-cn{color:var(--ink2);font-family:"Source Han Serif SC",serif;font-size:13px;margin-bottom:10px;padding:10px 12px;background:rgba(201,163,90,.05);border-left:2px solid var(--gold)}

  /* ====== EFFECT DEMO ====== */
  .effect-stage{background:#000;border:1px solid var(--line);height:280px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .effect-stage canvas{position:absolute;inset:0;width:100%;height:100%}
  .effect-label{position:absolute;top:10px;left:12px;font-size:10px;letter-spacing:2px;color:var(--gold);background:rgba(0,0,0,.6);padding:3px 8px;z-index:5;border:1px solid var(--gold2)}
  .effect-tag{position:absolute;bottom:10px;right:10px;font-size:10px;letter-spacing:1px;color:var(--ink2);background:rgba(0,0,0,.7);padding:3px 8px;z-index:5;font-family:monospace}
  .effect-controls{position:absolute;bottom:10px;left:10px;display:flex;gap:6px;z-index:5}
  .effect-controls button{background:rgba(0,0,0,.6);color:var(--ink);border:1px solid var(--line);padding:4px 10px;font-size:11px;cursor:pointer;letter-spacing:1px}
  .effect-controls button:hover{background:var(--gold);color:#000}

  /* ====== POSITION MAP ====== */
  .posmap{background:radial-gradient(ellipse at center,rgba(201,163,90,.08),transparent 70%),var(--bg3);height:280px;position:relative;border:1px solid var(--line);overflow:hidden}
  .posmap svg{width:100%;height:100%}
  .pos-tag{position:absolute;background:rgba(0,0,0,.75);color:var(--ink);font-size:11px;padding:3px 7px;border:1px solid var(--gold);white-space:nowrap;transform:translate(-50%,-50%);letter-spacing:1px}
  .pos-tag.red{border-color:var(--red);color:#f5b5b8}
  .pos-tag.jade{border-color:var(--jade);color:#b8e0c8}
  .pos-tag::after{content:"";position:absolute;width:8px;height:8px;background:var(--gold);border-radius:50%;left:-13px;top:50%;transform:translateY(-50%);box-shadow:0 0 8px var(--gold)}
  .pos-tag.red::after{background:var(--red);box-shadow:0 0 8px var(--red)}
  .pos-tag.jade::after{background:var(--jade);box-shadow:0 0 8px var(--jade)}

  /* ====== TIMELINE STRIP ====== */
  .timeline{position:relative;height:8px;background:var(--bg3);margin:20px 0;overflow:hidden;border:1px solid var(--line)}
  .tl-shot{position:absolute;top:0;height:100%;background:var(--line);border-right:1px solid var(--bg);transition:all .2s;cursor:pointer}
  .tl-shot:hover{background:var(--gold2)}
  .tl-shot.act{background:linear-gradient(180deg,var(--gold),var(--gold2))}
  .tl-label{display:flex;justify-content:space-between;font-size:10px;color:var(--ink3);font-family:monospace;margin-top:4px}

  /* ====== CAMERA NOTES ====== */
  .cam-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{background:var(--bg3);border:1px solid var(--line);padding:4px 10px;font-size:11px;color:var(--ink2);letter-spacing:1px}
  .tag.gold{color:var(--gold);border-color:var(--gold2)}
  .tag.red{color:#f5b5b8;border-color:var(--red2)}
  .tag.jade{color:#b8e0c8;border-color:#3a5a4a}

  /* ====== FOOTER ====== */
  footer{text-align:center;padding:32px;color:var(--ink3);font-size:12px;letter-spacing:2px;border-top:1px solid var(--line);margin-top:40px}

  /* ====== UTILS ====== */
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .small{font-size:12px;color:var(--ink3)}
  .divider{height:1px;background:var(--line);margin:16px 0}

  /* candle flicker */
  @keyframes flicker{0%,100%{opacity:1;transform:scaleY(1)}50%{opacity:.7;transform:scaleY(.95)}}
  /* shake */
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-1px)}75%{transform:translateX(1px)}}
</style>
</head>
<body>

<header>
  <div class="seal">宋<br>北伐</div>
  <div class="subtitle">影 视 分 镜 交 互 系 统</div>
  <h1>高粱河车神 · 雍熙悲歌</h1>
  <div class="meta">
    <span>剧本：<b>赵光义北伐全纪实</b></span>
    <span>时长：<b>13 分钟</b></span>
    <span>分镜：<b>52 镜</b></span>
    <span>单镜：<b>15 秒</b></span>
    <span>语速：<b>180-200 字/分</b></span>
  </div>
</header>

<div class="wrap">
  <!-- ============ SIDEBAR ============ -->
  <aside id="sidebar">
    <div class="side-title">▎剧本分幕</div>
    <div id="acts"></div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main id="main">
    <div class="crumb" id="crumb"></div>
    <div class="shot-header">
      <div class="shot-no" id="shotNo">01</div>
      <div class="shot-title">
        <h2 id="shotTitle">—</h2>
        <div class="time">本镜时长 <b id="shotTime">15.0s</b> · 起止 <span id="shotRange">00:00–00:15</span></div>
      </div>
      <div class="shot-nav">
        <button id="btnPrev">◀ 上一镜</button>
        <button id="btnNext">下一镜 ▶</button>
      </div>
    </div>

    <!-- TIMELINE -->
    <div class="timeline" id="timeline"></div>
    <div class="tl-label"><span>00:00</span><span>06:30</span><span>13:00</span></div>

    <!-- SCENE + AI PROMPT -->
    <div class="grid">
      <div class="card">
        <div class="card-title">▎画面描述 / 镜头脚本</div>
        <div class="card-body" id="sceneText"></div>
        <div class="divider"></div>
        <div class="cam-tags" id="camTags"></div>
      </div>
      <div class="card jade">
        <div class="card-title" style="color:var(--jade)">▎AI 生成提示词</div>
        <div class="prompt-cn" id="promptCn"></div>
        <div class="prompt-box" id="promptEn"></div>
      </div>
    </div>

    <!-- CHARACTERS + POSITION -->
    <div class="grid">
      <div class="card red">
        <div class="card-title" style="color:#f5b5b8">▎出场角色</div>
        <div class="char-grid" id="charGrid"></div>
      </div>
      <div class="card">
        <div class="card-title">▎机位 / 角色位置</div>
        <div class="posmap" id="posmap">
          <svg viewBox="0 0 400 280" preserveAspectRatio="none">
            <defs>
              <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a2a36" stroke-width="0.5"/>
              </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid)"/>
            <line x1="200" y1="0" x2="200" y2="280" stroke="#3a3a48" stroke-dasharray="2,4"/>
            <line x1="0" y1="140" x2="400" y2="140" stroke="#3a3a48" stroke-dasharray="2,4"/>
            <text x="10" y="20" fill="#6b6862" font-size="10" font-family="monospace">↑ NORTH / 远景</text>
            <text x="290" y="20" fill="#6b6862" font-size="10" font-family="monospace">WIDE 400 × 280</text>
          </svg>
          <div id="posTags" style="position:absolute;inset:0"></div>
        </div>
      </div>
    </div>

    <!-- EFFECT DEMO -->
    <div class="card">
      <div class="card-title">▎特殊效果 HTML 演示 / FX Preview</div>
      <div class="effect-stage" id="effectStage">
        <canvas id="fxCanvas"></canvas>
        <div class="effect-label" id="fxLabel">FX</div>
        <div class="effect-tag" id="fxTag">composite</div>
        <div class="effect-controls">
          <button onclick="fxReplay()">▶ 重新播放</button>
        </div>
      </div>
      <div class="small" style="margin-top:10px;line-height:1.8" id="fxDesc"></div>
    </div>
  </main>
</div>

<footer>
  ◈ 高 梁 河 车 神 · 雍 熙 悲 歌  ◈  分 镜 交 互 系 统  ◈  A E · V I D E O  ◈
</footer>

<script>
/* ============================================================
   STORYBOARD DATA — 52 SHOTS @ 15s = 13min
============================================================ */
const SHOTS=[
/* ============ 引子 ============ */
{act:0,actName:"引子",title:"石敬瑭割让燕云",nar:"公元936年，五代后晋开国皇帝石敬瑭，为换取契丹支持，将燕云十六州拱手让给辽国。",
 scene:"昏暗的宫殿内，石敬瑭跪于地上向北方叩拜。身后是燕云十六州的地形沙盘，烛光摇曳。",
 chars:[

 ],
 cam:["中景","低角度","暖色调烛光"],

 fx:"candle", fxName:"烛影摇曳",fxTag:"#fx-candle",
 fxDesc:"FX: 烛光摇曳投影在沙盘上 → 红色高亮燕云十六州 → 镜头缓缓推进。AE 制作: Turbulent Displace 烛芯 + Linear Wipe 红色描边。"},

{act:0,title:"燕云十六州地形",nar:"燕云十六州以北京和大同为中心，囊括居庸关、雁门关等险要。",
 scene:"中国北方地图从高空俯瞰，十六州区域高亮红光，居庸关、雁门关闪烁标记。",

/* ============================================================
   RENDER SIDEBAR
============================================================ */
const actsEl=document.getElementById("acts");
ACTS.forEach((a,i)=>{
  const div=document.createElement("div");
  div.className="act";
  div.dataset.act=i;
  div.innerHTML=`${a.name}<span class="n">第 ${a.range[0]}–${a.range[1]} 镜</span>`;
  div.onclick=()=>{goTo(a.range[0]-1)};
  actsEl.appendChild(div);

  const sl=document.createElement("div");
  sl.className="shot-list";
  for(let j=a.range[0]-1;j<a.range[1];j++){
    const s=SHOTS[j];
    const sm=document.createElement("div");
    sm.className="shot-mini";
    sm.dataset.idx=j;
    sm.innerHTML=`<span class="idx">${String(j+1).padStart(2,"0")}</span><span>${s.title}</span><span class="dur">15s</span>`;
    sm.onclick=()=>{goTo(j)};
    sl.appendChild(sm);

});

/* ============================================================
   RENDER TIMELINE
============================================================ */
let current=0;
let currentAct=0;
const tlEl=document.getElementById("timeline");
SHOTS.forEach((s,i)=>{

  t.className="tl-shot"+(s.act===currentAct?" act":"");

/* ============================================================
   RENDER SHOT
============================================================ */
function fmtTime(sec){const m=Math.floor(sec/60),s=sec%60;return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")}
function goTo(i){
  if(i<0||i>=SHOTS.length)return;
  current=i;
  const s=SHOTS[i];
  currentAct=s.act;
  const startSec=i*15,endSec=(i+1)*15;

  document.getElementById("shotNo").textContent=String(i+1).padStart(2,"0");
  document.getElementById("shotTitle").textContent=s.title;
  document.getElementById("shotTime").textContent="15.0s";
  document.getElementById("shotRange").textContent=fmtTime(startSec)+" – "+fmtTime(endSec);
  document.getElementById("sceneText").textContent=s.nar+"\n\n【画面】"+s.scene;
  document.getElementById("promptCn").textContent=s.cn;
  document.getElementById("promptEn").textContent=s.en;

  // crumb
  document.getElementById("crumb").innerHTML=`▸ ${ACTS[s.act].name} <b>·</b> 第 ${i+1} 镜`;

  // char grid
  const cg=document.getElementById("charGrid");
  cg.innerHTML="";
  s.chars.forEach(c=>{
    const cd=document.createElement("div");
    cd.className="char";
    cd.innerHTML=`<div class="char-av" style="background:${c.c}">${c.n.charAt(0)}</div><div class="char-name">${c.n}</div><div class="char-pos">${c.p}</div>`;
    cg.appendChild(cd);
  });

  // position tags - distribute around the map
  const pt=document.getElementById("posTags");
  pt.innerHTML="";
  const posLayout=[
    {x:50,y:50},{x:200,y:80},{x:350,y:60},
    {x:80,y:160},{x:200,y:180},{x:330,y:170},
    {x:60,y:240},{x:220,y:240},{x:340,y:230}
  ];
  s.chars.forEach((c,idx)=>{
    const p=posLayout[idx%posLayout.length];
    const t=document.createElement("div");
    t.className="pos-tag"+(c.c==="#a8242b"?" red":c.c==="#5a8a72"?" jade":"");
    t.style.left=p.x+"px";t.style.top=p.y+"px";
    t.textContent=c.n+" · "+c.p;
    pt.appendChild(t);
  });

  // cam tags
  const ct=document.getElementById("camTags");
  ct.innerHTML="";
  s.cam.forEach(c=>{
    const t=document.createElement("span");
    t.className="tag gold";
    t.textContent="◉ "+c;
    ct.appendChild(t);
  });
  s.chars.forEach(c=>{
    const t=document.createElement("span");
    t.className="tag";
    t.textContent="角色："+c.n;
    ct.appendChild(t);
  });

  // fx label
  document.getElementById("fxLabel").textContent="FX · "+s.fxName;
  document.getElementById("fxTag").textContent=s.fxTag;
  document.getElementById("fxDesc").textContent=s.fxDesc;

  // active in sidebar
  document.querySelectorAll(".shot-mini").forEach(el=>{
    el.classList.toggle("current",+el.dataset.idx===i);
  });
  document.querySelectorAll("#acts > .act").forEach(el=>{
    el.classList.toggle("active",ACTS[+el.dataset.act].range[0]-1<=i && i<ACTS[+el.dataset.act].range[1]);
  });
  document.querySelectorAll(".tl-shot").forEach(el=>{
    el.classList.toggle("act",+el.dataset.idx===i);
  });

  // launch fx
  playFx(s.fx);
}

document.getElementById("btnPrev").onclick=()=>goTo(current-1);
document.getElementById("btnNext").onclick=()=>goTo(current+1);
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft")goTo(current-1);
  if(e.key==="ArrowRight")goTo(current+1);
});

/* ============================================================
   SPECIAL EFFECTS — Canvas animations
============================================================ */
const canvas=document.getElementById("fxCanvas");
const ctx=canvas.getContext("2d");
let raf=null;
let particles=[];

function resize(){const s=document.getElementById("effectStage");canvas.width=s.clientWidth;canvas.height=s.clientHeight}
window.addEventListener("resize",resize);resize();

function fxReplay(){playFx(SHOTS[current].fx)}

function clearFx(){if(raf)cancelAnimationFrame(raf);raf=null;particles=[];ctx.clearRect(0,0,canvas.width,canvas.height)}

function playFx(type){
  clearFx();
  resize();
  const W=canvas.width,H=canvas.height;

  if(type==="candle"||type==="candle-axe")fxCandle(W,H);
  else if(type==="map")fxMap(W,H);
  else if(type==="imperial")fxImperial(W,H);
  else if(type==="army")fxArmy(W,H);
  else if(type==="dust")fxDust(W,H);
  else if(type==="battle")fxBattle(W,H);
  else if(type==="donkey")fxDonkey(W,H);
  else if(type==="blood")fxBlood(W,H);
  else if(type==="end")fxEnd(W,H);
}

function fxCandle(W,H){
  const cx=W*0.5,cy=H*0.45;
  const t0=performance.now();
  function loop(t){
    const dt=(t-t0)/1000;
    ctx.fillStyle="rgba(0,0,0,0.25)";ctx.fillRect(0,0,W,H);
    // backdrop
    const grd=ctx.createRadialGradient(cx,cy,10,cx,cy,180);
    grd.addColorStop(0,"rgba(201,163,90,0.4)");grd.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
    // flame
    const flick=Math.sin(t*0.02)*3+Math.sin(t*0.05)*2;
    ctx.save();
    ctx.translate(cx,cy);
    ctx.beginPath();
    ctx.moveTo(0,-30+flick);
    ctx.quadraticCurveTo(15+flick,-10,8+flick,10);
    ctx.quadraticCurveTo(0,20+flick,-8-flick,10);
    ctx.quadraticCurveTo(-15-flick,-10,0,-30+flick);
    const fg=ctx.createRadialGradient(0,0,2,0,0,30);
    fg.addColorStop(0,"#fff7c0");fg.addColorStop(0.4,"#c9a35a");fg.addColorStop(1,"rgba(201,163,90,0)");
    ctx.fillStyle=fg;ctx.fill();
    // candle stick
    ctx.fillStyle="#e8e6df";
    ctx.fillRect(-3,10,6,40);
    // candlelight flicker
    const flick2=0.6+Math.sin(t*0.03)*0.2+Math.sin(t*0.07)*0.1;
    document.getElementById("effectStage").style.boxShadow=`inset 0 0 ${50+flick2*30}px rgba(201,163,90,${0.3+flick2*0.3})`;
    // shadow hands on screen
    if(Math.random()<0.01)particles.push({x:cx+Math.random()*100-50,y:cy,life:60,type:"shadow"});
    ctx.restore();
    // shadows
    particles.forEach(p=>{
      p.life--;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.fillStyle=`rgba(0,0,0,${p.life/60*0.5})`;
      ctx.beginPath();
      ctx.ellipse(0,0,40+Math.sin(t*0.05+p.x)*10,80+Math.sin(t*0.04+p.y)*15,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
    particles=particles.filter(p=>p.life>0);
    if(t-t0<15000)raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
}

function fxMap(W,H){
  const t0=performance.now();
  function loop(t){
    const dt=(t-t0)/1000;
    ctx.fillStyle="rgba(0,0,0,0.15)";ctx.fillRect(0,0,W,H);
    // grid
    ctx.strokeStyle="rgba(201,163,90,0.15)";ctx.lineWidth=1;
    for(let i=0;i<W;i+=30){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke()}
    for(let i=0;i<H;i+=30){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke()}
    // animated paths
    ctx.strokeStyle="#c9a35a";ctx.lineWidth=2;ctx.shadowColor="#c9a35a";ctx.shadowBlur=10;
    const paths=[[100,80,200,140,300,100],[80,200,200,180,300,220],[150,200,180,260,250,240]];
    paths.forEach((p,i)=>{
      ctx.beginPath();
      const phase=(dt*0.5+i*0.2)%2;
      for(let k=0;k<3;k+=2){
        const t1=Math.min(1,Math.max(0,phase-k/3));
        const x=p[k]+(p[k+2]-p[k])*t1,y=p[k+1]+(p[k+3]-p[k+1])*t1;
        if(k===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
      }
      ctx.stroke();
    });
    ctx.shadowBlur=0;
    // pulsing dots
    [200,140,250,200,180,80].forEach((p,i)=>{
      const x=[100,300,150][i%3],y=[140,100,200][i%3];
      const r=3+Math.sin(t*0.005+i)*2;
      ctx.fillStyle="#a8242b";
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
    });
    if(t-t0<15000)raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
}

function fxImperial(W,H){
  const t0=performance.now();
  function loop(t){
    ctx.fillStyle="rgba(0,0,0,0.1)";ctx.fillRect(0,0,W,H);
    const grd=ctx.createRadialGradient(W/2,H/2,10,W/2,H/2,200);
    const a=0.3+Math.sin(t*0.003)*0.15;
    grd.addColorStop(0,`rgba(201,163,90,${a})`);grd.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
    // gold particles
    if(particles.length<60)particles.push({x:W/2,y:H/2,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:100});
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.life--;
      ctx.fillStyle=`rgba(201,163,90,${p.life/100})`;
      ctx.fillRect(p.x,p.y,2,2);
    });
    particles=particles.filter(p=>p.life>0);
    if(t-t0<15000)raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
}

function fxArmy(W,H){
  const t0=performance.now();
  for(let i=0;i<80;i++)particles.push({x:Math.random()*W,y:Math.random()*H,vx:0.5+Math.random()*0.5,vy:-0.2-Math.random()*0.3,life:200,size:2+Math.random()*2});
  function loop(t){
    const dt=(t-t0)/1000;
    ctx.fillStyle="rgba(60,50,40,0.15)";ctx.fillRect(0,0,W,H);
    // ground
    ctx.fillStyle="rgba(120,90,60,0.2)";ctx.fillRect(0,H*0.6,W,H*0.4);
    // flags
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.life--;
      ctx.fillStyle=`rgba(${168+p.x%30},${36+p.x%20},${43},${p.life/200})`;
      ctx.fillRect(p.x,p.y,p.size,15);
      // flag cloth
      ctx.fillStyle=`rgba(201,163,90,${p.life/200*0.6})`;
      ctx.beginPath();
      ctx.moveTo(p.x+p.size,p.y);
      ctx.lineTo(p.x+p.size+8+Math.sin(t*0.01+p.x)*2,p.y+3);
      ctx.lineTo(p.x+p.size,p.y+8);
      ctx.fill();
    });
    particles=particles.filter(p=>p.life>0&&p.x<W);
    if(t-t0<15000)raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
}

function fxDust(W,H){
  const t0=performance.now();
  for(let i=0;i<40;i++)particles.push({x:Math.random()*W,y:H*0.5+Math.random()*H*0.5,vx:(Math.random()-0.5)*0.3,vy:-0.1-Math.random()*0.2,life:300,size:1+Math.random()*3});
  function loop(t){
    ctx.fillStyle="rgba(50,40,30,0.1)";ctx.fillRect(0,0,W,H);
    // haze
    const grd=ctx.createLinearGradient(0,H*0.4,0,H);
    grd.addColorStop(0,"rgba(180,150,100,0)");grd.addColorStop(1,"rgba(180,150,100,0.4)");
    ctx.fillStyle=grd;ctx.fillRect(0,H*0.4,W,H*0.6);
    particles.forEach(p=>{
      p.x+=p.vx+Math.sin(t*0.001+p.x)*0.2;
      p.y+=p.vy;p.life--;
      ctx.fillStyle=`rgba(180,150,100,${p.life/300*0.6})`;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
    });
    particles=particles.filter(p=>p.life>0);
    if(t-t0<15000)raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
}

function fxBattle(W,H){
  const t0=performance.now();
  function loop(t){
    const dt=(t-t0)/1000;
    ctx.fillStyle="rgba(20,10,10,0.2)";ctx.fillRect(0,0,W,H);
    // ground
    ctx.fillStyle="rgba(60,40,30,0.5)";ctx.fillRect(0,H*0.65,W,H*0.35);
    // dust clouds
    if(Math.random()<0.3)particles.push({x:Math.random()*W,y:H*0.5+Math.random()*H*0.3,vx:(Math.random()-0.5)*3,vy:-Math.random()*2,life:50,size:8+Math.random()*15,col:Math.random()<0.5?"#a8242b":"#6b6862"});
    // sabers
    if(Math.random()<0.2)particles.push({x:Math.random()*W,y:Math.random()*H*0.6,vx:5+Math.random()*5,vy:0,life:20,type:"saber"});
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.life--;
      if(p.type==="saber"){
        ctx.strokeStyle=`rgba(232,230,223,${p.life/20})`;
        ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-30,p.y+5);ctx.stroke();
        ctx.shadowColor="#fff";ctx.shadowBlur=10;
      }else{
        ctx.fillStyle=p.col.replace(")",","+p.life/50+")").replace("rgb","rgba");
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
      }
    });
    ctx.shadowBlur=0;
    particles=particles.filter(p=>p.life>0);
    if(t-t0<15000)raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
}

function fxDonkey(W,H){
  const t0=performance.now();
  for(let i=0;i<20;i++)particles.push({x:Math.random()*W,y:H*0.6+Math.random()*H*0.2,vx:2+Math.random()*3,vy:0,life:100});
  function loop(t){
    const dt=(t-t0)/1000;
    ctx.fillStyle="rgba(10,5,5,0.3)";ctx.fillRect(0,0,W,H);
    // night sky
    ctx.fillStyle="rgba(20,15,30,0.6)";ctx.fillRect(0,0,W,H*0.6);
    // moon
    ctx.fillStyle="#e8e6df";
    ctx.beginPath();ctx.arc(W*0.8,H*0.2,20,0,Math.PI*2);ctx.fill();
    // ground
    ctx.fillStyle="rgba(60,40,30,0.6)";ctx.fillRect(0,H*0.6,W,H*0.4);
    // cart
    const x=((dt*100)%W+W*0.3)%W;
    ctx.save();
    ctx.translate(x,H*0.55);
    ctx.fillStyle="#6b1418";ctx.fillRect(-15,-10,30,15);
    ctx.fillStyle="#3a2818";ctx.fillRect(-2,5,4,8);
    // donkey
    ctx.fillStyle="#6b6862";
    ctx.fillRect(20,-15,20,10);
    ctx.fillRect(38,-20,5,15);
    // emperor
    ctx.fillStyle="#c9a35a";
    ctx.beginPath();ctx.arc(-5,-18,4,0,Math.PI*2);ctx.fill();
    // wheels
    ctx.fillStyle="#13131c";
    ctx.beginPath();ctx.arc(-10,10,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(10,10,4,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // dust trail
    particles.forEach(p=>{
      p.x-=p.vx;p.life--;
      ctx.fillStyle=`rgba(180,150,100,${p.life/100*0.4})`;
      ctx.beginPath();ctx.arc(p.x,p.y,3+Math.random()*2,0,Math.PI*2);ctx.fill();
    });
    particles=particles.filter(p=>p.life>0);
    if(particles.length<20)particles.push({x:W,y:H*0.6+Math.random()*H*0.2,vx:2+Math.random()*3,vy:0,life:100});
    // pursuit arrows
    if(Math.random()<0.1)particles.push({x:0,y:H*0.4+Math.random()*H*0.3,vx:8+Math.random()*4,vy:0,life:40,type:"arrow"});
    particles.forEach(p=>{
      if(p.type==="arrow"){
        ctx.strokeStyle=`rgba(${p.life*4},${p.life*4},${p.life*4},${p.life/40})`;
        ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-15,p.y);ctx.stroke();
      }
    });
    if(t-t0<15000)raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
}

function fxBlood(W,H){
  const t0=performance.now();
  function loop(t){
    const dt=(t-t0)/1000;
    ctx.fillStyle="rgba(60,20,20,0.3)";ctx.fillRect(0,0,W,H);
    // river
    const ry=H*0.7;
    const grd=ctx.createLinearGradient(0,ry-20,0,ry+20);
    grd.addColorStop(0,"rgba(168,36,43,0.8)");grd.addColorStop(0.5,"rgba(110,20,24,1)");grd.addColorStop(1,"rgba(80,15,18,0.8)");
    ctx.fillStyle=grd;ctx.fillRect(0,ry-15,W,30);
    // waves
    ctx.strokeStyle="rgba(168,36,43,0.6)";ctx.lineWidth=2;
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.moveTo(0,ry-10+i*5);
      for(let x=0;x<W;x+=10){
        ctx.lineTo(x,ry-10+i*5+Math.sin(t*0.005+x*0.1+i)*2);
      }
      ctx.stroke();
    }
    // floating bodies
    if(Math.random()<0.05)particles.push({x:Math.random()*W,y:ry,vx:-0.5,vy:0,life:200});
    particles.forEach(p=>{
      p.x+=p.vx;p.life--;
      ctx.fillStyle=`rgba(60,30,30,${p.life/200})`;
      ctx.fillRect(p.x,p.y-3,15,4);
    });
    particles=particles.filter(p=>p.life>0);
    if(t-t0<15000)raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
}

function fxEnd(W,H){
  const t0=performance.now();
  function loop(t){
    ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);
    const a=Math.min(1,(t-t0)/2000);
    ctx.fillStyle=`rgba(201,163,90,${a})`;
    ctx.font="bold 36px serif";
    ctx.textAlign="center";
    ctx.fillText("—— 全 剧 终 ——",W/2,H/2);
    ctx.font="14px monospace";
    ctx.fillStyle=`rgba(201,163,90,${a*0.6})`;
    ctx.fillText("THE END · 高粱河车神 · 雍熙悲歌",W/2,H/2+30);
    if(t-t0<15000)raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
}

/* ============================================================
   INIT
============================================================ */
goTo(0);
</script>

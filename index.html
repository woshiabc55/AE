<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AI 剧本制作框架逻辑图</title>
  <style>
    :root {
      --bg-deep: #0b0f14;
      --bg-panel: rgba(16, 22, 30, 0.95);
      --node-1: #4a90d9;
      --node-2: #5b8c5a;
      --node-3: #c9a86c;
      --node-4: #9b7cb6;
      --node-5: #5aa3a3;
      --node-6: #d07a5a;
      --node-7: #6b8cce;
      --text-main: #eef2f6;
      --text-sub: #9aa7b8;
      --accent: #6dc0ff;
      --line: rgba(109, 192, 255, 0.35);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      line-height: 1.6;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.45s ease, visibility 0.45s ease;
      z-index: 10;
      background: var(--bg-deep);
    }

    .screen.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .screen-diagram {
      justify-content: flex-start;
      padding-top: calc(18px + var(--safe-top));
      padding-bottom: calc(12px + var(--safe-bottom));
    }

    .modal-card {
      position: relative;
      z-index: 3;
      width: min(88vw, 460px);
      max-height: 80vh;
      background: var(--bg-panel);
      border: 1px solid rgba(109, 192, 255, 0.22);
      border-radius: 18px;
      padding: 26px 22px 22px;
      text-align: left;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 24px 70px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
      overflow-y: auto;
    }

    .modal-title {
      font-size: clamp(22px, 6vw, 30px);
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
      color: var(--accent);
      text-align: center;
    }

    .modal-subtitle {
      font-size: clamp(13px, 3.6vw, 15px);
      color: var(--text-sub);
      margin-bottom: 18px;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .modal-message {
      font-size: clamp(14px, 4vw, 16px);
      color: var(--text-main);
      margin-bottom: 22px;
      line-height: 1.75;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      appearance: none;
      border: none;
      outline: none;
      cursor: pointer;
      font: inherit;
      width: 100%;
      padding: 13px 18px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.06em;
      transition: transform 0.12s ease, opacity 0.12s ease;
      text-align: center;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(180deg, #6dc0ff 0%, #3a8fd9 100%);
      color: #051018;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text-main);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .diagram-header {
      position: relative;
      z-index: 20;
      width: 100%;
      text-align: center;
      padding: 10px 20px 14px;
      flex-shrink: 0;
    }

    .diagram-header h1 {
      font-size: clamp(18px, 5vw, 24px);
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .diagram-header p {
      font-size: 12px;
      color: var(--text-sub);
      letter-spacing: 0.05em;
    }

    .diagram-scroll {
      position: relative;
      z-index: 15;
      width: 100%;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 0 16px 30px;
    }

    .diagram-scroll::-webkit-scrollbar { width: 0; height: 0; }

    .diagram-svg {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      display: block;
      height: auto;
    }

    .node-rect {
      cursor: pointer;
      transition: filter 0.2s ease, transform 0.2s ease;
    }

    .node-rect:hover { filter: brightness(1.15); }

    .node-rect:active { transform: scale(0.98); transform-origin: center; }

    .node-label {
      pointer-events: none;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .node-desc {
      pointer-events: none;
      font-size: 11px;
      opacity: 0.85;
    }

    .flow-particle {
      pointer-events: none;
      filter: drop-shadow(0 0 4px var(--accent));
    }

    .detail-row {
      margin-bottom: 14px;
    }

    .detail-row:last-child { margin-bottom: 0; }

    .detail-label {
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .detail-text {
      font-size: 14px;
      color: var(--text-main);
      line-height: 1.7;
    }

    .detail-list {
      list-style: none;
      padding: 0;
    }

    .detail-list li {
      position: relative;
      padding-left: 14px;
      margin-bottom: 6px;
      font-size: 14px;
      color: var(--text-main);
      line-height: 1.6;
    }

    .detail-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 9px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
      font-size: 11px;
      color: var(--text-sub);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .pulse-ring {
      animation: pulseRing 2.4s ease-out infinite;
      transform-origin: center;
    }

    @keyframes pulseRing {
      0% { opacity: 0.6; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.5); }
    }

    @media (max-width: 360px) {
      .diagram-scroll { padding: 0 10px 24px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="screen-start" class="screen active" aria-hidden="false">
      <div class="modal-card">
        <h1 class="modal-title">AI 剧本制作框架逻辑图</h1>
        <p class="modal-subtitle">从创意种子到成品输出的全流程</p>
        <p class="modal-message">
          这是一个可交互的 SVG 框架图，展示当前流行的 AIGC 剧本/短片制作工作流。<br><br>
          点击流程节点，查看每一阶段的输入、AI 方法、输出与关键注意点。
        </p>
        <div class="modal-actions">
          <button class="btn btn-primary" data-action="start" type="button">查看框架图</button>
        </div>
      </div>
    </div>

    <div id="screen-diagram" class="screen screen-diagram" aria-hidden="true">
      <div class="diagram-header">
        <h1>AI 剧本制作框架</h1>
        <p>点击节点查看阶段详情</p>
      </div>
      <div class="diagram-scroll">
        <svg class="diagram-svg" viewBox="0 0 360 960" preserveAspectRatio="xMidYMin meet" xmlns="http://www.w3.org/2000/svg" id="framework-svg">
          <defs>
            <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(109,192,255,0.15)"/>
              <stop offset="50%" stop-color="rgba(109,192,255,0.45)"/>
              <stop offset="100%" stop-color="rgba(109,192,255,0.15)"/>
            </linearGradient>
            <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="2.5" result="blur"/>
              <feComposite in="SourceGraphic" in2="blur" operator="over"/>
            </filter>
          </defs>

          <rect width="360" height="960" fill="#0b0f14"/>

          <g opacity="0.18">
            <line x1="30" y1="0" x2="30" y2="960" stroke="#6dc0ff" stroke-width="0.5"/>
            <line x1="330" y1="0" x2="330" y2="960" stroke="#6dc0ff" stroke-width="0.5"/>
            <line x1="180" y1="0" x2="180" y2="960" stroke="#6dc0ff" stroke-width="0.5" stroke-dasharray="4 6"/>
          </g>

          <g id="connections" stroke="url(#lineGrad)" stroke-width="2" fill="none" stroke-linecap="round">
            <path d="M180,118 L180,148"/>
            <path d="M180,228 L180,258"/>
            <path d="M180,338 L180,368"/>
            <path d="M180,448 L180,478"/>
            <path d="M180,558 L180,588"/>
            <path d="M180,668 L180,698"/>
          </g>

          <g id="flow-particles"></g>

          <g class="node-group" data-index="0" transform="translate(180, 70)">
            <circle class="pulse-ring" cx="0" cy="0" r="52" fill="none" stroke="var(--node-1)" stroke-width="1.5" opacity="0"/>
            <rect class="node-rect" x="-130" y="-38" width="260" height="76" rx="14" fill="rgba(74,144,217,0.14)" stroke="var(--node-1)" stroke-width="1.5"/>
            <circle cx="-100" cy="0" r="18" fill="var(--node-1)"/>
            <text x="-100" y="5" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">1</text>
            <text class="node-label" x="0" y="-4" text-anchor="middle" fill="var(--text-main)" font-size="16">创意种子</text>
            <text class="node-desc" x="0" y="18" text-anchor="middle" fill="var(--text-sub)" font-size="11">主题 · 情绪 · 受众 · 核心命题</text>
          </g>

          <g class="node-group" data-index="1" transform="translate(180, 183)">
            <rect class="node-rect" x="-130" y="-38" width="260" height="76" rx="14" fill="rgba(91,140,90,0.14)" stroke="var(--node-2)" stroke-width="1.5"/>
            <circle cx="-100" cy="0" r="18" fill="var(--node-2)"/>
            <text x="-100" y="5" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">2</text>
            <text class="node-label" x="0" y="-4" text-anchor="middle" fill="var(--text-main)" font-size="16">AI 剧本生成</text>
            <text class="node-desc" x="0" y="18" text-anchor="middle" fill="var(--text-sub)" font-size="11">梗概 · 分幕 · 对白 · 人物设定</text>
          </g>

          <g class="node-group" data-index="2" transform="translate(180, 296)">
            <rect class="node-rect" x="-130" y="-38" width="260" height="76" rx="14" fill="rgba(201,168,108,0.14)" stroke="var(--node-3)" stroke-width="1.5"/>
            <circle cx="-100" cy="0" r="18" fill="var(--node-3)"/>
            <text x="-100" y="5" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">3</text>
            <text class="node-label" x="0" y="-4" text-anchor="middle" fill="var(--text-main)" font-size="16">逻辑巡演</text>
            <text class="node-desc" x="0" y="18" text-anchor="middle" fill="var(--text-sub)" font-size="11">逻辑校验 · 时间线 · 情感曲线</text>
          </g>

          <g class="node-group" data-index="3" transform="translate(180, 409)">
            <rect class="node-rect" x="-130" y="-38" width="260" height="76" rx="14" fill="rgba(155,124,182,0.14)" stroke="var(--node-4)" stroke-width="1.5"/>
            <circle cx="-100" cy="0" r="18" fill="var(--node-4)"/>
            <text x="-100" y="5" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">4</text>
            <text class="node-label" x="0" y="-4" text-anchor="middle" fill="var(--text-main)" font-size="16">生成参考</text>
            <text class="node-desc" x="0" y="18" text-anchor="middle" fill="var(--text-sub)" font-size="11">概念图 · 角色 · 色彩 · 分镜</text>
          </g>

          <g class="node-group" data-index="4" transform="translate(180, 522)">
            <rect class="node-rect" x="-130" y="-38" width="260" height="76" rx="14" fill="rgba(90,163,163,0.14)" stroke="var(--node-5)" stroke-width="1.5"/>
            <circle cx="-100" cy="0" r="18" fill="var(--node-5)"/>
            <text x="-100" y="5" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">5</text>
            <text class="node-label" x="0" y="-4" text-anchor="middle" fill="var(--text-main)" font-size="16">集中处理</text>
            <text class="node-desc" x="0" y="18" text-anchor="middle" fill="var(--text-sub)" font-size="11">标准化 · 元数据 · 资产库</text>
          </g>

          <g class="node-group" data-index="5" transform="translate(180, 635)">
            <rect class="node-rect" x="-130" y="-38" width="260" height="76" rx="14" fill="rgba(208,122,90,0.14)" stroke="var(--node-6)" stroke-width="1.5"/>
            <circle cx="-100" cy="0" r="18" fill="var(--node-6)"/>
            <text x="-100" y="5" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">6</text>
            <text class="node-label" x="0" y="-4" text-anchor="middle" fill="var(--text-main)" font-size="16">剪辑框架</text>
            <text class="node-desc" x="0" y="18" text-anchor="middle" fill="var(--text-sub)" font-size="11">时间线 · 粗剪 · 节奏 · 字幕</text>
          </g>

          <g class="node-group" data-index="6" transform="translate(180, 748)">
            <rect class="node-rect" x="-130" y="-38" width="260" height="76" rx="14" fill="rgba(107,140,206,0.14)" stroke="var(--node-7)" stroke-width="1.5"/>
            <circle cx="-100" cy="0" r="18" fill="var(--node-7)"/>
            <text x="-100" y="5" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">7</text>
            <text class="node-label" x="0" y="-4" text-anchor="middle" fill="var(--text-main)" font-size="16">成品输出</text>
            <text class="node-desc" x="0" y="18" text-anchor="middle" fill="var(--text-sub)" font-size="11">精剪 · 增强 · 多平台适配</text>
          </g>

          <g transform="translate(180, 855)">
            <text x="0" y="0" text-anchor="middle" fill="var(--text-sub)" font-size="12" letter-spacing="0.1em">闭环反馈</text>
            <path d="M-60,18 Q0,58 60,18" fill="none" stroke="var(--line)" stroke-width="1.5" stroke-dasharray="4 4"/>
            <polygon points="58,14 64,20 56,22" fill="var(--line)"/>
          </g>

          <g class="legend" transform="translate(180, 915)">
            <text x="-80" y="0" text-anchor="middle" fill="var(--text-sub)" font-size="10">生成层</text>
            <circle cx="-50" cy="-3" r="4" fill="var(--node-2)"/>
            <text x="-10" y="0" text-anchor="middle" fill="var(--text-sub)" font-size="10">校验层</text>
            <circle cx="20" cy="-3" r="4" fill="var(--node-3)"/>
            <text x="55" y="0" text-anchor="middle" fill="var(--text-sub)" font-size="10">资产层</text>
            <circle cx="85" cy="-3" r="4" fill="var(--node-4)"/>
          </g>
        </svg>
      </div>
    </div>

    <div id="screen-detail" class="screen" aria-hidden="true">
      <div class="modal-card" id="detail-card">
        <h2 class="modal-title" id="detail-title"></h2>
        <p class="modal-subtitle" id="detail-subtitle"></p>
        <div id="detail-body"></div>
        <div class="modal-actions" style="margin-top: 22px;">
          <button class="btn btn-secondary" data-action="close-detail" type="button">返回框架图</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const nodes = [
        {
          title: '1. 创意种子',
          subtitle: 'Creative Seed',
          color: '#4a90d9',
          input: '主题命题、目标受众、情绪基调、参考片/参考文本、平台调性',
          method: [
            '用 AI 进行关键词发散与主题聚类',
            '生成情绪板关键词云与视觉锚点',
            '分析参考片的叙事结构、节奏、色彩倾向'
          ],
          output: '创意 brief、核心一句话命题、关键词云、风格锚点',
          note: '这是整个流程的“根”。命题越具体，后续生成越可控。'
        },
        {
          title: '2. AI 剧本生成',
          subtitle: 'AI Script Generation',
          color: '#5b8c5a',
          input: '创意 brief、角色设定、结构模板（三幕/五幕/英雄之旅）',
          method: [
            '大模型生成故事梗概与核心冲突',
            '逐幕扩展：场景 → 动作 → 对白',
            '角色一致性校验：动机、语言风格、成长弧线'
          ],
          output: '完整剧本、人物小传、场景清单、对白文本',
          note: '建议分阶段生成，先结构后细节，避免一次性输出导致逻辑失控。'
        },
        {
          title: '3. 逻辑巡演',
          subtitle: 'Logic Tour / Narrative Verification',
          color: '#c9a86c',
          input: '剧本文本、时间线、角色关系网',
          method: [
            'AI 检查情节逻辑漏洞与因果链',
            '梳理时间线与空间线是否自洽',
            '分析情感曲线：起承转合、高潮位置、节奏密度'
          ],
          output: '逻辑校验报告、修订建议、情感曲线图、节奏图谱',
          note: 'AI 容易写出“看起来对但连不起来”的情节，此阶段必须人工 + AI 双重校验。'
        },
        {
          title: '4. 生成参考',
          subtitle: 'Generation References',
          color: '#9b7cb6',
          input: '剧本场景描述、角色外貌、氛围关键词',
          method: [
            '文生图批量生成概念图与氛围参考',
            '角色参考：固定种子/LoRA 保持形象一致',
            '分镜参考：关键帧构图、色彩、光影'
          ],
          output: '参考图库、风格指南、角色卡、分镜草图',
          note: '参考图决定最终视觉上限，建议建立统一的 prompt 模板与负面词库。'
        },
        {
          title: '5. 集中处理',
          subtitle: 'Centralized Processing',
          color: '#5aa3a3',
          input: '剧本 + 参考资产 + 生成素材',
          method: [
            '统一命名规范与文件夹结构',
            '自动打标签：场景、角色、情绪、用途',
            '素材去重、裁切、格式标准化、版本管理'
          ],
          output: '结构化资产库、可检索标签、制作清单、版本记录',
          note: '资产混乱是后期崩溃的主因，越早标准化越好。'
        },
        {
          title: '6. 剪辑框架',
          subtitle: 'Editing Framework',
          color: '#d07a5a',
          input: '分镜/镜头素材、剧本时间线、音频参考',
          method: [
            '按剧本时间线排列镜头粗剪',
            'AI 辅助匹配节奏点、生成字幕、推荐转场',
            '人工精修：情绪、留白、对白、音乐'
          ],
          output: '粗剪版本、精剪时间线、字幕文件、音频工程',
          note: '剪辑是“二次创作”，AI 负责效率，人负责情绪与取舍。'
        },
        {
          title: '7. 成品输出',
          subtitle: 'Final Output',
          color: '#6b8cce',
          input: '精剪成片、封面、字幕、标题',
          method: [
            '画质增强、调色统一、音频对齐',
            '多平台裁剪：横版/竖版/方形',
            '生成封面、缩略图、发布文案'
          ],
          output: '最终成片、封面图、字幕文件、多平台版本',
          note: '输出前需再次检查平台规范：分辨率、码率、时长、字幕安全区。'
        }
      ];

      function el(id) { return document.getElementById(id); }

      function showScreen(id) {
        document.querySelectorAll('.screen').forEach(node => {
          node.classList.remove('active');
          node.setAttribute('aria-hidden', 'true');
        });
        const target = el(id);
        if (target) {
          target.classList.add('active');
          target.setAttribute('aria-hidden', 'false');
        }
      }

      function renderDetail(index) {
        const n = nodes[index];
        el('detail-title').textContent = n.title;
        el('detail-title').style.color = n.color;
        el('detail-subtitle').textContent = n.subtitle;
        el('detail-body').innerHTML = `
          <div class="detail-row">
            <div class="detail-label">输入 Input</div>
            <div class="detail-text">${n.input}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">AI 方法 Method</div>
            <ul class="detail-list">${n.method.map(m => `<li>${m}</li>`).join('')}</ul>
          </div>
          <div class="detail-row">
            <div class="detail-label">输出 Output</div>
            <div class="detail-text">${n.output}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">关键提示 Key Point</div>
            <div class="detail-text">${n.note}</div>
          </div>
        `;
        showScreen('screen-detail');
      }

      function bindEvents() {
        document.addEventListener('click', (e) => {
          const target = e.target;
          const action = target.dataset.action;

          if (action === 'start') {
            showScreen('screen-diagram');
            startFlowAnimation();
            return;
          }
          if (action === 'close-detail') {
            showScreen('screen-diagram');
            return;
          }

          const group = target.closest('.node-group');
          if (group) {
            const index = parseInt(group.dataset.index, 10);
            if (!isNaN(index)) renderDetail(index);
          }
        });

        document.addEventListener('keydown', (e) => {
          if (e.code === 'Escape') {
            if (el('screen-detail').classList.contains('active')) {
              showScreen('screen-diagram');
            }
          }
        });
      }

      function startFlowAnimation() {
        const container = el('flow-particles');
        container.innerHTML = '';
        const paths = [
          { x: 180, y1: 118, y2: 148 },
          { x: 180, y1: 228, y2: 258 },
          { x: 180, y1: 338, y2: 368 },
          { x: 180, y1: 448, y2: 478 },
          { x: 180, y1: 558, y2: 588 },
          { x: 180, y1: 668, y2: 698 }
        ];

        paths.forEach((p, i) => {
          const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          c.setAttribute('cx', p.x);
          c.setAttribute('cy', p.y1);
          c.setAttribute('r', 4);
          c.setAttribute('fill', 'var(--accent)');
          c.classList.add('flow-particle');
          container.appendChild(c);

          const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
          anim.setAttribute('attributeName', 'cy');
          anim.setAttribute('values', `${p.y1};${p.y2};${p.y1}`);
          anim.setAttribute('dur', `${2 + i * 0.2}s`);
          anim.setAttribute('repeatCount', 'indefinite');
          anim.setAttribute('begin', `${i * 0.3}s`);
          anim.setAttribute('calcMode', 'spline');
          anim.setAttribute('keySplines', '0.45 0 0.55 1;0.45 0 0.55 1');
          c.appendChild(anim);
        });
      }

      window.addEventListener('load', () => {
        try {
          bindEvents();
        } catch (error) {
          console.error(error);
          const fallback = document.createElement('div');
          fallback.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b0f14;color:#eef2f6;font-size:18px;padding:24px;text-align:center;z-index:9999;';
          fallback.textContent = '哎呀，出错了，请重启试试吧~';
          document.body.innerHTML = '';
          document.body.appendChild(fallback);
        }
      });
    })();
  </script>
</body>
</html>

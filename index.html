<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Asset Reference Hub | 游戏素材参考库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="scanlines"></div>
  <div class="grid-bg"></div>

  <!-- 顶部导航 -->
  <header class="topbar">
    <div class="brand">
      <button class="menu-toggle" id="menuToggle" title="菜单">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon>
          <line x1="12" y1="22" x2="12" y2="15.5"></line>
          <polyline points="22 8.5 12 15.5 2 8.5"></polyline>
        </svg>
      </div>
      <div class="brand-text">
        <h1>G.A.R.H.</h1>
        <span>游戏素材参考库</span>
      </div>
    </div>

    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="searchInput" placeholder="搜索角色、皮肤、标签..." autocomplete="off">
      <div class="search-shortcut">⌘K</div>
    </div>

    <div class="topbar-actions">
      <button class="action-btn" id="viewToggle" title="切换视图">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
      </button>
      <button class="action-btn" id="themeToggle" title="切换主题">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
      <button class="action-btn import-btn" id="importBtn" title="导入数据">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
      </button>
      <button class="action-btn" id="exportBtn" title="导出数据">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
      </button>
    </div>
  </header>

  <div class="app-layout">
    <!-- 左侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <h3>快捷入口</h3>
        <nav class="nav-list">
          <a href="#" class="nav-item active" data-filter="all">
            <span class="nav-icon">⌘</span>
            <span>全部素材</span>
            <span class="nav-count" id="countAll">0</span>
          </a>
          <a href="#" class="nav-item" data-filter="favorites">
            <span class="nav-icon">♥</span>
            <span>收藏夹</span>
            <span class="nav-count" id="countFavorites">0</span>
          </a>
          <a href="#" class="nav-item" data-filter="recent">
            <span class="nav-icon">◷</span>
            <span>最近添加</span>
            <span class="nav-count" id="countRecent">0</span>
          </a>
        </nav>
      </div>

      <div class="sidebar-section">
        <h3>游戏分类</h3>
        <nav class="nav-list" id="gameNav">
          <!-- 动态生成 -->
        </nav>
      </div>

      <div class="sidebar-section">
        <h3>热门标签</h3>
        <div class="tag-cloud" id="tagCloud">
          <!-- 动态生成 -->
        </div>
      </div>

      <div class="sidebar-footer">
        <p>仅供个人参考整理</p>
        <p>素材版权归原厂商所有</p>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <div class="content-header">
        <div class="breadcrumbs" id="breadcrumbs">
          <span>全部素材</span>
        </div>
        <div class="sort-control">
          <label>排序</label>
          <select id="sortSelect">
            <option value="newest">最新添加</option>
            <option value="name">名称</option>
            <option value="game">游戏</option>
          </select>
        </div>
      </div>

      <div class="asset-grid" id="assetGrid">
        <!-- 动态生成 -->
      </div>

      <div class="empty-state hidden" id="emptyState">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <path d="M21 15l-5-5L5 21"></path>
          </svg>
        </div>
        <h3>未找到相关素材</h3>
        <p>尝试更换关键词或清除筛选条件</p>
      </div>
    </main>
  </div>

  <!-- 详情抽屉 -->
  <div class="drawer-overlay hidden" id="drawerOverlay"></div>
  <aside class="detail-drawer" id="detailDrawer">
    <button class="drawer-close" id="drawerClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="drawer-content" id="drawerContent">
      <!-- 动态生成 -->
    </div>
  </aside>

  <!-- 导入模态框 -->
  <div class="modal-overlay hidden" id="modalOverlay"></div>
  <div class="modal hidden" id="importModal">
    <div class="modal-header">
      <h2>导入素材数据</h2>
      <button class="modal-close" id="modalClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="import-tabs">
        <button class="import-tab active" data-tab="json">JSON 文本</button>
        <button class="import-tab" data-tab="file">JSON 文件</button>
      </div>
      <div class="import-panel active" data-panel="json">
        <textarea id="jsonInput" placeholder='粘贴符合格式的 JSON，例如：
{
  "games": [...],
  "assets": [...]
}'></textarea>
      </div>
      <div class="import-panel" data-panel="file">
        <div class="file-dropzone" id="fileDropzone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <p>点击选择或拖拽 JSON 文件到此处</p>
          <input type="file" id="fileInput" accept=".json,application/json">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelImport">取消</button>
        <button class="btn btn-primary" id="confirmImport">确认导入</button>
      </div>
    </div>
  </div>

  <!-- 提示条 -->
  <div class="toast hidden" id="toast">
    <span id="toastMsg"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>

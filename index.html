<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillBox · 多功能在线工具箱</title>
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    .cat-bar { height: 8px; border-radius: 4px; background: var(--bg-2); overflow: hidden; }
    .cat-bar-fill { height: 100%; }
  </style>
</head>
<body>
  <aside id="sidebar" class="sidebar"></aside>

  <main class="main">
    <div class="page-header">
      <div class="page-title">⚡ SkillBox 工具箱</div>
      <div class="page-desc">无需登录、无需联网（首次加载后），所有计算均在本地完成。</div>
    </div>

    <div class="panel">
      <div class="row">
        <a href="/search.html" style="text-decoration:none; flex:1; display:flex; align-items:center; gap:14px; padding:14px 18px; background:linear-gradient(135deg, rgba(106,166,255,0.15), rgba(139,109,255,0.15)); border:1px solid var(--border); border-radius:10px;">
          <span style="font-size:28px">🔍</span>
          <div style="flex:1">
            <div style="color:#fff; font-weight:700; font-size:15px">同质化检索（新功能）</div>
            <div style="color:var(--muted); font-size:12px">输入关键词，自动聚类功能相近的工具</div>
          </div>
          <span style="color:var(--accent);">→</span>
        </a>
      </div>
    </div>

    <div class="grid grid-4">
      <div class="stat"><div class="stat-num" id="cTotal">0</div><div class="stat-lbl">在线工具</div></div>
      <div class="stat"><div class="stat-num" id="cCat">0</div><div class="stat-lbl">分类</div></div>
      <div class="stat"><div class="stat-num">0</div><div class="stat-lbl">数据上传</div></div>
      <div class="stat"><div class="stat-num">∞</div><div class="stat-lbl">使用次数</div></div>
    </div>

    <div id="cats"></div>

    <div class="panel" style="text-align:center; color:var(--muted); font-size:13px;">
      💡 提示：所有页面共享左侧导航，使用 <span class="kbd">Ctrl</span> + <span class="kbd">F</span>（或顶部搜索框）可快速定位工具。
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    renderSidebar("/index.html");

    const colors = ["#6aa6ff","#8b6dff","#4ad991","#ffb86b","#ff6b6b","#cfd86b","#5dd5d5","#e08fff","#ff8aa6","#7cf28f"];
    const descs = {
      "文本处理": "字符统计、Markdown、正则、Diff、Base64、URL...",
      "数据可视化": "柱状图、折线、饼图、雷达、词云、桑基...",
      "实用工具": "调色器、二维码、JSON、UUID、计算器、番茄钟...",
      "图片工具": "压缩、缩放、格式转换、裁剪、水印（本地处理）",
      "加解密": "MD5/SHA、HMAC、AES-GCM/CBC、JWT 解码、密码强度",
      "网络 / 开发": "URL 解析、IP、HTTP 状态码、子网、Cron、进制、ASCII",
      "代码 / 数据": "JSON→代码、代码格式化/压缩、CSV↔JSON、表格查看、颜色",
      "数学 / 生活": "统计、BMI、BMR、工作日、世界时钟、倒计时"
    };

    const cats = NAV.filter(g => g.title !== "概览" && g.items.length > 0);
    document.getElementById("cTotal").textContent = totalTools();
    document.getElementById("cCat").textContent = cats.length;

    document.getElementById("cats").innerHTML = cats.map((g, i) => {
      const c = colors[i % colors.length];
      return `<div class="panel">
        <div class="row" style="align-items:center;">
          <div class="panel-title" style="margin:0">${g.title}（${g.items.length}）</div>
          <div class="cat-bar" style="width:120px; margin-left:auto;"><div class="cat-bar-fill" style="width:${g.items.length*8}%; background:${c}"></div></div>
        </div>
        <div class="page-desc" style="margin:4px 0 12px">${descs[g.title] || ""}</div>
        <div class="grid grid-4">
          ${g.items.map(it => `<a class="tool-card" href="${it.href}">
            <div class="tool-card-icon" style="background:linear-gradient(135deg, ${c}, ${colors[(i+1)%colors.length]})">${it.icon}</div>
            <div class="tool-card-name">${it.name}</div>
            <div class="tool-card-desc">${(it.tags || []).slice(0, 3).join(" · ")}</div>
          </a>`).join("")}
        </div>
      </div>`;
    }).join("");
  </script>
</body>
</html>

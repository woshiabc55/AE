<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Fraunces:ital,opsz,wght@1,9..144,700;1,9..144,900&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <title>图海 IconGalaxy · One Gallery. Every Icon.</title>
    <meta name="description" content="聚合 Iconfont / IconPark / Material / Lucide / Heroicons / Tabler / Phosphor 的跨源图标浏览器" />
    <script>
      // 防 FOUC：在 React 加载前同步主题
      (function () {
        try {
          var raw = localStorage.getItem('icongalaxy.theme');
          var mode = 'dark';
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && parsed.state && parsed.state.mode) mode = parsed.state.mode;
          }
          var root = document.documentElement;
          root.classList.remove('dark', 'light');
          root.classList.add(mode);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

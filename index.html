function _runTool(id, mountEl){
  switch(id){
    case 'reload-data':
      _logToLauncher('info', '正在重新加载 data.js…');
      const s = document.createElement('script');
      s.src = 'data.js?t=' + Date.now();
      s.onload = () => { _logToLauncher('ok', 'data.js 重新加载完成'); setTimeout(() => location.reload(), 500); };
      s.onerror = () => _logToLauncher('err', 'data.js 加载失败');
      document.head.appendChild(s);
      break;
    case 'clear-cache':
      if(!confirm('清空所有 LocalStorage (主题 / 收藏 / 25+ 设置)？此操作不可撤销。')) return;
      Object.keys(localStorage).filter(k => k.startsWith('gip:')).forEach(k => localStorage.removeItem(k));
      _logToLauncher('warn', 'LocalStorage 已清空');
      setTimeout(() => location.reload(), 600);
      break;
    case 'export-all':
      exportCSV(WORKS.slice(0, 5000).map(w => ({ id:w.id, title:w.title, type:w.typeZh, region:w.region, year:w.year, source:w.source, ip:w.ip })), `all_works_${Date.now()}.csv`);
      exportCSV(IP_LIST.map(([k,v]) => ({ ip:k, count:v })), `ip_ranking_${Date.now()}.csv`);
      _logToLauncher('ok', '已导出 CSV (5,000 作品 + IP 排行)');
      break;
    case 'open-prd':
      window.open('.trae/documents/PRD.md', '_blank');
      _logToLauncher('info', '打开 PRD.md');
      break;
    case 'open-tech':
      window.open('.trae/documents/TECH.md', '_blank');
      _logToLauncher('info', '打开 TECH.md');
      break;
    case 'copy-link':
      navigator.clipboard.writeText(location.href).then(() => {
        _logToLauncher('ok', '链接已复制: ' + location.href);
      }).catch(() => _logToLauncher('warn', '复制失败，请手动复制地址栏'));
      break;
    case 'fullscreen':
      if(!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
      _logToLauncher('info', '切换全屏');
      break;
    case 'view-source':
      window.open('index.html', '_blank');
      _logToLauncher('info', '在新窗口打开源码');
      break;
    case 'regen-data':
      _logToLauncher('info', '提示: 重新生成需在终端运行 python3 generate4.py');
      alert('请在终端运行:\\n\\npython3 generate4.py\\n\\n此操作会重新生成 91MB 的 data.js');
      break;
    case 'diag-run':
      _runDiagnostics(mountEl);
      break;
  }
}

function _runDiagnostics(mountEl){
  _logEntries = [];
  _logToLauncher('info', '开始系统诊断…');
  // 检查所有路由
  const routes = ['/', '/browse', '/visualize', '/ip', '/rankings', '/compare', '/timeline', '/regions', '/collections', '/brief', '/milestones', '/trends', '/settings', '/launcher'];
  routes.forEach(r => _logToLauncher('ok', '路由 ' + r + ' 已注册'));
  // 检查数据
  _logToLauncher(WORKS.length > 0 ? 'ok' : 'err', '数据: ' + WORKS.length.toLocaleString() + ' 条 / ' + IP_LIST.length + ' 个 IP');
  _logToLauncher(Object.keys(typeCounts).length === 13 ? 'ok' : 'warn', '类型数: ' + Object.keys(typeCounts).length + ' (期望 13)');
  _logToLauncher(Object.keys(regionCounts).length >= 4 ? 'ok' : 'warn', '地区数: ' + Object.keys(regionCounts).length);
  // 检查 ECharts
  _logToLauncher(typeof echarts !== 'undefined' ? 'ok' : 'err', 'ECharts ' + echarts.version);
  // LocalStorage
  const ls = _computeLocalStorageUsage();
  _logToLauncher(parseFloat(ls.mb) < 5 ? 'ok' : 'warn', 'LocalStorage: ' + ls.kb + ' KB (' + ls.count + ' 键)');
  // 设置
  _logToLauncher('info', '当前设置: theme=' + SETTINGS.theme + ' accent=' + SETTINGS.accent + ' density=' + SETTINGS.density);
  // 收藏
  _logToLauncher('ok', '收藏数: ' + storage.get('favs', []).length);
  // 性能
  const t = performance.now();
  IP_LIST.length;
  _logToLauncher('ok', '性能: IP_LIST 索引耗时 ' + (performance.now()-t).toFixed(2) + 'ms');
  // DOM
  _logToLauncher('ok', 'DOM 节点: ' + document.getElementsByTagName('*').length);
  _logToLauncher('info', '诊断完成');
  // re-render
  if(mountEl) renderLauncher(mountEl);
}

function renderMilestones(mountEl){
  const total = WORKS.length;
  // 选关键里程碑年份
  const yC = Object.create(null);
  for(const w of WORKS){ if(w.year > 0) yC[w.year] = (yC[w.year] || 0) + 1; }
  // 关键年份：每年作品数 Top + 固定时间点
  const fixedYears = [1986, 1989, 1996, 2000, 2005, 2010, 2015, 2020, yearRange[1]].filter(y => y >= yearRange[0] && y <= yearRange[1]);
  // Top 年份
  const topYears = Object.entries(yC).sort((a,b)=>b[1]-a[1]).slice(0, 8).map(([y]) => +y);
  const milestoneYears = Array.from(new Set([...fixedYears, ...topYears])).sort((a,b)=>a-b);
  // 为每个年份构建里程碑
  const milestones = milestoneYears.map(y => {
    const works = WORKS.filter(w => w.year === y);
    const ipC = Object.create(null), tC = Object.create(null), rC = Object.create(null);
    for(const w of works){
      ipC[w.ip] = (ipC[w.ip] || 0) + 1;
      tC[w.type] = (tC[w.type] || 0) + 1;
      rC[w.region] = (rC[w.region] || 0) + 1;
    }
    const topIp = Object.entries(ipC).sort((a,b)=>b[1]-a[1])[0];
    const topT = Object.entries(tC).sort((a,b)=>b[1]-a[1])[0];
    // 代表作：随机 2 个
    const samples = [];
    if(works.length){
      for(let i=0;i<Math.min(2, works.length);i++){
        samples.push(works[Math.floor(Math.random()*works.length)]);
      }
    }
    // 里程碑描述
    const era = y < 1990 ? 'FC 时代 · 8-bit 黄金期' :
                y < 2000 ? 'PS / SS 主机崛起 · 32-bit 浪潮' :
                y < 2010 ? 'PS2 / PSP 多元扩张 · 改编井喷' :
                y < 2020 ? '数字化 · 网络化 · 跨平台' :
                            '元宇宙 · 全球化 · AI 协同';
    return { y, count: works.length, topIp, topT, samples, era, region: Object.entries(rC).sort((a,b)=>b[1]-a[1])[0]?.[0] || '—' };
  });

  mountEl.innerHTML = `
    <div class="page-heading" style="margin-top:24px">
      <h1>里程碑 <span class="grad">年表</span></h1>
      <p>从 ${yearRange[0]} 到 ${yearRange[1]} · 关键年份的代表作与生态</p>
    </div>
    <div class="viz-card" style="margin-bottom:20px"><div id="mile-timeline" style="height:260px"></div></div>
    <div class="brief-mix">
      ${milestones.map((m, i) => `<div class="brief-ip-card ${i===0?'span-2':''}">
        <div class="iptag">${esc(m.era)}</div>
        <div class="ipname" style="font-size:36px">${m.y}</div>
        <div class="ipdesc"><b style="color:var(--accent-b)">${formatNum(m.count)}</b> 项衍生作品。当年的主导 IP 是 <b>${esc(m.topIp?.[0] || '—')}</b>，主要类型 <b>${esc(TYPE_MAP[m.topT?.[0]] || '—')}</b>，主战场 <b>${esc(m.region)}</b>。</div>
        <div class="ipstats" style="margin-bottom:10px"><span>IP 数 <b>${Object.keys(WORKS.filter(w=>w.year===m.y).reduce((a,w)=>{a[w.ip]=1;return a;},{})).length}</b></span><span>类型 <b>${Object.keys(WORKS.filter(w=>w.year===m.y).reduce((a,w)=>{a[w.type]=1;return a;},{})).length}</b></span></div>
        ${m.samples.map(s => `<div style="font-size:12px;padding:6px 10px;background:rgba(255,255,255,0.05);border-radius:8px;margin-top:4px;cursor:pointer" data-wid="${s.id}">
          <span class="badge ${TYPE_CLS[s.type]||''}" style="font-size:9px">${esc(TYPE_MAP[s.type]||s.type)}</span>
          <b style="color:var(--text-0)">${esc(s.title)}</b>
          <span style="color:var(--text-2)">· ${esc(s.ip)}</span>
        </div>`).join('')}
      </div>`).join('')}
    </div>
  `;
  // bind samples
  mountEl.querySelectorAll('[data-wid]').forEach(el => el.addEventListener('click', () => openModal(WORKS[parseInt(el.dataset.wid) - 1])));
  // 渲染时间线图
  const c = ensureChart('mile-timeline');
  const bt = baseTheme();
  const yArr = Object.keys(yC).map(Number).sort((a,b)=>a-b);

/* ============================================================
   VIEW 12: 趋势报告 TRENDS
   ============================================================ */
function renderTrends(mountEl){
  const recentYear = yearRange[1];
  const recentCutoff = recentYear - 5;     // 近 5 年
  const prevCutoff = recentYear - 10;      // 前 5 年
  // 按 IP 划分
  const ipRecent = Object.create(null), ipPrev = Object.create(null);
  for(const w of WORKS){
    if(w.year >= recentCutoff && w.year < recentYear) ipRecent[w.ip] = (ipRecent[w.ip] || 0) + 1;
    else if(w.year >= prevCutoff && w.year < recentCutoff) ipPrev[w.ip] = (ipPrev[w.ip] || 0) + 1;
  }
  // 增长率 = (近期 - 前期) / 前期
  const growth = [];
  for(const ip of allIPs){
    const r = ipRecent[ip] || 0;
    const p = ipPrev[ip] || 0;
    if(r + p < 20) continue;   // 过滤样本太少
    const rate = p === 0 ? (r > 0 ? 10 : 0) : (r - p) / p;
    growth.push({ ip, rate, recent: r, prev: p, total: r + p });
  }
  growth.sort((a,b) => b.rate - a.rate);
  const rising = growth.filter(g => g.rate > 0).slice(0, 8);
  const falling = growth.filter(g => g.rate < 0).reverse().slice(0, 8);
  // 类型增长
  const tRecent = Object.create(null), tPrev = Object.create(null);
  for(const w of WORKS){
    if(w.year >= recentCutoff && w.year < recentYear) tRecent[w.type] = (tRecent[w.type] || 0) + 1;
    else if(w.year >= prevCutoff && w.year < recentCutoff) tPrev[w.type] = (tPrev[w.type] || 0) + 1;
  }
  const tGrowth = Object.keys(tRecent).map(t => {
    const r = tRecent[t] || 0;
    const p = tPrev[t] || 0;
    const rate = p === 0 ? 10 : (r - p) / p;
    return { type: t, rate, recent: r, prev: p };
  }).sort((a,b) => b.rate - a.rate);

  mountEl.innerHTML = `
    <div class="page-heading" style="margin-top:24px">
      <h1>趋势 <span class="grad">报告</span></h1>
      <p>近 5 年 (${recentCutoff}-${recentYear-1}) vs 前 5 年 (${prevCutoff}-${recentCutoff-1})</p>
    </div>
    <div class="brief-strip">
      <div class="bs"><div class="bk">上升 IP</div><div class="bv">${rising.length}</div><div class="bh">增长率 &gt; 0 的头部 IP</div></div>
      <div class="bs"><div class="bk">下降 IP</div><div class="bv">${falling.length}</div><div class="bh">增长率 &lt; 0 的 IP</div></div>
      <div class="bs"><div class="bk">最快增长类型</div><div class="bv">${esc(TYPE_MAP[tGrowth[0]?.type]||'—')}</div><div class="bh">+${(tGrowth[0]?.rate*100).toFixed(0)}%</div></div>
      <div class="bs"><div class="bk">最慢类型</div><div class="bv">${esc(TYPE_MAP[tGrowth[tGrowth.length-1]?.type]||'—')}</div><div class="bh">${(tGrowth[tGrowth.length-1]?.rate*100).toFixed(0)}%</div></div>
    </div>
    <div class="brief-section">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>上升榜 <span class="sub">· Top ${rising.length}</span></h2>
      <div class="viz-card"><div id="trend-rise" style="height:${Math.max(160, rising.length*32+40)}px"></div></div>
    </div>
    <div class="brief-section">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/></svg>下降榜 <span class="sub">· Top ${falling.length}</span></h2>
      <div class="viz-card"><div id="trend-fall" style="height:${Math.max(160, falling.length*32+40)}px"></div></div>
    </div>
    <div class="brief-section">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/></svg>类型增长图谱 <span class="sub">· 13 类</span></h2>
      <div class="viz-card"><div id="trend-type" style="height:380px"></div></div>
    </div>
    <div class="brief-section">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>类型增长详情</h2>
      <div class="grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px">
        ${tGrowth.map(t => `<div class="card" style="padding:12px">
          <div style="font-size:11px;color:var(--text-2)">${esc(TYPE_MAP[t.type]||t.type)}</div>
          <div style="font-size:22px;font-weight:800;margin:4px 0;color:${t.rate>0?'var(--accent-d)':'var(--accent-c)'}">${t.rate>0?'+':''}${(t.rate*100).toFixed(0)}%</div>
          <div style="font-size:11px;color:var(--text-3)">${formatNum(t.recent)} / ${formatNum(t.prev)}</div>
        </div>`).join('')}
      </div>
    </div>
  `;
  // rise chart
  const bt = baseTheme();
  if(rising.length){
    const c1 = ensureChart('trend-rise');
    c1.setOption({
      ...bt,
      tooltip: { trigger:'axis', backgroundColor:'rgba(20,20,45,0.95)', textStyle:{ color:'#fff' } },
      grid: { left:120, right:60, top:10, bottom:20 },
      xAxis: { type:'value', axisLabel:{ color: bt.textStyle.color, fontSize:10, formatter: v => (v*100).toFixed(0)+'%' } },
      yAxis: { type:'category', data: rising.map(g => g.ip).reverse(), axisLabel:{ color: bt.textStyle.color, fontSize:11 } },
      series: [{ type:'bar', data: rising.map(g => g.rate).reverse(), itemStyle:{ color: PALETTE[2], borderRadius:[0,4,4,0] }, label:{ show:true, position:'right', formatter: p => '+'+(p.value*100).toFixed(0)+'%', color: PALETTE[2], fontSize:10 } }]
    });
  }
  if(falling.length){
    const c2 = ensureChart('trend-fall');
    c2.setOption({
      ...bt,
      tooltip: { trigger:'axis', backgroundColor:'rgba(20,20,45,0.95)', textStyle:{ color:'#fff' } },
      grid: { left:120, right:60, top:10, bottom:20 },
      xAxis: { type:'value', axisLabel:{ color: bt.textStyle.color, fontSize:10, formatter: v => (v*100).toFixed(0)+'%' } },
      yAxis: { type:'category', data: falling.map(g => g.ip).reverse(), axisLabel:{ color: bt.textStyle.color, fontSize:11 } },
      series: [{ type:'bar', data: falling.map(g => g.rate).reverse(), itemStyle:{ color: PALETTE[9], borderRadius:[0,4,4,0] }, label:{ show:true, position:'right', formatter: p => (p.value*100).toFixed(0)+'%', color: PALETTE[9], fontSize:10 } }]
    });
  }
  // type growth radar
  const c3 = ensureChart('trend-type');
  c3.setOption({
    ...bt,
    tooltip: { backgroundColor:'rgba(20,20,45,0.95)', textStyle:{ color:'#fff' } },
    radar: {
      indicator: tGrowth.map(t => ({ name: TYPE_MAP[t.type]||t.type, max: 1.5 })),
      axisName: { color: bt.textStyle.color, fontSize: 11 },
      splitLine: { lineStyle: { color: 'rgba(160,160,255,0.15)' } },
      splitArea: { areaStyle: { color: ['rgba(124,92,255,0.04)', 'rgba(124,92,255,0.08)'] } }
    },
    series: [{ type:'radar', data:[{ value: tGrowth.map(t => Math.max(-0.5, t.rate)), name:'增长率', areaStyle:{ color:'rgba(34,211,238,0.3)' }, lineStyle:{ color: PALETTE[1], width:2 }, itemStyle:{ color: PALETTE[1] } }] }]
  });
}

   ============================================================ */
const vizState = { region:"日本", top:30 };
function ensureChart(id){ if(!charts[id]) charts[id] = echarts.init(document.getElementById(id), null, { renderer: 'canvas' }); return charts[id]; }
function baseTheme(){
  const t = document.documentElement.getAttribute('data-theme') || 'dark';
  return {
    textStyle: { color: t === 'light' ? '#3a3a55' : (t === 'cyber' ? '#80fff0' : '#c8c8e6'), fontFamily: 'Inter, "PingFang SC", sans-serif' },
    backgroundColor: 'transparent',
  };
}
function aggregateList(list){
  const yrStart = 1985;
  const yC = new Int32Array(60);
  const ipC = Object.create(null);
  const tC = Object.create(null);
  const rC = Object.create(null);
  const ipType = Object.create(null);
  const N = list.length;
  for(let i=0; i<N; i++){
    const w = list[i];
    if(w.year >= yrStart && w.year < yrStart + 60) yC[w.year-yrStart]++;
    ipC[w.ip] = (ipC[w.ip] || 0) + 1;
    tC[w.type] = (tC[w.type] || 0) + 1;
    rC[w.region] = (rC[w.region] || 0) + 1;
    if(!ipType[w.ip]) ipType[w.ip] = Object.create(null);
    ipType[w.ip][w.type] = (ipType[w.ip][w.type] || 0) + 1;
  }
  return { yC, yrStart, ipC, tC, rC, ipType };
}

        <div class="vhead"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18"/><path d="M3 9h18M9 21V9"/></svg>头部 IP · 衍生作品数量排行</h3><span class="vmeta" id="vz-m2">—</span></div>
        <div id="chart-ip" class="chart tall"></div>

      <div class="viz-card span-4">
        <div class="vhead"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M12 3v9l5 3"/></svg>衍生类型分布</h3><span class="vmeta" id="vz-m3">—</span></div>
        <div id="chart-type" class="chart tall"></div>
      </div>
      <div class="viz-card span-4">
        <div class="vhead"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>地区分布</h3><span class="vmeta" id="vz-m4">—</span></div>
        <div id="chart-region" class="chart"></div>
      </div>
      <div class="viz-card span-8">
        <div class="vhead"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>IP × 衍生类型 · 热力图</h3><span class="vmeta" id="vz-m5">—</span></div>
        <div id="chart-heatmap" class="chart tall"></div>
      </div>
      <div class="viz-card span-12">
        <div class="vhead"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="18" r="3"/><path d="M9 6h6M9 18h6M6 9v6M18 9v6"/></svg>IP 关系网络 · 类型共现</h3><span class="vmeta">节点 = IP · 边权重 = 主导类型</span></div>
        <div id="chart-network" class="chart tall"></div>
      </div>
    </div>
  `;
  function runViz(){
    const target = vizState.region;
    const wantAll = target === "all";
    const list = [];
    for(let i=0, n=WORKS.length; i<n; i++){
      if(wantAll || WORKS[i].region === target) list.push(WORKS[i]);
    }
    const agg = aggregateList(list);
    const topN = vizState.top;
    const totalN = list.length;
    const topIp = Object.entries(agg.ipC).sort((a,b)=>b[1]-a[1])[0] || ['—', 0];
    const topType = Object.entries(agg.tC).sort((a,b)=>b[1]-a[1])[0] || ['—', 0];
    let activeYears = 0;
    for(let i=0;i<60;i++) if(agg.yC[i]>0) activeYears++;
    document.getElementById("vz-ins").innerHTML = `
      <div class="insight"><div class="k">当前样本</div><div class="v">${formatNum(totalN)}<small>条</small></div><div class="h">${wantAll ? "全球范围" : target} · 当前过滤</div></div>
      <div class="insight"><div class="k">头部 IP</div><div class="v">${esc(topIp[0])}</div><div class="h">${formatNum(topIp[1])} 项衍生</div></div>
      <div class="insight"><div class="k">头部类型</div><div class="v">${esc(TYPE_MAP[topType[0]]||topType[0])}</div><div class="h">${formatNum(topType[1])} 项作品</div></div>
      <div class="insight"><div class="k">活跃年份</div><div class="v">${activeYears}<small>年</small></div><div class="h">${agg.yrStart} – ${agg.yrStart+59}</div></div>
    `;
    const cTextColor = getComputedStyle(document.body).getPropertyValue('--text-2') || '#8a8aab';
    const cTextColor1 = getComputedStyle(document.body).getPropertyValue('--text-1') || '#c8c8e6';
    // timeline
    const years = [], yData = [];
    for(let i=0; i<60; i++){ years.push(agg.yrStart+i); yData.push(agg.yC[i]); }
    const c1 = ensureChart("chart-timeline");
    c1.setOption({
      ...baseTheme(),
      grid: { top: 30, right: 30, bottom: 60, left: 60 },
      tooltip: { trigger: 'axis', backgroundColor: 'rgba(20,20,45,0.95)', borderColor: 'rgba(124,92,255,0.3)', textStyle: { color: '#fff' } },
      xAxis: { type: 'category', data: years, axisLine: { lineStyle: { color: 'rgba(160,160,255,0.2)' } }, axisLabel: { color: cTextColor, fontSize: 10, rotate: 45 }, splitLine: { show: false } },
      yAxis: { type: 'value', axisLine: { show: false }, axisLabel: { color: cTextColor, fontSize: 10, formatter: formatNum }, splitLine: { lineStyle: { color: 'rgba(160,160,255,0.08)' } } },
      series: [{ name: '衍生作品数', type: 'line', smooth: true, symbol: 'circle', symbolSize: 5, data: yData, itemStyle: { color: '#22d3ee' }, lineStyle: { color: '#7c5cff', width: 2.5, shadowColor: 'rgba(124,92,255,0.5)', shadowBlur: 12 }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{offset:0,color:'rgba(124,92,255,0.5)'},{offset:1,color:'rgba(124,92,255,0)'}] } }, markPoint: { data: [{ type: 'max', name: '峰值', itemStyle: { color: '#ff5d8f' }, label: { color: '#fff', fontSize: 10 } }], symbolSize: 50 } }],
    }, true);
    document.getElementById("vz-m1").textContent = `峰值 ${formatNum(Math.max(...yData))} 项/年`;
    // IP bar
    const ipTop = Object.entries(agg.ipC).sort((a,b)=>b[1]-a[1]).slice(0, topN);
    const ipData = ipTop.map(([k,v])=>({ name: k, value: v })).reverse();
    const c2 = ensureChart("chart-ip");
    c2.setOption({
      ...baseTheme(),
      grid: { top: 20, right: 60, bottom: 30, left: 130 },
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, backgroundColor: 'rgba(20,20,45,0.95)', borderColor: 'rgba(124,92,255,0.3)', textStyle: { color: '#fff' } },
      xAxis: { type: 'value', axisLine: { show: false }, axisLabel: { color: cTextColor, fontSize: 10, formatter: formatNum }, splitLine: { lineStyle: { color: 'rgba(160,160,255,0.08)' } } },
      yAxis: { type: 'category', data: ipData.map(d=>d.name), axisLine: { lineStyle: { color: 'rgba(160,160,255,0.2)' } }, axisLabel: { color: cTextColor1, fontSize: 11 } },
      series: [{ name: '衍生作品数', type: 'bar', data: ipData.map(d=>d.value), itemStyle: { borderRadius: [0, 4, 4, 0], color: { type: 'linear', x: 0, y: 0, x2: 1, y2: 0, colorStops: [{offset:0,color:'#22d3ee'},{offset:1,color:'#7c5cff'}] } }, label: { show: true, position: 'right', color: cTextColor1, fontSize: 10, formatter: p => formatNum(p.value) } }],
    }, true);
    document.getElementById("vz-m2").textContent = `Top ${topN} · 共 ${ipTop.length} IP`;
    // type pie
    const tSorted = Object.entries(agg.tC).sort((a,b)=>b[1]-a[1]);
    const c3 = ensureChart("chart-type");
    c3.setOption({
      ...baseTheme(),
      tooltip: { trigger: 'item', backgroundColor: 'rgba(20,20,45,0.95)', borderColor: 'rgba(124,92,255,0.3)', textStyle: { color: '#fff' }, formatter: '{b}<br/>{c} 项 ({d}%)' },
      legend: { type: 'scroll', bottom: 10, textStyle: { color: cTextColor1, fontSize: 11 }, itemWidth: 12, itemHeight: 12 },
      series: [{ type: 'pie', radius: ['45%', '70%'], center: ['50%', '45%'], avoidLabelOverlap: true, itemStyle: { borderRadius: 6, borderColor: 'rgba(20,20,45,0.95)', borderWidth: 2 }, label: { show: false }, emphasis: { label: { show: true, fontSize: 13, fontWeight: 600, color: '#fff' }, itemStyle: { shadowBlur: 20, shadowColor: 'rgba(124,92,255,0.6)' } }, data: tSorted.map(([k,v],i)=>({ name: TYPE_MAP[k]||k, value: v, itemStyle: { color: PALETTE[i % PALETTE.length] } })) }],
    }, true);
    document.getElementById("vz-m3").textContent = `${tSorted.length} 类 · 总 ${formatNum(totalN)} 项`;
    // region pie
    const rSorted = Object.entries(agg.rC).sort((a,b)=>b[1]-a[1]);
    const c4 = ensureChart("chart-region");
    c4.setOption({
      ...baseTheme(),
      tooltip: { trigger: 'item', backgroundColor: 'rgba(20,20,45,0.95)', borderColor: 'rgba(124,92,255,0.3)', textStyle: { color: '#fff' }, formatter: '{b}<br/>{c} 项 ({d}%)' },
      legend: { orient: 'vertical', left: 10, top: 'center', textStyle: { color: cTextColor1, fontSize: 12 } },
      series: [{ type: 'pie', radius: ['50%', '78%'], center: ['65%', '50%'], itemStyle: { borderRadius: 8, borderColor: 'rgba(20,20,45,0.95)', borderWidth: 3 }, label: { show: false }, emphasis: { label: { show: true, fontSize: 14, fontWeight: 600, color: '#fff' }, itemStyle: { shadowBlur: 20, shadowColor: 'rgba(34,211,238,0.6)' } }, data: rSorted.map(([k,v],i)=>({ name: k, value: v, itemStyle: { color: PALETTE[(i*3) % PALETTE.length] } })) }],
    }, true);
    document.getElementById("vz-m4").textContent = `${rSorted.length} 个地区`;
    // heatmap
    const heatIps = Object.entries(agg.ipC).sort((a,b)=>b[1]-a[1]).slice(0, 25).map(([k])=>k);
    const heatTypes = Object.keys(agg.tC).sort();
    const heatData = [];
    let heatMax = 0;
    for(let i=0; i<heatIps.length; i++){
      for(let j=0; j<heatTypes.length; j++){
        const v = (agg.ipType[heatIps[i]] && agg.ipType[heatIps[i]][heatTypes[j]]) || 0;
        if(v > heatMax) heatMax = v;
        heatData.push([j, i, v]);
      }
    }
    const c5 = ensureChart("chart-heatmap");
    c5.setOption({
      ...baseTheme(),
      tooltip: { backgroundColor: 'rgba(20,20,45,0.95)', borderColor: 'rgba(124,92,255,0.3)', textStyle: { color: '#fff' }, formatter: p => `${heatIps[p.value[1]]} · ${TYPE_MAP[heatTypes[p.value[0]]]||heatTypes[p.value[0]]}<br/>${p.value[2]} 项` },
      grid: { top: 20, right: 50, bottom: 60, left: 110 },
      xAxis: { type: 'category', data: heatTypes.map(t=>TYPE_MAP[t]||t), splitArea: { show: true }, axisLine: { lineStyle: { color: 'rgba(160,160,255,0.2)' } }, axisLabel: { color: cTextColor1, fontSize: 10, rotate: 30, interval: 0 } },
      yAxis: { type: 'category', data: heatIps, inverse: true, splitArea: { show: true }, axisLine: { lineStyle: { color: 'rgba(160,160,255,0.2)' } }, axisLabel: { color: cTextColor1, fontSize: 10 } },
      visualMap: { min: 0, max: heatMax, calculable: true, orient: 'horizontal', left: 'center', bottom: 5, textStyle: { color: cTextColor1, fontSize: 10 }, inRange: { color: ['#0c0c20', '#7c5cff', '#22d3ee', '#ff5d8f', '#ffd166'] } },
      series: [{ name: '衍生数', type: 'heatmap', data: heatData, label: { show: false }, emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(124,92,255,0.8)' } } }],
    }, true);
    document.getElementById("vz-m5").textContent = `Top 25 IP × ${heatTypes.length} 类型 · 峰值 ${formatNum(heatMax)}`;
    // network
    const netIps = Object.entries(agg.ipC).sort((a,b)=>b[1]-a[1]).slice(0, 25);
    const netNodes = netIps.map(([k,v],i)=>({ id: k, name: k, symbolSize: 8 + Math.min(40, Math.log10(v+1)*6), value: v, category: i, label: { show: true, color: cTextColor1, fontSize: 10 } }));
    const typeTopByIp = netIps.map(([k])=>{ let best=null,bv=0; for(const t in (agg.ipType[k]||{})){ if(agg.ipType[k][t]>bv){bv=agg.ipType[k][t];best=t} } return {ip:k,type:best}; });
    const byType = Object.create(null);
    typeTopByIp.forEach(o=>{ if(o.type){ (byType[o.type]=byType[o.type]||[]).push(o.ip) } });
    const netEdges = [];
    for(const t in byType){
      const arr = byType[t];
      for(let i=0;i<arr.length;i++) for(let j=i+1;j<arr.length;j++){
        if(netEdges.length<220) netEdges.push({ source:arr[i], target:arr[j], lineStyle:{ color:'rgba(124,92,255,0.18)', width:1, curveness:0.1 } });
      }
    }
    const c6 = ensureChart("chart-network");
    c6.setOption({
      ...baseTheme(),
      tooltip: { backgroundColor: 'rgba(20,20,45,0.95)', borderColor: 'rgba(124,92,255,0.3)', textStyle: { color: '#fff' }, formatter: p => p.dataType==='edge' ? '' : `${p.data.name}<br/>${formatNum(p.data.value)} 项衍生` },
      series: [{ type: 'graph', layout: 'force', data: netNodes, links: netEdges, roam: true, draggable: true, force: { repulsion: 220, edgeLength: 80, gravity: 0.05 }, emphasis: { focus: 'adjacency', lineStyle: { width: 3, color: '#22d3ee' }, itemStyle: { shadowBlur: 16, shadowColor: '#7c5cff' } }, lineStyle: { opacity: 0.5 } }],
    }, true);
  }
  mountEl.querySelectorAll("[data-vz]").forEach(c => c.addEventListener("click", () => {
    vizState.region = c.dataset.vz;
    mountEl.querySelectorAll("[data-vz]").forEach(x => x.classList.toggle("active", x === c));
    runViz();
  }));
  mountEl.querySelectorAll("[data-tp]").forEach(c => c.addEventListener("click", () => {
    vizState.top = parseInt(c.dataset.tp);
    mountEl.querySelectorAll("[data-tp]").forEach(x => x.classList.toggle("active", x === c));
    runViz();
  }));
  document.getElementById("vz-export").addEventListener("click", () => {
    for(const id of ["chart-timeline","chart-ip","chart-type","chart-region","chart-heatmap","chart-network"]){
      exportPNG(id, `gameip_${id}_${Date.now()}.png`);
    }
  });
  setTimeout(runViz, 50);
}

    c2.setOption({
      ...baseTheme(),
      tooltip: { trigger: 'item', backgroundColor: 'rgba(20,20,45,0.95)', borderColor: 'rgba(124,92,255,0.3)', textStyle: { color: '#fff' }, formatter: '{b}<br/>{c} 项 ({d}%)' },
      legend: { type: 'scroll', bottom: 10, textStyle: { color: getComputedStyle(document.body).getPropertyValue('--text-1'), fontSize: 11 } },
      series: [{ type: 'pie', radius: ['40%', '70%'], center: ['50%', '45%'], itemStyle: { borderRadius: 6, borderColor: 'rgba(20,20,45,0.95)', borderWidth: 2 }, label: { show: false }, emphasis: { label: { show: true, fontSize: 13, fontWeight: 600, color: '#fff' }, itemStyle: { shadowBlur: 20, shadowColor: 'rgba(124,92,255,0.6)' } }, data: tSorted.map(([k,v],i)=>({ name: TYPE_MAP[k]||k, value: v, itemStyle: { color: PALETTE[i % PALETTE.length] } })) }],
    }, true);
  }, 50);
  document.getElementById("ip-export").addEventListener("click", () => {
    exportCSV(works.map(w => ({ id:w.id, title:w.title, type:w.typeZh, region:w.region, year:w.year, source:w.source, ip:w.ip, desc:w.desc })), `${ip}_${Date.now()}.csv`);
  });
  document.getElementById("ip-compare").addEventListener("click", () => {
    const arr = storage.get('compare', []);
    if(!arr.includes(ip)){ arr.push(ip); if(arr.length>4) arr.shift(); storage.set('compare', arr); }
    navigate('#/compare');
  });
  mountEl.querySelectorAll(".card").forEach(c => c.addEventListener("click", () => {
    const w = WORKS.find(x => x.id === parseInt(c.dataset.id));
    if(w) openModal(w);
  }));
}

/* ============================================================
   VIEW 5: RANKINGS
   ============================================================ */
let rankState = { dim: 'ip' };
function renderRankings(mountEl){
  const dims = [
    {k:'ip', label:'IP 排行', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>'},
    {k:'type', label:'类型 排行', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/></svg>'},
    {k:'region', label:'地区 排行', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>'},
    {k:'source', label:'来源/作者 排行', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'},
  ];
  mountEl.innerHTML = `
    <div class="page-heading" style="margin-top:24px">
      <h1>排行 <span class="grad">榜</span></h1>
      <p>多维度 Top 100 榜单 · 实时计算</p>
    </div>
    <div class="rank-tabs">
      ${dims.map(d => `<div class="rank-tab ${rankState.dim===d.k?'active':''}" data-dim="${d.k}">${d.icon}${d.label}</div>`).join('')}
      <button class="btn" id="rk-export" style="margin-left:auto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>导出当前榜单</button>
    </div>
    <div class="rank-list" id="rk-list"></div>
  `;
  function getData(){
    const c = Object.create(null);
    for(let i=0, n=WORKS.length; i<n; i++){
      const w = WORKS[i];
      let key;
      if(rankState.dim === 'ip') key = w.ip;
      else if(rankState.dim === 'type') key = w.typeZh;
      else if(rankState.dim === 'region') key = w.region;
      else if(rankState.dim === 'source') key = w.source || '—';
      c[key] = (c[key] || 0) + 1;
    }
    return Object.entries(c).sort((a,b)=>b[1]-a[1]);
  }
  function render(){
    const data = getData();
    const top = data.slice(0, 100);
    const max = top[0] ? top[0][1] : 1;
    const list = document.getElementById("rk-list");
    list.innerHTML = top.map((d, i) => {
      const [name, val] = d;
      const pct = (val / max) * 100;
      const isIP = rankState.dim === 'ip';
      const href = isIP ? `href="#/ip/${encodeURIComponent(name)}"` : '';
      return `<a ${href} class="rank-row">
        <div class="rank-num">#${i+1}</div>
        <div class="rank-name">${esc(name)}</div>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%"></div></div>
        <div class="rank-val">${formatNum(val)}</div>
      </a>`;
    }).join('');
  }
  mountEl.querySelectorAll("[data-dim]").forEach(c => c.addEventListener("click", () => {
    rankState.dim = c.dataset.dim;
    mountEl.querySelectorAll("[data-dim]").forEach(x => x.classList.toggle("active", x === c));
    render();
  }));
  document.getElementById("rk-export").addEventListener("click", () => {
    const data = getData().slice(0, 100);
    exportCSV(data.map((d, i) => ({ rank: i+1, name: d[0], count: d[1] })), `rankings_${rankState.dim}_${Date.now()}.csv`);
  });
  render();
}

/* ============================================================
   MODAL
   ============================================================ */
function openModal(w){
  const box = document.getElementById("modal-box");
  // Find related (same IP, excluding self)
  const related = [];
  for(let i=0, n=WORKS.length; i<n && related.length<5; i++){
    if(WORKS[i].ip === w.ip && WORKS[i].id !== w.id) related.push(WORKS[i]);
  }
  const fav = storage.get('favs', []);
  const isFav = fav.includes(w.id);
  box.innerHTML = `
    <button class="modal-close" id="mc">×</button>
    <h2>${esc(w.title)}</h2>
    <a href="#/ip/${encodeURIComponent(w.ip)}" class="ip-line">◆ ${esc(w.ip)} · 查看全部 →</a>
    <div class="modal-grid">
      <div class="cell"><div class="k">类型</div><div class="v">${w.typeZh}</div></div>
      <div class="cell"><div class="k">年份</div><div class="v">${w.year}</div></div>
      <div class="cell"><div class="k">地区</div><div class="v">${esc(w.region)}</div></div>
      <div class="cell"><div class="k">来源/制作方</div><div class="v">${esc(w.source)}</div></div>
    </div>
    <div class="modal-desc">${esc(w.desc || '无详细简介。')}</div>
    <div class="modal-tags">
      <div class="tag">${w.typeZh}</div>
      <div class="tag">${esc(w.ip)}</div>
      <div class="tag">${w.year}</div>
      <div class="tag">${esc(w.region)}</div>
      <button class="btn ${isFav?'primary':''}" id="modal-fav" data-id="${w.id}" style="padding:6px 10px;font-size:12px">${isFav?'★ 已收藏':'☆ 收藏'}</button>
    </div>
    ${related.length ? `<div class="modal-related">
      <h4>同 IP 其他作品</h4>
      ${related.map(r => `<div class="rel-item" data-id="${r.id}">${esc(r.title)} <span style="color:var(--text-3)">· ${r.year} · ${r.typeZh}</span></div>`).join('')}
    </div>` : ''}
  `;
  document.getElementById("modal").classList.add("open");
  document.getElementById("mc").addEventListener("click", closeModal);
  document.getElementById("modal-fav").addEventListener("click", () => {
    const id = parseInt(document.getElementById("modal-fav").dataset.id);
    const arr = storage.get('favs', []);
    const i = arr.indexOf(id);
    if(i >= 0) arr.splice(i, 1);
    else arr.push(id);
    storage.set('favs', arr);
    closeModal();
  });
  box.querySelectorAll(".rel-item").forEach(r => r.addEventListener("click", () => {
    const nw = WORKS.find(x => x.id === parseInt(r.dataset.id));
    if(nw) openModal(nw);
  }));
}
function closeModal(){ document.getElementById("modal").classList.remove("open"); }
document.getElementById("modal").addEventListener("click", e => { if(e.target.id==="modal") closeModal(); });
document.addEventListener("keydown", e => { if(e.key==="Escape") closeModal(); });

/* ============================================================
   THEME / DENSITY / ANIM INIT
   ============================================================ */
const themeBtn = document.getElementById("theme-btn");
const themes = ['dark','light','cyber'];
let themeIdx = themes.indexOf(storage.get('theme', 'dark'));
if(themeIdx < 0) themeIdx = 0;
document.documentElement.setAttribute('data-theme', themes[themeIdx]);
document.documentElement.setAttribute('data-density', storage.get('density', 'default'));
document.documentElement.setAttribute('data-anim', storage.get('anim', 'on'));
themeBtn.addEventListener("click", () => {
  themeIdx = (themeIdx + 1) % themes.length;
  const t = themes[themeIdx];
  storage.set('theme', t);
  document.documentElement.setAttribute('data-theme', t);
  for(const k in charts){ try { charts[k].dispose(); } catch(e){} }
  Object.keys(charts).forEach(k => delete charts[k]);
  const r = parseRoute();
  const path = r.path;
  const mountEl = app;
  // re-render current view
  if(path === '/' || path === '') renderHome(mountEl);
  else if(path === '/launcher') renderLauncher(mountEl);
  else if(path === '/browse') renderBrowse(mountEl);
  else if(path === '/visualize') renderVisualize(mountEl);
  else if(path === '/ip') renderIPDetail(mountEl, r.params[0]);
  else if(path === '/rankings') renderRankings(mountEl);
  else if(path === '/compare') renderCompare(mountEl);
  else if(path === '/timeline') renderTimeline(mountEl);
  else if(path === '/regions') renderRegions(mountEl);
  else if(path === '/collections') renderCollections(mountEl);
  else if(path === '/brief') renderBrief(mountEl);
  else if(path === '/milestones') renderMilestones(mountEl);
  else if(path === '/trends') renderTrends(mountEl);
  else if(path === '/settings') renderSettings(mountEl);
});

/* ============================================================
   ROUTER + INIT
   ============================================================ */
function routeTo(){
  const r = parseRoute();
  const path = r.path;
  setActiveNav(path);
  // Dispose all charts to free memory
  for(const k in charts){ try { charts[k].dispose(); } catch(e){} }
  Object.keys(charts).forEach(k => delete charts[k]);
  // Render view
  if(path === '/' || path === '') renderHome(app);
  else if(path === '/launcher') renderLauncher(app);
  else if(path === '/browse') renderBrowse(app);
  else if(path === '/visualize') renderVisualize(app);
  else if(path === '/ip') renderIPDetail(app, r.params[0]);
  else if(path === '/rankings') renderRankings(app);
  else if(path === '/compare') renderCompare(app);
  else if(path === '/timeline') renderTimeline(app);
  else if(path === '/regions') renderRegions(app);
  else if(path === '/collections') renderCollections(app);
  else if(path === '/brief') renderBrief(app);
  else if(path === '/milestones') renderMilestones(app);
  else if(path === '/trends') renderTrends(app);
  else if(path === '/settings') renderSettings(app);
  else { app.innerHTML = `<div class="page-heading" style="margin-top:80px"><h1>404</h1><p>页面不存在 · <a href="#/" style="color:var(--accent-b)">返回首页</a></p></div>`; }
  window.scrollTo({ top: 0, behavior: 'instant' });
}
window.addEventListener("hashchange", routeTo);
window.addEventListener("resize", () => {
  for(const k in charts) try { charts[k].resize(); } catch(e){}
});

function init(){
  if(!RAW.length){
    document.getElementById("lt").textContent = "NO DATA FOUND";
    document.getElementById("lp").textContent = "请确认 data.js 存在";
    return;
  }
  const lt = document.getElementById("lt");
  const lp = document.getElementById("lp");
  lt.textContent = "PARSING DATABASE…";
  lp.textContent = `正在解析 ${RAW.length.toLocaleString()} 条原始数据`;
  setTimeout(() => {
    lt.textContent = "BUILDING INDEX…";
    lp.textContent = "正在构建索引与统计聚合";
    setTimeout(() => {
      buildWorks();
      buildAggregates();
      timelineState.year = yearRange[1] || 2025;
      lt.textContent = "READY";
      lp.textContent = "准备就绪";
      setTimeout(() => {
        document.getElementById("loader").classList.add("hidden");
        routeTo();
      }, 200);
    }, 30);
  }, 30);
}
init();
</script>

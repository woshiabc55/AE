  <script>
    KE.loadStructure().then(function (s) {
      const ch = s.chapters.find(function (c) { return c.id === 'ch4'; });
      if (!ch) return;
      return KE.loadShots().then(function (sd) {
        const chapterShots = ch.shots.map(function (id) {
          return sd.shots.find(function (x) { return x.id === id; });
        }).filter(Boolean);
        // 上下导航
        const order = s.chapters;
        const idx = order.findIndex(function (c) { return c.id === ch.id; });
        const prev = idx > 0
          ? {
              href: 'chapter-' + (idx) + '.html',
              num: order[idx - 1].title,
              title: order[idx - 1].subtitle,
              color: order[idx - 1].color
            }
          : { href: 'preface.html', num: '前幕', title: '制作组·自白介绍', color: s.preface.color };
        const next = idx < order.length - 1
          ? {
              href: 'chapter-' + (idx + 2) + '.html',
              num: order[idx + 1].title,
              title: order[idx + 1].subtitle,
              color: order[idx + 1].color
            }
          : { href: 'epilogue.html', num: '尾幕', title: '展开 PPT', color: s.epilogue.color };
        KE.renderChapter(ch, chapterShots, prev, next);
      });
    });
  </script>

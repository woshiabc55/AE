<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Forge</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; }
      #app { display: flex; width: 100%; height: 100%; }
      #canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
      #canvas-area canvas { image-rendering: pixelated; border: 1px solid #333; }
      #sidebar { width: 320px; background: #111118; border-left: 1px solid #222; overflow-y: auto; padding: 12px; }
      .panel { margin-bottom: 16px; background: #1a1a24; border-radius: 8px; padding: 12px; }
      .panel h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; }
      .param-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
      .param-row label { font-size: 12px; min-width: 80px; color: #aaa; }
      .param-row input[type="range"] { flex: 1; accent-color: #6c5ce7; }
      .param-row input[type="checkbox"] { accent-color: #6c5ce7; }
      .param-row select { flex: 1; background: #222; color: #ddd; border: 1px solid #444; border-radius: 4px; padding: 2px 4px; }
      .param-row .value { font-size: 11px; min-width: 36px; text-align: right; color: #6c5ce7; }
      .layer-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; background: #222230; border-radius: 6px; margin-bottom: 4px; cursor: grab; }
      .layer-item .layer-name { flex: 1; font-size: 12px; }
      .layer-item .layer-opacity { width: 60px; }
      .btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; transition: background 0.2s; }
      .btn-primary { background: #6c5ce7; color: #fff; }
      .btn-primary:hover { background: #5a4bd6; }
      .btn-secondary { background: #333; color: #ccc; }
      .btn-secondary:hover { background: #444; }
      .btn-danger { background: #e74c3c; color: #fff; }
      .btn-danger:hover { background: #c0392b; }
      .upload-zone { border: 2px dashed #444; border-radius: 8px; padding: 24px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
      .upload-zone:hover { border-color: #6c5ce7; }
      .upload-zone p { font-size: 13px; color: #888; }
      .mode-switch { display: flex; gap: 4px; margin-bottom: 12px; }
      .mode-switch .btn { flex: 1; }
      .mode-switch .btn.active { background: #6c5ce7; color: #fff; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-area"></div>
      <div id="sidebar"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

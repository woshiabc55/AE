<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>镜号索引 · 哥窑</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/site.css">
  <style>
    .shot-index {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 32px 100px;
    }
    .shot-index__head {
      text-align: center;
      padding: 60px 0;
      border-bottom: 1px solid rgba(74,74,74,0.1);
      margin-bottom: 40px;
    }
    .shot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .shot-grid a {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      background: var(--paper-soft);
      border: 1px solid rgba(74,74,74,0.1);
      border-radius: 2px;
      text-align: center;
      transition: all 0.25s var(--ease);
      text-decoration: none;
      color: inherit;
    }
    .shot-grid a:hover {
      border-color: var(--kiln-fire);
      background: var(--paper);
      transform: translateY(-2px);
      box-shadow: var(--shadow-soft);
      color: inherit;
    }
    .shot-grid .num {
      font-family: var(--font-display);
      font-size: 1.8rem;
      color: var(--kiln-fire);
      line-height: 1;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }
    .shot-grid .size {
      font-family: var(--font-serif);
      color: var(--ink-black);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .shot-grid .act {
      font-family: var(--font-display);
      color: var(--ink-soft);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
    }
    .act-section { margin-bottom: 48px; }
    .act-section h2 {
      font-size: 1.6rem;
      margin-bottom: 20px;
      padding-left: 16px;
      border-left: 4px solid var(--act-color, var(--seal-red));
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }
    .act-section h2 .act-section__count {
      font-family: var(--font-display);
      color: var(--ink-soft);
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="../index.html" class="nav__brand"><span class="seal">哥</span>哥窑 · GE KILN</a>
    <ul class="nav__chapter">
      <li><a href="../preface.html"><span class="num">前</span>幕</a></li>
      <li><a href="../chapter-1.html"><span class="num">I</span>第一章</a></li>
      <li><a href="../chapter-2.html"><span class="num">II</span>第二章</a></li>
      <li><a href="../chapter-3.html"><span class="num">III</span>第三章</a></li>
      <li><a href="../chapter-4.html"><span class="num">IV</span>第四章</a></li>
      <li><a href="../epilogue.html"><span class="num">尾</span>幕</a></li>
    </ul>
    <ul class="nav__links">
      <li><a href="../storyboard.html">分镜</a></li>
      <li><a href="../analysis.html">解读</a></li>
      <li><a href="../about.html">关于</a></li>
    </ul>
  </nav>

  <main class="shot-index">
    <header class="shot-index__head">
      <div class="section__eyebrow">Shot Index · 镜号索引</div>
      <h1>62 个独立镜号页</h1>
      <p class="section__lead">按 6 段结构 / 4 章节分组。点击任一镜号，进入其独立 HTML 页面。</p>
    </header>

    <div id="shotIndexRoot">
      <div style="text-align:center;padding:60px;color:var(--ink-soft);">LOADING · 加载镜号数据</div>
    </div>

    <div style="text-align:center;margin-top:60px;padding-top:40px;border-top:1px solid rgba(74,74,74,0.1);">
      <a href="../index.html" class="btn">← 返回首页</a>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__brand">哥窑 · GE KILN</div>
    <div class="footer__lead">窑火如歌，兄弟如线</div>
    <div class="footer__small">
      <a href="../preface.html">前幕</a> ·
      <a href="../chapter-1.html">第一章</a> ·
      <a href="../chapter-2.html">第二章</a> ·
      <a href="../chapter-3.html">第三章</a> ·
      <a href="../chapter-4.html">第四章</a> ·
      <a href="../epilogue.html">尾幕</a>
    </div>
  </footer>

  <script src="../js/data.js"></script>
  <script src="../js/site.js"></script>
  <script>
    Promise.all([KE.loadShots(), KE.loadStructure()]).then(function (results) {
      const shots = results[0].shots;
      const structure = results[1];

      const root = document.getElementById('shotIndexRoot');

      // 按章节分组
      const groups = {};
      const order = [];
      shots.forEach(function (s) {
        if (!groups[s.act]) { groups[s.act] = []; order.push(s.act); }
        groups[s.act].push(s);
      });

      const colorMap = {
        ch1: '#6b8e7f',
        ch2: '#8a4a2c',
        ch3: '#b53028',
        ch4: '#d96b27'
      };

      function getChapterMeta(actId) {
        if (!structure || !structure.chapters) return null;
        return structure.chapters.find(function (c) { return c.id === actId; });
      }

      let html = '';
      order.forEach(function (act) {
        const meta = getChapterMeta(act);
        const title = meta ? meta.title + ' · ' + meta.subtitle : (KE.ACT_NAMES[act] || act.toUpperCase());
        const count = groups[act].length;
        const color = (meta && meta.color) || colorMap[act] || 'var(--seal-red)';

        html += '<section class="act-section" style="--act-color:' + color + '">' +
          '<h2>' + KE.esc(title) +
            '<span class="act-section__count">· ' + count + ' 镜 · ' + (meta ? meta.duration : '—') + '</span>' +
          '</h2>' +
          '<div class="shot-grid">';

        groups[act].forEach(function (s) {
          html += '<a href="shot-' + String(s.id).padStart(3, '0') + '.html">' +
            '<span class="num">' + String(s.id).padStart(3, '0') + '</span>' +
            '<span class="size">' + KE.esc(s.shotSize || '—') + '</span>' +
            '<span class="act">' + KE.esc(KE.ACT_NAMES[act] || act) + '</span>' +
          '</a>';
        });

        html += '</div></section>';
      });

      root.innerHTML = html;
    }).catch(function (err) {
      document.getElementById('shotIndexRoot').innerHTML =
        '<div style="text-align:center;padding:60px;color:var(--seal-red)">数据加载失败：' + (err.message) + '</div>';
    });
  </script>
</body>
</html>

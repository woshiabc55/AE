<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音创作者工具</title>
<style>
:root{--bg-deep:#0a0e1a;--bg-surface:#111827;--bg-card:#1a2236;--bg-card-hover:#1f2a42;--accent-cyan:#00e5ff;--accent-amber:#ffb300;--accent-violet:#a855f7;--accent-rose:#f43f5e;--accent-emerald:#10b981;--text-primary:#e8ecf4;--text-secondary:#8b95a8;--text-muted:#4b5563;--border-subtle:rgba(255,255,255,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column}

.app-header{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(10,14,26,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.app-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px}
.app-brand-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent-rose),var(--accent-violet));display:flex;align-items:center;justify-content:center;font-size:16px}
.header-actions{display:flex;gap:12px;align-items:center}
.header-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg-card);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}

.tab-bar{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(10,14,26,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border-subtle);display:flex;justify-content:space-around;align-items:center;z-index:100}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--text-muted);transition:color .2s;padding:8px 16px}
.tab-item:hover,.tab-item.active{color:var(--accent-rose)}
.tab-icon{font-size:22px}
.tab-label{font-size:11px;font-weight:500}

#app-content{flex:1;margin-top:60px;margin-bottom:64px;overflow-y:auto;padding:20px}

.btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--accent-rose),#e11d48);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(244,63,94,.3)}
.btn-secondary{background:rgba(255,255,255,.05);color:var(--text-primary);border:1px solid var(--border-subtle)}
.btn-block{width:100%}
.btn-sm{padding:6px 14px;font-size:12px}

.home-banner{display:flex;justify-content:space-between;align-items:center;padding:32px;background:var(--bg-card);border-radius:16px;margin-bottom:32px;position:relative;overflow:hidden}
.banner-content h1{font-size:28px;margin-bottom:8px}
.banner-content p{color:var(--text-secondary);margin-bottom:20px}
.banner-actions{display:flex;gap:12px}
.banner-visual{position:relative;width:200px;height:200px;flex-shrink:0}
.visual-ring{position:absolute;border-radius:50%;border:1px solid rgba(244,63,94,.15);animation:spin 20s linear infinite}
.visual-ring:nth-child(1){inset:0;animation-duration:25s}.visual-ring:nth-child(2){inset:25px;animation-duration:20s;animation-direction:reverse;border-color:rgba(168,85,247,.15)}.visual-ring:nth-child(3){inset:50px;animation-duration:30s;border-color:rgba(255,179,0,.1)}
.visual-center{position:absolute;inset:75px;border-radius:50%;background:radial-gradient(circle,rgba(244,63,94,.12),transparent);display:flex;align-items:center;justify-content:center;font-size:40px}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.features-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-top:20px}
.feature-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:14px;padding:24px;transition:all .3s}
.feature-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.1)}
.feature-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px}
.feature-card h3{font-size:16px;margin-bottom:8px}
.feature-card p{font-size:13px;color:var(--text-secondary);line-height:1.6}

.quick-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-top:20px}
.quick-stat-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:12px;padding:20px;text-align:center}
.stat-label{font-size:12px;color:var(--text-muted);margin-bottom:8px}
.stat-value{font-size:24px;font-weight:700;margin-bottom:4px}
.stat-trend{font-size:12px}

.auth-container{max-width:520px;margin:0 auto}
.auth-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:16px;padding:32px}
.auth-header{text-align:center;margin-bottom:28px}
.auth-logo{font-size:48px;margin-bottom:12px}
.auth-header h2{font-size:22px;margin-bottom:4px}
.auth-header p{color:var(--text-secondary);font-size:14px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px}
.form-group input[type="text"],.form-group input[type="password"],.form-group textarea{width:100%;padding:10px 14px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--border-subtle);color:var(--text-primary);font-size:14px;outline:none;transition:border-color .2s;font-family:inherit}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent-rose)}
.scope-options{display:flex;flex-wrap:wrap;gap:12px;margin-top:6px}
.scope-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer}
.auth-status{margin-top:16px;padding:12px;border-radius:8px;font-size:13px;display:none}
.auth-status.error{display:block;background:rgba(244,63,94,.1);color:var(--accent-rose);border:1px solid rgba(244,63,94,.2)}
.auth-status.info{display:block;background:rgba(0,229,255,.1);color:var(--accent-cyan);border:1px solid rgba(0,229,255,.2)}
.auth-help{margin-top:24px;padding-top:20px;border-top:1px solid var(--border-subtle)}
.auth-help h4{font-size:14px;margin-bottom:10px}
.auth-help ol{font-size:13px;color:var(--text-secondary);line-height:2;padding-left:20px}

.content-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.content-header h2{font-size:22px}
.content-actions{display:flex;gap:10px}
.content-filters{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.filter-group{display:flex;gap:6px}
.filter-btn{padding:6px 16px;border-radius:100px;font-size:12px;font-weight:500;border:1px solid var(--border-subtle);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .2s}
.filter-btn.active{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.3);color:var(--accent-rose)}
.search-box input{padding:8px 16px;border-radius:100px;background:rgba(255,255,255,.05);border:1px solid var(--border-subtle);color:var(--text-primary);font-size:13px;outline:none;width:200px}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.video-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:14px;overflow:hidden;transition:all .3s}
.video-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.1)}
.video-thumb{height:160px;display:flex;align-items:flex-end;justify-content:space-between;padding:12px;position:relative}
.video-duration{padding:3px 8px;border-radius:4px;background:rgba(0,0,0,.6);color:#fff;font-size:11px;font-family:monospace}
.video-status{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600}
.video-status.published{background:rgba(16,185,129,.2);color:var(--accent-emerald)}
.video-status.draft{background:rgba(255,255,255,.1);color:var(--text-muted)}
.video-status.review{background:rgba(255,179,0,.2);color:var(--accent-amber)}
.video-info{padding:16px}
.video-title{font-size:14px;font-weight:600;margin-bottom:8px}
.video-meta{display:flex;gap:12px;font-size:12px;color:var(--text-secondary)}
.video-date{font-size:11px;color:var(--text-muted);margin-top:6px}

.analytics-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.analytics-header h2{font-size:22px}
.analytics-period{display:flex;gap:6px}
.period-btn{padding:6px 16px;border-radius:8px;font-size:12px;border:1px solid var(--border-subtle);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .2s}
.period-btn.active{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.3);color:var(--accent-rose)}
.analytics-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.summary-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:12px;padding:20px;text-align:center}
.summary-value{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent-rose),var(--accent-violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.summary-label{font-size:12px;color:var(--text-muted);margin-top:4px}
.analytics-charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:14px;padding:24px}
.chart-card h3{font-size:16px;margin-bottom:16px}
.chart-card.full-width{grid-column:1/-1}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:160px}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;animation:bar-grow .6s ease-out;min-height:4px}
@keyframes bar-grow{from{height:0}to{height:var(--h)}}
.bar-label{font-size:10px;color:var(--text-muted)}
.table-header,.table-row{display:grid;grid-template-columns:60px 1fr 80px 80px 80px;padding:12px 0;border-bottom:1px solid var(--border-subtle);font-size:13px}
.table-header{color:var(--text-muted);font-weight:600}
.rank-num.top{color:var(--accent-amber);font-weight:700}

.upload-dropzone{border:2px dashed rgba(255,255,255,.1);border-radius:16px;padding:60px 20px;text-align:center;cursor:pointer;transition:all .3s;background:var(--bg-card)}
.upload-dropzone:hover,.upload-dropzone.dragover{border-color:var(--accent-rose);background:rgba(244,63,94,.05)}
.dropzone-icon{font-size:48px;margin-bottom:16px}
.upload-dropzone h3{font-size:18px;margin-bottom:8px}
.upload-dropzone p{color:var(--text-secondary);font-size:14px}
.dropzone-hint{font-size:12px;color:var(--text-muted);margin-top:8px}
.upload-preview{width:100%;height:200px;border-radius:12px;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;margin-bottom:20px;color:var(--text-muted)}
.char-count{font-size:11px;color:var(--text-muted);float:right}
.tags-input{display:flex;flex-wrap:wrap;gap:8px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--border-subtle);min-height:42px;align-items:center}
.tags-input input{border:none;background:none;color:var(--text-primary);font-size:14px;outline:none;flex:1;min-width:100px}
.tag-item{padding:4px 10px;border-radius:100px;background:rgba(244,63,94,.1);color:var(--accent-rose);font-size:12px;display:flex;align-items:center;gap:4px}
.tag-remove{cursor:pointer;font-size:14px}
.visibility-options{display:flex;gap:16px;margin-top:6px}
.radio-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer}
.checkbox-label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer;margin-bottom:8px}
.form-actions{display:flex;gap:12px;margin-top:20px}

.not-found{text-align:center;padding:80px 20px}
.not-found-icon{font-size:64px;margin-bottom:16px}
.not-found h2{font-size:24px;margin-bottom:8px}
.not-found p{color:var(--text-secondary);margin-bottom:20px}

@media(max-width:768px){
  .analytics-charts{grid-template-columns:1fr}
  .home-banner{flex-direction:column;text-align:center}
  .banner-visual{display:none}
  .video-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-brand">
    <div class="app-brand-icon">🎵</div>
    <span>抖音工具</span>
  </div>
  <div class="header-actions">
    <div class="header-avatar" id="user-avatar">👤</div>
  </div>
</header>

<div id="app-content"></div>

<nav class="tab-bar">
  <div class="tab-item active" data-path="/home">
    <span class="tab-icon">🏠</span>
    <span class="tab-label">首页</span>
  </div>
  <div class="tab-item" data-path="/content">
    <span class="tab-icon">🎬</span>
    <span class="tab-label">内容</span>
  </div>
  <div class="tab-item" data-path="/upload">
    <span class="tab-icon">➕</span>
    <span class="tab-label">上传</span>
  </div>
  <div class="tab-item" data-path="/analytics">
    <span class="tab-icon">📊</span>
    <span class="tab-label">数据</span>
  </div>
  <div class="tab-item" data-path="/auth">
    <span class="tab-icon">⚙️</span>
    <span class="tab-label">设置</span>
  </div>
</nav>

<script>
const pages = {};

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = src;
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

class SimpleRouter {
  constructor() {
    this.routes = {};
    this.currentPage = null;
    this.container = document.getElementById('app-content');
  }

  register(path, pageObj) {
    this.routes[path] = pageObj;
  }

  navigate(path) {
    window.location.hash = path;
  }

  init() {
    window.addEventListener('hashchange', () => this._handleRoute());
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', () => this.navigate(tab.dataset.path));
    });
    this._handleRoute();
  }

  _handleRoute() {
    const hash = window.location.hash.slice(1) || '/home';
    const page = this.routes[hash];
    if (!page) {
      this.container.innerHTML = '<div class="not-found"><div class="not-found-icon">🔍</div><h2>页面未找到</h2><p>请检查路径是否正确</p><button class="btn btn-primary" onclick="window.location.hash=\'/home\'">返回首页</button></div>';
      return;
    }
    if (this.currentPage && this.currentPage.unmount) this.currentPage.unmount();
    this.currentPage = page;
    page.mount(this.container, {});
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.classList.toggle('active', tab.dataset.path === hash);
    });
  }
}

const router = new SimpleRouter();

const homePage = {
  mount(container) {
    container.innerHTML = `
      <div class="page-home">
        <div class="home-banner">
          <div class="banner-content">
            <h1>抖音创作者工具</h1>
            <p>一站式内容管理与数据分析平台</p>
            <div class="banner-actions">
              <button class="btn btn-primary" id="btn-go-auth">接入抖音账号</button>
            </div>
          </div>
          <div class="banner-visual">
            <div class="visual-ring"></div><div class="visual-ring"></div><div class="visual-ring"></div>
            <div class="visual-center">🎬</div>
          </div>
        </div>
        <h2>核心功能</h2>
        <div class="features-grid">
          <div class="feature-card"><div class="feature-icon" style="background:rgba(0,229,255,.1);color:#00e5ff">📊</div><h3>数据分析</h3><p>实时查看播放量、点赞数等核心指标</p></div>
          <div class="feature-card"><div class="feature-icon" style="background:rgba(168,85,247,.1);color:#a855f7">🎬</div><h3>内容管理</h3><p>管理视频、上传内容、编辑信息</p></div>
          <div class="feature-card"><div class="feature-icon" style="background:rgba(255,179,0,.1);color:#ffb300">🔍</div><h3>内容搜索</h3><p>搜索热门内容与趋势话题</p></div>
          <div class="feature-card"><div class="feature-icon" style="background:rgba(16,185,129,.1);color:#10b981">💬</div><h3>互动管理</h3><p>查看和管理评论与互动数据</p></div>
        </div>
        <h2 style="margin-top:32px">快速统计</h2>
        <div class="quick-stats-grid">
          <div class="quick-stat-card"><div class="stat-label">今日播放</div><div class="stat-value" style="color:#00e5ff">12,345</div><div class="stat-trend" style="color:#00e5ff">+15%</div></div>
          <div class="quick-stat-card"><div class="stat-label">新增粉丝</div><div class="stat-value" style="color:#a855f7">234</div><div class="stat-trend" style="color:#a855f7">+8%</div></div>
          <div class="quick-stat-card"><div class="stat-label">互动率</div><div class="stat-value" style="color:#ffb300">4.2%</div><div class="stat-trend" style="color:#ffb300">+0.3%</div></div>
          <div class="quick-stat-card"><div class="stat-label">视频总数</div><div class="stat-value" style="color:#10b981">56</div><div class="stat-trend" style="color:#10b981">+2</div></div>
        </div>
      </div>
    `;
    document.getElementById('btn-go-auth').addEventListener('click', () => router.navigate('/auth'));
  },
  unmount() {}
};

const authPage = {
  mount(container) {
    container.innerHTML = `
      <div class="page-auth"><div class="auth-container"><div class="auth-card">
        <div class="auth-header"><div class="auth-logo">🎵</div><h2>接入抖音账号</h2><p>授权后可使用完整功能</p></div>
        <div class="auth-form">
          <div class="form-group"><label>Client Key</label><input type="text" id="auth-client-key" placeholder="输入抖音开放平台 Client Key"></div>
          <div class="form-group"><label>Client Secret</label><input type="password" id="auth-client-secret" placeholder="输入 Client Secret"></div>
          <div class="form-group"><label>回调地址</label><input type="text" id="auth-redirect-uri" value="http://localhost:3000/callback"></div>
          <div class="form-group"><label>授权范围</label><div class="scope-options">
            <label class="scope-item"><input type="checkbox" checked value="user_info"> 用户信息</label>
            <label class="scope-item"><input type="checkbox" checked value="video.list"> 视频列表</label>
            <label class="scope-item"><input type="checkbox" value="video.create"> 发布视频</label>
            <label class="scope-item"><input type="checkbox" value="video.data"> 视频数据</label>
          </div></div>
          <button class="btn btn-primary btn-block" id="btn-start-auth">开始授权</button>
        </div>
        <div class="auth-status" id="auth-status"></div>
        <div class="auth-help"><h4>如何获取 Client Key？</h4><ol>
          <li>前往抖音开放平台 (open.douyin.com) 注册开发者账号</li>
          <li>创建应用并获取 Client Key 和 Client Secret</li>
          <li>配置回调地址为当前服务地址</li>
          <li>选择需要的权限范围</li>
        </ol></div>
      </div></div></div>
    `;
    document.getElementById('btn-start-auth').addEventListener('click', () => {
      const ck = document.getElementById('auth-client-key').value;
      const cs = document.getElementById('auth-client-secret').value;
      if (!ck || !cs) {
        const s = document.getElementById('auth-status');
        s.className = 'auth-status error'; s.textContent = '请填写 Client Key 和 Client Secret';
        return;
      }
      const scopes = Array.from(document.querySelectorAll('.scope-item input:checked')).map(c => c.value);
      localStorage.setItem('douyin_sdk_config', JSON.stringify({ clientKey: ck, clientSecret: cs, scope: scopes.join(',') }));
      const s = document.getElementById('auth-status');
      s.className = 'auth-status info'; s.textContent = '配置已保存，授权功能需部署后使用';
    });
  },
  unmount() {}
};

const contentPage = {
  mount(container) {
    const videos = [
      { id:1, title:'春日穿搭分享', dur:'00:45', status:'published', statusText:'已发布', views:'12.3K', likes:'1.2K', comments:'234', color:'linear-gradient(135deg,#ff6b6b,#ee5a24)' },
      { id:2, title:'美食制作教程', dur:'01:30', status:'published', statusText:'已发布', views:'8.5K', likes:'890', comments:'156', color:'linear-gradient(135deg,#ffa502,#ff6348)' },
      { id:3, title:'旅行Vlog - 京都', dur:'02:15', status:'review', statusText:'审核中', views:'--', likes:'--', comments:'--', color:'linear-gradient(135deg,#7bed9f,#2ed573)' },
      { id:4, title:'产品开箱测评', dur:'03:00', status:'draft', statusText:'草稿', views:'--', likes:'--', comments:'--', color:'linear-gradient(135deg,#70a1ff,#1e90ff)' },
      { id:5, title:'健身打卡 Day 30', dur:'00:30', status:'published', statusText:'已发布', views:'5.2K', likes:'456', comments:'89', color:'linear-gradient(135deg,#a29bfe,#6c5ce7)' },
      { id:6, title:'读书笔记分享', dur:'01:00', status:'published', statusText:'已发布', views:'3.1K', likes:'321', comments:'67', color:'linear-gradient(135deg,#fd79a8,#e84393)' },
    ];
    container.innerHTML = `
      <div class="page-content">
        <div class="content-header"><h2>内容管理</h2><div class="content-actions">
          <button class="btn btn-primary" onclick="router.navigate('/upload')">上传视频</button>
          <button class="btn btn-secondary" id="btn-refresh">刷新</button>
        </div></div>
        <div class="content-filters">
          <div class="filter-group">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="published">已发布</button>
            <button class="filter-btn" data-filter="draft">草稿</button>
            <button class="filter-btn" data-filter="review">审核中</button>
          </div>
          <div class="search-box"><input type="text" id="content-search" placeholder="搜索视频..."></div>
        </div>
        <div class="video-grid" id="video-grid">
          ${videos.map(v => `
            <div class="video-card" data-status="${v.status}">
              <div class="video-thumb" style="background:${v.color}">
                <div class="video-duration">${v.dur}</div>
                <div class="video-status ${v.status}">${v.statusText}</div>
              </div>
              <div class="video-info">
                <h4 class="video-title">${v.title}</h4>
                <div class="video-meta"><span>▶ ${v.views}</span><span>❤ ${v.likes}</span><span>💬 ${v.comments}</span></div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const f = btn.dataset.filter;
        document.querySelectorAll('.video-card').forEach(card => {
          card.style.display = (f === 'all' || card.dataset.status === f) ? '' : 'none';
        });
      });
    });
    document.getElementById('content-search').addEventListener('input', (e) => {
      const kw = e.target.value.toLowerCase();
      document.querySelectorAll('.video-card').forEach(card => {
        const title = card.querySelector('.video-title').textContent.toLowerCase();
        card.style.display = title.includes(kw) ? '' : 'none';
      });
    });
  },
  unmount() {}
};

const uploadPage = {
  mount(container) {
    container.innerHTML = `
      <div class="page-upload">
        <div class="upload-header"><h2>上传视频</h2></div>
        <div class="upload-dropzone" id="dropzone">
          <div class="dropzone-icon">📁</div><h3>拖拽视频文件到此处</h3><p>或点击选择文件</p>
          <p class="dropzone-hint">支持 MP4、MOV 格式，最大 4GB</p>
          <input type="file" id="file-input" accept="video/mp4,video/quicktime" hidden>
        </div>
        <div id="upload-form" style="display:none">
          <div class="upload-preview">视频预览</div>
          <div class="form-group"><label>视频标题</label><input type="text" id="video-title" placeholder="输入视频标题" maxlength="55"></div>
          <div class="form-group"><label>视频描述</label><textarea id="video-desc" placeholder="添加视频描述..." maxlength="500" rows="4"></textarea></div>
          <div class="form-group"><label>话题标签</label><div class="tags-input"><input type="text" id="tag-input" placeholder="输入标签后按回车"></div></div>
          <div class="form-group"><label>可见范围</label><div class="visibility-options">
            <label class="radio-item"><input type="radio" name="vis" value="public" checked> 公开</label>
            <label class="radio-item"><input type="radio" name="vis" value="friends"> 朋友可见</label>
            <label class="radio-item"><input type="radio" name="vis" value="private"> 私密</label>
          </div></div>
          <div class="form-actions">
            <button class="btn btn-primary" id="btn-publish">发布视频</button>
            <button class="btn btn-secondary" id="btn-draft">保存草稿</button>
          </div>
        </div>
      </div>
    `;
    const dz = document.getElementById('dropzone');
    const fi = document.getElementById('file-input');
    dz.addEventListener('click', () => fi.click());
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); if(e.dataTransfer.files[0]) showForm(e.dataTransfer.files[0]); });
    fi.addEventListener('change', e => { if(e.target.files[0]) showForm(e.target.files[0]); });
    function showForm(file) { dz.style.display='none'; document.getElementById('upload-form').style.display='block'; document.getElementById('video-title').value=file.name.replace(/\.[^.]+$/,''); }
    document.getElementById('tag-input').addEventListener('keydown', e => {
      if(e.key==='Enter'&&e.target.value.trim()){e.preventDefault();const t=document.createElement('span');t.className='tag-item';t.innerHTML='#'+e.target.value.trim()+' <span class="tag-remove">&times;</span>';t.querySelector('.tag-remove').addEventListener('click',()=>t.remove());e.target.parentElement.insertBefore(t,e.target);e.target.value='';}
    });
  },
  unmount() {}
};

const analyticsPage = {
  mount(container) {
    const days = 7;
    const viewsData = Array.from({length:days},()=>Math.floor(Math.random()*15000+5000));
    const followersData = Array.from({length:days},()=>Math.floor(Math.random()*500+100));
    const maxV = Math.max(...viewsData), maxF = Math.max(...followersData);
    container.innerHTML = `
      <div class="page-analytics">
        <div class="analytics-header"><h2>数据分析</h2>
          <div class="analytics-period">
            <button class="period-btn active">7天</button>
            <button class="period-btn">30天</button>
            <button class="period-btn">90天</button>
          </div>
        </div>
        <div class="analytics-summary">
          <div class="summary-card"><div class="summary-value">86.2K</div><div class="summary-label">总播放量</div></div>
          <div class="summary-card"><div class="summary-value">8.9K</div><div class="summary-label">总点赞数</div></div>
          <div class="summary-card"><div class="summary-value">1.2K</div><div class="summary-label">总评论数</div></div>
          <div class="summary-card"><div class="summary-value">3.4K</div><div class="summary-label">总分享数</div></div>
        </div>
        <div class="analytics-charts">
          <div class="chart-card"><h3>播放趋势</h3><div class="bar-chart">${viewsData.map((v,i)=>`<div class="bar-item"><div class="bar" style="height:${(v/maxV*100).toFixed(0)}%;background:linear-gradient(to top,rgba(244,63,94,.3),var(--accent-rose))"></div><span class="bar-label">D${i+1}</span></div>`).join('')}</div></div>
          <div class="chart-card"><h3>粉丝增长</h3><div class="bar-chart">${followersData.map((v,i)=>`<div class="bar-item"><div class="bar" style="height:${(v/maxF*100).toFixed(0)}%;background:linear-gradient(to top,rgba(168,85,247,.3),var(--accent-violet))"></div><span class="bar-label">D${i+1}</span></div>`).join('')}</div></div>
        </div>
        <div class="chart-card full-width"><h3>视频表现排行</h3>
          <div class="table-header"><span>排名</span><span>标题</span><span>播放</span><span>点赞</span><span>互动率</span></div>
          <div class="table-row"><span class="rank-num top">1</span><span>春日穿搭分享</span><span>12.3K</span><span>1.2K</span><span style="color:var(--accent-emerald)">11.4%</span></div>
          <div class="table-row"><span class="rank-num top">2</span><span>美食制作教程</span><span>8.5K</span><span>890</span><span style="color:var(--accent-emerald)">10.5%</span></div>
          <div class="table-row"><span class="rank-num top">3</span><span>健身打卡 Day 30</span><span>5.2K</span><span>456</span><span style="color:var(--accent-emerald)">8.8%</span></div>
          <div class="table-row"><span class="rank-num">4</span><span>读书笔记分享</span><span>3.1K</span><span>321</span><span style="color:var(--accent-emerald)">10.4%</span></div>
          <div class="table-row"><span class="rank-num">5</span><span>日常分享</span><span>2.8K</span><span>234</span><span style="color:var(--accent-emerald)">8.4%</span></div>
        </div>
      </div>
    `;
  },
  unmount() {}
};

router.register('/home', homePage);
router.register('/auth', authPage);
router.register('/content', contentPage);
router.register('/upload', uploadPage);
router.register('/analytics', analyticsPage);
router.init();
</script>
</body>
</html>
